<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>명일방주 통합 소장품 도감</title>
<style>
:root {
  --bg: #0d0e12;
  --bg2: #13151c;
  --bg3: #1a1d28;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #e8e9f0;
  --text2: #9499b0;
  --text3: #5a5f7a;
  --accent: #4a9eff;
  --topbar-h: 56px;
  --sidebar-w: 220px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Pretendard','Noto Sans KR',system-ui,sans-serif; min-height: 100vh; font-size: 16px; }

/* ── TOP BAR ─────────────────────────────── */
.top-bar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border2);
  padding: 0 16px;
  display: flex;
  align-items: center;
  gap: 6px;
  height: var(--topbar-h);
  position: sticky;
  top: 0;
  z-index: 200;
  flex-wrap: nowrap;
}
.top-bar h1 {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  margin-right: 8px;
  flex-shrink: 0;
}
.top-bar h1 span { color: var(--text3); font-weight: 400; }

.is-tabs { display: flex; gap: 2px; flex-shrink: 0; }
.is-tab {
  background: none;
  border: none;
  cursor: pointer;
  padding: 7px 12px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text3);
  border-radius: 6px;
  transition: all 0.15s;
  white-space: nowrap;
  line-height: 1.2;
}
.is-tab .tab-sub { display: block; font-size: 10px; opacity: 0.7; font-weight: 400; }
.is-tab:hover { background: var(--bg3); color: var(--text); }
.is-tab.active { color: #fff; }
.is-tab[data-is="is2"].active { background: rgba(74,158,255,0.2); color: #4a9eff; }
.is-tab[data-is="is4"].active { background: rgba(232,134,74,0.2); color: #e8864a; }
.is-tab[data-is="is5"].active { background: rgba(62,200,200,0.2); color: #3ec8c8; }
.is-tab[data-is="is6"].active { background: rgba(200,155,74,0.2); color: #c89b4a; }

.search-wrap { margin-left: auto; flex-shrink: 0; }
.search-wrap input {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text);
  font-size: 14px;
  padding: 7px 12px;
  width: 200px;
  outline: none;
  transition: border-color 0.15s;
}
.search-wrap input:focus { border-color: rgba(255,255,255,0.3); }
.search-wrap input::placeholder { color: var(--text3); }

/* ── MOBILE NAV (bottom tabs, hidden on desktop) ── */
.mobile-bottom-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--bg2);
  border-top: 1px solid var(--border2);
  z-index: 300;
  padding: 0;
}
.mobile-bottom-nav .is-tabs { justify-content: space-around; padding: 6px 0 env(safe-area-inset-bottom, 6px); }
.mobile-bottom-nav .is-tab { flex: 1; text-align: center; border-radius: 0; padding: 6px 4px; font-size: 12px; }

.mobile-cat-bar {
  display: none;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  white-space: nowrap;
  padding: 8px 12px;
  gap: 6px;
  scrollbar-width: none;
}
.mobile-cat-bar::-webkit-scrollbar { display: none; }
.mobile-cat-pill {
  display: inline-block;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 13px;
  color: var(--text3);
  padding: 5px 13px;
  cursor: pointer;
  transition: all 0.12s;
  white-space: nowrap;
}
.mobile-cat-pill.active { color: var(--text); background: rgba(255,255,255,0.08); border-color: var(--accent); }
.mobile-cat-pill .pill-count { font-size: 11px; color: var(--text3); margin-left: 4px; }

/* ── LAYOUT ──────────────────────────────── */
.layout {
  display: flex;
  height: calc(100vh - var(--topbar-h));
}

.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--bg2);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 14px 0;
  flex-shrink: 0;
}
.sidebar-section-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--text3);
  text-transform: uppercase;
  padding: 8px 16px 4px;
}
.sidebar-cat {
  padding: 9px 16px;
  font-size: 14px;
  color: var(--text3);
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: all 0.12s;
  line-height: 1.4;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.sidebar-cat:hover { background: var(--bg3); color: var(--text2); }
.sidebar-cat.active { background: var(--bg3); color: var(--text); border-left-color: var(--accent); }
.sidebar-cat .cat-count {
  font-size: 12px;
  color: var(--text3);
  background: var(--bg);
  border-radius: 10px;
  padding: 1px 7px;
  flex-shrink: 0;
}

.main {
  flex: 1;
  overflow-y: auto;
  padding: 22px 20px;
}
.cat-header { margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.cat-header h2 { font-size: 20px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.cat-header .cat-sub { font-size: 13px; color: var(--text3); margin-top: 4px; }
.count-badge {
  font-size: 12px;
  font-weight: 500;
  color: var(--text3);
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 2px 8px;
}

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }

.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 15px 16px;
  transition: all 0.12s;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent);
  opacity: 0;
  transition: opacity 0.12s;
}
.card:hover { border-color: var(--border2); background: var(--bg3); transform: translateY(-1px); }
.card:hover::before { opacity: 1; }

.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
.item-name { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.35; }
.item-id { font-size: 11px; color: var(--text3); font-family: monospace; white-space: nowrap; flex-shrink: 0; padding-top: 2px; }
.item-usage {
  font-size: 13px;
  color: var(--accent);
  line-height: 1.5;
  margin-bottom: 8px;
  padding: 6px 9px;
  background: rgba(255,255,255,0.04);
  border-radius: 5px;
  border-left: 2px solid var(--accent);
}
.item-desc { font-size: 13px; color: var(--text3); line-height: 1.6; }
.new-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  background: rgba(62,200,200,0.2);
  color: #3ec8c8;
  border-radius: 4px;
  padding: 2px 6px;
  margin-left: 6px;
  vertical-align: middle;
  letter-spacing: 0.04em;
}
.no-results { text-align: center; padding: 80px 20px; color: var(--text3); font-size: 15px; }

/* ── MOBILE SEARCH (shown below topbar on mobile) ── */
.mobile-search-bar { display: none; padding: 10px 14px; border-bottom: 1px solid var(--border); }
.mobile-search-bar input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text);
  font-size: 15px;
  padding: 9px 13px;
  outline: none;
}
.mobile-search-bar input::placeholder { color: var(--text3); }

/* ── RESPONSIVE ──────────────────────────── */
@media (max-width: 768px) {
  :root { --topbar-h: 52px; }

  .top-bar h1 span { display: none; }
  .is-tabs { display: none; }
  .search-wrap { display: none; }

  .mobile-bottom-nav { display: block; }
  .mobile-cat-bar { display: flex; }
  .mobile-search-bar { display: block; }

  .layout { height: calc(100vh - var(--topbar-h) - 60px); flex-direction: column; }
  .sidebar { display: none; }
  .main { padding: 14px 12px 100px; }

  .grid { grid-template-columns: 1fr; gap: 10px; }
  .card { padding: 13px 14px; }
  .item-name { font-size: 15px; }
  .item-usage { font-size: 13px; }
  .item-desc { font-size: 13px; }
  .cat-header h2 { font-size: 18px; }
}
@media (max-width: 480px) {
  .top-bar h1 { font-size: 14px; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <h1>명일방주 <span>소장품</span></h1>
  <div class="is-tabs" id="is-tabs-top"></div>
  <div class="search-wrap">
    <input type="text" id="search-desktop" placeholder="이름 / 효과 검색…">
  </div>
</div>

<!-- MOBILE: search + category pill bar -->
<div class="mobile-search-bar">
  <input type="text" id="search-mobile" placeholder="이름 / 효과 검색…">
</div>
<div class="mobile-cat-bar" id="mobile-cat-bar"></div>

<!-- LAYOUT -->
<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main"></div>
</div>

<!-- MOBILE BOTTOM NAV -->
<div class="mobile-bottom-nav">
  <div class="is-tabs" id="is-tabs-bottom"></div>
</div>

<script>
const DATA = {"is2":{"meta":{"title":"미래 위에 빛나는 자","short":"IS:2","color":"#4a9eff"},"categories":[{"name":"생존 지원","items":[{"id":"001","name":"전기주전자","usage":"목표 HP +2, 희망 +1 즉시 획득","desc":"로도스 아일랜드 사무실에 있는 것과 같은 모델의 전기 주전자. 한밤중에 이걸로 라면을 끓여 먹는 사람들도 종종 있는데, 이는 건강하지 않은 생활습관이다……","imgSrc":"assets/img/showroom/relics/001.png"},{"id":"002","name":"특수 저지 장치","usage":"목표 HP +6 즉시 획득","desc":"로도스 아일랜드의 개량형 저지 장치. 감염으로 인한 오리지늄 아츠 통제 불능 상태를 효과적으로 제어할 수 있다.","imgSrc":"assets/img/showroom/relics/002.png"},{"id":"003","name":"석상귀 조각상","usage":"목표 HP +6 즉시 획득","desc":"손바닥만한 조각상. 석상귀들이 우호를 표시하는 피조물이라고 한다.","imgSrc":"assets/img/showroom/relics/003.png"},{"id":"004","name":"뱀파이어의 침대","usage":"목표 HP +8 즉시 획득","desc":"고성의 분위기와 아주 잘 어울리는 럭셔리한 관. 와파린은 이런 게 고정관념이라고 한다.","imgSrc":"assets/img/showroom/relics/004.png"},{"id":"005","name":"영생의 상징","usage":"목표 HP +10 즉시 획득","desc":"한쪽은 시들지만, 한쪽은 자라고 있는 나뭇가지. 시든 쪽에서 살아나고, 번성한 쪽은 다시 시든다.","imgSrc":"assets/img/showroom/relics/005.png"},{"id":"006","name":"열린 소품 상자","usage":"희망 +4","desc":"극단 소품 담당자의 상자. 골무부터 마네킹까지 없는 게 없다.","imgSrc":"assets/img/showroom/relics/006.png"},{"id":"007","name":"낡은 악보","usage":"희망 +4","desc":"음표가 흐려져 잘 보이지 않는 낡은 악보의 찢긴 한 페이지. 과연 이 곡엔 어떤 사연이 담겨 있을지 궁금하다.","imgSrc":"assets/img/showroom/relics/007.png"},{"id":"008","name":"계약해지서","usage":"희망 +4","desc":"서명 하나만 받아내면 이 극단에서 완전히 벗어날 수 있다.","imgSrc":"assets/img/showroom/relics/008.png"},{"id":"009","name":"만능열쇠","usage":"희망 +6","desc":"은으로 만든 낡은 열쇠로, 열 수 없는 문이 없다. 관리자로서, 극단 매니저로서 당연히 모든 비밀을 열 수 있는 이 은 열쇠를 손에 쥐어야 한다.","imgSrc":"assets/img/showroom/relics/009.png"},{"id":"010","name":"밴시의 입맞춤","usage":"희망 +8","desc":"이종족이 이걸 얻으면 종종 자신을 초월하는 용기를 보여주곤 하는데, 보기 드문 남성 밴시인 로고스는 이미 익숙해져 있었다.","imgSrc":"assets/img/showroom/relics/010.png"},{"id":"011","name":"고대 주화","usage":"오리지늄각뿔 +10 즉시 획득","desc":"녹이 슬어 연도를 판별할 수 없는 고대 주화. 테라 황무지 어디에서나 볼 수 있다.","imgSrc":"assets/img/showroom/relics/011.png"},{"id":"012","name":"배우의 장신구 박스","usage":"오리지늄각뿔 +18 즉시 획득","desc":"각종 깨진 장신구가 가득 담긴 박스. 젊은 주연 배우는 보석들을 장착하고 무대에 올라 가장 높은 곳에서 훌쩍 뛰어내린다.","imgSrc":"assets/img/showroom/relics/012.png"},{"id":"013","name":"무결점 보옥","usage":"오리지늄각뿔 +25 즉시 획득","desc":"이것 때문에 성이 세 번이나 파괴되긴 했지만, 흠잡을 데 없는 보옥은 여전히 밝게 빛난다. 보옥을 소지한 사르곤 황제는 오늘날까지도 어떤 보석이 가장 잘 어울리는지 모른다. 전쟁의 총성만 영원히 따를 뿐.","imgSrc":"assets/img/showroom/relics/013.png"},{"id":"014","name":"조커 카드","usage":"오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"이것은 당신에게 주어진 특권이다.","imgSrc":"assets/img/showroom/relics/014.png"},{"id":"015","name":"미스 크리스틴 쓰담권","usage":"오퍼레이터 2명 즉시 랭크 상승 (희망 소모 없음)","desc":"당신은 이미 미스의 허락을 받았다!","imgSrc":"assets/img/showroom/relics/015.png"},{"id":"016","name":"고대 주물","usage":"오퍼레이터 3명 즉시 랭크 상승 (희망 소모 없음)","desc":"“하늘에는 커다란 용광로가 있고, 땅에는 금, 은, 동, 석, 철, 다섯 가지 금속이 난다”…… 다양한 일에 사용되긴 하지만 아무도 구체적인 원리를 모른다.","imgSrc":"assets/img/showroom/relics/016.png"},{"id":"017","name":"클로 - 전훈","usage":"[뱅가드] 오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"강력한 무기, 용감히 앞으로 나아가는 마음.","imgSrc":"assets/img/showroom/relics/017.png"},{"id":"018","name":"브로큰 스피어 - 전훈","usage":"[가드] 오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"활도, 아츠도 사용할 줄도 모르기 때문에 할 수 없이 검을 사용하는 사람들도 있지만, 검을 사용할 수밖에 없기 때문에 검을 사용하는 사람도 있다.","imgSrc":"assets/img/showroom/relics/018.png"},{"id":"019","name":"프로텍터 - 전훈","usage":"[디펜더] 오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"상처는 훈장이다. 하지만 가루처럼 부서져 버린 전사들은 누가 기억해 줄 것인가?","imgSrc":"assets/img/showroom/relics/019.png"},{"id":"020","name":"브로큰 보우 - 전훈","usage":"[스나이퍼] 오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"“화력을 잘 제어하든지, 목표를 정확히 겨냥하든지 하라고, 알겠어?”","imgSrc":"assets/img/showroom/relics/020.png"},{"id":"021","name":"브로큰 스태프 - 전훈","usage":"[캐스터] 오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"“어떤 캐스터 오퍼레이터들의 \\'공연\\'을 보고 난 뒤, 나는 라이타니엔 교재를 묵묵히 거둬들이기로 결심했다.”","imgSrc":"assets/img/showroom/relics/021.png"},{"id":"022","name":"스트럿 - 전훈","usage":"[서포터] 오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"그들은 행동할 때 항상 제각각이다.","imgSrc":"assets/img/showroom/relics/022.png"},{"id":"023","name":"힐러 - 전훈","usage":"[메딕] 오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"모든 사람이 의사가 되어 삶의 병터라는 병을 완치할 수 있는 때가 온다면, 우리는 더 이상 의사가 필요하지 않을 것이다.","imgSrc":"assets/img/showroom/relics/023.png"},{"id":"024","name":"러스트 블레이드 - 전훈","usage":"[스페셜리스트] 오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"스페셜리스트 오퍼레이터들과 실전 연습을 할 때, \\'준비를 제대로 하지 않으면 공격당한다\\'라는 마음의 준비를 단단히 해두도록.","imgSrc":"assets/img/showroom/relics/024.png"},{"id":"025","name":"지역 액션 플랜","usage":"4성 오퍼레이터 모집 시 희망 소모 -2","desc":"중요 거점 지역에 모두 전문 사무소가 있는 로도스 아일랜드는 전달자들의 노력 끝에 이 땅에 파괴되기 쉬운 네트워크를 겨우 구축할 수 있었다.","imgSrc":"assets/img/showroom/relics/025.png"},{"id":"026","name":"전역 작전 문서","usage":"5성 오퍼레이터 모집 시 희망 소모 -2","desc":"대륙에서 배를 띄우는 건 살얼음판을 걷는 것과 같다. 자신만의 통찰력을 키우길.","imgSrc":"assets/img/showroom/relics/026.png"},{"id":"027","name":"인사부 비밀서한","usage":"6성 오퍼레이터 모집 시 희망 소모 -2","desc":"“■■■ 씨가 준 거라고? 그럼 됐어.”","imgSrc":"assets/img/showroom/relics/027.png"},{"id":"028","name":"연설문","usage":"모든 오퍼레이터 모집 시 희망 소모 -2","desc":"그녀는 조금 긴장하고 걱정스러운 듯한 모습을 보였지만, 언제나 굳건함을 유지했다. 마이크가 켜지자, 그녀의 긴 두 귀가 살짝 움직였다.","imgSrc":"assets/img/showroom/relics/028.png"},{"id":"029","name":"크림슨 극단의 반쪽 티켓","usage":"전투 후 25% 확률로 모집권 1장 추가 드랍","desc":"공연과 연출자의 이름이 쓰여 있지 않은 크림슨 극단의 티켓, 과연 어떤 공연이 당신을 기다리고 있을지 기대된다.","imgSrc":"assets/img/showroom/relics/029.png"},{"id":"030","name":"럭키 코인","usage":"비전투 노드 진입 시 오리지늄각뿔 +2 획득","desc":"로도스 아일랜드에서 주운 동전. 하나를 주우면 더 많이 주울 수 있다.","imgSrc":"assets/img/showroom/relics/030.png"},{"id":"031","name":"무도회 가면","usage":"비전투 노드 진입 시 오리지늄각뿔 +3 획득","desc":"신사 숙녀 여러분, 크림슨 극단에 오신 것을 환영합니다. 다음 공연은 정말 인상 깊을 것입니다.","imgSrc":"assets/img/showroom/relics/031.png"},{"id":"032","name":"보물 반지","usage":"전투 드랍 오리지늄각뿔 +50%","desc":"라이타니엔 신화에 나오는 반지. 이 반지를 지니면 온 대지의 부를 가질 수 있으나, 결국 탐욕 때문에 파멸한다고 전해진다.","imgSrc":"assets/img/showroom/relics/032.png"},{"id":"033","name":"빅토리아 \\'고철\\' 훈장","usage":"전투 획득 지휘 경험치 +20%","desc":"시즈가 임시로 다그다에게 만들어 준 기사 훈장. 재료는 형편없으나, 다그다에겐 그 의미가 아주 컸다.","imgSrc":"assets/img/showroom/relics/033.png"},{"id":"034","name":"라이타니엔 명예 훈장","usage":"전투 획득 지휘 경험치 +30%","desc":"쌍둥이 여황제의 의견이 잘 맞는 일은 극히 드문데, 예술을 창조하는 자에게 훈장을 수여하는 것이 그중 하나다.","imgSrc":"assets/img/showroom/relics/034.png"},{"id":"035","name":"녹슨 쇠망치","usage":"상품 구매 시 소모 오리지늄각뿔 -50%","desc":"“변혁은 필수다. 폭풍우가 더 빨리 휘몰아쳐야 한다.”","imgSrc":"assets/img/showroom/relics/035.png"},{"id":"036","name":"네잎클로버 화석","usage":"전투 후 소장품 선택 옵션 1종 추가","desc":"마젤란이 생명이 사라진 곳에서 찾은 행운의 상징. 대지의 격변을 겪은 게 틀림없으나, 다행히 살아남은 이 돌은 발견자에게 자그마한 희망을 주고 있다.\\n","imgSrc":"assets/img/showroom/relics/036.png"},{"id":"037","name":"돌격 협의 확충","usage":"상점 및 전투에서 드랍되는 뱅가드 모집권이 모두 고급 인사배치서한으로 업그레이드","desc":"오퍼레이터 구성만으로 전선 전투에서 우위를 점하기는 어렵다. 협의를 통해 전투력을 보충하는 것도 효과적인 방법이다.","imgSrc":"assets/img/showroom/relics/037.png"},{"id":"038","name":"돌격 협의 증원","usage":"상점 및 전투에서 드랍되는 가드 모집권이 모두 고급 인사배치서한으로 업그레이드","desc":"오퍼레이터 구성만으로 전선 전투에서 우위를 점하기는 어렵다. 협의를 통해 전투력을 보충하는 것도 효과적인 방법이다.","imgSrc":"assets/img/showroom/relics/038.png"},{"id":"039","name":"방어 협의 확충","usage":"상점 및 전투에서 드랍되는 디펜더 모집권이 모두 고급 인사배치서한으로 업그레이드","desc":"오퍼레이터 구성만으로 전선 전투에서 우위를 점하기는 어렵다. 협의를 통해 전투력을 보충하는 것도 효과적인 방법이다.","imgSrc":"assets/img/showroom/relics/039.png"},{"id":"040","name":"방어 협의 증원","usage":"상점 및 전투에서 드랍되는 서포터 모집권이 모두 고급 인사배치서한으로 업그레이드","desc":"오퍼레이터 구성만으로 전선 전투에서 우위를 점하기는 어렵다. 협의를 통해 전투력을 보충하는 것도 효과적인 방법이다.","imgSrc":"assets/img/showroom/relics/040.png"},{"id":"041","name":"원거리 협의 확충","usage":"상점 및 전투에서 드랍되는 메딕 모집권이 모두 고급 인사배치서한으로 업그레이드","desc":"오퍼레이터 구성만으로 전선 전투에서 우위를 점하기는 어렵다. 협의를 통해 전투력을 보충하는 것도 효과적인 방법이다.","imgSrc":"assets/img/showroom/relics/041.png"},{"id":"042","name":"원거리 협의 증원","usage":"상점 및 전투에서 드랍되는 스나이퍼 모집권이 모두 고급 인사배치서한으로 업그레이드","desc":"오퍼레이터 구성만으로 전선 전투에서 우위를 점하기는 어렵다. 협의를 통해 전투력을 보충하는 것도 효과적인 방법이다.","imgSrc":"assets/img/showroom/relics/042.png"},{"id":"043","name":"파괴 협의 확충","usage":"상점 및 전투에서 드랍되는 캐스터 모집권이 모두 고급 인사배치서한으로 업그레이드","desc":"오퍼레이터 구성만으로 전선 전투에서 우위를 점하기는 어렵다. 협의를 통해 전투력을 보충하는 것도 효과적인 방법이다.","imgSrc":"assets/img/showroom/relics/043.png"},{"id":"044","name":"파괴 협의 증원","usage":"상점 및 전투에서 드랍되는 스페셜리스트 모집권이 모두 고급 인사배치서한으로 업그레이드","desc":"오퍼레이터 구성만으로 전선 전투에서 우위를 점하기는 어렵다. 협의를 통해 전투력을 보충하는 것도 효과적인 방법이다.","imgSrc":"assets/img/showroom/relics/044.png"}]},{"name":"투지의 기어","items":[{"id":"045","name":"\\'사일런트 스쿼드\\'","usage":"모든 아군 유닛의 공격력, 방어력 +35%, HP +45%","desc":"로도스 아일랜드 엔지니어링부에서 조종하는 탐색용 드론으로, 보다 효율적이고 안전하며 외근 오퍼레이터에게 전방위적인 지원과 보장을 제공한다.","imgSrc":"assets/img/showroom/relics/045.png"},{"id":"046","name":"갈라진 속박의 끈","usage":"모든 적군 유닛의 공격력 -7%","desc":"이 튼튼한 끈으로 뭔가 무서운 걸 묶었을 것 같다…… 이런……","imgSrc":"assets/img/showroom/relics/046.png"},{"id":"047","name":"기이한 가면","usage":"모든 적군 유닛의 공격력 -12%","desc":"그 어떤 문화에도 속하지 않는 괴상한 가면. 전의를 상실하게 한다…… 그리고, 자기도 모르게 깊은 생각에 빠진다.","imgSrc":"assets/img/showroom/relics/047.png"},{"id":"048","name":"대모의 증표","usage":"모든 적군 유닛의 공격력 -17%","desc":"뼈로 만든 월계관. 시실리안 부인의 증표이다. 질서의 상징은 바로 요동치는 욕망을 잠재우는 것으로, 투쟁은 허용되지 않는다. 진실이든 거짓이든 무릎을 꿇으라.","imgSrc":"assets/img/showroom/relics/048.png"},{"id":"049","name":"낡은 사진","usage":"모든 적군 유닛의 방어력 -12%","desc":"사진 속에 아는 사람이라도 있나?","imgSrc":"assets/img/showroom/relics/049.png"},{"id":"050","name":"작가의 대변자","usage":"모든 적군 유닛의 방어력 -21%","desc":"극작가는 자신의 피를 잉크로 삼아 작품을 창작한다. 그는 자신을 위해 불바다에 뛰어드는 마지막 장면을 그려냈다.","imgSrc":"assets/img/showroom/relics/050.png"},{"id":"051","name":"로즈몬티스의 포옹","usage":"모든 적군 유닛의 방어력 -30%","desc":"“누가 심판하지?”","imgSrc":"assets/img/showroom/relics/051.png"},{"id":"052","name":"\\'검은 밤의 속삭임\\'","usage":"모든 적군 유닛의 HP -10%","desc":"검은 색 레코드, 만.지.지.마.시.오.","imgSrc":"assets/img/showroom/relics/052.png"},{"id":"053","name":"금박 장식 주사위","usage":"모든 적군 유닛의 HP -15%","desc":"금박 장식이 되어 있는 주사위로, 한 면에만 생존을 상징하는 표식이 새겨져 있고, 나머지 19개 면에는……","imgSrc":"assets/img/showroom/relics/053.png"},{"id":"054","name":"《고요함》","usage":"모든 적군 유닛의 HP -20%","desc":"이베리아 역사상 가장 컸던 재앙을 그린 작품. 붓 터치도, 색도, 사상도 아무 의미가 없다. “에기르는 안다, 에기르는 안다, 에기르는 안다.”","imgSrc":"assets/img/showroom/relics/054.png"},{"id":"055","name":"이철 원형 방패","usage":"모든 아군 유닛의 방어력 +15%","desc":"현대 공업 분야에 널리 쓰이기 전까지 이철은 군용 제식 무기를 만드는 데 더 자주 쓰였다.","imgSrc":"assets/img/showroom/relics/055.png"},{"id":"056","name":"군단 미러 아머","usage":"모든 아군 유닛의 방어력 +25%","desc":"한때 심장의 치명적인 피해를 막을 수 있는 흉갑이었으나, 가울이 몰락하면서 이런 구식 갑옷은 역사의 무대에서 사라지게 됐다.","imgSrc":"assets/img/showroom/relics/056.png"},{"id":"057","name":"고대 증기 투구","usage":"모든 아군 유닛의 방어력 +35%","desc":"이런 구형 증기 투구에도 빅토리아 군주들이 넓은 대륙을 비추었던 과거의 영광을 담고 있는 것만 같다.","imgSrc":"assets/img/showroom/relics/057.png"},{"id":"058","name":"황제의 은총","usage":"모든 아군 근거리 유닛 공격력 +15%","desc":"편지 봉투를 개봉할 때 쓰는 날카로운 칼. 전대 우르수스 황제가 애용하던 일용품이지만, 대부분 봉투를 개봉하는 데 쓰지는 않았다.","imgSrc":"assets/img/showroom/relics/058.png"},{"id":"059","name":"귀족 레이피어","usage":"모든 아군 근거리 유닛 공격력 +25%","desc":"거의 장식용으로 사용하는 귀족 검. 가울 귀족들이 가장 먼저 사용했지만, 군용 무기로 쓰기에는 너무 취약하다.","imgSrc":"assets/img/showroom/relics/059.png"},{"id":"060","name":"올드 가디언의 창","usage":"모든 아군 근거리 유닛 공격력 +35%","desc":"올드 가디언의 희생을 지켜본 후 가울은 비로소 자신의 파멸을 맞이했다.","imgSrc":"assets/img/showroom/relics/060.png"},{"id":"061","name":"헌신의 목걸이","usage":"모든 아군 원거리 유닛 공격력 +15%","desc":"신앙은 심장 10센티미터 위에 걸려있고, 언어는 피에 흘러들며, 총알은 탄창에 미끄러져 들어간다.","imgSrc":"assets/img/showroom/relics/061.png"},{"id":"062","name":"은식기","usage":"모든 아군 원거리 유닛 공격력 +25%","desc":"하나는 실패한 배우를 처리할 때 쓰고, 하나는 어설픈 극작가를 혼낼 때 쓰며, 다른 하나는 필요한 사람을 위해 준비해뒀다. 셰프는 누구도 식탁에서 실수하는 것을 용납할 수 없다.","imgSrc":"assets/img/showroom/relics/062.png"},{"id":"063","name":"망가진 리볼버 탄창","usage":"모든 아군 원거리 유닛 공격력 +35%","desc":"그녀는 험난한 순간에도 간사한 자들에게 고개를 숙인 적이 없었고, 그녀의 총구에서 나오는 불꽃은 마치 성난 태양 같았고, 그녀 머리 위의 고리는 대낮보다 환한 빛을 발했다. 이곳에 우리의 친구, 아웃캐스트가 잠들어 있다.","imgSrc":"assets/img/showroom/relics/063.png"},{"id":"064","name":"악취 나는 지혈제","usage":"모든 아군 유닛의 HP +20%","desc":"“이런 원석충의 체액은 발효 처리 후 지혈제로 사용할 수 있다”——《로도스 아일랜드 야생 생존 지침》","imgSrc":"assets/img/showroom/relics/064.png"},{"id":"065","name":"구급상자","usage":"모든 아군 유닛의 HP +35%","desc":"“……항생제와 에틸 첨가물은 전문가의 지도하에 사용하세요……”——림 빌리턴 안전 생산 지침","imgSrc":"assets/img/showroom/relics/065.png"},{"id":"066","name":"정체불명의 기기","usage":"모든 아군 유닛의 HP +50%","desc":"무엇인지 묻지 마. 다 너를 위해서야.","imgSrc":"assets/img/showroom/relics/066.png"},{"id":"067","name":"녹슨 면도날","usage":"모든 적군 유닛이 받는 물리 대미지 +15%","desc":"이것에 살이 베였다면 그다음 무슨 일이 일어날지 감이 올 거다.","imgSrc":"assets/img/showroom/relics/067.png"},{"id":"068","name":"마부의 채찍","usage":"모든 적군 유닛이 받는 물리 대미지 +25%","desc":"극단의 마부로서 그는 이름도 과거도 없다. 채찍을 휘둘러 버든비스트를 모는 것만이 그가 존재하는 유일한 의미다.","imgSrc":"assets/img/showroom/relics/068.png"},{"id":"069","name":"\\'어벤져\\'","usage":"모든 적군 유닛이 받는 물리 대미지 +35%","desc":"아스카론이 군사위원회의 첫 번째 임무를 완성한 후 테레시스가 직접 선물하고 테레시아가 그녀에게 장착해 준 첫 번째 무기이다.","imgSrc":"assets/img/showroom/relics/069.png"},{"id":"070","name":"제식 저항 도구","usage":"모든 적군 유닛이 받는 마법 대미지 +20%","desc":"우르수스 헌병의 제식 장비로, 간헐적 블라인드 오리지늄 아츠 기능을 탑재했다. 하지만, 아쉽게도 결정적인 순간에 그 기능을 떠올리는 헌병은 매우 드물다.","imgSrc":"assets/img/showroom/relics/070.png"},{"id":"071","name":"황제의 소장품","usage":"모든 적군 유닛이 받는 마법 대미지 +30%","desc":"사미인은 자신들의 황야를 그 무엇보다 존경한다. 그리고 지금, 그 황야의 파편들이 우르수스 황제의 금고에서 조용히 누워있다.","imgSrc":"assets/img/showroom/relics/071.png"},{"id":"072","name":"\\'찬란한 눈물\\'","usage":"모든 적군 유닛이 받는 마법 대미지 +40%","desc":"그의 피는 아직도 흐른다. 그는 단 한 번도 여기를 떠난 적이 없다.","imgSrc":"assets/img/showroom/relics/072.png"},{"id":"073","name":"살아 있는 장미","usage":"모든 아군 유닛이 받는 치료 및 HP 회복 효과 +20%","desc":"과연 당신이 보살피고 있는가, 아니면 장미가 당신을 지키고 있는가?","imgSrc":"assets/img/showroom/relics/073.png"},{"id":"074","name":"창백해진 화관","usage":"모든 아군 유닛이 받는 치료 및 HP 회복 효과 +30%","desc":"뱀파이어가 의식을 치를 때 사용하던 화관 베일로, 새빨갛던 생명이 모두 바래져 지금은 창백함만 남았다.","imgSrc":"assets/img/showroom/relics/074.png"},{"id":"075","name":"공연용 향수","usage":"모든 아군 유닛의 초당 최대 HP의 1% 만큼 HP 회복","desc":"극단 배우들이 무대에 오르기 전에 몸에 뿌리는 향수로, 안정적이고 향기로운 냄새가 배우들의 스트레스를 풀어준다고 한다. 적어도, 겉보기에는 그렇다.","imgSrc":"assets/img/showroom/relics/075.png"},{"id":"076","name":"디자이너의 자","usage":"모든 아군 유닛의 물리 회피 +15%","desc":"데이터와 경험 및 정밀한 측량을 기반으로 만든 갑옷을 입은 사람은 운이 좀 더 좋은 편이다.","imgSrc":"assets/img/showroom/relics/076.png"},{"id":"077","name":"\\'아츠 킬러\\'","usage":"모든 아군 유닛의 마법 회피 +15%","desc":"라이타니엔인의 오리지늄 아츠가 음악과 직결돼 있다고 해서, 소음으로 아츠에 맞서는 미련한 생각을 떠올린 사람이 있을 줄이야.","imgSrc":"assets/img/showroom/relics/077.png"},{"id":"078","name":"댄서의 팔찌","usage":"모든 아군 유닛의 물리 및 마법 회피 +10%","desc":"훈련된 댄서들이 무대에서 춤추며 함정을 피하자, 관객들은 박수갈채를 보냈다. 방금 하마터면 사람이 죽을 뻔했다는 것도 모른 채 말이다.","imgSrc":"assets/img/showroom/relics/078.png"},{"id":"079","name":"우르수스 흘렙","usage":"편성 가능 인원수 +1","desc":"우르수스에서 온 음식. 먹으면 강렬하게 발효된 맛이 느껴진다. 그러니까, 시큼하단 소리다.","imgSrc":"assets/img/showroom/relics/079.png"},{"id":"080","name":"고행자의 슈크림빵","usage":"편성 가능 인원수 +1","desc":"고된 길을 걷는 사람들은 종종 이 디저트로 마음을 위로하곤 한다.","imgSrc":"assets/img/showroom/relics/080.png"},{"id":"081","name":"딱딱한 바게트","usage":"편성 가능 인원수 +1","desc":"딱딱한 막대기 모양의 빵으로, 허기도 달랠 수 있고 호신용으로도 사용할 수 있다.","imgSrc":"assets/img/showroom/relics/081.png"},{"id":"082","name":"초콜릿 시제품","usage":"편성 가능 인원수 +2","desc":"개발자가 본인이 좋아하는 달걀노른자와 초콜릿을 대충 섞어서 만든 시제품일 뿐, 아직 상품으로 시장에 내놓을 수준은 아니다. “으음, 바삭함의 감동이 부족하달까……”","imgSrc":"assets/img/showroom/relics/082.png"},{"id":"083","name":"가울 마카롱","usage":"편성 가능 인원수 +2","desc":"가울의 마카롱 당도가 놀라울 정도로 높아, 일부 매장에서는 고객이 즐길 수 있도록 미니어처 버전을 출시했다.","imgSrc":"assets/img/showroom/relics/083.png"},{"id":"084","name":"빅토리아 케이크","usage":"편성 가능 인원수 +3","desc":"승승장구하는 우리의 황제 폐하를 위하여!","imgSrc":"assets/img/showroom/relics/084.png"},{"id":"085","name":"노선 설명도","usage":"배치 가능 인원수 +1","desc":"한 오퍼레이터가 직접 그린 지도로, 노선 설명도 동봉되어 있다. 하지만 정작 그린 사람 외엔 아무도 알아볼 수 없다.","imgSrc":"assets/img/showroom/relics/085.png"},{"id":"086","name":"어둑한 램프","usage":"배치 가능 인원수 +1","desc":"오퍼레이터의 탐험용 램프로, 손에 들 수도 배낭에 걸어서 사용할 수도 있다.\\n밖에서는 분명 밝았는데, 여기서는 별로 효과가 없다.","imgSrc":"assets/img/showroom/relics/086.png"},{"id":"087","name":"구리 나침판","usage":"배치 가능 인원수 +2","desc":"늘 같은 방향만 가리킨다. 과연 그곳이 어딜까?","imgSrc":"assets/img/showroom/relics/087.png"},{"id":"088","name":"파손된 가면","usage":"배치 가능 인원수 +2","desc":"그가 가면을 썼다.\\n그럼, 말하고 있는 게 누굴까? 그일까, 가면일까?","imgSrc":"assets/img/showroom/relics/088.png"},{"id":"089","name":"백지명함","usage":"편성 가능 인원수 +1, 배치 가능 인원수 +1","desc":"수상한 명함에 신비한 방식으로 미스터리한 킬러의 연락처가 적혀있다.","imgSrc":"assets/img/showroom/relics/089.png"},{"id":"090","name":"인형의 집","usage":"초기 배치 코스트 +10","desc":"모든 아이들이 다 갖고 싶어 하는 그것.","imgSrc":"assets/img/showroom/relics/090.png"},{"id":"091","name":"미니 극장 모형","usage":"초기 배치 코스트 +20","desc":"빨간 물감이 아직 마르지 않았다. 손에 묻지 않도록 조심하자.","imgSrc":"assets/img/showroom/relics/091.png"},{"id":"092","name":"드림바인드 캐슬 모형","usage":"초기 배치 코스트 +30","desc":"이 모형 안에 있는 곳은 고성을 돌아다니면서 본 적이 있다. 그런데 지금은 이걸 손바닥으로 받들고 있다. 이 모든 것이 진짜일까? 아니면 단지 꿈일까?","imgSrc":"assets/img/showroom/relics/092.png"}]},{"name":"전문 도구","items":[{"id":"093","name":"클로 - 돌파","usage":"모든 [뱅가드] 오퍼레이터의 배치 코스트 -2, HP +60%","desc":"파도에 돌을 던지면 거대한 파도를 가르며 안개가 걷혀진다.","imgSrc":"assets/img/showroom/relics/093.png"},{"id":"094","name":"클로 - 폭발","usage":"모든 [뱅가드] 오퍼레이터의 초기 SP +15","desc":"그가 후속 부대의 일을 이미 전부 마쳤는데, 다른 사람들이 할 일이 뭐가 더 있을까?","imgSrc":"assets/img/showroom/relics/094.png"},{"id":"095","name":"클로 - 정통","usage":"모든 [뱅가드] 오퍼레이터의 SP 소모 -35%","desc":"평소에 가장 먼저 전장에 나서는 오퍼레이터로, 그들이 겪은 일들은 상상도 할 수 없다.","imgSrc":"assets/img/showroom/relics/095.png"},{"id":"096","name":"클로 - 고양","usage":"모든 [뱅가드] 오퍼레이터의 재배치 시간 -50%","desc":"전략적 후퇴일 뿐, 그래야만 적을 꿰뚫기 전에 그들이 어떻게 생겼는지 똑똑히 확인할 수 있다.","imgSrc":"assets/img/showroom/relics/096.png"},{"id":"097","name":"클로 - 백전","usage":"모든 [뱅가드] 오퍼레이터의 공격력, 방어력 +50%","desc":"“새까맣게 나를 향해 몰려드는 적들을 보며 나는…… 저것들이 이제 다 끝장이라 생각할 뿐이었다.”","imgSrc":"assets/img/showroom/relics/097.png"},{"id":"098","name":"브로큰 스피어 - 돌파","usage":"모든 [가드] 오퍼레이터의 배치 코스트 -3, HP +40%","desc":"전사가 전장에 걸어 들어가고, 전사가 무기를 꺼내 들고, 전사가 전투를 맞이한다.","imgSrc":"assets/img/showroom/relics/098.png"},{"id":"099","name":"브로큰 스피어 - 창날","usage":"모든 [가드] 오퍼레이터의 공격력 +25%","desc":"“이번 달에 부러뜨린 칼만 벌써 일곱 자루라고.” “그런데 난 이번 달에 적을 여덟 명이나 베었는데.”","imgSrc":"assets/img/showroom/relics/099.png"},{"id":"100","name":"브로큰 스피어 - 혈전","usage":"모든 [가드] 오퍼레이터가 공격 시 SP 2 획득","desc":"전투를 할수록 용맹해지는 전사는 극히 드물다. 그래서 전투 후에 긴장을 완화해 줄 수 있는 심리상담사를 좀 배치할 필요가 있다.","imgSrc":"assets/img/showroom/relics/100.png"},{"id":"101","name":"브로큰 스피어 - 일당백","usage":"모든 [가드] 오퍼레이터의 저지 가능 수 +1","desc":"중무장하였거나 방패를 든 사람만이 적의 공격을 잘 막아낼 수 있는 건 아니다. 자신에게 해를 끼칠 가능성이 있는 적을 빠르게 무찌르는 것이야말로 최고의 방어다.","imgSrc":"assets/img/showroom/relics/101.png"},{"id":"102","name":"브로큰 스피어 - 임전무퇴","usage":"모든 [가드] 오퍼레이터의 방어력 -40%, 공격력 +40%, 공격 속도 +30","desc":"블레이즈에게 그 기술들을 배우라고 딱히 권장하고 싶진 않다.","imgSrc":"assets/img/showroom/relics/102.png"},{"id":"103","name":"프로텍터 - 돌파","usage":"모든 [디펜더] 오퍼레이터의 배치 코스트 -3, HP +40%","desc":"방패를 든 사람들이 끝없이 이어졌다. 그들은 살아있는 적에 맞서는 게 아니라, 운명과 부조리에 맞서는 것이다.","imgSrc":"assets/img/showroom/relics/103.png"},{"id":"104","name":"프로텍터 - 침략","usage":"모든 [디펜더] 오퍼레이터의 공격력 +60%","desc":"팀원과 전략적 목표에 대한 보호 행위는, 그들 본래의 침략성을 잊게 만드는 경우가 많다.","imgSrc":"assets/img/showroom/relics/104.png"},{"id":"105","name":"프로텍터 - 부동","usage":"모든 [디펜더] 오퍼레이터의 방어력 +25%, HP +50%","desc":"“이런 규모의 폭격에도 끄떡없는 사람이 정말 있다고?” “누가 끄떡없대? 그래도 앞으로 몇 걸음 움직였는걸, 그 사람이.”","imgSrc":"assets/img/showroom/relics/105.png"},{"id":"106","name":"프로텍터 - 추진","usage":"모든 [디펜더] 오퍼레이터의 저지 가능 수 -1 (최소 1 유지), 공격력 +40%, 공격 속도 +40","desc":"방어를 포기하고 공격의 기회로 맞바꾸었다. 파멸의 전선이 앞으로 나아갔다.","imgSrc":"assets/img/showroom/relics/106.png"},{"id":"107","name":"프로텍터 - 무봉","usage":"모든 [디펜더] 오퍼레이터가 피격 시 SP 2 획득","desc":"그들은 공격을 받을 때마다 공격을 분노로 바꾸어 몇 배로 돌려준다.","imgSrc":"assets/img/showroom/relics/107.png"},{"id":"108","name":"브로큰 보우 - 돌파","usage":"모든 [스나이퍼] 오퍼레이터의 배치 코스트 -2, HP +60%","desc":"장전, 조준, 발사, 그리고 파멸은 어김없이 다가온다.","imgSrc":"assets/img/showroom/relics/108.png"},{"id":"109","name":"브로큰 보우 - 백발백중","usage":"모든 [스나이퍼] 오퍼레이터의 공격력 +20%","desc":"오리지늄 아츠가 오늘날처럼 발달하지 못했던 시대, 염국에선 타인의 궁술을 칭찬할 때 \\'백보천양\\'이라는 표현을 썼다.","imgSrc":"assets/img/showroom/relics/109.png"},{"id":"110","name":"브로큰 보우 - 전장 의존","usage":"모든 [스나이퍼] 오퍼레이터의 자연 SP 회복 +0.5/s","desc":"스나이퍼가 무기와 친할수록, 무기로부터 배신당하는 일이 더 적다.","imgSrc":"assets/img/showroom/relics/110.png"},{"id":"111","name":"브로큰 보우 - 교차 사격","usage":"모든 [스나이퍼] 오퍼레이터의 HP -40%, 공격력 +40%","desc":"촘촘하게 화력망을 배치하는 순간 스나이퍼 오퍼레이터들을 위험에 노출시키고, 그다음은 가늠쇠에 관한 게임이 이어진다.","imgSrc":"assets/img/showroom/relics/111.png"},{"id":"112","name":"브로큰 보우 - 신속","usage":"모든 [스나이퍼] 오퍼레이터의 공격 속도 +70","desc":"고대 빅토리아 전설의 궁수는 화살을 거의 일직선으로 연결할 수 있다고 한다.","imgSrc":"assets/img/showroom/relics/112.png"},{"id":"113","name":"브로큰 스태프 - 돌파","usage":"모든 [캐스터] 오퍼레이터의 배치 코스트 -3, HP +60%","desc":"아츠가 손끝에서 춤을 추고 비바람을 불러오고 현실을 교란시켜 자신의 위대한 목적을 달성한다.","imgSrc":"assets/img/showroom/relics/113.png"},{"id":"114","name":"브로큰 스태프 - 위버","usage":"모든 [캐스터] 오퍼레이터의 공격력 +25%","desc":"라이타니엔에서 고탑을 올려다볼 때 종종 이상한 현상을 목격하곤 했다…… 심지어 천체 현상을 목격한 적도 있다.","imgSrc":"assets/img/showroom/relics/114.png"},{"id":"115","name":"브로큰 스태프 - 아리아","usage":"모든 [캐스터] 오퍼레이터의 공격 속도 +40","desc":"음악과 아츠는 교묘하게 연관되어 있긴 하지만, 윽… 그래도 이게 누군가가 음치인 핑계가 될 순 없다.","imgSrc":"assets/img/showroom/relics/115.png"},{"id":"116","name":"브로큰 스태프 - 집중","usage":"모든 [캐스터] 오퍼레이터의 SP 회복 +0.4/s","desc":"“한 캐스터가 전력을 다하기로 하면 스카이파이어 같이 성격이 나쁜 캐스터도 전혀 다른 기질을 보일 수 있어.”","imgSrc":"assets/img/showroom/relics/116.png"},{"id":"117","name":"브로큰 스태프 - 고난의 주술","usage":"모든 [캐스터] 오퍼레이터의 HP -40%, 공격 시 마법 대미지 +70%","desc":"살카즈가 오리지늄을 접하게 된 기원에 대해서는 거의 고증할 길이 없다. 고대 아츠의 시작은 물질 현실과 논리 상식을 벗어난 지 오래다.","imgSrc":"assets/img/showroom/relics/117.png"},{"id":"118","name":"스트럿 - 돌파","usage":"모든 [서포터] 오퍼레이터의 배치 코스트 -2, HP +60%","desc":"\\'임무가 조금 남았\\'을 때 필요한 것은 바로 그 \\'조금\\' 남은 일을 도와줄 사람이다.","imgSrc":"assets/img/showroom/relics/118.png"},{"id":"119","name":"스트럿 - 이차전장","usage":"모든 [서포터] 오퍼레이터의 [소환물] 공격력 +50%","desc":"“아, 마키나와 오리지늄 아츠의 유도체는 나도 알겠는데, 다른 게 더 있는 건 아닐까……”","imgSrc":"assets/img/showroom/relics/119.png"},{"id":"120","name":"스트럿 - 근면","usage":"모든 [서포터] 오퍼레이터의 SP 소모 -40%","desc":"별거 아닌 일인 것처럼 보여도 오퍼레이터들은 전력을 다할 것이다. 게다가 사실 전혀 별거 아닌 일도 아니다.","imgSrc":"assets/img/showroom/relics/120.png"},{"id":"121","name":"스트럿 - 파괴","usage":"모든 [서포터] 오퍼레이터의 공격 범위 내 적군 유닛 공격력 -15%","desc":"적의 대미지를 약화시키는 방법은 다양하다. 무기를 부식시키거나, 멘탈을 붕괴시키거나, 중력을 강화하거나… 아니면 배를 아프게 만들거나…","imgSrc":"assets/img/showroom/relics/121.png"},{"id":"122","name":"스트럿 - 약화","usage":"모든 [서포터] 오퍼레이터의 공격 범위 내 적군 유닛 방어력 -20%, 마법 저항 -20%","desc":"적의 방어를 약화시키는 방법은 다양하다. 위치 장치, 아츠 아머 관통, 약점 표시…… 아니면 배를 아프게 만들거나……","imgSrc":"assets/img/showroom/relics/122.png"},{"id":"123","name":"힐러 - 돌파","usage":"모든 [메딕] 오퍼레이터의 배치 코스트 -2, HP +60%","desc":"구원은 인류가 칭찬해야 하는 미덕이며, 이 모든 것을 가능하게 하는 버팀목이다.","imgSrc":"assets/img/showroom/relics/123.png"},{"id":"124","name":"힐러 - 자생","usage":"모든 [메딕] 오퍼레이터의 SP 회복 +0.3/s","desc":"누가 의사는 제 병을 못 고친다고 했는가, 그들은 단지 각성제 한 알을 먹은 뒤, 계속하여 다른 사람을 돕는 일을 선택했을 뿐이다.","imgSrc":"assets/img/showroom/relics/124.png"},{"id":"125","name":"힐러 - 강력시약","usage":"모든 [메딕] 오퍼레이터의 공격력 +40%","desc":"와파린 외에 이렇게 과격한 의료 수단을 감히 사용할 사람은 아무도 없었다. 하지만 그녀는 한 번도 실수한 적이 없다.","imgSrc":"assets/img/showroom/relics/125.png"},{"id":"126","name":"힐러 - 명의","usage":"모든 [메딕] 오퍼레이터의 공격 속도 +50","desc":"죽음의 문턱에서 목숨을 건진 위대한 업적에 비하면, 그 뒤에 겨우 3일 혼수상태에 빠지는 것쯤이야 무슨 대수겠는가?","imgSrc":"assets/img/showroom/relics/126.png"},{"id":"127","name":"힐러 - 정신강화","usage":"모든 [메딕] 오퍼레이터의 공격 범위 내의 아군 유닛 저항 획득","desc":"사고력을 키워 당신의 머릿속에 있는 제국 영토의 잡초 하나까지 모두 빈틈없게 만드십시오.","imgSrc":"assets/img/showroom/relics/127.png"},{"id":"128","name":"러스트 블레이드 - 돌파","usage":"모든 [스페셜리스트] 오퍼레이터의 배치 코스트 -2, HP +60%","desc":"수단은 여러 가지 있지만, 결말은 결국 하나뿐이다.","imgSrc":"assets/img/showroom/relics/128.png"},{"id":"129","name":"러스트 블레이드 - 처형","usage":"모든 [스페셜리스트] 오퍼레이터의 공격 속도 +30","desc":"레드에게는 단검이 하나 있다. 그녀는 단검 한 자루를 가지고 있다.","imgSrc":"assets/img/showroom/relics/129.png"},{"id":"130","name":"러스트 블레이드 - 각개 전투","usage":"모든 [스페셜리스트] 오퍼레이터의 공격력, 방어력 +40%","desc":"SWEEP의 책임자는 그 어떤 임무 참여 기록도 없다. *진짜 하나도 없다*.","imgSrc":"assets/img/showroom/relics/130.png"},{"id":"131","name":"러스트 블레이드 - 무인지경","usage":"모든 [스페셜리스트] 오퍼레이터의 재배치 시간 -35%","desc":"일부 오퍼레이터는 작전 방식이 아주 독특하다. 그들을 \\'여러 번\\' 보았든 \\'여러 명\\' 보았든, 너무 놀라지 말길.","imgSrc":"assets/img/showroom/relics/131.png"},{"id":"132","name":"러스트 블레이드 - 신력","usage":"모든 [스페셜리스트] 오퍼레이터의 밀고 당기는 힘 +2","desc":"지형은 작전의 일환이다…… 더 이상 말해줄 수 없다.","imgSrc":"assets/img/showroom/relics/132.png"},{"id":"133","name":"가시의 손","usage":"[프로텍터], [아츠 프로텍터], [결전자]가 저지 중인 적에게 초당 자신 방어력의 100%에 해당하는 마법 대미지 부여","desc":"적이 공격하게 내버려 두자. 되려 자기 머리가 터지게.","imgSrc":"assets/img/showroom/relics/133.png"},{"id":"134","name":"목 조르는 손","usage":"[헤비슈터], [저격수], [공성사수]의 공격이 HP 30% 미만의 비리더 적군 강제 처치","desc":"마지막 기력을 다해 마지막 숨통을 끊어버린다.","imgSrc":"assets/img/showroom/relics/134.png"},{"id":"135","name":"긁기의 손","usage":"[감속자], [약화자], [비호자]가 공격 시 추가로 목표 HP의 3%에 해당하는 마법 대미지 부여","desc":"작은 것도 막으려야 막을 수가 없다.","imgSrc":"assets/img/showroom/relics/135.png"},{"id":"136","name":"확장의 손","usage":"[스플래시 캐스터], [체인 캐스터], [블래스트 캐스터]가 적군 유닛 1명 공격할 때마다 SP 2 회복","desc":"적을 한 명이라도 더 때리면, 더 많은 힘을 모을 수 있다.","imgSrc":"assets/img/showroom/relics/136.png"},{"id":"137","name":"뜯기의 손","usage":"[드레드노트], [소드마스터], [교관]이 공격 시 목표의 방어력 70% 무시","desc":"이리 뜯기고 저리 찢겨 철갑이 포목이 됐다.","imgSrc":"assets/img/showroom/relics/137.png"},{"id":"138","name":"극속의 손","usage":"[처형자], [매복자], [인형사]의 주변 8칸 내에 아군 유닛이 없을 경우 공격 속도 +100","desc":"팔 한 번 휘두르니 남은 건 잔상뿐이다.","imgSrc":"assets/img/showroom/relics/138.png"},{"id":"139","name":"모둠의 손","usage":"[돌격수], [척후병], [전술가]의 배치 코스트-12, 적 처치 후 배치 코스트 6 추가 획득","desc":"부족한 건 적으로부터 가져오면 된다. 사양하지 말고.","imgSrc":"assets/img/showroom/relics/139.png"}]},{"name":"현명한 수집","items":[{"id":"140","name":"블루 스카프","usage":"희망 +2, 편성 가능 인원수 +1","desc":"우아한 스카프, 그녀의 등장이 곧 안전함을 의미한다.","imgSrc":"assets/img/showroom/relics/140.png"},{"id":"141","name":"빨간 리본","usage":"희망 +2, 배치 가능 인원수 +1","desc":"팬텀이 선물한 첫 번째 선물, 미스 크리스틴이 아주 마음에 들어 한다.","imgSrc":"assets/img/showroom/relics/141.png"},{"id":"142","name":"괴상한 플루트","usage":"희망 +4, 편성 가능 인원수 +1","desc":"괴상하게 생긴 플루트로, 누군가 밤낮으로 불어댄다.","imgSrc":"assets/img/showroom/relics/142.png"},{"id":"143","name":"유리로 만든 새","usage":"희망 +4, 편성 가능 인원수 +1","desc":"“나만의 낙원에서 이 작은 새는 영원히 노래한다.”","imgSrc":"assets/img/showroom/relics/143.png"},{"id":"144","name":"독주 오르골","usage":"희망 +4, 배치 가능 인원수 +1","desc":"낡은 오르골. 켜도 소리가 나지 않고 인형도 움직이지 않는다. 아무 소리도 없고 춤추는 사람도 없다. 팬텀과 공연하기 전에 여주인공은 늘 무대 뒤에서 멍하니 이 오르골을 바라보곤 했다.","imgSrc":"assets/img/showroom/relics/144.png"},{"id":"145","name":"오리지늄 아이리스","usage":"희망 +6, 편성 가능 인원수 +2","desc":"아주 럭셔리한 꽃다발. 커튼콜 할 때 단장이 주인공에게 꽃을 준 적은 손에 꼽을 정도다.","imgSrc":"assets/img/showroom/relics/145.png"},{"id":"146","name":"순금의 원정","usage":"희망 +4, 편성 가능 인원수 +1, 배치 가능 인원수 +1","desc":"군주는 황무지에서 출발했고, 그녀의 발길이 닿는 곳마다 시장이 봄날의 새싹처럼 피어났고, 번영의 길은 높은 산과 울창한 숲을 지나 그녀가 사라진 서쪽 파도의 절벽까지 이어졌다. ——사르곤 전래동화","imgSrc":"assets/img/showroom/relics/146.png"},{"id":"147","name":"《두린의 지상 유람기》","usage":"전투 시 임시 목표 HP 1 획득","desc":"이 유람기를 통해 우리는 두린족이 지상의 사람들에 대해 품은 기이한 견해를 알 수 있다.","imgSrc":"assets/img/showroom/relics/147.png"},{"id":"148","name":"《옛 가울 지명 원류고》","usage":"전투 시 임시 목표 HP 2 획득","desc":"민트가 박사 사무실에서 뒤져낸 옛 지명 역사책으로, 이 책에는 셀라이블라손에 관련된 내용이 기록돼 있다.","imgSrc":"assets/img/showroom/relics/148.png"},{"id":"149","name":"고대 가울의 은화","usage":"모든 오퍼레이터의 초기 SP +6","desc":"지금은 멸망한 국가 \\'가울\\'에서 유통했던 화폐로 잘 보관되어 소장 가치가 높다.","imgSrc":"assets/img/showroom/relics/149.png"},{"id":"150","name":"엘리제 돈주머니","usage":"모든 오퍼레이터의 초기 SP +8","desc":"엘리제 거리를 거닐 때 귀부인들이 사용하는 돈주머니. 무스에게도 똑같은 것이 하나 있다.","imgSrc":"assets/img/showroom/relics/150.png"},{"id":"151","name":"가울 은행 수표","usage":"모든 오퍼레이터의 초기 SP +12","desc":"금과 은이 박힌 엄청 고급스러운 수표장. 지금은 현금으로 바꿀 수 없다.","imgSrc":"assets/img/showroom/relics/151.png"},{"id":"152","name":"《제2경제개혁법》","usage":"모든 오퍼레이터의 초기 SP +18","desc":"이 법안을 시작으로 가울은 본격적으로 패권 제국의 길을 걷게 되었다.","imgSrc":"assets/img/showroom/relics/152.png"},{"id":"153","name":"바닐라 사르시 탄산음료","usage":"모든 자연 회복 스킬의 SP 회복 +0.2/s","desc":"볼리바르 지역의 저가 음료. 수백 년의 역사를 지니고 있으며 다양한 향료를 섞어 만들었다. 특징이라면 맛이 없다는 점.","imgSrc":"assets/img/showroom/relics/153.png"},{"id":"154","name":"땡땡이 주스","usage":"모든 자연 회복 스킬의 SP 회복 +0.25/s","desc":"주스라고 하지만 실은 술이다. 병에는 미성년자 섭취 금지라고 적혀 있다. 원산지가 원래는 가울 경내였는데 지금은 빅토리아에 속한다.","imgSrc":"assets/img/showroom/relics/154.png"},{"id":"155","name":"파울비스트 푸아그라","usage":"모든 자연 회복 스킬의 SP 회복 +0.35/s","desc":"고급스러운 작은 병에 담긴 파울비스트의 간 요리. 색깔이 산뜻하고 귀족들에게만 특별 제공된다.","imgSrc":"assets/img/showroom/relics/155.png"},{"id":"156","name":"매혹의 향수","usage":"모든 자연 회복 스킬의 SP 회복 +0.5/s","desc":"밴시들은 향수를 만들어 마음에 드는 사람에게 선물한다고 한다. 딱 한 방울, 한 방울이면 사람을 황홀하게 만들고, 예술가들의 영감과 아이디어도 이것에서 얻는다고 한다.","imgSrc":"assets/img/showroom/relics/156.png"},{"id":"157","name":"황무지 테킬라","usage":"모든 공격 및 피격 시 회복되는 스킬이 3.5초마다 SP 1 회복","desc":"볼리바르에서 만든 저가 증류주. 톡 쏘는 맛으로 컬럼비아 개척자들에게 인기가 좋다.","imgSrc":"assets/img/showroom/relics/157.png"},{"id":"158","name":"모건 대장의 술","usage":"모든 공격 및 피격 시 회복되는 스킬이 3초마다 SP 1 회복","desc":"이베리아 지역에서 생산되는 술. 빅토리아 중부 도시에서 인기가 좋지만, 현재는 단종되었다.","imgSrc":"assets/img/showroom/relics/158.png"},{"id":"159","name":"스피리터스","usage":"모든 공격 및 피격 시 회복되는 스킬이 2.5초마다 SP 1 회복","desc":"도수가 매우 높은 우르수스의 독한 술, 마시면 머리가 아프긴 하지만, 건강한 우르수스인들은 몇 병이나 비울 수 있다고 한다.","imgSrc":"assets/img/showroom/relics/159.png"},{"id":"160","name":"로열 리큐어","usage":"모든 공격 및 피격 시 회복되는 스킬이 1.5초마다 SP 1 회복","desc":"지금은 멸망한 국가 \\'가울\\'의 술. 이제는 수집가들의 애장품이 되어 가격이 매우 비싸다. 현재 생산지가 라이타니엔 영토 내에 있으며, 제조법은 이미 실전되었다.","imgSrc":"assets/img/showroom/relics/160.png"},{"id":"161","name":"\\'만개\\'","usage":"모든 오퍼레이터가 피격 시 SP 1 회복, 원소 피해를 입을 때마다 SP 1 회복","desc":"터치의 시도에 자연이 잠시나마 당신을 향해 마음을 열었다.","imgSrc":"assets/img/showroom/relics/161.png"},{"id":"162","name":"\\'인기 가수\\'","usage":"적이 기절, 빙결, 속박 상태에서 초당 마법 대미지 600 받음","desc":"저게 무슨 노래를 부르든 당장 그만하라고 해, 시끄러워 죽겠어!","imgSrc":"assets/img/showroom/relics/162.png"},{"id":"163","name":"망석중이","usage":"적이 기절, 빙결, 속박 상태에서 초당 마법 대미지 700 받음","desc":"벗어나려고 애쓸수록 실에 더 꽁꽁 묶인다. 정말 자신이 사고란 걸 하고 있다고 생각하는가?","imgSrc":"assets/img/showroom/relics/163.png"},{"id":"164","name":"\\'동심 저격 인형\\'","usage":"적이 기절, 빙결, 속박 상태에서 초당 마법 대미지 1000 받음","desc":"이베리아 아이들이 바닷가의 이상한 물건으로 만든 초라한 인형. 이 인형을 안고 있으면 꿈속 세계가 다채로워진다고 한다.","imgSrc":"assets/img/showroom/relics/164.png"},{"id":"165","name":"코인 인형","usage":"보유한 오리지늄각뿔 5개당 아군 유닛의 공격 속도 +3","desc":"이런 스타일을 왜 좋아하는지 모르겠지만, 전체적인 디자인은 나쁘지 않다…… 코인만 투입하면 석상이 움직일 수도 있다. 진심이다.","imgSrc":"assets/img/showroom/relics/165.png"},{"id":"166","name":"기사 계율 · 신편","usage":"보유한 오리지늄각뿔 5개당 아군 유닛의 공격 속도 +5","desc":"엄숙하게 선서하는 것도 다 옛날식이다. 현대 기사 정신은 보다 자유로운 표현 방식이 필요하다. 통신 장치에 자신의 번호를 입력하기만 하면 바로 영광스러운 기사가 될 수 있다.","imgSrc":"assets/img/showroom/relics/166.png"},{"id":"167","name":"황금 술의 성배","usage":"보유한 오리지늄각뿔 5개당 아군 유닛의 공격 속도 +7","desc":"성자, 기사, 독실한 신자를 막론하고 이걸 위해 미치지 않는 사람이 없다. 세상에나, 성배조차도 순금인데!","imgSrc":"assets/img/showroom/relics/167.png"},{"id":"168","name":"유기농 통조림","usage":"모든 오퍼레이터가 스킬 발동 후 1초간 공격력 +60%","desc":"수많은 카우투스들은 이 통조림을 먹으면 힘이 폭발한다고 믿고 있다. 뛰어난 광고 효과와 업계의 대표적인 성공 사례 덕분이다.","imgSrc":"assets/img/showroom/relics/168.png"},{"id":"169","name":"073번 안전 시약","usage":"모든 오퍼레이터가 스킬 발동 후 1초간 공격력 +65%","desc":"엄격한 실험에 따른 안전한 산물. 절대 안전하며 폭발하지 않는다. 안심해도 된다.","imgSrc":"assets/img/showroom/relics/169.png"},{"id":"170","name":"시라쿠사인의 분노","usage":"모든 오퍼레이터가 스킬 발동 후 1초간 공격력 +100%","desc":"가울 수도에 있던 \\'정통 시라쿠사 레스토랑\\'의 간판 메뉴로, 진한 초코 잼과 원석충 간으로 만든 소스는 독특한 풍미를 자랑하여 가울 귀족들의 호평을 받았다. 그러나, 시라쿠사와 가울의 외교 갈등도 유발할 뻔했다고 한다.","imgSrc":"assets/img/showroom/relics/170.png"},{"id":"171","name":"\\'문명의 존속\\'","usage":"모든 적군 유닛의 피격 트루 대미지 +150%","desc":"검은색 작은 왕관.","imgSrc":"assets/img/showroom/relics/171.png"},{"id":"172","name":"영광의 어깨띠","usage":"모든 아군 유닛이 적 1명만 저지 시 공격력 +100%","desc":"수많은 배우들이 이 배역을 맡았었으나, 이 배역의 마음속 단짝을 영원히 구할 수 없었다.","imgSrc":"assets/img/showroom/relics/172.png"},{"id":"173","name":"\\'충성과 의리\\'","usage":"모든 아군 유닛이 적 3명 이상 저지 시 초당 HP 150 회복","desc":"충성이란 무엇이고, 의리란 무엇일까. 수십 년 전에 이미 이 질문에 답을 내놓은 사람들이 있다.","imgSrc":"assets/img/showroom/relics/173.png"},{"id":"174","name":"\\'시간의 끝\\'","usage":"1회에 한해, 구역별 최종 전투가 아닌 작전에서 실패 시 탐험을 끝내지 않고 목표 HP +1 상태로 계속 탐험 가능","desc":"새로운 순환이 시작되지 않은 한 아직 잘못을 만회할 기회가 있다.","imgSrc":"assets/img/showroom/relics/174.png"},{"id":"175","name":"왕정의 맹약","usage":"모든 오퍼레이터가 [살카즈] 적의 대미지를 받지 않음","desc":"옛 살카즈 왕정은 자신을 희생해 힘을 얻었고, 이때부터 여러 왕정은 싸움을 멈추고 공동의 적에 대해 적개심을 불태우기 시작했다.","imgSrc":"assets/img/showroom/relics/175.png"},{"id":"176","name":"농축 억제제","usage":"모든 오퍼레이터가 [감염 생물]에 주는 대미지 150%까지 증가, 상대의 특수능력 3초간 무효화","desc":"로도스 아일랜드에서 급성 광석병을 억제할 때 사용하는 의료용 시약. 하지만, 농축 및 추출 후 감염 부위에 되레 돌이킬 수 없는 상처를 입힌다.","imgSrc":"assets/img/showroom/relics/176.png"}]},{"name":"명예의 증표","items":[{"id":"177","name":"우르수스 곡도","usage":"모든 적군 유닛의 공격력, 방어력, HP +40%","desc":"강철의 홍수가 거친 땅을 질주하고, 저 멀리서 거스를 수 없는 절대 의지가 전해온다. 우르수스, 내 양손의 연장이다.","imgSrc":"assets/img/showroom/relics/177.png"},{"id":"178","name":"빅토리아 왕관","usage":"모든 적군 유닛의 공격력, 방어력, HP +30%, 모든 리더 유닛의 공격력, 방어력 +15%, HP +30%","desc":"빅토리아의 마지막 통치자 아슬란이 단두대에 오르자 분노한 군중은 우르르 몰려나와 지난 왕권을 짓밟았다.","imgSrc":"assets/img/showroom/relics/178.png"},{"id":"179","name":"라이타니엔 셉터","usage":"모든 적군 유닛의 공격력, 방어력, HP +30%, 새로운 노드 진입 시 목표 HP -1 (최대 1까지 하락)","desc":"언제부터인지 위치킹의 셉터에 낮과 밤이 흐르기 시작했다.","imgSrc":"assets/img/showroom/relics/179.png"},{"id":"180","name":"가울 맨틀","usage":"모든 적군 유닛의 공격력, 방어력, HP +25%, 4성 이상 오퍼레이터 모집 시 희망 소모 +1","desc":"가울 황제의 유물. 권력과 번성한 세대의 상징이다.","imgSrc":"assets/img/showroom/relics/180.png"},{"id":"181","name":"반세공 다이아몬드","usage":"모든 적군 유닛의 공격력, 방어력, HP +25%, 전투 획득 지휘 경험치 -50%","desc":"반은 예술의 빛으로 반짝이고, 반은 선홍빛으로 물들어져 있다. 이거야말로 극단 단장이 꿈꾸던 \\'팬텀\\'의 모습이다.","imgSrc":"assets/img/showroom/relics/181.png"},{"id":"182","name":"트라고디아 시길","usage":"모든 적군 유닛의 공격력, 방어력, HP +30%, 배치 가능 인원수 -2","desc":"크림슨 극단 내에서 흔히 볼 수 있는 도안으로, 극단 단장과 그의 예술에 대한 갈증을 사람들의 머릿속에 깊이 각인시켜준다.","imgSrc":"assets/img/showroom/relics/182.png"}]},{"name":"스토리텔러","items":[{"id":"183","name":"\\'프릴리베의 오른 눈\\'","usage":"모든 [가드], [스나이퍼] 오퍼레이터의 공격력 +15%, 모든 [서포터], [캐스터] 오퍼레이터의 공격력 -5%","desc":"가울 황후의 면관류 장신구 중 일부로, 지금은 런디니움 로열 박물관에 보관되어 있다. 황제의 사망 소식을 접한 황후는 적과 끝까지 싸우기로 결심했다…… 이 나라를 위해, 세상을 떠난 애인을 위해.","imgSrc":"assets/img/showroom/relics/183.png"},{"id":"184","name":"\\'프릴리베의 왼 눈\\'","usage":"모든 [서포터], [캐스터] 오퍼레이터의 공격력 +15%, 모든 [가드], [스나이퍼] 오퍼레이터의 공격력 -5%","desc":"가울 황후의 면관류 장신구 중 일부로, 지금은 라이타니엔 여황제 도서관에 보관되어 있다. 황후는 모든 시종을 내보내고 모든 죄인을 사면한 뒤, 남편의 보좌에 홀로 앉아 침략자를 기다렸다…… 그리고, 그녀는 적의 칼이 아닌 오리지늄 결정에 죽기로 마음먹었다.","imgSrc":"assets/img/showroom/relics/184.png"},{"id":"185","name":"\\'화려한 용모\\'","usage":"비전투 노드 진입 시 획득 희망 +1","desc":"얼굴만 봐도 희망을 가질 수 있다는 건 참 다행이다…… 설령 재앙의 본질을 알게 된다 할지라도.","imgSrc":"assets/img/showroom/relics/185.png"},{"id":"186","name":"\\'망치의 검\\'","usage":"모든 오퍼레이터의 배치 코스트 +5, 공격력, 방어력, HP +10%","desc":"커다란 바위에 꽂혀 있는 검. 대체 누가 이딴 장난을 치는 건지.","imgSrc":"assets/img/showroom/relics/186.png"},{"id":"187","name":"\\'부러진 검\\'","usage":"모든 오퍼레이터의 HP -30%, 재배치 시간 -50%","desc":"부러진 검 한 자루. 아마…… 쓸 수 있겠지……","imgSrc":"assets/img/showroom/relics/187.png"},{"id":"188","name":"낯익은 조각상","usage":"모든 적군 유닛의 공격 속도 -15","desc":"생김새는 닮았지만, 분위기는 전혀 다르다. 어쩌면 이 사람을 본 적이 있을지도?","imgSrc":"assets/img/showroom/relics/188.png"},{"id":"189","name":"우정의 상징","usage":"전투 드랍 오리지늄각뿔 +30%","desc":"일부 오래된 뱀파이어 가족들은 아직도 고대의 번거로운 예의를 그대로 지키고 있다. 그들은 깊은 우정을 대가로 함부로 무례를 범하는 걸 용납하지 않는다.","imgSrc":"assets/img/showroom/relics/189.png"},{"id":"190","name":"검은색 댄스화","usage":"고지대에 근거리 오퍼레이터 배치 가능","desc":"컬럼비아의 댄서가 스텝을 밟으면, 낭랑하고 우렁찬 소리가 들린다.","imgSrc":"assets/img/showroom/relics/190.png"},{"id":"191","name":"하얀색 댄스화","usage":"지상에 원거리 오퍼레이터 배치 가능","desc":"우르수스의 댄서가 가볍게 몸을 움직이며 한껏 자태를 뽐낸다.","imgSrc":"assets/img/showroom/relics/191.png"},{"id":"192","name":"\\'칼춤\\'","usage":"전투 시작 후 랜덤 1명 오퍼레이터의 공격력 +100%, HP +100%","desc":"\\'크림슨 극단\\' 멤버의 유물. \\'칼춤\\'은 말수가 적은 사르곤 댄서이자 무예가 뛰어난 전사이다. 그녀는 극단에 더할 나위 없이 충성스럽다. 극단 안에서 그녀의 어두운 과거를 아는 사람이 극히 드물다.","imgSrc":"assets/img/showroom/relics/192.png"},{"id":"193","name":"\\'배풍등\\'","usage":"전투 시작 후 모든 오퍼레이터의 배치 코스트가 랜덤으로 변경","desc":"\\'크림슨 극단\\' 멤버의 유물. \\'배풍등\\'은 라이타니엔의 유명 오페라 배우의 예명이다. \\'라이타니엔 고탑 위의 배풍등\\'이라 불렸던 이 여배우는 여러 고탑 귀족들과 미묘한 개인 관계를 유지하며, 심지어 귀족들 간의 투쟁을 부추기는 시도까지 했다고 한다.","imgSrc":"assets/img/showroom/relics/193.png"},{"id":"194","name":"\\'그림자\\'","usage":"모집권에 임시 모집이 출현할 확률 상승","desc":"\\'크림슨 극단\\' 멤버의 유물. 극단에 가입하기 전 \\'그림자\\'는 시라쿠사의 유명 무대 마술사였고, 뛰어난 환술을 자랑했다. 그러나 지금은 공연 중에 오리지늄 아츠를 몰래 사용해 여러 가족을 암살했다는 혐의를 받고 있다.","imgSrc":"assets/img/showroom/relics/194.png"},{"id":"195","name":"《낀데의 꽃》","usage":"모든 아군 유닛이 초당 HP 10 회복","desc":"석판에 새겨진 서사시로, 800년 전 가울의 한 유명한 시인이 남긴 대작이다. 후세의 문학가들이 이 시에 대해 상당히 높게 평가했지만, 역사 기록에 따르면 이 시인은 비대한 몸집과 추한 용모 때문에 사람들의 조롱을 샀다고 한다.","imgSrc":"assets/img/showroom/relics/195.png"},{"id":"196","name":"《무감각과 저속함》","usage":"모든 아군 유닛의 마법 저항 +5","desc":"200년 전 라이타니엔의 한 미치광이 조각가의 유작이자 유명한 예술품. 이 조각가는 재능이 넘치고 여러 잔인한 살인 사건에 연루된 것으로 잘 알려졌다. 하지만 역사 기록에 따르면 그는 생전에 작품보다도, 오히려 수려한 외모 때문에 많은 사랑을 받았다고 한다.","imgSrc":"assets/img/showroom/relics/196.png"},{"id":"197","name":"《세상의 아름다움과 추함》","usage":"1회에 한해, 구역별 최종 전투가 아닌 작전에서 실패 시 탐험을 끝내지 않고 목표 HP +10 상태로 계속 탐험 가능","desc":"15년 전 빅토리아에서 출간된 전설의 책. 이 책에는 작가의 미적 기준과 대량의 문학, 예술, 음악에 관한 역사와 지식이 실려있으며, 고금을 망라하고 읽기까지 쉬워 \\'현세대의 예술 대전\\'으로도 불린다. 그러나 이 위대한 책의 저자는 그저 작은 극단의 단장일 뿐이며, 수년 전에 \\'블러드 다이아몬드\\'라 불리는 암살자에게 살해당했다고 한다.","imgSrc":"assets/img/showroom/relics/197.png"},{"id":"198","name":"망가진 인형","usage":"탐험 결말이 변경","desc":"“그는 이제 지긋지긋하다며, 더 이상 남의 손에 끌려다니는 꼭두각시가 되고 싶지 않다고 말했다.”","imgSrc":"assets/img/showroom/relics/198.png"},{"id":"199","name":"쓸모없는 가위","usage":"오리지늄각뿔 +11, 희망 +3 즉시 획득","desc":"이 가위는 너무 오래 사용되어, 더 이상 그 어떤 형태의 물건도 자를 수 없게 되었고, 수많은 무형의 속박마저 잘라낼 수 있게 되었다.","imgSrc":"assets/img/showroom/relics/199.png"},{"id":"200","name":"빈 유서 봉투","usage":"[슬퍼하는 자물쇠]의 자연 치유 능력 무력화","desc":"자신을 조종하려는 미치광이에게서 벗어나는 것이 그의 유일한 소원이었다. 그리고 지금, 그는 소원을 이뤘다.","imgSrc":"assets/img/showroom/relics/200.png"},{"id":"201","name":"대속의 타이","usage":"모든 아군 유닛의 배치 코스트 +2","desc":"미치광이 고탑 캐스터가 특별한 연회를 열었다. 체면 때문에 억지로 찾아온 빈객들은 모두 막이 올라간 그 순간을 목격했다.","imgSrc":"assets/img/showroom/relics/201.png"},{"id":"202","name":"대체 배우","usage":"모든 아군 유닛의 공격력, 방어력, HP +3%","desc":"극작가는 그가 막을 올린 이 몇 편의 연극을 끝내 인정하지 않았다. 하지만 괜찮다. 호스트는 아직 낙담하지 않았다. 그에겐 대체 배우가 많기 때문이다.","imgSrc":"assets/img/showroom/relics/202.png"},{"id":"203","name":"깨달음","usage":"모든 아군 유닛의 배치 코스트 -3, 공격력, 방어력, HP +5%, 게임 엔딩이 변경","desc":"한때 위치킹의 추종자였던 자가 예술을 위해 모든 걸 바쳤다. 피와 살, 뼈, 신앙, 그리고 마음까지.","imgSrc":"assets/img/showroom/relics/203.png"}]},{"name":"극단의 비밀","items":[{"id":"PCS01","name":"국왕의 새 창","usage":"목표 HP가 1일 경우 모든 아군 유닛의 공격 속도 +50","desc":"절망 속에서의 아름다운 기원은 사람들에게 희망을 준다. 설령 그게 진실이 아닐지라도.","imgSrc":"assets/img/showroom/relics/PCS01.png"},{"id":"PCS02","name":"가드의 군모","usage":"한 번의 전투에서 오퍼레이터를 배치할 때마다 해당 오퍼레이터의 HP +25%","desc":"“모두 언젠가 떠나겠지만, 우리의 국가는 영원히 번영하고 쇠퇴하지 않을 것이다.”","imgSrc":"assets/img/showroom/relics/PCS02.png"},{"id":"PCS03","name":"\\'고통스러운 쾌락\\'","usage":"모든 적군 유닛의 HP -15%, 이동 속도 -15%","desc":"광석병이 극단 내에 확산하면서 쓰러지는 사람도 있고, 흐느끼는 사람도 있으며, 기뻐서 어쩔 줄 모르는 사람도 있고, 글쓰기에 여념이 없는 사람도 있다. 젊은이는 성년의 선물을 받고 배우로서의 마지막 노래를 부를 예정이다.","imgSrc":"assets/img/showroom/relics/PCS03.png"},{"id":"PCS04","name":"고성의 후손","usage":"전장에 100초간 배치한 오퍼레이터의 방어력 +300, 마법 저항 +30","desc":"시간만 충분하다면 이 상자는 또 다른 새로운 무대가 될 수 있다.","imgSrc":"assets/img/showroom/relics/PCS04.png"},{"id":"PCS05","name":"꿈틀대는 식탐","usage":"모든 아군 유닛이 받는 치료 및 HP 회복 효과 +30%, 받는 원소 피해 -30%","desc":"우리는 태어날 때부터 섭취하는 법을 배웠다. 욕구를 거역하지 말고, 순종해라.","imgSrc":"assets/img/showroom/relics/PCS05.png"},{"id":"PCS06","name":"\\'밤의 공포\\'","usage":"적이 방어 포인트에 진입할 때마다 남은 적들은 5초간 기절","desc":"빛조차도 구원할 수 없는 어두운 날이 꼭 찾아온다. 그럴 때마다 극단 단장은 술을 준비하고 타인이 절망하는 순간을 만끽한다.","imgSrc":"assets/img/showroom/relics/PCS06.png"},{"id":"PCS07","name":"\\'무한\\'","usage":"적이 방어 포인트에 진입할 때마다 남은 적들에게 트루대미지 3000 부여","desc":"빛이 없는 보석. 마치 극단 단장 본인의 끝없는 욕망과도 같다.","imgSrc":"assets/img/showroom/relics/PCS07.png"}]}]},"is4":{"meta":{"title":"흔들리는 대지, 불타는 시장","short":"IS:4","color":"#e8864a"},"categories":[{"name":"다원 기물","items":[{"id":"rogue_3_relic_legacy_16","orderId":"001","name":"지형도","usage":"배치 가능 인원수 +1, 모든 아군 유닛의 방어력 +4%","desc":"꽤 오래 돼 보이는 수제 지도. 지도상의 명칭과 지형은 많이 바뀌었고, 축척에도 문제가 있는 것 같다.","new":false},{"id":"rogue_3_relic_legacy_17","orderId":"002","name":"신탁의 소라","usage":"배치 가능 인원수 +1, 모든 아군 유닛의 HP +4%","desc":"이것을 불면 당신이 본 적도 들은 적도 없는 신들이 응답할 것이다. 사실은 그저 소라 껍데기일 뿐이다.","new":false},{"id":"rogue_3_relic_legacy_18","orderId":"003","name":"숲 속의 야화","usage":"배치 가능 인원수 +2, 모든 아군 유닛의 방어력 +6%","desc":"요양 정원에서 외근 오퍼레이터들을 위해 제작한 방향제 세트. 15가지 식물 성분을 채취해 172가지로 조합할 수 있다. 숲에 바람이 불어오면 만물이 속삭이니, 편하게 잠들 수 있다.","new":false},{"id":"rogue_3_relic_legacy_19","orderId":"004","name":"교회 구호식권","usage":"배치 가능 인원수 +2, 모든 아군 유닛의 HP +6%","desc":"몰락한 이베리아 해안 도시의 일부 교회에서는 정기적으로 신도들에게 구호식권을 나눠준다. 식권의 발급 대상 기준은 비밀이지만.","new":false},{"id":"rogue_3_relic_legacy_22","orderId":"005","name":"빨간 리본","usage":"희망 +2, 배치 가능 인원수 +1","desc":"팬텀이 선물한 첫 번째 선물, 미스 크리스틴이 아주 마음에 들어 한다.","new":false},{"id":"rogue_3_relic_legacy_23","orderId":"006","name":"독주 오르골","usage":"희망 +4, 배치 가능 인원수 +1","desc":"낡은 오르골. 켜도 소리가 나지 않고 인형도 움직이지 않는다. 아무 소리도 없고 춤추는 사람도 없다. 팬텀과 공연하기 전에 여주인공은 늘 무대 뒤에서 멍하니 이 오르골을 바라보곤 했다.","new":false},{"id":"rogue_3_relic_legacy_35","orderId":"007","name":"열린 소품 상자","usage":"희망 +4","desc":"극단 소품 담당자의 상자. 골무부터 마네킹까지 없는 게 없다.","new":false},{"id":"rogue_3_relic_legacy_36","orderId":"008","name":"낡은 악보","usage":"희망 +4","desc":"음표가 흐려져 잘 보이지 않는 낡은 악보의 찢긴 한 페이지. 과연 이 곡엔 어떤 사연이 담겨 있을지 궁금하다.","new":false},{"id":"rogue_3_relic_legacy_37","orderId":"009","name":"계약해지서","usage":"희망 +4","desc":"서명 하나만 받아내면 이 극단에서 완전히 벗어날 수 있다.","new":false},{"id":"rogue_3_relic_legacy_38","orderId":"010","name":"만능열쇠","usage":"희망 +6","desc":"은으로 만든 낡은 열쇠로, 열 수 없는 문이 없다. 관리자로서, 극단 매니저로서 당연히 모든 비밀을 열 수 있는 이 은 열쇠를 손에 쥐어야 한다.","new":false},{"id":"rogue_3_relic_legacy_40","orderId":"011","name":"고대 주화","usage":"오리지늄각뿔 +10 즉시 획득","desc":"녹이 슬어 연도를 판별할 수 없는 고대 주화. 테라 황무지 어디에서나 볼 수 있다.","new":false},{"id":"rogue_3_relic_legacy_41","orderId":"012","name":"배우의 장신구 박스","usage":"오리지늄각뿔 +18 즉시 획득","desc":"각종 깨진 장신구가 가득 담긴 박스. 젊은 주연 배우는 보석들을 장착하고 무대에 올라 가장 높은 곳에서 훌쩍 뛰어내린다.","new":false},{"id":"rogue_3_relic_legacy_43","orderId":"013","name":"오락실 관리자 카드","usage":"오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"이게 있으면 로도스 아일랜드의 오락실 대권을 잡은 거나 마찬가지다. 오퍼레이터의 이상한 요청 사항은 신중하게 처리할 것…… 그리고 문단속은 확실하게 할 것.   ","new":false},{"id":"rogue_3_relic_legacy_44","orderId":"014","name":"미스 크리스틴 쓰담권","usage":"오퍼레이터 2명 즉시 랭크 상승 (희망 소모 없음)","desc":"당신은 이미 미스의 허락을 받았다!","new":false},{"id":"rogue_3_relic_legacy_54","orderId":"015","name":"지역 액션플랜","usage":"4성 오퍼레이터 모집 시 희망 소모 -2","desc":"중요 거점 지역에 모두 전문 사무소가 있는 로도스 아일랜드는 전달자들의 노력 끝에 이 땅에 파괴되기 쉬운 네트워크를 겨우 구축할 수 있었다.","new":false},{"id":"rogue_3_relic_legacy_55","orderId":"016","name":"전역 작전 문서","usage":"5성 오퍼레이터 모집 시 희망 소모 -2","desc":"대륙에서 배를 띄우는 건 살얼음판을 걷는 것과 같다. 자신만의 통찰력을 키우길.","new":false},{"id":"rogue_3_relic_legacy_56","orderId":"017","name":"인사부 비밀서한","usage":"6성 오퍼레이터 모집 시 희망 소모 -2","desc":"“■■■ 씨가 준 거라고? 그럼 됐어.”","new":false},{"id":"rogue_3_relic_legacy_59","orderId":"018","name":"로도스 아일랜드 전술 무전","usage":"전투 후 모집권 선택 옵션 1종 추가","desc":"무전대기, 곧 지원군이 도착한다.","new":false}]},{"name":"생존 지원","items":[{"id":"rogue_3_relic_legacy_10","orderId":"019","name":"특선 비스트 통조림","usage":"편성 가능 인원수 +1, 모든 아군 유닛이 초당 HP +3","desc":"먼 길을 떠나는 여행자에겐 \\'즉각취식\\'의 편리함이 맛보다 중요한 때가 많다.","new":false},{"id":"rogue_3_relic_legacy_11","orderId":"020","name":"해초 무침","usage":"편성 가능 인원수 +1, 모든 아군 유닛의 공격 속도 +1","desc":"한때 이베리아인들이 자랑스러워했던 전통 미식이었으나, 시본이 횡포한 지금 점점 사람들의 기억에서 잊혀 가고 있다.","new":false},{"id":"rogue_3_relic_legacy_12","orderId":"021","name":"오렌지 스톰","usage":"편성 가능 인원수 +1, 모든 아군 유닛의 공격력 +1%","desc":"마마존스 캔디 제품 중에서도 가장 잘 팔리는 오렌지 맛. 저렴한 가격과 달콤한 맛을 어필하여 아이들 사이에 특히 인기가 많다.","new":false},{"id":"rogue_3_relic_legacy_13","orderId":"022","name":"커피 플레인 커피 캔디","usage":"편성 가능 인원수 +2, 모든 아군 유닛의 공격 속도 +2","desc":"도솔레스 유명 커피 브랜드의 커피 캔디 제품으로 현재 각지에서 널리 판매되고 있다. 실제로 카페인을 첨가하여 출근부터 퇴근까지 맑은 정신을 유지하게 해준다.","new":false},{"id":"rogue_3_relic_legacy_14","orderId":"023","name":"스크리밍 체리","usage":"편성 가능 인원수 +2, 모든 아군 유닛의 공격력 +2%","desc":"마마존스의 새콤달콤한 체리 맛 캔디로, 판매량은 인기 제품에 비해 보잘것없으나 소수의 마니들이 꾸준히 찾고 있다. 듣기로는 마마존스의 한 이사가 이 맛을 좋아한다고 한다.","new":false},{"id":"rogue_3_relic_legacy_15","orderId":"024","name":"피트 과일 믹스","usage":"편성 가능 인원수 +3, 모든 아군 유닛의 공격력, 방어력, HP +3%","desc":"피터 브랜드의 과일 믹스 캔디, 다양한 맛과 높은 가성비로 그 인기가 마마존스 캔디와 맞먹을 정도다. 뮤엘시스가 가장 좋아하는 제품이기도 하다.","new":false},{"id":"rogue_3_relic_legacy_20","orderId":"025","name":"그윽한 향의 특급 원두","usage":"편성 가능 인원수 +1, 배치 가능 인원수 +1, 실드 +1","desc":"커피 농부들이 독특한 향이 나는 파울비스트에게 원두를 먹이고, 그 배설물에서 다시 채취 및 가공한 원두. 위산 발효 과정에서 원두가 독특한 향을 머금어, 덕분에 가격이 3배로 뛰었다.","new":false},{"id":"rogue_3_relic_legacy_21","orderId":"026","name":"블루 스카프","usage":"희망 +2, 편성 가능 인원수 +1","desc":"우아한 스카프, 그녀의 등장은 곧 안전함을 의미한다.","new":false},{"id":"rogue_3_relic_legacy_24","orderId":"027","name":"오리지늄 아이리스","usage":"희망 +6, 편성 가능 인원수 +2","desc":"아주 럭셔리한 꽃다발. 커튼콜 할 때 단장이 주인공에게 꽃을 준 적은 손에 꼽을 정도다.","new":false},{"id":"rogue_3_relic_legacy_25","orderId":"028","name":"괴상한 플루트","usage":"희망 +4, 편성 가능 인원수 +1","desc":"괴상하게 생긴 플루트로, 누군가 밤낮으로 불어댄다.","new":false},{"id":"rogue_3_relic_legacy_26","orderId":"029","name":"유리로 만든 새","usage":"희망 +4, 편성 가능 인원수 +1","desc":"“나만의 낙원에서 이 작은 새는 영원히 노래한다.”","new":false},{"id":"rogue_3_relic_legacy_27","orderId":"030","name":"순금의 원정","usage":"희망 +4, 편성 가능 인원수 +1, 배치 가능 인원수 +1","desc":"군주는 황무지에서 출발했고, 그녀의 발길이 닿는 곳마다 시장이 봄날의 새싹처럼 피어났고, 번영의 길은 높은 산과 울창한 숲을 지나 그녀가 사라진 서쪽 파도의 절벽까지 이어졌다. ——사르곤 전래동화","new":false},{"id":"rogue_3_relic_legacy_28","orderId":"031","name":"《두린의 지상 유람기》","usage":"실드 +4","desc":"이 유람기를 통해 우리는 두린족이 지상의 사람들에 대해 품은 기이한 견해를 알 수 있다.","new":false},{"id":"rogue_3_relic_legacy_29","orderId":"032","name":"《옛 가울 지명 원류고》","usage":"실드 +6","desc":"민트가 박사 사무실에서 뒤져낸 옛 지명 역사책으로, 이 책에는 셀라이블라손에 관련된 내용이 기록돼 있다.","new":false},{"id":"rogue_3_relic_legacy_30","orderId":"033","name":"전기주전자","usage":"최대 목표 HP +1, 희망 +1","desc":"로도스 아일랜드 사무실에 있는 것과 같은 모델의 전기 주전자. 한밤중에 이걸로 라면을 끓여 먹는 사람들도 종종 있는데, 이는 건강하지 않은 생활습관이다……","new":false},{"id":"rogue_3_relic_legacy_31","orderId":"034","name":"특수 저지 장치","usage":"최대 목표 HP +2, 목표 HP 2 회복","desc":"로도스 아일랜드의 개량형 저지 장치. 감염으로 인한 오리지늄 아츠 통제 불능 상태를 효과적으로 제어할 수 있다.","new":false},{"id":"rogue_3_relic_legacy_32","orderId":"035","name":"석상귀 조각상","usage":"최대 목표 HP +3","desc":"손바닥만한 조각상. 석상귀들이 우호를 표시하는 피조물이라고 한다.","new":false},{"id":"rogue_3_relic_legacy_33","orderId":"036","name":"뱀파이어의 침대","usage":"최대 목표 HP +4","desc":"고성의 분위기와 아주 잘 어울리는 럭셔리한 관. 와파린은 이런 게 고정관념이라고 한다.","new":false},{"id":"rogue_3_relic_legacy_34","orderId":"037","name":"영생의 상징","usage":"최대 목표 HP +6","desc":"한쪽은 시들지만, 한쪽은 자라고 있는 나뭇가지. 시든 쪽에서 살아나고, 번성한 쪽은 다시 시든다.","new":false},{"id":"rogue_3_relic_legacy_39","orderId":"038","name":"밴시의 입맞춤","usage":"희망 +8","desc":"이종족이 이걸 얻으면 종종 자신을 초월하는 용기를 보여주곤 하는데, 보기 드문 남성 밴시인 로고스는 이미 익숙해져 있었다.","new":false},{"id":"rogue_3_relic_legacy_42","orderId":"039","name":"무결점 보옥","usage":"오리지늄각뿔 +25 즉시 획득","desc":"이것 때문에 성이 세 번이나 파괴되긴 했지만, 흠잡을 데 없는 보옥은 여전히 밝게 빛난다. 보옥을 소지한 사르곤 황제는 오늘날까지도 어떤 보석이 가장 잘 어울리는지 모른다. 전쟁의 총성만 영원히 따를 뿐.","new":false},{"id":"rogue_3_relic_legacy_46","orderId":"040","name":"클로 - 전훈","usage":"[뱅가드] 오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"강력한 무기, 용감히 앞으로 나아가는 마음.","new":false},{"id":"rogue_3_relic_legacy_47","orderId":"041","name":"브로큰 스피어 - 전훈","usage":"[가드] 오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"활도, 아츠도 사용할 줄도 모르기 때문에 할 수 없이 검을 사용하는 사람들도 있지만, 검을 사용할 수밖에 없기 때문에 검을 사용하는 사람도 있다.","new":false},{"id":"rogue_3_relic_legacy_48","orderId":"042","name":"프로텍터 - 전훈","usage":"[디펜더] 오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"상처는 훈장이다. 하지만 가루처럼 부서져 버린 전사들은 누가 기억해 줄 것인가?","new":false},{"id":"rogue_3_relic_legacy_49","orderId":"043","name":"브로큰 보우 - 전훈","usage":"[스나이퍼] 오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"“화력을 잘 제어하든지, 목표를 정확히 겨냥하든지 하라고, 알겠어?”","new":false},{"id":"rogue_3_relic_legacy_50","orderId":"044","name":"브로큰 스태프 - 전훈","usage":"[캐스터] 오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"“어떤 캐스터 오퍼레이터들의 \\'공연\\'을 보고 난 뒤, 나는 라이타니엔 교재를 묵묵히 거둬들이기로 결심했다.”","new":false},{"id":"rogue_3_relic_legacy_51","orderId":"045","name":"스트럿 - 전훈","usage":"[서포터] 오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"그들은 행동할 때 항상 제각각이다.","new":false},{"id":"rogue_3_relic_legacy_52","orderId":"046","name":"힐러 - 전훈","usage":"[메딕] 오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"모든 사람이 의사가 되어 삶의 병터라는 병을 완치할 수 있는 때가 온다면, 우리는 더 이상 의사가 필요하지 않을 것이다.","new":false},{"id":"rogue_3_relic_legacy_53","orderId":"047","name":"러스트 블레이드 - 전훈","usage":"[스페셜리스트] 오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"스페셜리스트 오퍼레이터들과 실전 연습을 할 때, \\'준비를 제대로 하지 않으면 공격당한다\\'라는 마음의 준비를 단단히 해두도록.","new":false},{"id":"rogue_3_relic_legacy_154","orderId":"048","name":"빅토리아 \\'고철\\' 훈장","usage":"전투 획득 지휘 경험치 +20%","desc":"시즈가 임시로 다그다에게 만들어 준 기사 훈장. 재료는 형편없으나, 다그다에겐 그 의미가 아주 크다.","new":false},{"id":"rogue_3_relic_res_2","orderId":"049","name":"스펙트럼 분석기","usage":"간섭 방지 지수 +1, 실드 +2","desc":"신중하시길! 사미의 이상 현상에 관해, 전자파 측정 결과와 샘플의 미세결정 분석 결과는 완전히 다르다.","new":true},{"id":"rogue_3_relic_res_4","orderId":"050","name":"여가 시간","usage":"편성 가능 인원수 +1, 간섭 방지 지수 +1","desc":"아이들은 다양한 물건을 주어와 자신만의 놀이동산을 만든다. 외부인들이 하도 이동 수단을 자주 버려 현지 주민들에겐 신기하지도 않다.","new":true},{"id":"rogue_3_relic_res_8","orderId":"051","name":"고요한 샘물","usage":"간섭 방지 지수 +2, 최대 목표 HP +3, 희망 +3","desc":"물방울 소리를 따라 눈보라를 탈출한 뒤, 이 표본은 탐험대의 부적이 되었다.","new":true}]},{"name":"투지의 기어","items":[{"id":"rogue_3_relic_legacy_2","orderId":"052","name":"돌격 협의 - 칼날","usage":"편성에 뱅가드 또는 가드가 1명 있을 때마다 모든 뱅가드와 가드의 공격력 +8%","desc":"가장 날카로운 창으로 가장 단단한 방패를 공격하면 결국 방패가 깨진다. 날 믿어라.","new":false},{"id":"rogue_3_relic_legacy_3","orderId":"053","name":"돌격 협의 - 산개","usage":"편성에 뱅가드 또는 가드가 1명 있을 때마다 모든 뱅가드와 가드의 방어력 +10%","desc":"정교한 막기 기술이야말로 자기 몸을 지킬 수 있는 핵심이다.","new":false},{"id":"rogue_3_relic_legacy_4","orderId":"054","name":"방어 협의 - 방진","usage":"편성에 디펜더 또는 서포터가 1명 있을 때마다 모든 디펜더와 서포터의 공격력 +8%","desc":"마치 거대한 함선이 자갈을 짓이기듯.","new":false},{"id":"rogue_3_relic_legacy_5","orderId":"055","name":"방어 협의 - 사수","usage":"편성에 디펜더 또는 서포터가 1명 있을 때마다 모든 디펜더와 서포터의 방어력 +10%","desc":"가장 날카로운 창으로 가장 단단한 방패를 공격하면 결국 창이 부러진다. 날 믿어라.","new":false},{"id":"rogue_3_relic_legacy_6","orderId":"056","name":"원거리 협의 - 요격","usage":"편성에 메딕 또는 스나이퍼가 1명 있을 때마다 모든 메딕과 스나이퍼의 공격력 +8%","desc":"거리를 두면 해결할 수 있는 문제를, 왜 얼굴을 갖다 대야 하나?","new":false},{"id":"rogue_3_relic_legacy_7","orderId":"057","name":"원거리 협의 - 굴복","usage":"편성에 메딕 또는 스나이퍼가 1명 있을 때마다 모든 메딕과 스나이퍼의 공격 속도 +6","desc":"거리가 멀어서 피아식별이 안 된다고? 그럼 일단 공격해 보길. 피하지 않는 놈이 적이다.","new":false},{"id":"rogue_3_relic_legacy_8","orderId":"058","name":"파괴 협의 - 제거","usage":"편성에 캐스터 또는 스페셜리스트가 1명 있을 때마다 모든 캐스터와 스페셜리스트의 공격력 +8%","desc":"외부의 파괴와 내부의 와해.","new":false},{"id":"rogue_3_relic_legacy_9","orderId":"059","name":"파괴 협의 - 제압","usage":"편성에 캐스터 또는 스페셜리스트가 1명 있을 때마다 모든 캐스터와 스페셜리스트의 공격 속도 +6","desc":"정확도에는 너무 신경 쓰지 마. 많이 때리는 게 정확하게 때리는 거니까!","new":false},{"id":"rogue_3_relic_legacy_64","orderId":"060","name":"갈라진 속박의 끈","usage":"모든 적군 유닛의 공격력 -7%","desc":"이 튼튼한 끈으로 뭔가 무서운 걸 묶었을 것 같다…… 이런……","new":false},{"id":"rogue_3_relic_legacy_65","orderId":"061","name":"기이한 가면","usage":"모든 적군 유닛의 공격력 -12%","desc":"그 어떤 문화에도 속하지 않는 괴상한 가면. 전의를 상실하게 한다…… 그리고, 자기도 모르게 깊은 생각에 빠진다.","new":false},{"id":"rogue_3_relic_legacy_66","orderId":"062","name":"대모의 증표","usage":"모든 적군 유닛의 공격력 -17%","desc":"뼈로 만든 월계관. 시칠리아 부인의 증표이다. 질서의 상징은 바로 요동치는 욕망을 잠재우는 것으로, 투쟁은 허용되지 않는다. 진실이든 거짓이든 무릎을 꿇으라.","new":false},{"id":"rogue_3_relic_legacy_67","orderId":"063","name":"낡은 사진","usage":"모든 적군 유닛의 방어력 -12%","desc":"사진 속에 아는 사람이라도 있나?","new":false},{"id":"rogue_3_relic_legacy_68","orderId":"064","name":"말린 시테러","usage":"모든 적군 유닛의 방어력 -21%","desc":"생존에 대한 욕구가 두려움을 압도하면, 극도로 굶주린 이베리아인들은 이 \\'음식\\'을 삼키고 어느 순간 시테러가 되어버린다.","new":false},{"id":"rogue_3_relic_legacy_69","orderId":"065","name":"로즈몬티스의 포옹","usage":"모든 적군 유닛의 방어력 -30%","desc":"“누가 심판하지?”","new":false},{"id":"rogue_3_relic_legacy_70","orderId":"066","name":"금박 장식 주사위","usage":"모든 적군 유닛의 HP -15%","desc":"금박 장식이 되어 있는 주사위로, 한 면에만 생존을 상징하는 표식이 새겨져 있고, 나머지 19개 면에는……","new":false},{"id":"rogue_3_relic_legacy_71","orderId":"067","name":"\\'검은 밤의 속삭임\\'","usage":"모든 적군 유닛의 HP -10%","desc":"검은 색 레코드, 만.지.지.마.시.오.","new":false},{"id":"rogue_3_relic_legacy_72","orderId":"068","name":"《고요함》","usage":"모든 적군 유닛의 HP -20%","desc":"이베리아 역사상 가장 컸던 재앙을 그린 작품. 붓 터치도, 색도, 사상도 아무 의미가 없다. “에기르는 안다, 에기르는 안다, 에기르는 안다.”","new":false},{"id":"rogue_3_relic_legacy_73","orderId":"069","name":"이철 원형 방패","usage":"모든 아군 유닛의 방어력 +15%","desc":"현대 공업 분야에 널리 쓰이기 전까지 이철은 군용 제식 무기를 만드는 데 더 자주 쓰였다.","new":false},{"id":"rogue_3_relic_legacy_74","orderId":"070","name":"군단 미러 아머","usage":"모든 아군 유닛의 방어력 +25%","desc":"한때 심장의 치명적인 피해를 막을 수 있는 흉갑이었으나, 가울이 몰락하면서 이런 구식 갑옷은 역사의 무대에서 사라지게 됐다.","new":false},{"id":"rogue_3_relic_legacy_75","orderId":"071","name":"오래된 증기 갑옷","usage":"모든 아군 유닛의 방어력 +35%","desc":"이런 구형 증기 갑옷마저도 빅토리아 군주들이 넓은 대륙을 비추었던 과거의 영광을 담고 있는 것만 같다.","new":false},{"id":"rogue_3_relic_legacy_76","orderId":"072","name":"황제의 은총","usage":"모든 아군 근거리 유닛 공격력 +15%","desc":"편지 봉투를 개봉할 때 쓰는 날카로운 칼. 전대 우르수스 황제가 애용하던 일용품이지만, 대부분 봉투를 개봉하는 데 쓰지는 않았다.","new":false},{"id":"rogue_3_relic_legacy_77","orderId":"073","name":"귀족 레이피어","usage":"모든 아군 근거리 유닛 공격력 +25%","desc":"거의 장식용으로 사용하는 귀족 검. 가울 귀족들이 가장 먼저 사용했지만, 군용 무기로 쓰기에는 너무 취약하다.","new":false},{"id":"rogue_3_relic_legacy_78","orderId":"074","name":"올드 가디언의 창","usage":"모든 아군 근거리 유닛 공격력 +35%","desc":"올드 가디언의 희생을 지켜본 후 가울은 비로소 자신의 파멸을 맞이했다.","new":false},{"id":"rogue_3_relic_legacy_79","orderId":"075","name":"헌신의 목걸이","usage":"모든 아군 원거리 유닛 공격력 +15%","desc":"신앙은 심장 10센티미터 위에 걸려있고, 언어는 피에 흘러들며, 총알은 탄창에 미끄러져 들어간다.","new":false},{"id":"rogue_3_relic_legacy_80","orderId":"076","name":"은식기","usage":"모든 아군 원거리 유닛 공격력 +25%","desc":"하나는 실패한 배우를 처리할 때 쓰고, 하나는 어설픈 극작가를 혼낼 때 쓰며, 다른 하나는 필요한 사람을 위해 준비해뒀다. 셰프는 누구도 식탁에서 실수하는 것을 용납할 수 없다.","new":false},{"id":"rogue_3_relic_legacy_81","orderId":"077","name":"망가진 리볼버 탄창","usage":"모든 아군 원거리 유닛 공격력 +35%","desc":"그녀는 험난한 순간에도 간사한 자들에게 고개를 숙인 적이 없었고, 그녀의 총구에서 나오는 불꽃은 마치 성난 태양 같았고, 그녀 머리 위의 고리는 대낮보다 환한 빛을 발했다. 이곳에 우리의 친구, 아웃캐스트가 잠들어 있다.","new":false},{"id":"rogue_3_relic_legacy_82","orderId":"078","name":"악취 나는 지혈제","usage":"모든 아군 유닛의 HP +20%","desc":"“이런 원석충의 체액은 발효 처리 후 지혈제로 사용할 수 있다”——《로도스 아일랜드 야생 생존 지침》","new":false},{"id":"rogue_3_relic_legacy_83","orderId":"079","name":"구급상자","usage":"모든 아군 유닛의 HP +35%","desc":"“……항생제와 에틸 첨가물은 전문가의 지도하에 사용하세요……”——림 빌리턴 안전 생산 지침","new":false},{"id":"rogue_3_relic_legacy_84","orderId":"080","name":"정체불명의 기기","usage":"모든 아군 유닛의 HP +50%","desc":"무엇인지 묻지 마. 다 너를 위해서야.","new":false},{"id":"rogue_3_relic_legacy_85","orderId":"081","name":"녹슨 면도칼","usage":"모든 적군 유닛이 받는 물리 대미지 +15%","desc":"이것에 살이 베였다면 그다음 무슨 일이 일어날지 감이 올 거다.","new":false},{"id":"rogue_3_relic_legacy_86","orderId":"082","name":"마부의 채찍","usage":"모든 적군 유닛이 받는 물리 대미지 +25%","desc":"극단의 마부로서 그는 이름도 과거도 없다. 채찍을 휘둘러 버든비스트를 모는 것만이 그가 존재하는 유일한 의미다.","new":false},{"id":"rogue_3_relic_legacy_87","orderId":"083","name":"\\'어벤져\\'","usage":"모든 적군 유닛이 받는 물리 대미지 +35%","desc":"아스카론이 군사위원회의 첫 번째 임무를 완성한 후 테레시스가 직접 선물하고 테레시아가 그녀에게 장착해 준 첫 번째 무기이다.","new":false},{"id":"rogue_3_relic_legacy_88","orderId":"084","name":"제식 저항 도구","usage":"모든 적군 유닛이 받는 마법 대미지 +20%","desc":"우르수스 헌병의 제식 장비로, 간헐적 블라인드 오리지늄 아츠 기능을 탑재했다. 하지만, 아쉽게도 결정적인 순간에 그 기능을 떠올리는 헌병은 매우 드물다.","new":false},{"id":"rogue_3_relic_legacy_89","orderId":"085","name":"황제의 소장품","usage":"모든 적군 유닛이 받는 마법 대미지 +30%","desc":"사미인은 자신들의 황야를 그 무엇보다 존경한다. 그리고 지금, 그 황야의 파편들이 우르수스 황제의 금고에서 조용히 누워있다.","new":false},{"id":"rogue_3_relic_legacy_90","orderId":"086","name":"\\'찬란한 눈물\\'","usage":"모든 적군 유닛이 받는 마법 대미지 +40%","desc":"그의 피는 아직도 흐른다. 그는 단 한 번도 여기를 떠난 적이 없다.","new":false},{"id":"rogue_3_relic_legacy_91","orderId":"087","name":"살아 있는 장미","usage":"모든 아군 유닛이 받는 치료 및 HP 회복 효과 +20%","desc":"과연 당신이 보살피고 있는가, 아니면 장미가 당신을 지키고 있는가?","new":false},{"id":"rogue_3_relic_legacy_92","orderId":"088","name":"창백해진 화관","usage":"모든 아군 유닛이 받는 치료 및 HP 회복 효과 +30%","desc":"뱀파이어가 의식을 치를 때 사용하던 화관 베일로, 새빨갛던 생명이 모두 바래져 지금은 창백함만 남았다.","new":false},{"id":"rogue_3_relic_legacy_93","orderId":"089","name":"공연용 향수","usage":"모든 아군 유닛이 초당 최대 HP의 1% 만큼 HP 회복","desc":"극단 배우들이 무대에 오르기 전에 몸에 뿌리는 향수로, 안정적이고 향기로운 냄새가 배우들의 스트레스를 풀어준다고 한다. 적어도, 겉보기에는 그렇다.","new":false},{"id":"rogue_3_relic_legacy_94","orderId":"090","name":"디자이너의 자","usage":"모든 아군 유닛의 물리 회피 +15%","desc":"데이터와 경험 및 정밀한 측량을 기반으로 만든 갑옷을 입은 사람은 운이 좀 더 좋은 편이다.","new":false},{"id":"rogue_3_relic_legacy_95","orderId":"091","name":"\\'아츠 킬러\\'","usage":"모든 아군 유닛의 마법 회피 +15%","desc":"라이타니엔인의 오리지늄 아츠가 음악과 직결돼 있다고 해서, 소음으로 아츠에 맞서는 미련한 생각을 떠올린 사람이 있을 줄이야.","new":false},{"id":"rogue_3_relic_legacy_96","orderId":"092","name":"댄서의 팔찌","usage":"모든 아군 유닛의 물리 및 마법 회피 +10%","desc":"훈련된 댄서들이 무대에서 춤추며 함정을 피하자, 관객들은 박수갈채를 보냈다. 방금 하마터면 사람이 죽을 뻔했다는 것도 모른 채 말이다.","new":false},{"id":"rogue_3_relic_legacy_97","orderId":"093","name":"인형의 집","usage":"초기 배치 코스트 +10","desc":"모든 아이들이 다 갖고 싶어 하는 그것.","new":false},{"id":"rogue_3_relic_legacy_98","orderId":"094","name":"미니 극장 모형","usage":"초기 배치 코스트 +20","desc":"빨간 물감이 아직 마르지 않았다. 손에 묻지 않도록 조심하자.","new":false},{"id":"rogue_3_relic_legacy_99","orderId":"095","name":"드림바인드 캐슬 모형","usage":"초기 배치 코스트 +30","desc":"이 모형 안에 있는 곳은 고성을 돌아다니면서 본 적이 있다. 그런데 지금은 이걸 손바닥으로 받들고 있다. 이 모든 것이 진짜일까? 아니면 단지 꿈일까?","new":false},{"id":"rogue_3_relic_legacy_100","orderId":"096","name":"검은색 댄스화","usage":"고지대에 근거리 오퍼레이터 배치 가능","desc":"컬럼비아의 댄서가 스텝을 밟으면, 낭랑하고 우렁찬 소리가 들린다.","new":false},{"id":"rogue_3_relic_legacy_101","orderId":"097","name":"하얀색 댄스화","usage":"지상에 원거리 오퍼레이터 배치 가능","desc":"우르수스의 댄서가 가볍게 몸을 움직이며 한껏 자태를 뽐낸다.","new":false},{"id":"rogue_3_relic_legacy_138","orderId":"098","name":"고대 가울의 은화","usage":"모든 오퍼레이터의 초기 SP +6","desc":"지금은 멸망한 국가 \\'가울\\'에서 유통했던 화폐로 잘 보관되어 소장 가치가 높다.","new":false},{"id":"rogue_3_relic_legacy_139","orderId":"099","name":"가울 은행 수표","usage":"모든 오퍼레이터의 초기 SP +12","desc":"금과 은이 박힌 엄청 고급스러운 수표장. 지금은 현금으로 바꿀 수 없다.","new":false},{"id":"rogue_3_relic_legacy_140","orderId":"100","name":"《제2경제개혁법》","usage":"모든 오퍼레이터의 초기 SP +18","desc":"이 법안을 시작으로 가울은 본격적으로 패권 제국의 길을 걷게 되었다.","new":false},{"id":"rogue_3_relic_legacy_141","orderId":"101","name":"바닐라 사르시 탄산음료","usage":"모든 자연 회복 스킬의 SP 회복 +0.2/초","desc":"볼리바르 지역의 저가 음료. 수백 년의 역사를 지니고 있으며 다양한 향료를 섞어 만들었다. 특징이라면 맛이 없다는 점.","new":false},{"id":"rogue_3_relic_legacy_142","orderId":"102","name":"파울비스트 푸아그라","usage":"모든 자연 회복 스킬의 SP 회복 +0.35/초","desc":"고급스러운 작은 병에 담긴 파울비스트의 간 요리. 색깔이 산뜻하고 귀족들에게만 특별 제공된다.","new":false},{"id":"rogue_3_relic_legacy_143","orderId":"103","name":"매혹의 향수","usage":"모든 자연 회복 스킬의 SP 회복 +0.5/초","desc":"밴시들은 향수를 만들어 마음에 드는 사람에게 선물한다고 한다. 딱 한 방울, 한 방울이면 사람을 황홀하게 만들고, 예술가들의 영감과 아이디어도 이것에서 얻는다고 한다.","new":false},{"id":"rogue_3_relic_legacy_144","orderId":"104","name":"모건 대장의 술","usage":"모든 공격 및 피격 시 회복되는 스킬이 3초마다 SP 1 회복","desc":"이베리아 지역에서 생산되는 술. 빅토리아 중부 도시에서 인기가 좋지만, 현재는 단종되었다.","new":false},{"id":"rogue_3_relic_legacy_145","orderId":"105","name":"스피리터스","usage":"모든 공격 및 피격 시 회복되는 스킬이 2.5초마다 SP 1 회복","desc":"도수가 매우 높은 우르수스의 독한 술, 마시면 머리가 아프긴 하지만, 건강한 우르수스인들은 몇 병이나 비울 수 있다고 한다.","new":false},{"id":"rogue_3_relic_legacy_146","orderId":"106","name":"로열 리큐어","usage":"모든 공격 및 피격 시 회복되는 스킬이 1.5초마다 SP 1 회복","desc":"지금은 멸망한 국가 \\'가울\\'의 술. 이제는 수집가들의 애장품이 되어 가격이 매우 비싸다. 현재 생산지가 라이타니엔 영토 내에 있으며, 제조법은 이미 실전되었다.","new":false},{"id":"rogue_3_relic_legacy_147","orderId":"107","name":"마리오네트","usage":"적이 기절, 빙결, 속박 상태에서 초당 마법 대미지 700 받음","desc":"벗어나려고 애쓸수록 실에 더 꽁꽁 묶인다. 정말 자신이 사고란 걸 하고 있다고 생각하는가?","new":false},{"id":"rogue_3_relic_legacy_148","orderId":"108","name":"\\'동심 저격 인형\\'","usage":"적이 기절, 빙결, 속박 상태에서 초당 마법 대미지 1000 받음","desc":"이베리아 아이들이 바닷가의 이상한 물건으로 만든 초라한 인형. 이 인형을 안고 있으면 꿈속 세계가 다채로워진다고 한다.","new":false},{"id":"rogue_3_relic_legacy_149","orderId":"109","name":"개선의 뿔피리","usage":"적이 받는 일회성 기절, 냉기, 빙결 등 상태 이상 시간이 100% 증가","desc":"뿔피리를 불고 구호를 높이 외쳐, 적들이 하늘을 뒤흔드는 포효 속에서 도망치게 하라!","new":false},{"id":"rogue_3_relic_legacy_150","orderId":"110","name":"하이플래시 카메라","usage":"적이 받는 일회성 기절, 냉기, 빙결 등 상태 이상 시간이 110% 증가","desc":"촬영한 필름을 현상해 보니 사진은 온통 하얗게 번졌고, 피해자의 일그러진 표정만 어렴풋이 보였다.","new":false},{"id":"rogue_3_relic_legacy_151","orderId":"111","name":"정신 치료 테이프","usage":"적이 받는 일회성 기절, 냉기, 빙결 등 상태 이상 시간이 150% 증가","desc":"이것은 그가 위험하다며, 이곳에 머물면 안 된다며 당신이 듣는 걸 여러 번 반대했던 것이다…… 이제 알겠는가? 당신은 지금 그의 노래를 듣고 있다.","new":false},{"id":"rogue_3_relic_legacy_152","orderId":"112","name":"낡은 부들부채","usage":"편성에 다른 포지션의 오퍼레이터가 1명 있을 때마다 모든 오퍼레이터의 공격력 +10%","desc":"장마철만 되면 염국의 토목천사 어르신은 늘 무릎이 쑤신다며 주변에 불평한다. 그러면서 그가 부채를 꺼내 흔들면…… 곧바로 구름이 걷히고 비가 그치며 날이 갠다. 이 방법은 나중에 대리사에서 일하는 제자한테도 가르쳐 줘야 한다.","new":false},{"id":"rogue_3_relic_legacy_153","orderId":"113","name":"나흐체러르의 지팡이","usage":"모든 아군 유닛이 받은 치유량이 초과 시, 주변 적에게 초과한 치유량만큼 마법 대미지 부여","desc":"나흐체러르는 생명을 삼켜버린다. 또한, 생명을 이용하기도 한다.","new":false},{"id":"rogue_3_relic_legacy_155","orderId":"114","name":"스카우트의 조준경","usage":"모든 적군 유닛이 대미지 근원으로부터 거리가 멀수록 받는 대미지 상승 (최대 100%)","desc":"목표를 지정하고, 정밀도를 유지하며, 방아쇠를 당겨, 적의 저항을 꺾어버린다. 이 모든 것은 더 큰 미래를 위한 것이다. 하지만, 스카우트는 그 미래를 볼 기회가 없다. 당신이 대신 실현해줄 수밖에.","new":false},{"id":"rogue_3_relic_legacy_156","orderId":"115","name":"블랙 튤립","usage":"모든 아군 오퍼레이터의 스킬 미발동 시 60초 동안 공격력이 점진적으로 최대 +60%까지 증가, 스킬 종료 시 버프 효과 종료","desc":"침묵에 억압받는 이베리아인들을 위해 그녀는 목소리를 낼 것이다. 목소리가 날카롭지 않다면 검으로 대신한다.","new":false},{"id":"rogue_3_relic_legacy_159","orderId":"116","name":"유기농 통조림","usage":"모든 오퍼레이터가 스킬 발동 후 1초간 공격력 +60%","desc":"수많은 카우투스들은 이 통조림을 먹으면 힘이 폭발한다고 믿고 있다. 뛰어난 광고 효과와 업계의 대표적인 성공 사례 덕분이다.","new":false},{"id":"rogue_3_relic_legacy_160","orderId":"117","name":"시라쿠사인의 분노","usage":"모든 오퍼레이터가 스킬 발동 후 1초간 공격력 +100%","desc":"가울 수도에 있던 \\'정통 시라쿠사 레스토랑\\'의 간판 메뉴로, 진한 초코 잼과 원석충 간으로 만든 소스는 독특한 풍미를 자랑하여 가울 귀족들의 호평을 받았다. 그러나, 시라쿠사와 가울의 외교 갈등도 유발할 뻔했다고 한다.","new":false},{"id":"rogue_3_relic_legacy_164","orderId":"118","name":"국왕의 새 창","usage":"목표 HP가 1이 될 경우, 모든 아군 유닛의 공격 속도 +50","desc":"절망 속에서의 아름다운 기원은 사람들에게 희망을 준다. 설령 그게 진실이 아닐지라도.","new":false},{"id":"rogue_3_relic_legacy_165","orderId":"119","name":"고성의 후손","usage":"전장에 100초간 배치한 오퍼레이터의 방어력 +300, 마법 저항 +30","desc":"시간만 충분하다면 이 상자는 또 다른 새로운 무대가 될 수 있다.","new":false},{"id":"rogue_3_relic_legacy_168","orderId":"120","name":"국왕의 원판","usage":"목표 HP가 1이 될 경우, 모든 오퍼레이터의 저지 가능 수 +2","desc":"전방을 주시하라, 굳건한 마음으로 모든 고난에 맞서도록.","new":false},{"id":"rogue_3_relic_legacy_169","orderId":"121","name":"국왕의 가지","usage":"목표 HP가 1이 될 경우, 모든 오퍼레이터가 추가로 2초당 SP +1","desc":"쓸데없는 위엄은 버리고 자비롭게 대하라. 그들도 그리 대할 것이다. 필시 그리할 것이다.","new":false},{"id":"rogue_3_relic_legacy_170","orderId":"122","name":"제왕의 왕관","usage":"목표 HP가 1이 될 경우, 모든 아군 유닛의 공격력 +50%, 국왕의 소장품 3개 이상 획득 시 +150%로 변경","desc":"이름 없는 왕들이여, 왕국이 멸망하더라도 부디 이베리아를 지켜주소서.","new":false},{"id":"rogue_3_relic_legacy_171","orderId":"123","name":"《글로리어스 카시미어》","usage":"오퍼레이터가 회피 발동 후 6초 동안 공격력 +70%","desc":"카시미어의 베스트셀러. 기사 스포츠를 빛낸 기사들의 일대기를 소설 형식으로 풀어냈다. 처참하게 추방당했지만, 다시 우승을 되찾은 니어의 이야기가 상당한 비중을 차지했다.","new":false},{"id":"rogue_3_relic_legacy_172","orderId":"124","name":"《귀환》","usage":"오퍼레이터가 회피 발동 후 6초 동안 공격력 +130%","desc":"카시미어의 베스트셀러. 팬덤의 집단 창작물이라고 한다. \\'니어\\'는 이미 복잡한 환상들이 뒤섞인 이미지의 복합체가 되어버렸다. “추방이지, 결코 도피는 아니다. 그녀는 돌아와 홀로 이 시대의 홍수를 맞설 것이다.”","new":false},{"id":"rogue_3_relic_fight_2","orderId":"125","name":"\\'헌신\\'","usage":"원거리 오퍼레이터가 공격 또는 치료 시, 공격 범위 내 무작위 1명의 적에게 150 마법 대미지 부여","desc":"고대로부터 이 부족은 자신들이 사미의 진실을 알고 있다고 믿었다. 바로 만물은 원래 소리가 있었는데, \\'그것\\'이 만물의 소리를 대신했다는 것.","new":true},{"id":"rogue_3_relic_fight_3","orderId":"126","name":"하늘의 먼지","usage":"원거리 오퍼레이터가 수동 스킬 발동 시, 공격 범위 내 모든 적을 2초간 공중 부양","desc":"그녀는 해가 뜨고 달이 지며 별이 바뀌는 기록을 수도 없이 불었다. 그렇게 그녀의 생명은 쉽게 날아가 버렸다.","new":true},{"id":"rogue_3_relic_fight_4","orderId":"127","name":"얼어붙은 몸","usage":"근거리 오퍼레이터가 대미지를 받으면 5초간 공격 속도 +40","desc":"윈터투스 산맥에 주둔하고 있는 사미 전사들은 생명이 땅으로 흘러들수록 얼어붙은 몸이 점점 가벼워진다는 환각에 자주 고무된다.","new":true},{"id":"rogue_3_relic_fight_5","orderId":"128","name":"가시 고리","usage":"근거리 오퍼레이터가 치료를 받으면 자신과 주변 4칸 범위 내 오퍼레이터가 SP +1","desc":"당신은 이 왜곡된 두려움으로부터 자신을 안정시켜야 한다. 가시에 남은 핏자국은 제사장 것인지 당신 것인지 알 수 없다. 그들은 어떠한 수단을 쓰더라도 눈 하나 깜빡이지 않는다.","new":true},{"id":"rogue_3_relic_fight_6","orderId":"129","name":"\\'영원한 밤의 염탐\\'","usage":"모든 오퍼레이터의 공격력 +25%, 공격 속도 +25, 단 초당 HP -25","desc":"그녀가 북지를 향해 출발한 순간 검은색 산맥이 눈앞에 펼쳐졌다, 그녀가 몇 년 전에 봤던 그 징조처럼.","new":true},{"id":"rogue_3_relic_fight_7","orderId":"130","name":"\\'고목의 메아리\\'","usage":"모든 오퍼레이터가 초당 HP 50 회복, 단 최대 HP -25%","desc":"북을 두드려 조상의 영혼을 부르고, 초목을 꿰뚫으며, 악령을 쫓는다. 한 명 또 한 명의 무당이 짐승 뼈 북채를 물려받았지만, 그중 어떤 이들이 남긴 울림은 더 오래 간다.","new":true},{"id":"rogue_3_relic_fight_8","orderId":"131","name":"얼음 숫돌","usage":"전투 시작 후 무작위 1명 오퍼레이터의 HP, 공격력, 방어력, 마법 저항, 저지 가능 수, 초기 SP, 배치 코스트가 2배로 증가","desc":"표면이 얼음처럼 매끈하다. 이것을 만든 자는 바위에 허락받고 그 무거운 힘을 칼날에 새겼다.","new":true},{"id":"rogue_3_relic_fight_9","orderId":"132","name":"예견자의 표시","usage":"모든 오퍼레이터의 배치 코스트, 재배치 시간이 무작위로 변경","desc":"그 어떤 방향도 액운을 피할 수는 없다.","new":true},{"id":"rogue_3_relic_fight_11","orderId":"133","name":"가시와 잎의 띠","usage":"전장에 특별한 작전 포인트 출현, 해당 위치 및 주변 8칸에 배치된 아군 유닛이 위장 효과 획득","desc":"이 고리 속에서만큼은 가시와 잎의 편애를 받아야 한다.","new":true},{"id":"rogue_3_relic_fight_12","orderId":"134","name":"생존의 나무 갑옷","usage":"모든 근거리 오퍼레이터가 배치 후 최대 HP 50%에 해당하는 보호막 획득","desc":"샤먼들은 나무의 생존에 대한 집착을 잘 알고 있다. 그래서 전사들에게 이런 의지가 보일 때마다, 그들은 나무를 초대해 전사들의 갑옷이 되길 바란다.","new":true},{"id":"rogue_3_relic_fight_13","orderId":"135","name":"린수비늘 방패","usage":"모든 원거리 아군 유닛이 배치 후 실드 3회 획득","desc":"멀리서 온 겹겹의 상처도 몸으로 쌓은 철통방어를 넘지 못한다.","new":true},{"id":"rogue_3_relic_fight_16","orderId":"136","name":"서리남의 견갑","usage":"모든 아군 유닛이 적 2명 이상 저지 시 공격력 +40%, 방어력 +40%, 30초간 지속","desc":"그의 시신에는 상처가 보이지 않았고, 두 눈에서만 피눈물이 말라 있을 뿐이었다.","new":true},{"id":"rogue_3_relic_fight_17","orderId":"137","name":"설녀의 장갑","usage":"모든 아군 유닛이 적 3명 이상 저지 시 공격 속도 +80, 물리 및 마법 회피 +50%, 30초간 지속","desc":"그녀는 혹한을 향해 마지막 남은 화살 3발을 쏘았고, 혹한은 그것으로 그녀의 목숨을 끊어버렸다.","new":true},{"id":"rogue_3_relic_fight_18","orderId":"138","name":"공각 파울비스트","usage":"[소환물]의 HP +30%, 공격력 +30%, 배치되어 있을 때 소환한 오퍼레이터의 공격력 +60%","desc":"육체는 진작에 사라졌지만, 영혼만은 곤히 깃들어 있다. 가지와 잎에 어울릴 수 없는 생령은 얼음을 머금고 힘차게 숲을 날아오른다.","new":true},{"id":"rogue_3_relic_fight_19","orderId":"139","name":"뿔피리","usage":"모든 오퍼레이터가 주변 4칸에 오퍼레이터 배치 시 1명당 공격력 +20%","desc":"사미에서 사람을 불러 모으려면 뿔피리를 부는 게 가장 효과적이다.","new":true},{"id":"rogue_3_relic_fight_20","orderId":"140","name":"불멸의 횃불","usage":"모든 오퍼레이터가 주변 4칸에 오퍼레이터 배치 시 1명당 공격 속도 +30","desc":"불은 빛과 따뜻함의 상징이다. 불 옆에 모이면 절망도 희망이 된다.","new":true},{"id":"rogue_3_relic_fight_21","orderId":"141","name":"호수의 방패","usage":"실드 +1, 실드 보유 시 전투 시작 후 모든 아군 유닛의 최대 HP +60%","desc":"30년 전, 아이의 장난감 방패가 호수에 떨어졌다. 30년 후, 그는 얼어붙은 호수를 깨고 방패를 꺼내 영웅의 길을 떠났다.","new":true},{"id":"rogue_3_relic_fight_23","orderId":"142","name":"고대 벽화","usage":"적이 공중 부양, 무중력 상태에 돌입 또는 해제할 때마다 1000 트루 대미지를 받으며, 10초간 특수 능력 상실","desc":"동굴을 나와 고개를 들어서 보라. 자고로 모든 것이 다 그런 건 아니다.","new":true},{"id":"rogue_3_relic_fight_24","orderId":"143","name":"스텔라리아의 휘광","usage":"적이 공중 부양, 무중력 상태에 돌입 또는 해제할 때마다 2000 트루 대미지를 받으며, 10초간 피격 대미지 +30%","desc":"그 순간, 진실의 빛이 대지 곳곳을 비추었다.","new":true},{"id":"rogue_3_relic_fight_26","orderId":"144","name":"이운자의 토템","usage":"모든 적의 이동 속도 -15%, 무중력 상태에서 무게 등급이 추가로 2랭크 하락","desc":"파울비스트 킹을 신봉하는 부족에서 만든 토템. 진심을 담아 부르면 파울비스트 킹이 날갯짓으로 폭풍을 일으켜 대지를 떨게 한다는 소문이 있다.","new":true}]},{"name":"전문 도구","items":[{"id":"rogue_3_relic_legacy_102","orderId":"145","name":"클로 - 돌파","usage":"모든 [뱅가드] 오퍼레이터의 배치 코스트 -2, HP +60%","desc":"파도에 돌을 던지면 거대한 파도를 가르며 안개가 걷혀진다.","new":false},{"id":"rogue_3_relic_legacy_103","orderId":"146","name":"클로 - 폭발","usage":"모든 [뱅가드] 오퍼레이터의 초기 SP +15","desc":"그가 후속 부대의 일을 이미 전부 마쳤는데, 다른 사람들이 할 일이 뭐가 더 있을까?","new":false},{"id":"rogue_3_relic_legacy_104","orderId":"147","name":"클로 - 정통","usage":"모든 [뱅가드] 오퍼레이터의 SP 소모 -35%","desc":"평소에 가장 먼저 전장에 나서는 오퍼레이터로, 그들이 겪은 일들은 상상도 할 수 없다.","new":false},{"id":"rogue_3_relic_legacy_105","orderId":"148","name":"클로 - 백전","usage":"모든 [뱅가드] 오퍼레이터의 공격력, 방어력 +50%","desc":"“새까맣게 나를 향해 몰려드는 적들을 보며 나는…… 저것들이 이제 다 끝장이라 생각할 뿐이었다.”","new":false},{"id":"rogue_3_relic_legacy_106","orderId":"149","name":"브로큰 스피어 - 돌파","usage":"모든 [가드] 오퍼레이터의 배치 코스트 -3, HP +40%","desc":"전사가 전장에 걸어 들어가고, 전사가 무기를 꺼내 들고, 전사가 전투를 맞이한다.","new":false},{"id":"rogue_3_relic_legacy_107","orderId":"150","name":"브로큰 스피어 - 창날","usage":"모든 [가드] 오퍼레이터의 공격력 +25%","desc":"“이번 달에 부러뜨린 칼만 벌써 일곱 자루라고.” “그런데 난 이번 달에 적을 여덟 명이나 베었는데.”","new":false},{"id":"rogue_3_relic_legacy_108","orderId":"151","name":"브로큰 스피어 - 혈전","usage":"모든 [가드] 오퍼레이터가 공격 시 SP 2 획득","desc":"전투를 할수록 용맹해지는 전사는 극히 드물다. 그래서 전투 후에 긴장을 완화해 줄 수 있는 심리상담사를 좀 배치할 필요가 있다.","new":false},{"id":"rogue_3_relic_legacy_109","orderId":"152","name":"브로큰 스피어 - 임전무퇴","usage":"모든 [가드] 오퍼레이터의 방어력 -40%, 공격력 +40%, 공격 속도 +30","desc":"블레이즈에게 그 기술들을 배우라고 딱히 권장하고 싶진 않다.","new":false},{"id":"rogue_3_relic_legacy_110","orderId":"153","name":"프로텍터 - 돌파","usage":"모든 [디펜더] 오퍼레이터의 배치 코스트 -3, HP +40%","desc":"방패를 든 사람들이 끝없이 이어졌다. 그들은 살아있는 적에 맞서는 게 아니라, 운명과 부조리에 맞서는 것이다.","new":false},{"id":"rogue_3_relic_legacy_111","orderId":"154","name":"프로텍터 - 침략","usage":"모든 [디펜더] 오퍼레이터의 공격력 +60%","desc":"팀원과 전략적 목표에 대한 보호 행위는, 그들 본래의 침략성을 잊게 만드는 경우가 많다.","new":false},{"id":"rogue_3_relic_legacy_112","orderId":"155","name":"프로텍터 - 무봉","usage":"모든 [디펜더] 오퍼레이터가 피격 시 SP 2 획득","desc":"그들은 공격을 받을 때마다 공격을 분노로 바꾸어 몇 배로 돌려준다.","new":false},{"id":"rogue_3_relic_book_1","orderId":"156","name":"프로텍터 - 안정","usage":"모든 [디펜더] 오퍼레이터의 HP +40%, 방어력 +40%, 마법 저항 +20","desc":"운명의 타격이 얼마나 무겁든, 그 무게를 짊어져라.","new":false},{"id":"rogue_3_relic_legacy_113","orderId":"157","name":"브로큰 보우 - 돌파","usage":"모든 [스나이퍼] 오퍼레이터의 배치 코스트 -2, HP +60%","desc":"장전, 조준, 발사, 그리고 파멸은 어김없이 다가온다.","new":false},{"id":"rogue_3_relic_legacy_114","orderId":"158","name":"브로큰 보우 - 백발백중","usage":"모든 [스나이퍼] 오퍼레이터의 공격력 +20%","desc":"오리지늄 아츠가 오늘날처럼 발달하지 못했던 시대, 염국에선 타인의 궁술을 칭찬할 때 \\'백보천양\\'이라는 표현을 썼다.","new":false},{"id":"rogue_3_relic_legacy_115","orderId":"159","name":"브로큰 보우 - 교차 사격","usage":"모든 [스나이퍼] 오퍼레이터의 HP -40%, 공격력 +40%","desc":"촘촘하게 화력망을 배치하는 순간 스나이퍼 오퍼레이터들을 위험에 노출시키고, 그다음은 가늠쇠에 관한 게임이 이어진다.","new":false},{"id":"rogue_3_relic_legacy_116","orderId":"160","name":"브로큰 보우 - 신속","usage":"모든 [스나이퍼] 오퍼레이터의 공격 속도 +70","desc":"고대 빅토리아 전설의 궁수는 화살을 거의 일직선으로 연결할 수 있다고 한다.","new":false},{"id":"rogue_3_relic_legacy_117","orderId":"161","name":"브로큰 스태프 - 돌파","usage":"모든 [캐스터] 오퍼레이터의 배치 코스트 -3, HP +60%","desc":"아츠가 손끝에서 춤을 추고 비바람을 불러오고 현실을 교란시켜 자신의 위대한 목적을 달성한다.","new":false},{"id":"rogue_3_relic_legacy_118","orderId":"162","name":"브로큰 스태프 - 위버","usage":"모든 [캐스터] 오퍼레이터의 공격력 +25%, 공격 속도 +25","desc":"라이타니엔에서 고탑을 올려다볼 때 종종 이상한 현상을 목격하곤 했다…… 심지어 천체 현상을 목격한 적도 있다.","new":false},{"id":"rogue_3_relic_legacy_119","orderId":"163","name":"브로큰 스태프 - 집중","usage":"모든 [캐스터] 오퍼레이터의 SP 회복 +0.4/초","desc":"“한 캐스터가 전력을 다하기로 하면 스카이파이어 같이 성격이 나쁜 캐스터도 전혀 다른 기질을 보일 수 있어.”","new":false},{"id":"rogue_3_relic_legacy_120","orderId":"164","name":"브로큰 스태프 - 고난의 주술","usage":"모든 [캐스터] 오퍼레이터의 HP -40%, 공격 시 마법 대미지 +70%","desc":"살카즈가 오리지늄을 접하게 된 기원에 대해서는 거의 고증할 길이 없다. 고대 아츠의 시작은 물질 현실과 논리 상식을 벗어난 지 오래다.","new":false},{"id":"rogue_3_relic_legacy_121","orderId":"165","
