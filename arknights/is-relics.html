name":"스트럿 - 돌파","usage":"모든 [서포터] 오퍼레이터의 배치 코스트 -2, HP +60%","desc":"\\'임무가 조금 남았\\'을 때 필요한 것은 바로 그 \\'조금\\' 남은 일을 도와줄 사람이다.","new":false},{"id":"rogue_3_relic_legacy_122","orderId":"166","name":"스트럿 - 근면","usage":"모든 [서포터] 오퍼레이터의 SP 소모 -40%","desc":"별거 아닌 일인 것처럼 보여도 오퍼레이터들은 전력을 다할 것이다. 게다가 사실 전혀 별거 아닌 일도 아니다.","new":false},{"id":"rogue_3_relic_legacy_123","orderId":"167","name":"스트럿 - 케어","usage":"모든 [서포터] 오퍼레이터의 공격 범위 내 아군 유닛 공격력 +20%","desc":"식사를 건네주거나, 길을 알려주거나, 심지어는 마음의 대화를 나누거나. 승패의 관건은 바로 이런 사소한 일에 달려 있다.","new":false},{"id":"rogue_3_relic_legacy_124","orderId":"168","name":"스트럿 - 약화","usage":"모든 [서포터] 오퍼레이터의 공격 범위 내 적군 유닛 방어력 -20%, 마법 저항 -20%","desc":"적의 방어를 약화시키는 방법은 다양하다. 위치 장치, 아츠 아머 관통, 약점 표시…… 아니면 배를 아프게 만들거나……","new":false},{"id":"rogue_3_relic_legacy_125","orderId":"169","name":"힐러 - 돌파","usage":"모든 [메딕] 오퍼레이터의 배치 코스트 -2, HP +60%","desc":"구원은 인류가 칭찬해야 하는 미덕이며, 이 모든 것을 가능하게 하는 버팀목이다.","new":false},{"id":"rogue_3_relic_legacy_126","orderId":"170","name":"힐러 - 자생","usage":"모든 [메딕] 오퍼레이터 SP 회복 +0.3/초","desc":"누가 의사는 제 병을 못 고친다고 했는가, 그들은 단지 각성제 한 알을 먹은 뒤, 계속하여 다른 사람을 돕는 일을 선택했을 뿐이다.","new":false},{"id":"rogue_3_relic_legacy_127","orderId":"171","name":"힐러 - 명의","usage":"모든 [메딕] 오퍼레이터의 공격 속도 +50","desc":"죽음의 문턱에서 목숨을 건진 위대한 업적에 비하면, 그 뒤에 겨우 3일 혼수상태에 빠지는 것쯤이야 무슨 대수겠는가?","new":false},{"id":"rogue_3_relic_legacy_128","orderId":"172","name":"힐러 - 고착화","usage":"모든 [메딕] 오퍼레이터의 공격 범위 내의 아군 유닛 저항 획득","desc":"신체를 이동도시처럼 튼튼하게 만드는 건 이상에 가까운 일이지만, 의사들은 이 발상을 실천할 준비가 되어 있다.","new":false},{"id":"rogue_3_relic_legacy_129","orderId":"173","name":"러스트 블레이드 - 돌파","usage":"모든 [스페셜리스트] 오퍼레이터의 배치 코스트 -2, HP +60%","desc":"수단은 여러 가지 있지만, 결말은 결국 하나뿐이다.","new":false},{"id":"rogue_3_relic_legacy_130","orderId":"174","name":"러스트 블레이드 - 연마","usage":"모든 [스페셜리스트] 오퍼레이터의 공격 속도 +30","desc":"아무리 갈아도 끊임없는 녹슨 자국, 아무리 해도 끝이 안 보이는 일.","new":false},{"id":"rogue_3_relic_legacy_131","orderId":"175","name":"러스트 블레이드 - 보이는 고요함","usage":"모든 [스페셜리스트] 오퍼레이터의 재배치 시간 -35%","desc":"소리는 오직 그림자가 덮쳐오는 순간에만 들린다. 그 소리를 들을 자는 다음 피해자이다.","new":false},{"id":"rogue_3_relic_book_2","orderId":"176","name":"러스트 블레이드 - 날카로움","usage":"모든 [스페셜리스트] 오퍼레이터의 공격력 +40%, 밀고 당기는 힘 +2","desc":"“새 무기를 시험해 봐…… 아니면, 이미 시험해 봤나?”","new":false},{"id":"rogue_3_relic_legacy_132","orderId":"177","name":"긁기의 손","usage":"[감속자], [약화자], [비호자]가 공격 시 추가로 목표 HP의 3%에 해당하는 마법 대미지 부여","desc":"작은 것도 막으려야 막을 수가 없다.","new":false},{"id":"rogue_3_relic_legacy_133","orderId":"178","name":"작열의 손","usage":"[포트리스], [체인 캐스터], [블래스트 캐스터]가 대미지를 입힐 때마다 SP 2 회복","desc":"수량이 많을수록 힘은 강해지는 법.","new":false},{"id":"rogue_3_relic_legacy_134","orderId":"179","name":"극속의 손","usage":"[처형자], [매복자], [인형사] 주변 4칸에 아군 유닛이 없으면 공격 속도 +120","desc":"팔 한 번 휘두르니 남은 건 잔상뿐이다.","new":false},{"id":"rogue_3_relic_legacy_135","orderId":"180","name":"정화의 손","usage":"[음유시인], [진법 캐스터], [테라피스트]가 범위 내 적에게 초당 공격력의 50%에 해당하는 마법 대미지를 입힘","desc":"이것이 있는 곳이 곧 정화된 곳이다.","new":false},{"id":"rogue_3_relic_legacy_136","orderId":"181","name":"과녁 파괴의 손","usage":"[포격사수], [스플래시 캐스터], [투척수]가 대미지를 입힐 때마다 자신의 공격력 +15%, 최대 +150%, 5초간 대미지를 입히지 못하면 버프 초기화","desc":"목표, 과녁만 맞추는 게 아니다.","new":false},{"id":"rogue_3_relic_legacy_137","orderId":"182","name":"영원한 흐름의 손","usage":"[코어 캐스터], [미스틱 캐스터], [소환사]가 스킬을 사용할 때마다 SP 자연 회복 속도 +0.5/초, 최대 4회 중첩","desc":"바다가 끝없이 흐르는 것은 그것이 영원히 솟구치기 때문이다.","new":false},{"id":"rogue_3_relic_hand_1","orderId":"183","name":"결박의 손","usage":"[프로텍터], [아츠 프로텍터], [결전자]가 2초마다 자기 주변의 모든 적을 1초간 기절, 동시에 100%의 트루 대미지 부여","desc":"그녀가 거기 서 있다는 건, 넘을 수 없다는 뜻이다.","new":false},{"id":"rogue_3_relic_hand_2","orderId":"184","name":"임기응변의 손","usage":"[돌격수], [척후병], [전술가]의 배치 코스트 -10, 적 처치 시 모든 미배치 오퍼레이터의 배치 코스트 -1","desc":"우리에게 부족한 건 전장의 정보가 아니라, 정보를 제때 다 읽을 수 있는 리더다.","new":false},{"id":"rogue_3_relic_hand_3","orderId":"185","name":"궤멸의 손","usage":"[헤비슈터], [저격수], [공성사수]의 공격 대미지가 목표의 HP 하락에 따라 최대 50%까지 상승, 추가로 HP가 20% 이하인 적을 강제로 처치","desc":"모든 균열을 부숴버리든가, 첫 번째 균열을 부숴내든가.","new":false}]},{"name":"현명한 수집","items":[{"id":"rogue_3_relic_legacy_1","orderId":"186","name":"농축 억제제","usage":"모든 오퍼레이터가 [감염 생물]에 주는 대미지 150%까지 증가, 상대의 특수능력 3초간 무효화","desc":"로도스 아일랜드에서 급성 광석병을 억제할 때 사용하는 의료용 시약. 하지만, 농축 및 추출 후 감염 부위에 되레 돌이킬 수 없는 상처를 입힌다.","new":false},{"id":"rogue_3_relic_legacy_45","orderId":"187","name":"고대 주물","usage":"오퍼레이터 3명 즉시 랭크 상승 (희망 소모 없음)","desc":"“하늘에는 커다란 용광로가 있고, 땅에는 금, 은, 동, 석, 철, 다섯 가지 금속이 난다”…… 다양한 일에 사용되긴 하지만 아무도 구체적인 원리를 모른다.","new":false},{"id":"rogue_3_relic_legacy_57","orderId":"188","name":"연설문","usage":"모든 오퍼레이터 모집 시 희망 소모 -2","desc":"그녀는 조금 긴장하고 걱정스러운 듯한 모습을 보였지만, 언제나 굳건함을 유지했다. 마이크가 켜지자, 그녀의 긴 두 귀가 살짝 움직였다.","new":false},{"id":"rogue_3_relic_legacy_58","orderId":"189","name":"녹슨 쇠망치","usage":"상품 구매 시 소모 오리지늄각뿔 -50%","desc":"“변혁은 필수다. 폭풍우가 더 빨리 휘몰아쳐야 한다.”","new":false},{"id":"rogue_3_relic_legacy_60","orderId":"190","name":"네잎클로버 화석","usage":"소원성취 및 전투 종료 후 소장품 선택 옵션 1종 추가","desc":"마젤란이 생명이 사라진 곳에서 찾은 행운의 상징. 이 돌이 대지의 격변을 겪은 건 틀림없으나, 다행히 살아남았고, 마지막 남은 자그마한 희망을 발견자에게 줄 것이다. ","new":false},{"id":"rogue_3_relic_legacy_61","orderId":"191","name":"아카후알라 그릇","usage":"목표 HP +4, 실드 +2","desc":"과일은 현지인들의 주식 중 하나이며, 과일을 따고 현장에서 바로 먹는 것도 흔하게 있는 일이다.","new":false},{"id":"rogue_3_relic_legacy_62","orderId":"192","name":"입체 예술 장식품","usage":"목표 HP +7, 전투가 종료될 때마다 추가로 목표 HP +1","desc":"라인 랩이 사람들에게 주는 인상은 마치 이 예술 장식품과도 같다. 뭔가 신비롭고 겹겹이 둘러싸여 영원히 그 내부를 알 수 없는 것처럼.","new":false},{"id":"rogue_3_relic_legacy_63","orderId":"193","name":"디펜더-2","usage":"실드 +5","desc":"이건 양산형 방어용 드론이다. 꼭 적들만 조종할 수 있다는 법은 없다.","new":false},{"id":"rogue_3_relic_legacy_158","orderId":"194","name":"황금 술의 성배","usage":"보유한 오리지늄각뿔 5개당 아군 유닛의 공격 속도 +7","desc":"성자, 기사, 독실한 신자를 막론하고 이걸 위해 미치지 않는 사람이 없다. 세상에나, 성배조차도 순금인데!","new":false},{"id":"rogue_3_relic_legacy_163","orderId":"195","name":"\\'국왕의 수호 반지\\'","usage":"실드 +2, 목표 HP가 전부 실드로 전환 (목표 HP 최소 1 유지)","desc":"심해 신도들이 한 번에 성공할 순 없다. 그들이 바다와 육지의 경계선에서 오랜 시간 머문 것은 앞으로 있을 \\'고요함\\'이라는 재난을 위한 것이다.","new":false},{"id":"rogue_3_relic_res_1","orderId":"196","name":"기사의 랜스 Pro","usage":"보물 상자에서 더 많은 오리지늄각뿔 획득","desc":"힘이 모자랄까 걱정하지 마라! 작은 지렛대를 이용하면 더 많이 들고 더 많이 이길 수 있다! 그 보상으로 사미 바캉스 투어가 차려질 테니!","new":true},{"id":"rogue_3_relic_res_3","orderId":"197","name":"전자동 정비대","usage":"간섭 방지 지수 +2, 붕괴 수치 +2","desc":"조금은 더럽지만 그래도 알아서 잘 돌아간다. 아침부터 밤까지, 심지어 쓰는 사람이 없어도 왜 혼자 돌아가지는지는 아무도 모른다. 레이시언 공업 측은 이런 제품을 만든 적이 없다고 한다.","new":true},{"id":"rogue_3_relic_res_5","orderId":"198","name":"경계용 울타리","usage":"붕괴 수치 -2, 최대 HP +2","desc":"눈밭에 있는 아주 선명한 채색 장식, 심지어 꿈에서도 또렷하게 보인다. 땅에는 경계가 없지만, 방황하는 마음은 공포가 어디에 숨어있는지 알아야 한다.","new":true},{"id":"rogue_3_relic_res_6","orderId":"199","name":"《헤비메탈 컬렉션》","usage":"붕괴 수치 -2, 희망 +2","desc":"사미 남부에 주둔해있는 컬럼비아 구조대는 매년 겨울이 오면 꼭 수행하는 임무가 있다. 바로 뮤직비디오를 찍다가 눈이 덮인 숲에서 조난당한 밴드를 구하는 것이다.","new":true},{"id":"rogue_3_relic_res_7","orderId":"200","name":"방랑 캐스터의 향수병","usage":"숨겨진 비경에 진입 시 붕괴 수치 -3","desc":"누군가가 절망적인 추모 속에서 이 음표들을 모방해냈다. 칼날이 공기를 가르며 낸 선율은 기괴한 조화를 이루지만, 결코 평균율의 법칙을 따르진 않는다.","new":true},{"id":"rogue_3_relic_res_9","orderId":"201","name":"의식용 종","usage":"간섭 방지 지수 감소 시 목표 HP +1","desc":"눈을 감아라. 갈망하는 모든 걸 안에서 찾아야 할지니.","new":true},{"id":"rogue_3_relic_res_11","orderId":"202","name":"북부 개척자의 지팡이","usage":"간섭 방지 지수가 4 이상인 상태에서 비전투 노드에 진입할 때마다 오리지늄각뿔 +2","desc":"약간의 위험을 감지할 수 있지만, 중요한 건 돈도 감지할 수 있다. 계약에 따르면, 현지에 컬럼비아 기준에 맞는 의료 기관을 설립해야만 회사가 개척자의 의료 보험 비용을 부담해준다.","new":true},{"id":"rogue_3_relic_fight_1","orderId":"203","name":"사냥꾼의 통찰력","usage":"모든 오퍼레이터가 [붕괴체] 공격 시 50%의 방어력과 마법 저항 무시, 상대를 0.5초간 정지","desc":"의지를 완전히 빼앗기기 전, 소녀는 다가오는 구원자를 향해 애걸했다. “활을 당기게 해줘. 내가 이겨내게 해줘. 내가 두려워하지 않게 해줘.”","new":true},{"id":"rogue_3_relic_fight_10","orderId":"204","name":"눈과 흙의 띠","usage":"전장에 특별한 작전 포인트 출현, 해당 위치 및 주변 8칸에 배치된 아군 유닛이 공격 또는 피격으로 인해 SP 회복 시, 범위 내 다른 한 명의 오퍼레이터도 SP 회복","desc":"이 고리 속에서만큼은 눈서리 내린 대지의 총애를 받아야 한다.","new":true},{"id":"rogue_3_relic_fight_14","orderId":"205","name":"옛 땅의 나무 열매","usage":"소장품 3개 즉시 획득","desc":"사미 아이들은 소원을 빈 씨앗을 새하얀 눈에 묻는다. 나무가 자라 열매를 맺으면 최초의 열매 네 개를 따서, 가장 작은 열매는 소원용으로 후대에 남겨준다. 그리고 나머지 열매는 바로 사미에게 답을 비는 공물이다.","new":true},{"id":"rogue_3_relic_fight_15","orderId":"206","name":"극지용 개량 팩","usage":"지원 도구 사용 시 주변 4칸에도 동시 적용","desc":"볼보트 코친스키 극한 환경 설비 테스트부 제공. 다양한 보급형 모델을 극지용으로 개조할 수 있어 추운 환경에서 더 큰 효과를 발휘할 수 있게 한다.","new":true},{"id":"rogue_3_relic_fight_22","orderId":"207","name":"원형 제단","usage":"전투 후 일정 확률로 모든 아군 유닛의 공격력 및 방어력이 영구적으로 +5% (최대 10회 중첩)","desc":"제물을 바쳐 보답을 받는다. 너무나도 편리해서 사람들은 무엇을 향해 제사를 지내는지도 모른다.","new":true},{"id":"rogue_3_relic_fight_25","orderId":"208","name":"무지개 항아리","usage":"적이 방어 포인트에 침입할 때마다, 무작위로 재배치 중인 유닛 1명의 현재 재배치 시간을 절반 감소","desc":"사미 사람들은 보통 무지개가 지는 곳에 이것을 보관해 천재와 인재를 막고자 한다.","new":true},{"id":"rogue_3_relic_explore_1","orderId":"209","name":"새싹 막대기","usage":"울창한 숲길 또는 득과 실 노드에 진입할 때마다 실드 +2","desc":"이것은 튼실하고 까무잡잡한 쿠란타와 함께 모래의 황야를 나왔고, 라인 랩 과학조사과 주임이 된 그와 함께 은빛 광야에 들어갔다. 사고로 주인과 헤어졌다 해도 이것은 소유자를 위해 생존의 계시를 가져다줄 것이다.","new":true},{"id":"rogue_3_relic_explore_2","orderId":"210","name":"캔낫의 표식","usage":"교활한 상인에서 아이템 1개 구매, 또는 득과 실에서 아이템 1회 교환할 때마다 희망 +1","desc":"캔낫의 체면을 세워주는 사람도 있고, 캔낫이 \\'체면\\'을 세워줄 만한 사람도 있다.","new":true},{"id":"rogue_3_relic_explore_3","orderId":"211","name":"길잡이 넝쿨인형","usage":"수직으로 노드 이동 시 일정 확률로 간섭 방지 지수가 하락하지 않음","desc":"샤먼들이 넝쿨로 만든 골렘. 주로 숲에서 길 찾을 때 사용한다. 아주 정확하지는 않지만, 그래도 제대로 찾으면 탐사 장비를 위해 많은 에너지를 절약할 수 있다.","new":true},{"id":"rogue_3_relic_explore_4","orderId":"212","name":"우르수스의 부러진 칼날","usage":"붕괴 패러다임 1레벨당 전투에서 획득하는 지휘 경험치 +10%","desc":"그에게 결심이 부족한 것도 의지가 없는 것도 아니다. 다만, 자결하는 순간에 몸의 본능적인 반응이 돌이킬 수 없는 잘못을 저질렀을 뿐이다.","new":true},{"id":"rogue_3_relic_explore_5","orderId":"213","name":"\\'뾰족니, 숲의 파괴자\\'","usage":"전투 후 일정 확률로 암호판 1개 획득","desc":"인간이 열매로 자신과 나무 조각을 교환하길 원한다는 걸 알게 된 후, 이 무스비스트는 숲의 나무를 거침없이 물어뜯기 시작했다. 하지만 녀석은 일부 나무 조각에 사미 무상의 뜻이 담겨있다는 걸 모를 것이다.","new":true}]},{"name":"지원 도구","items":[{"id":"rogue_3_active_tool_1","orderId":"214","name":"지원 - 보급기","usage":"전투 시 휴대용 보급기 1개 사용 가능(캐릭터나 지휘 단말기가 추가 SP 획득)","desc":"외근 오퍼레이터에게 긴급 제공되는 휴대용 보급기","new":false},{"id":"rogue_3_active_tool_2","orderId":"215","name":"지원 - 지뢰세트","usage":"전투 시 방해지뢰 3개 사용 가능(폭발 시 주변의 모든 적에게 대량의 대미지를 주고, 해당 적이 일정 시간 동안 받는 대미지 증가)","desc":"외근 오퍼레이터에게 긴급 제공되는 방해지뢰","new":false},{"id":"rogue_3_active_tool_3","orderId":"216","name":"지원 - 럼블","usage":"전투 시 미스터 럼블 2개 사용 가능(주변 4칸 범위의 적을 긴 시간 동안 기절시킨다)","desc":"외근 오퍼레이터에게 긴급 제공되는 미스터 럼블","new":false},{"id":"rogue_3_active_tool_4","orderId":"217","name":"지원 - 크레인","usage":"전투 시 스노우상트의 안전한 크레인 2개 사용 가능(오퍼레이터를 즉시 퇴각시키고, 재배치 시간을 대폭 단축시킨다)","desc":"외근 오퍼레이터에게 긴급 제공되는 스노우상트의 안전한 크레인","new":false},{"id":"rogue_3_active_tool_5","orderId":"218","name":"지원 - 진압장치","usage":"전투 시 진압장치 2개 사용 가능(적 저지 가능)","desc":"외근 오퍼레이터에게 긴급 제공되는 휴대용 진압장치","new":false},{"id":"rogue_3_active_tool_6","orderId":"219","name":"지원 - 포그머신","usage":"전투 시 고장난 무대용 포그머신 1개 사용 가능(주변 8칸 범위 내 적의 이동 속도 감소)","desc":"외근 오퍼레이터에게 긴급 제공되는 고장 난 무대용 포그머신","new":false}]},{"name":"스토리 텔러","items":[{"id":"rogue_3_relic_boss_1","orderId":"220","name":"나무 상처의 투구","usage":"희망 +3, 탐험 결말이 변경","desc":"지위와 권력의 상징이지만, 전사에게는 그저 나약한 자가 자신을 보호하기 위한 인공물로 보일 뿐이다. 누군가는 책임을 회피하려고 이걸 버리지만, 누군가는 목숨을 버리겠다는 결의를 다지기 위해 이걸 버린다.","new":true},{"id":"rogue_3_relic_boss_2","orderId":"221","name":"무한 선물","usage":"붕괴 수치 +3, 탐험 결말이 변경","desc":"보이지 않는 곳에서 뿌리를 내리고 상상할 수 없는 곳에서 영양분을 흡수한다. 꽃은 끝없는 경계를 넘어 경계 밖의 첫 번째 표식으로 만개한다.","new":true},{"id":"rogue_3_relic_boss_2b","orderId":"222","name":"도로망","usage":"추가의 적 출현, 탐험 결말이 변경","desc":"복잡하게 얽힌 그물이 아무도 알아볼 수 없는 지도가 되었다. 길이 사방으로 통한 것처럼 보이지만, 실제로 보여준 건 결과밖에 없다.","new":true}]},{"name":"테라의 비밀","items":[{"id":"rogue_3_relic_legacy_157","orderId":"223","name":"\\'쉐이의 분노\\'","usage":"아군 유닛을 배치할 때마다 무작위로 1명의 적군과 상대의 주변에 3000 마법 대미지 부여","desc":"베헤모스가 고개를 들면 천지가 흔들릴지니.","new":false},{"id":"rogue_3_relic_legacy_161","orderId":"224","name":"\\'문명의 존속\\'","usage":"모든 적군 유닛의 피격 트루 대미지 +150%","desc":"검은색 작은 왕관.","new":false},{"id":"rogue_3_relic_legacy_162","orderId":"225","name":"\\'시간의 끝\\'","usage":"1회에 한해, 리더 전투 또는 최종 전투가 아닌 작전에서 실패할 경우, 탐험을 끝내지 않고 목표 HP +1 상태로 계속 탐험 가능","desc":"새로운 순환이 시작되지 않은 한 아직 잘못을 만회할 기회가 있다.","new":false},{"id":"rogue_3_relic_legacy_166","orderId":"226","name":"\\'미니 그란파로\\'","usage":"적이 방어 포인트에 진입할 때마다 남은 적들은 5초간 기절","desc":"리버스 엔지니어링으로 \\'이베리아의 눈\\'을 분석하여 만든 조명 장치. 겹겹이 쌓인 먹구름을 뚫을 수도, 일시적으로 강적을 물리칠 수도 있다.","new":false},{"id":"rogue_3_relic_legacy_167","orderId":"227","name":"\\'더 샤드의 기억\\'","usage":"적이 방어 포인트에 진입할 때마다 남은 적들에게 트루대미지 3000 부여","desc":"“빅토리아의 심장에 박혀, 제국이 피 흘리는 모습을 지켜볼 수밖에 없다.”","new":false},{"id":"rogue_3_relic_res_10","orderId":"228","name":"\\'맹목\\'","usage":"간섭 방지 지수가 0-1 경우, 노드 이동 시 무작위로 실드, 오리지늄각뿔, 희망, 간섭 방지 지수 또는 암호판 획득","desc":"그들이 살카즈 왕정의 제도를 유지하고 있는지, 왕정의 주인이 아직 남아 있는지는 현재 아무도 확신할 수 없다. 사람들이 확신할 수 있는 마지막 기억은 어느 사이클롭스가 검은색 왕관을 벗은 그 순간에 머물러 있다.","new":true},{"id":"rogue_3_relic_res_12","orderId":"229","name":"호박의 상처","usage":"간섭 방지 지수가 최대치 초과 가능, 초과한 지수 1당 아군 유닛의 최대 HP +8%, 공격력 +8%","desc":"엘프들은 테라의 땅에 외롭게 남아 흙먼지를 안고 타향에 등을 기댄다.","new":true},{"id":"rogue_3_relic_explore_6","orderId":"230","name":"암마의 사랑","usage":"모든 아군 유닛의 HP, 공격력, 방어력 +1%, 간혹 기묘한 효과 발동","desc":"그것은 정말로 당신을 사랑한다. 호주머니 속의 그 무게가 바로 증거이다. 하지만 그의 사랑이 너무나도 변덕스러워, 호주머니에서 꺼낸 게 가호의 증명인지, 아니면 한 움큼의 녹은 눈인지 영원히 알 수 없다.","new":true}]}]},"is5":{"meta":{"title":"파도를 삼키는 불","short":"IS:5","color":"#3ec8c8"},"categories":[{"name":"다원 기물","items":[{"id":"rogue_4_relic_legacy_9","orderId":"001","name":"특선 비스트 통조림","usage":"편성 가능 인원수 +1, 모든 아군 유닛이 초당 HP +3","desc":"먼 길을 떠나는 여행자에겐 \\'즉각취식\\'의 편리함이 맛보다 중요한 때가 많다."},{"id":"rogue_4_relic_legacy_10","orderId":"002","name":"해초 무침","usage":"편성 가능 인원수 +1, 모든 아군 유닛의 공격 속도 +1","desc":"한때 이베리아인들이 자랑스러워했던 전통 미식이었으나, 시본이 횡포한 지금 점점 사람들의 기억에서 잊혀 가고 있다."},{"id":"rogue_4_relic_legacy_11","orderId":"003","name":"오렌지 스톰","usage":"편성 가능 인원수 +1, 모든 아군 유닛의 공격력 +1%","desc":"마마존스 캔디 제품 중에서도 가장 잘 팔리는 오렌지 맛. 저렴한 가격과 달콤한 맛을 어필하여 아이들 사이에 특히 인기가 많다."},{"id":"rogue_4_relic_legacy_12","orderId":"004","name":"커피 플레인 커피 캔디","usage":"편성 가능 인원수 +2, 모든 아군 유닛의 공격 속도 +2","desc":"도솔레스 유명 커피 브랜드의 커피 캔디 제품으로 현재 각지에서 널리 판매되고 있다. 실제로 카페인을 첨가하여 출근부터 퇴근까지 맑은 정신을 유지하게 해준다."},{"id":"rogue_4_relic_legacy_13","orderId":"005","name":"스크리밍 체리","usage":"편성 가능 인원수 +2, 모든 아군 유닛의 공격력 +2%","desc":"마마존스의 새콤달콤한 체리 맛 캔디로, 판매량은 인기 제품에 비해 보잘것없으나 소수의 마니아들이 꾸준히 찾고 있다. 듣기로는 마마존스의 한 이사가 이 맛을 좋아한다고 한다."},{"id":"rogue_4_relic_legacy_14","orderId":"006","name":"피트 과일 믹스","usage":"편성 가능 인원수 +3, 모든 아군 유닛의 공격력, 방어력, HP +3%","desc":"피트 브랜드의 과일 믹스 캔디, 다양한 맛과 높은 가성비로 그 인기가 마마존스 캔디와 맞먹을 정도다. 뮤엘시스가 가장 좋아하는 제품이기도 하다."},{"id":"rogue_4_relic_legacy_15","orderId":"007","name":"지형도","usage":"배치 가능 인원수 +1, 모든 아군 유닛의 방어력 +4%","desc":"꽤 오래 돼 보이는 수제 지도. 지도상의 명칭과 지형은 많이 바뀌었고, 축척에도 문제가 있는 것 같다."},{"id":"rogue_4_relic_legacy_16","orderId":"008","name":"신탁의 소라","usage":"배치 가능 인원수 +1, 모든 아군 유닛의 HP +4%","desc":"이것을 불면 당신이 본 적도 들은 적도 없는 신들이 응답할 것이다. 사실은 그저 소라 껍데기일 뿐이다."},{"id":"rogue_4_relic_legacy_17","orderId":"009","name":"숲 속의 야화","usage":"배치 가능 인원수 +2, 모든 아군 유닛의 방어력 +6%","desc":"요양 정원에서 외근 오퍼레이터들을 위해 제작한 방향제 세트. 15가지 식물 성분을 채취해 172가지로 조합할 수 있다. 숲에 바람이 불어오면 만물이 속삭이니, 편하게 잠들 수 있다."},{"id":"rogue_4_relic_legacy_18","orderId":"010","name":"교회 구호식권","usage":"배치 가능 인원수 +2, 모든 아군 유닛의 HP +6%","desc":"몰락한 이베리아 해안 도시의 일부 교회에서는 정기적으로 신도들에게 구호식권을 나눠준다. 식권의 발급 대상 기준은 비밀이지만."},{"id":"rogue_4_relic_legacy_34","orderId":"011","name":"열린 소품 상자","usage":"희망 +4","desc":"극단 소품 담당자의 상자. 골무부터 마네킹까지 없는 게 없다."},{"id":"rogue_4_relic_legacy_35","orderId":"012","name":"낡은 악보","usage":"희망 +4","desc":"음표가 흐려져 잘 보이지 않는 낡은 악보의 찢긴 한 페이지. 과연 이 곡엔 어떤 사연이 담겨 있을지 궁금하다."},{"id":"rogue_4_relic_legacy_36","orderId":"013","name":"계약해지서","usage":"희망 +4","desc":"서명 하나만 받아내면 이 극단에서 완전히 벗어날 수 있다."},{"id":"rogue_4_relic_legacy_37","orderId":"014","name":"만능열쇠","usage":"희망 +6","desc":"은으로 만든 낡은 열쇠로, 열 수 없는 문이 없다. 관리자로서, 극단 매니저로서 당연히 모든 비밀을 열 수 있는 이 은 열쇠를 손에 쥐어야 한다."},{"id":"rogue_4_relic_legacy_38","orderId":"015","name":"밴시의 입맞춤","usage":"희망 +8","desc":"이종족이 이걸 얻으면 종종 자신을 초월하는 용기를 보여주곤 하는데, 보기 드문 남성 밴시인 로고스는 이미 익숙해져 있었다."},{"id":"rogue_4_relic_legacy_39","orderId":"016","name":"고대 주화","usage":"오리지늄각뿔 +10 즉시 획득","desc":"녹이 슬어 연도를 판별할 수 없는 고대 주화. 테라 황무지 어디에서나 볼 수 있다."},{"id":"rogue_4_relic_legacy_40","orderId":"017","name":"배우의 장신구 박스","usage":"오리지늄각뿔 +18 즉시 획득","desc":"각종 깨진 장신구가 가득 담긴 박스. 젊은 주연 배우는 보석들을 장착하고 무대에 올라 가장 높은 곳에서 훌쩍 뛰어내린다."},{"id":"rogue_4_relic_legacy_41","orderId":"018","name":"무결점 보옥","usage":"오리지늄각뿔 +25 즉시 획득","desc":"이것 때문에 성이 세 번이나 파괴되긴 했지만, 흠잡을 데 없는 보옥은 여전히 밝게 빛난다. 보옥을 소지한 사르곤 황제는 오늘날까지도 어떤 보석이 가장 잘 어울리는지 모른다. 전쟁의 총성만 영원히 따를 뿐."},{"id":"rogue_4_relic_legacy_42","orderId":"019","name":"오락실 관리자 카드","usage":"오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"이게 있으면 로도스 아일랜드의 오락실 대권을 잡은 거나 마찬가지다. 오퍼레이터의 이상한 요청 사항은 신중하게 처리할 것…… 그리고 문단속은 확실하게 할 것.   "},{"id":"rogue_4_relic_legacy_43","orderId":"020","name":"미스 크리스틴 쓰담권","usage":"오퍼레이터 2명 즉시 랭크 상승 (희망 소모 없음)","desc":"당신은 이미 미스의 허락을 받았다!"}]},{"name":"생존 지원","items":[{"id":"rogue_4_relic_legacy_21","orderId":"021","name":"빨간 리본","usage":"희망 +2, 배치 가능 인원수 +1","desc":"팬텀이 선물한 첫 번째 선물, 미스 크리스틴이 아주 마음에 들어 한다."},{"id":"rogue_4_relic_legacy_22","orderId":"022","name":"독주 오르골","usage":"희망 +4, 배치 가능 인원수 +1","desc":"낡은 오르골. 켜도 소리가 나지 않고 인형도 움직이지 않는다. 아무 소리도 없고 춤추는 사람도 없다. 팬텀과 공연하기 전에 여주인공은 늘 무대 뒤에서 멍하니 이 오르골을 바라보곤 했다."},{"id":"rogue_4_relic_legacy_173","orderId":"023","name":"보물 반지","usage":"전투 드랍 오리지늄각뿔 +50%","desc":"라이타니엔 신화에 나오는 반지. 이 반지를 지니면 온 대지의 부를 가질 수 있으나, 결국 탐욕 때문에 파멸한다고 전해진다."},{"id":"rogue_4_relic_legacy_176","orderId":"024","name":"럭키 코인","usage":"비전투 노드 진입 시 오리지늄각뿔 +2 획득","desc":"로도스 아일랜드에서 주운 동전. 하나를 주우면 더 많이 주울 수 있다."},{"id":"rogue_4_relic_legacy_183","orderId":"025","name":"라이타니엔 명예 훈장","usage":"전투 획득 지휘 경험치 +30%","desc":"쌍둥이 여황제의 의견이 잘 맞는 일은 극히 드문데, 예술을 창조하는 자에게 훈장을 수여하는 것이 그중 하나다."},{"id":"rogue_4_relic_explore_4","orderId":"026","name":"잠든 동포","usage":"희망 +5, 득과 실에서 해당 소장품 교환 시 추가로 소장품 1개 획득","desc":"은빛 산맥에서 길을 잃은 살카즈는 휴면으로 자신을 보호했다. 그러나 너무 오래 잠들었던 탓인지 그는 자아마저 사라졌으며, 그 예정된 운명의 동포가 자신을 깨웠을 때 그는 또 다른 그가 되어 있었다."},{"id":"rogue_4_relic_legacy_19","orderId":"027","name":"그윽한 향의 특급 원두","usage":"편성 가능 인원수 +1, 배치 가능 인원수 +1, 실드 +1","desc":"커피 농부들이 독특한 향이 나는 파울비스트에게 원두를 먹이고, 그 배설물에서 다시 채취 및 가공한 원두. 위산 발효 과정에서 원두가 독특한 향을 머금어, 덕분에 가격이 3배로 뛰었다."},{"id":"rogue_4_relic_legacy_20","orderId":"028","name":"블루 스카프","usage":"희망 +2, 편성 가능 인원수 +1","desc":"우아한 스카프, 그녀의 등장은 곧 안전함을 의미한다."},{"id":"rogue_4_relic_legacy_23","orderId":"029","name":"오리지늄 아이리스","usage":"희망 +6, 편성 가능 인원수 +2","desc":"아주 럭셔리한 꽃다발. 커튼콜 할 때 단장이 주인공에게 꽃을 준 적은 손에 꼽을 정도다."},{"id":"rogue_4_relic_legacy_24","orderId":"030","name":"괴상한 플루트","usage":"희망 +4, 편성 가능 인원수 +1","desc":"괴상하게 생긴 플루트로, 누군가 밤낮으로 불어댄다."},{"id":"rogue_4_relic_legacy_25","orderId":"031","name":"유리로 만든 새","usage":"희망 +4, 편성 가능 인원수 +1","desc":"“나만의 낙원에서 이 작은 새는 영원히 노래한다.”"},{"id":"rogue_4_relic_legacy_26","orderId":"032","name":"순금의 원정","usage":"희망 +4, 편성 가능 인원수 +1, 배치 가능 인원수 +1","desc":"군주는 황무지에서 출발했고, 그녀의 발길이 닿는 곳마다 시장이 봄날의 새싹처럼 피어났고, 번영의 길은 높은 산과 울창한 숲을 지나 그녀가 사라진 서쪽 파도의 절벽까지 이어졌다. ——사르곤 전래동화"},{"id":"rogue_4_relic_legacy_27","orderId":"033","name":"《두린의 지상 유람기》","usage":"실드 +4","desc":"이 유람기를 통해 우리는 두린족이 지상의 사람들에 대해 품은 기이한 견해를 알 수 있다."},{"id":"rogue_4_relic_legacy_28","orderId":"034","name":"《옛 가울 지명 원류고》","usage":"실드 +6","desc":"민트가 박사 사무실에서 뒤져낸 옛 지명 역사책으로, 이 책에는 셀라이블라손에 관련된 내용이 기록돼 있다."},{"id":"rogue_4_relic_legacy_29","orderId":"035","name":"전기 주전자","usage":"최대 목표 HP +1, 희망 +1","desc":"로도스 아일랜드 사무실에 있는 것과 같은 모델의 전기 주전자. 한밤중에 이걸로 라면을 끓여 먹는 사람들도 종종 있는데, 이는 건강하지 않은 생활습관이다……"},{"id":"rogue_4_relic_legacy_30","orderId":"036","name":"특수 저지 장치","usage":"최대 목표 HP +2, 목표 HP 2 회복","desc":"로도스 아일랜드의 개량형 저지 장치. 감염으로 인한 오리지늄 아츠 통제 불능 상태를 효과적으로 제어할 수 있다."},{"id":"rogue_4_relic_legacy_31","orderId":"037","name":"석상귀 조각상","usage":"최대 목표 HP +3","desc":"손바닥만한 조각상. 석상귀들이 우호를 표시하는 피조물이라고 한다."},{"id":"rogue_4_relic_legacy_32","orderId":"038","name":"뱀파이어의 침대","usage":"최대 목표 HP +4","desc":"고성의 분위기와 아주 잘 어울리는 럭셔리한 관. 와파린은 이런 게 고정관념이라고 한다."},{"id":"rogue_4_relic_legacy_33","orderId":"039","name":"영생의 상징","usage":"최대 목표 HP +6","desc":"한쪽은 시들지만, 한쪽은 자라고 있는 나뭇가지. 시든 쪽에서 살아나고, 번성한 쪽은 다시 시든다."},{"id":"rogue_4_relic_legacy_45","orderId":"040","name":"클로 - 전훈","usage":"[뱅가드] 오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"강력한 무기, 용감히 앞으로 나아가는 마음."},{"id":"rogue_4_relic_legacy_46","orderId":"041","name":"브로큰 스피어 - 전훈","usage":"[가드] 오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"활도, 아츠도 사용할 줄도 모르기 때문에 할 수 없이 검을 사용하는 사람들도 있지만, 검을 사용할 수밖에 없기 때문에 검을 사용하는 사람도 있다."},{"id":"rogue_4_relic_legacy_47","orderId":"042","name":"프로텍터 - 전훈","usage":"[디펜더] 오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"상처는 훈장이다. 하지만 가루처럼 부서져 버린 전사들은 누가 기억해 줄 것인가?"},{"id":"rogue_4_relic_legacy_48","orderId":"043","name":"브로큰 보우 - 전훈","usage":"[스나이퍼] 오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"“화력을 잘 제어하든지, 목표를 정확히 겨냥하든지 하라고, 알겠어?”"},{"id":"rogue_4_relic_legacy_49","orderId":"044","name":"브로큰 스태프 - 전훈","usage":"[캐스터] 오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"“어떤 캐스터 오퍼레이터들의 \\'공연\\'을 보고 난 뒤, 나는 라이타니엔 교재를 묵묵히 거둬들이기로 결심했다.”"},{"id":"rogue_4_relic_legacy_50","orderId":"045","name":"스트럿 - 전훈","usage":"[서포터] 오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"그들은 행동할 때 항상 제각각이다."},{"id":"rogue_4_relic_legacy_51","orderId":"046","name":"힐러 - 전훈","usage":"[메딕] 오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"모든 사람이 의사가 되어 삶의 병터라는 병을 완치할 수 있는 때가 온다면, 우리는 더 이상 의사가 필요하지 않을 것이다."},{"id":"rogue_4_relic_legacy_52","orderId":"047","name":"러스트 블레이드 - 전훈","usage":"[스페셜리스트] 오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"스페셜리스트 오퍼레이터들과 실전 연습을 할 때, \\'준비를 제대로 하지 않으면 공격당한다\\'라는 마음의 준비를 단단히 해두도록."},{"id":"rogue_4_relic_legacy_56","orderId":"048","name":"아카후알라 그릇","usage":"목표 HP +4, 실드 +2","desc":"과일은 현지인들의 주식 중 하나이며, 과일을 따고 현장에서 바로 먹는 것도 흔하게 있는 일이다."},{"id":"rogue_4_relic_legacy_58","orderId":"049","name":"디펜더-2","usage":"실드 +3","desc":"이건 양산형 방어용 드론이다. 꼭 적들만 조종할 수 있다는 법은 없다."},{"id":"rogue_4_relic_legacy_143","orderId":"050","name":"빅토리아 \\'고철\\' 훈장","usage":"전투 획득 지휘 경험치 +20%","desc":"시즈가 임시로 다그다에게 만들어 준 기사 훈장. 재료는 형편없으나, 다그다에겐 그 의미가 아주 크다."},{"id":"rogue_4_relic_res_1","orderId":"051","name":"구상의 가방","usage":"구상 3개 즉시 획득","desc":"“여기에 다리를 놔야겠다”, “저기에 꽃을 심어야지”, “이 벽은 없애야겠네” 같은 생각을 담을 수 있는 가방이 있었으면 좋겠다. 필요할 때 꺼내 쓸 수 있게."},{"id":"rogue_4_relic_res_4","orderId":"052","name":"명심의 축하선물","usage":"부하 임계치 +5","desc":"이것은 협곡의 영원히 반짝이는 물로, 기적이 내린 나날 동안 라케라말린 두카 콘발리스가 손수 병에 담은 것이다. 그 후, \\'눈물 흘리는 협곡의 마님\\'은 웃으면서 이 물병을 여러 친구와 자매들에게 선물했다."},{"id":"rogue_4_relic_res_5","orderId":"053","name":"저주받은 전쟁사집","usage":"부하 임계치 +2, 완벽한 작전을 수행할 때마다 부하 임계치 +1","desc":"이 전쟁사집은 도서관 가장 깊숙한 곳에 놓여 있으며, 이를 읽으려는 사람은 그것에 기록된 수많은 전투에 휘말려 헛된 저항 끝에 정신이 붕괴된다. 하지만 엘더 레버넌트의 손은 전장을 훤히 꿰뚫고 있어, 이 책에 붙어 있는 동포를 단번에 끄집어내 자신의 뼈 우리에 봉인했다."},{"id":"rogue_4_relic_res_8","orderId":"054","name":"잃어버린 열쇠","usage":"전투 획득 지휘 경험치 +20%, 지휘 레벨 10 달성 시 오리지늄각뿔 50개 즉시 획득","desc":"“여러분, 이 열쇠는 잃어버린 왕도 카즈델의 보물창고를 열 수 있는 열쇠야. 어이, 거기 녹색 머리 필라인, 너의 저 후드 노예를 잘 감시해! 내 지도를 건드리지 못하게!”"},{"id":"rogue_4_relic_res_9","orderId":"055","name":"이름없는 토템","usage":"다른 종류의 생각 3개 즉시 획득","desc":"이 토템은 길목에 세워져 있었고, 다가간 사람들은 하나같이 신발 밑창이 닳고, 두 발에 피가 흘러, 힘이 다해 죽을 때까지 레베넌트의 희릿한 현실 윤곽을 밟아냈다. 이에 엘더 레버넌트는 동포의 물건을 밟아 부수곤 그것을 자신의 뼈 우리에 봉인했다."},{"id":"rogue_4_relic_res_10","orderId":"056","name":"레버넌트의 잔해","usage":"희망 +2, 노드의 새로고침 횟수 +1","desc":"육체를 잃고 방황하는 유령이 된다. 이것이 바로 일부 살카즈가 종족의 미래를 위해 자발적으로 치른 대가이다."},{"id":"rogue_4_relic_res_11","orderId":"057","name":"마술 상자","usage":"오리지늄각뿔 +4, 부하 임계치 +2","desc":"이 평범해 보이는 상자는 사람들의 마음을 빼앗아 서둘러 상자의 주인을 살해하고 상자를 차지하게 만든다. 인류가 모두 죽은 후 동물이 그 주인공이 되었다. 결국, 엘더 레버넌트는 거대한 록혼비스트 위에서 동포를 꺼내 자신의 뼈 우리에 봉인했다."},{"id":"rogue_4_relic_res_13","orderId":"058","name":"먹다 만 사탕","usage":"편성 가능 인원수 +1, 부하 임계치 +2","desc":"“사탕을 하나 먹을 때마다, 내 몸의 일부가 내 것이 아니라는 생각이 들었어. 그럼에도 사탕을 계속 먹고 싶다는 마음은 그 검은 그림자가 나타나 내 몸에 깃든 괴물을 단숨에 잡아갈 때까지 계속됐지. 하지만 내 마음의 빈 부분은 더는 채울 수 없어.”"}]},{"name":"투지의 기어","items":[{"id":"rogue_4_relic_legacy_1","orderId":"059","name":"돌격 협의 - 칼날","usage":"편성에 뱅가드 또는 가드가 1명 있을 때마다 모든 뱅가드와 가드의 공격력 +8%","desc":"가장 날카로운 창으로 가장 단단한 방패를 공격하면 결국 방패가 깨진다. 날 믿어라."},{"id":"rogue_4_relic_legacy_2","orderId":"060","name":"돌격 협의 - 산개","usage":"편성에 뱅가드 또는 가드가 1명 있을 때마다 모든 뱅가드와 가드의 방어력 +10%","desc":"정교한 막기 기술이야말로 자기 몸을 지킬 수 있는 핵심이다."},{"id":"rogue_4_relic_legacy_3","orderId":"061","name":"방어 협의 - 방진","usage":"편성에 디펜더 또는 서포터가 1명 있을 때마다 모든 디펜더와 서포터의 공격력 +8%","desc":"마치 거대한 함선이 자갈을 짓이기듯."},{"id":"rogue_4_relic_legacy_4","orderId":"062","name":"방어 협의 - 사수","usage":"편성에 디펜더 또는 서포터가 1명 있을 때마다 모든 디펜더와 서포터의 방어력 +10%","desc":"가장 날카로운 창으로 가장 단단한 방패를 공격하면 결국 창이 부러진다. 날 믿어라."},{"id":"rogue_4_relic_legacy_5","orderId":"063","name":"원거리 협의 - 요격","usage":"편성에 메딕 또는 스나이퍼가 1명 있을 때마다 모든 메딕과 스나이퍼의 공격력 +8%","desc":"거리를 두면 해결할 수 있는 문제를, 왜 얼굴을 갖다 대야 하나?"},{"id":"rogue_4_relic_legacy_6","orderId":"064","name":"원거리 협의 - 굴복","usage":"편성에 메딕 또는 스나이퍼가 1명 있을 때마다 모든 메딕과 스나이퍼의 공격 속도 +6","desc":"거리가 멀어서 피아식별이 안 된다고? 그럼 일단 공격해 보길. 피하지 않는 놈이 적이다."},{"id":"rogue_4_relic_legacy_7","orderId":"065","name":"파괴 협의 - 제거","usage":"편성에 캐스터 또는 스페셜리스트가 1명 있을 때마다 모든 캐스터와 스페셜리스트의 공격력 +8%","desc":"외부의 파괴와 내부의 와해."},{"id":"rogue_4_relic_legacy_8","orderId":"066","name":"파괴 협의 - 제압","usage":"편성에 캐스터 또는 스페셜리스트가 1명 있을 때마다 모든 캐스터와 스페셜리스트의 공격 속도 +6","desc":"정확도에는 너무 신경 쓰지 마. 많이 때리는 게 정확하게 때리는 거니까!"},{"id":"rogue_4_relic_legacy_59","orderId":"067","name":"갈라진 속박의 끈","usage":"모든 적군 유닛의 공격력 -7%","desc":"이 튼튼한 끈으로 뭔가 무서운 걸 묶었을 것 같다…… 이런……"},{"id":"rogue_4_relic_legacy_60","orderId":"068","name":"기이한 가면","usage":"모든 적군 유닛의 공격력 -12%","desc":"그 어떤 문화에도 속하지 않는 괴상한 가면. 전의를 상실하게 한다…… 그리고, 자기도 모르게 깊은 생각에 빠진다."},{"id":"rogue_4_relic_legacy_61","orderId":"069","name":"대모의 증표","usage":"모든 적군 유닛의 공격력 -17%","desc":"뼈로 만든 월계관. 시칠리아 부인의 증표이다. 질서의 상징은 바로 요동치는 욕망을 잠재우는 것으로, 투쟁은 허용되지 않는다. 진실이든 거짓이든 무릎을 꿇으라."},{"id":"rogue_4_relic_legacy_62","orderId":"070","name":"낡은 사진","usage":"모든 적군 유닛의 방어력 -12%","desc":"사진 속에 아는 사람이라도 있나?"},{"id":"rogue_4_relic_legacy_63","orderId":"071","name":"말린 시테러","usage":"모든 적군 유닛의 방어력 -21%","desc":"생존에 대한 욕구가 두려움을 압도하면, 극도로 굶주린 이베리아인들은 이 \\'음식\\'을 삼키고 어느 순간 시테러가 되어버린다."},{"id":"rogue_4_relic_legacy_64","orderId":"072","name":"로즈몬티스의 포옹","usage":"모든 적군 유닛의 방어력 -30%","desc":"“누가 심판하지?”"},{"id":"rogue_4_relic_legacy_65","orderId":"073","name":"금박 장식 주사위","usage":"모든 적군 유닛의 HP -15%","desc":"금박 장식이 되어 있는 주사위로, 한 면에만 생존을 상징하는 표식이 새겨져 있고, 나머지 19개 면에는……"},{"id":"rogue_4_relic_legacy_66","orderId":"074","name":"\\'검은 밤의 속삭임\\'","usage":"모든 적군 유닛의 HP -10%","desc":"검은 색 레코드, 만.지.지.마.시.오."},{"id":"rogue_4_relic_legacy_67","orderId":"075","name":"《고요함》","usage":"모든 적군 유닛의 HP -20%","desc":"이베리아 역사상 가장 컸던 재앙을 그린 작품. 붓 터치도, 색도, 사상도 아무 의미가 없다. “에기르는 안다, 에기르는 안다, 에기르는 안다.”"},{"id":"rogue_4_relic_legacy_68","orderId":"076","name":"이철 원형 방패","usage":"모든 아군 유닛의 방어력 +15%","desc":"현대 공업 분야에 널리 쓰이기 전까지 이철은 군용 제식 무기를 만드는 데 더 자주 쓰였다."},{"id":"rogue_4_relic_legacy_69","orderId":"077","name":"군단 미러 아머","usage":"모든 아군 유닛의 방어력 +25%","desc":"한때 심장의 치명적인 피해를 막을 수 있는 흉갑이었으나, 가울이 몰락하면서 이런 구식 갑옷은 역사의 무대에서 사라지게 됐다."},{"id":"rogue_4_relic_legacy_70","orderId":"078","name":"오래된 증기 갑옷","usage":"모든 아군 유닛의 방어력 +35%","desc":"이런 구형 증기 갑옷마저도 빅토리아 군주들이 넓은 대륙을 비추었던 과거의 영광을 담고 있는 것만 같다."},{"id":"rogue_4_relic_legacy_71","orderId":"079","name":"황제의 은총","usage":"모든 아군 근거리 유닛 공격력 +15%","desc":"편지 봉투를 개봉할 때 쓰는 날카로운 칼. 전대 우르수스 황제가 애용하던 일용품이지만, 대부분 봉투를 개봉하는 데 쓰지는 않았다."},{"id":"rogue_4_relic_legacy_72","orderId":"080","name":"귀족 레이피어","usage":"모든 아군 근거리 유닛 공격력 +25%","desc":"거의 장식용으로 사용하는 귀족 검. 가울 귀족들이 가장 먼저 사용했지만, 군용 무기로 쓰기에는 너무 취약하다."},{"id":"rogue_4_relic_legacy_73","orderId":"081","name":"올드 가디언의 창","usage":"모든 아군 근거리 유닛 공격력 +35%","desc":"올드 가디언의 희생을 지켜본 후 가울은 비로소 자신의 파멸을 맞이했다."},{"id":"rogue_4_relic_legacy_74","orderId":"082","name":"헌신의 목걸이","usage":"모든 아군 원거리 유닛 공격력 +15%","desc":"신앙은 심장 10센티미터 위에 걸려있고, 언어는 피에 흘러들며, 총알은 탄창에 미끄러져 들어간다."},{"id":"rogue_4_relic_legacy_75","orderId":"083","name":"은식기","usage":"모든 아군 원거리 유닛 공격력 +25%","desc":"하나는 실패한 배우를 처리할 때 쓰고, 하나는 어설픈 극작가를 혼낼 때 쓰며, 다른 하나는 필요한 사람을 위해 준비해뒀다. 셰프는 누구도 식탁에서 실수하는 것을 용납할 수 없다."},{"id":"rogue_4_relic_legacy_76","orderId":"084","name":"망가진 리볼버 탄창","usage":"모든 아군 원거리 유닛 공격력 +35%","desc":"그녀는 험난한 순간에도 간사한 자들에게 고개를 숙인 적이 없었고, 그녀의 총구에서 나오는 불꽃은 마치 성난 태양 같았고, 그녀 머리 위의 고리는 대낮보다 환한 빛을 발했다. 이곳에 우리의 친구, 아웃캐스트가 잠들어 있다."},{"id":"rogue_4_relic_legacy_77","orderId":"085","name":"악취 나는 지혈제","usage":"모든 아군 유닛의 HP +20%","desc":"“이런 원석충의 체액은 발효 처리 후 지혈제로 사용할 수 있다”——《로도스 아일랜드 야생 생존 지침》"},{"id":"rogue_4_relic_legacy_78","orderId":"086","name":"구급상자","usage":"모든 아군 유닛의 HP +35%","desc":"“……항생제와 에틸 첨가물은 전문가의 지도하에 사용하세요……”——림 빌리턴 안전 생산 지침"},{"id":"rogue_4_relic_legacy_79","orderId":"087","name":"정체불명의 기기","usage":"모든 아군 유닛의 HP +50%","desc":"묻지 말라니까. 다 너 자신을 위한 거라 생각해."},{"id":"rogue_4_relic_legacy_80","orderId":"088","name":"녹슨 면도칼","usage":"모든 적군 유닛이 받는 물리 대미지 +15%","desc":"이것에 살이 베였다면 그다음 무슨 일이 일어날지 감이 올 거다."},{"id":"rogue_4_relic_legacy_81","orderId":"089","name":"마부의 채찍","usage":"모든 적군 유닛이 받는 물리 대미지 +25%","desc":"극단의 마부로서 그는 이름도 과거도 없다. 채찍을 휘둘러 버든비스트를 모는 것만이 그가 존재하는 유일한 의미다."},{"id":"rogue_4_relic_legacy_82","orderId":"090","name":"\\'어벤져\\'","usage":"모든 적군 유닛이 받는 물리 대미지 +35%","desc":"아스카론이 군사위원회의 첫 번째 임무를 완성한 후 테레시스가 직접 선물하고 테레시아가 그녀에게 장착해 준 첫 번째 무기이다."},{"id":"rogue_4_relic_legacy_83","orderId":"091","name":"제식 저항 도구","usage":"모든 적군 유닛이 받는 마법 대미지 +20%","desc":"우르수스 헌병의 제식 장비로, 간헐적 블라인드 오리지늄 아츠 기능을 탑재했다. 하지만, 아쉽게도 결정적인 순간에 그 기능을 떠올리는 헌병은 매우 드물다."},{"id":"rogue_4_relic_legacy_84","orderId":"092","name":"황제의 소장품","usage":"모든 적군 유닛이 받는 마법 대미지 +30%","desc":"사미인은 자신들의 황야를 그 무엇보다 존경한다. 그리고 지금, 그 황야의 파편들이 우르수스 황제의 금고에서 조용히 누워있다."},{"id":"rogue_4_relic_legacy_85","orderId":"093","name":"\\'찬란한 눈물\\'","usage":"모든 적군 유닛이 받는 마법 대미지 +40%","desc":"그의 피는 아직도 흐른다. 그는 단 한 번도 여기를 떠난 적이 없다."},{"id":"rogue_4_relic_legacy_86","orderId":"094","name":"살아 있는 장미","usage":"모든 아군 유닛이 받는 치료 및 HP 회복 효과 +20%","desc":"과연 당신이 보살피고 있는가, 아니면 장미가 당신을 지키고 있는가?"},{"id":"rogue_4_relic_legacy_87","orderId":"095","name":"창백해진 화관","usage":"모든 아군 유닛이 받는 치료 및 HP 회복 효과 +30%","desc":"뱀파이어가 의식을 치를 때 사용하던 화관 베일로, 새빨갛던 생명이 모두 바래져 지금은 창백함만 남았다."},{"id":"rogue_4_relic_legacy_88","orderId":"096","name":"공연용 향수","usage":"모든 아군 유닛이 초당 최대 HP의 1% 만큼 HP 회복","desc":"극단 배우들이 무대에 오르기 전에 몸에 뿌리는 향수로, 안정적이고 향기로운 냄새가 배우들의 스트레스를 풀어준다고 한다. 적어도, 겉보기에는 그렇다."},{"id":"rogue_4_relic_legacy_89","orderId":"097","name":"디자이너의 자","usage":"모든 아군 유닛의 물리 회피 +15%","desc":"데이터와 경험 및 정밀한 측량을 기반으로 만든 갑옷을 입은 사람은 운이 좀 더 좋은 편이다."},{"id":"rogue_4_relic_legacy_90","orderId":"098","name":"\\'아츠 킬러\\'","usage":"모든 아군 유닛의 마법 회피 +15%","desc":"라이타니엔인의 오리지늄 아츠가 음악과 직결돼 있다고 해서, 소음으로 아츠에 맞서는 미련한 생각을 떠올린 사람이 있을 줄이야."},{"id":"rogue_4_relic_legacy_91","orderId":"099","name":"댄서의 팔찌","usage":"모든 아군 유닛의 물리 및 마법 회피 +10%","desc":"훈련된 댄서들이 무대에서 춤추며 함정을 피하자, 관객들은 박수갈채를 보냈다. 방금 하마터면 사람이 죽을 뻔했다는 것도 모른 채 말이다."},{"id":"rogue_4_relic_legacy_92","orderId":"100","name":"인형의 집","usage":"초기 배치 코스트 +10","desc":"모든 아이들이 다 갖고 싶어 하는 그것."},{"id":"rogue_4_relic_legacy_93","orderId":"101","name":"미니 극장 모형","usage":"초기 배치 코스트 +20","desc":"빨간 물감이 아직 마르지 않았다. 손에 묻지 않도록 조심하자."},{"id":"rogue_4_relic_legacy_94","orderId":"102","name":"드림바인드 캐슬 모형","usage":"초기 배치 코스트 +30","desc":"이 모형 안에 있는 곳은 고성을 돌아다니면서 본 적이 있다. 그런데 지금은 이걸 손바닥으로 받들고 있다. 이 모든 것이 진짜일까? 아니면 단지 꿈일까?"},{"id":"rogue_4_relic_legacy_95","orderId":"103","name":"검은색 댄스화","usage":"고지대에 근거리 오퍼레이터 배치 가능","desc":"컬럼비아의 댄서가 스텝을 밟으면, 낭랑하고 우렁찬 소리가 들린다."},{"id":"rogue_4_relic_legacy_96","orderId":"104","name":"하얀색 댄스화","usage":"지상에 원거리 오퍼레이터 배치 가능","desc":"우르수스의 댄서가 가볍게 몸을 움직이며 한껏 자태를 뽐낸다."},{"id":"rogue_4_relic_legacy_128","orderId":"105","name":"고대 가울의 은화","usage":"모든 오퍼레이터의 초기 SP +6","desc":"지금은 멸망한 국가 \\'가울\\'에서 유통했던 화폐로 잘 보관되어 소장 가치가 높다."},{"id":"rogue_4_relic_legacy_129","orderId":"106","name":"가울 은행 수표","usage":"모든 오퍼레이터의 초기 SP +12","desc":"금과 은이 박힌 엄청 고급스러운 수표장. 지금은 현금으로 바꿀 수 없다."},{"id":"rogue_4_relic_legacy_130","orderId":"107","name":"《제2경제개혁법》","usage":"모든 오퍼레이터의 초기 SP +18","desc":"이 법안을 시작으로 가울은 본격적으로 패권 제국의 길을 걷게 되었다."},{"id":"rogue_4_relic_legacy_131","orderId":"108","name":"바닐라 사르시 탄산음료","usage":"모든 자연 회복 스킬의 SP 회복 +0.2/초","desc":"볼리바르 지역의 저가 음료. 수백 년의 역사를 지니고 있으며 다양한 향료를 섞어 만들었다. 특징이라면 맛이 없다는 점."},{"id":"rogue_4_relic_legacy_132","orderId":"109","name":"파울비스트 푸아그라","usage":"모든 자연 회복 스킬의 SP 회복 +0.35/초","desc":"고급스러운 작은 병에 담긴 파울비스트의 간 요리. 색깔이 산뜻하고 귀족들에게만 특별 제공된다."},{"id":"rogue_4_relic_legacy_133","orderId":"110","name":"매혹의 향수","usage":"모든 자연 회복 스킬의 SP 회복 +0.5/초","desc":"밴시들은 향수를 만들어 마음에 드는 사람에게 선물한다고 한다. 딱 한 방울, 한 방울이면 사람을 황홀하게 만들고, 예술가들의 영감과 아이디어도 이것에서 얻는다고 한다."},{"id":"rogue_4_relic_legacy_134","orderId":"111","name":"모건 대장의 술","usage":"모든 공격 및 피격 시 회복되는 스킬이 3초마다 SP 1 회복","desc":"이베리아 지역에서 생산되는 술. 빅토리아 중부 도시에서 인기가 좋지만, 현재는 단종되었다."},{"id":"rogue_4_relic_legacy_135","orderId":"112","name":"스피리터스","usage":"모든 공격 및 피격 시 회복되는 스킬이 2.5초마다 SP 1 회복","desc":"도수가 매우 높은 우르수스의 독한 술, 마시면 머리가 아프긴 하지만, 건강한 우르수스인들은 몇 병이나 비울 수 있다고 한다."},{"id":"rogue_4_relic_legacy_136","orderId":"113","name":"로열 리큐어","usage":"모든 공격 및 피격 시 회복되는 스킬이 1.5초마다 SP 1 회복","desc":"지금은 멸망한 국가 \\'가울\\'의 술. 이제는 수집가들의 애장품이 되어 가격이 매우 비싸다. 현재 생산지가 라이타니엔 영토 내에 있으며, 제조법은 이미 실전되었다."},{"id":"rogue_4_relic_legacy_137","orderId":"114","name":"마리오네트","usage":"적이 기절, 빙결, 속박 상태에서 초당 마법 대미지 700 받음","desc":"벗어나려고 애쓸수록 실에 더 꽁꽁 묶인다. 정말 자신이 사고란 걸 하고 있다고 생각하는가?"},{"id":"rogue_4_relic_legacy_138","orderId":"115","name":"\\'동심 저격 인형\\'","usage":"적이 기절, 빙결, 속박 상태에서 초당 마법 대미지 1000 받음","desc":"이베리아 아이들이 바닷가의 이상한 물건으로 만든 초라한 인형. 이 인형을 안고 있으면 꿈속 세계가 다채로워진다고 한다."},{"id":"rogue_4_relic_legacy_139","orderId":"116","name":"개선의 뿔피리","usage":"적이 받는 일회성 기절, 냉기, 빙결 등 상태 이상 시간이 100% 증가","desc":"뿔피리를 불고 구호를 높이 외쳐, 적들이 하늘을 뒤흔드는 포효 속에서 도망치게 하라!"},{"id":"rogue_4_relic_legacy_140","orderId":"117","name":"하이플래시 카메라","usage":"적이 받는 일회성 기절, 냉기, 빙결 등 상태 이상 시간이 110% 증가","desc":"촬영한 필름을 현상해 보니 사진은 온통 하얗게 번졌고, 피해자의 일그러진 표정만 어렴풋이 보였다."},{"id":"rogue_4_relic_legacy_141","orderId":"118","name":"정신 치료 테이프","usage":"적이 받는 일회성 기절, 냉기, 빙결 등 상태 이상 시간이 150% 증가","desc":"이것은 그가 위험하다며, 이곳에 머물면 안 된다며 당신이 듣는 걸 여러 번 반대했던 것이다…… 이제 알겠는가? 당신은 지금 그의 노래를 듣고 있다."},{"id":"rogue_4_relic_legacy_142","orderId":"119","name":"낡은 부들부채","usage":"편성에 다른 포지션의 오퍼레이터가 1명 있을 때마다 모든 오퍼레이터의 공격력 +10%","desc":"장마철만 되면 염국의 토목천사 어르신은 늘 무릎이 쑤신다며 주변에 불평한다. 그러면서 그가 부채를 꺼내 흔들면…… 곧바로 구름이 걷히고 비가 그치며 날이 갠다. 이 방법은 나중에 대리사에서 일하는 제자한테도 가르쳐 줘야 한다."},{"id":"rogue_4_relic_legacy_144","orderId":"120","name":"스카우트의 조준경","usage":"모든 적군 유닛이 대미지 근원으로부터 거리가 멀수록 받는 대미지 상승 (최대 100%)","desc":"목표를 지정하고, 정밀도를 유지하며, 방아쇠를 당겨, 적의 저항을 꺾어버린다. 이 모든 것은 더 큰 미래를 위한 것이다. 하지만, 스카우트는 그 미래를 볼 기회가 없다. 당신이 대신 실현해줄 수밖에."},{"id":"rogue_4_relic_legacy_145","orderId":"121","name":"블랙 튤립","usage":"모든 아군 오퍼레이터의 스킬 미발동 시 60초 동안 공격력이 점진적으로 최대 +60%까지 증가, 스킬 종료 시 버프 효과 종료","desc":"침묵에 억압받는 이베리아인들을 위해 그녀는 목소리를 낼 것이다. 목소리가 날카롭지 않다면 검으로 대신한다."},{"id":"rogue_4_relic_legacy_147","orderId":"122","name":"유기농 통조림","usage":"모든 오퍼레이터가 스킬 발동 후 1초간 공격력 +60%","desc":"수많은 카우투스들은 이 통조림을 먹으면 힘이 폭발한다고 믿고 있다. 뛰어난 광고 효과와 업계의 대표적인 성공 사례 덕분이다."},{"id":"rogue_4_relic_legacy_148","orderId":"123","name":"시라쿠사인의 분노","usage":"모든 오퍼레이터가 스킬 발동 후 1초간 공격력 +100%","desc":"가울 수도에 있던 \\'정통 시라쿠사 레스토랑\\'의 간판 메뉴로, 진한 초코 잼과 원석충 간으로 만든 소스는 독특한 풍미를 자랑하여 가울 귀족들의 호평을 받았다. 그러나, 시라쿠사와 가울의 외교 갈등도 유발할 뻔했다고 한다."},{"id":"rogue_4_relic_legacy_151","orderId":"124","name":"고성의 후손","usage":"전장에 100초간 배치한 오퍼레이터의 방어력 +300, 마법 저항 +30","desc":"시간만 충분하다면 이 상자는 또 다른 새로운 무대가 될 수 있다."},{"id":"rogue_4_relic_legacy_155","orderId":"125","name":"《글로리어스 카시미어》","usage":"오퍼레이터가 회피 발동 후 6초 동안 공격력 +70%","desc":"카시미어의 베스트셀러. 기사 스포츠를 빛낸 기사들의 일대기를 소설 형식으로 풀어냈다. 처참하게 추방당했지만, 다시 우승을 되찾은 니어의 이야기가 상당한 비중을 차지했다."},{"id":"rogue_4_relic_legacy_156","orderId":"126","name":"《귀환》","usage":"오퍼레이터가 회피 발동 후 6초 동안 공격력 +130%","desc":"카시미어의 베스트셀러. 팬덤의 집단 창작물이라고 한다. \\'니어\\'는 이미 복잡한 환상들이 뒤섞인 이미지의 복합체가 되어버렸다. “추방이지, 결코 도피는 아니다. 그녀는 돌아와 홀로 이 시대의 홍수를 맞설 것이다.”"},{"id":"rogue_4_relic_legacy_158","orderId":"127","name":"호수의 방패","usage":"실드 +1, 실드 보유 시 전투 시작 후 모든 아군 유닛의 최대 HP +60%","desc":"30년 전, 아이의 장난감 방패가 호수에 떨어졌다. 30년 후, 그는 얼어붙은 호수를 깨고 방패를 꺼내 영웅의 길을 떠났다."},{"id":"rogue_4_relic_legacy_160","orderId":"128","name":"공각 파울비스트","usage":"[소환물]의 HP +30%, 공격력 +30%, 배치되어 있을 때 소환한 오퍼레이터의 공격력 +60%","desc":"육체는 진작에 사라졌지만, 영혼만은 곤히 깃들어 있다. 가지와 잎에 어울릴 수 없는 생령은 얼음을 머금고 힘차게 숲을 날아오른다."},{"id":"rogue_4_relic_legacy_167","orderId":"129","name":"생존의 나무 갑옷","usage":"모든 근거리 오퍼레이터가 배치 후 최대 HP 50%에 해당하는 보호막 획득","desc":"샤먼들은 나무의 생존에 대한 집착을 잘 알고 있다. 그래서 전사들에게 이런 의지가 보일 때마다, 그들은 나무를 초대해 전사들의 갑옷이 되길 바란다."},{"id":"rogue_4_relic_legacy_168","orderId":"130","name":"뿔피리","usage":"모든 오퍼레이터가 주변 4칸에 오퍼레이터 배치 시 1명당 공격력 +20%","desc":"사미에서 사람을 불러 모으려면 뿔피리를 부는 게 가장 효과적이다."},{"id":"rogue_4_relic_legacy_170","orderId":"131","name":"영광의 어깨띠","usage":"모든 아군 유닛이 적 1명만 저지 시 공격력 +100%","desc":"수많은 배우들이 이 배역을 맡았었으나, 이 배역의 마음속 단짝을 영원히 구할 수 없었다."},{"id":"rogue_4_relic_legacy_171","orderId":"132","name":"키틴질 나이프","usage":"전투 시작 후 랜덤 1명 오퍼레이터의 공격력 +100%, HP +100%","desc":"더욱 효율적인 외골격 성장 형태. 사냥감을 찢을 수 있고 충격을 막아낼 수 있으며, 동포의 먹이가 될 수도 있다."},{"id":"rogue_4_relic_legacy_172","orderId":"133","name":"약용 재갈","usage":"모든 아군 유닛이 배치 후 실드 2회 획득","desc":"고대 염국 병사들은 작전할 때 입에 재갈을 물고 행군했다고 한다. 멀베리가 이것에 영감을 받아 식용 가능한 고약을 만들었는데, 교근 단련에도 좋고, 특히 정신을 맑게 하는 용도로 효과가 좋다."},{"id":"rogue_4_relic_legacy_179","orderId":"134","name":"요양 체험 카드","usage":"모든 오퍼레이터가 배치 후 10초간 공격 속도 +40","desc":"요양 정원의 특별 서비스! 누구든 외근 임무를 수행하기 전, 요양 정원에서 심리 케어 서비스를 1회 받을 수 있다. 타인에게 양도 불가."},{"id":"rogue_4_relic_legacy_180","orderId":"135","name":"요양 스페셜 카드","usage":"모든 오퍼레이터가 배치 후 10초간 공격 속도 +70","desc":"의료부와 요양 정원의 합동 특별 서비스! 누구든 외근 임무를 수행하기 전, 요양 정원에서 전면적인 신체검사와 심리 케어 서비스를 1회 받을 수 있다. 끝나면 포덴코가 만든 꽃전도 시식 가능."},{"id":"rogue_4_relic_legacy_181","orderId":"136","name":"올드조지 영양 원액","usage":"오퍼레이터의 HP가 높을수록 공격력 상승, HP 100% 경우 최대 +30%까지 상승","desc":"냄새가 상당히 지독한 강화 영양제. 원래는 컬럼비아 개발업체들이 개척자들에게 제공하는 \\'식량\\' 보급이었으나, 마케팅이 본격화되면서 귀족들이 선호하는 \\'뷰티 용품\\'으로 탈바꿈했다."},{"id":"rogue_4_relic_legacy_182","orderId":"137","name":"긴급 활성제","usage":"오퍼레이터의 HP가 낮을수록 공격 속도 상승, HP 30% 경우 최대 +60까지 상승","desc":"림 빌리턴 광산에서 자주 사용되는 주사제의 일종으로, 강력한 활성 성분은 작업자의 감각을 자극하여 극한 환경에서의 작업 효율을 보장해준다. 생명도, 공사도 기한이 있기는 매한가지. 그들에겐 단지 선택의 문제일 뿐."},{"id":"rogue_4_relic_legacy_186","orderId":"138","name":"망가진 죽간","usage":"[소환물]의 HP +30%, 공격력 +30%, 배치 인원수를 소모하지 않음","desc":"“천 개의 산을 흔쾌히 잃어도, 만물엔 영혼이 깃드느라.”"},{"id":"rogue_4_relic_legacy_177","orderId":"139","name":"낯익은 조각상","usage":"모든 적군 유닛의 공격 속도 -15","desc":"생김새는 닮았지만, 분위기는 전혀 다르다. 어쩌면 이 사람을 본 적이 있을지도?"},{"id":"rogue_4_relic_legacy_178","orderId":"140","name":"\\'고통스러운 쾌락\\'","usage":"모든 적군 유닛의 HP -15%, 이동 속도 -15%","desc":"광석병이 극단 내에 확산하면서 쓰러지는 사람도 있고, 흐느끼는 사람도 있으며, 기뻐서 어쩔 줄 모르는 사람도 있고, 글쓰기에 여념이 없는 사람도 있다. 젊은이는 성년의 선물을 받고 배우로서의 마지막 노래를 부를 예정이다."},{"id":"rogue_4_relic_fight_3","orderId":"141","name":"문학의 시작","usage":"[살카즈] 적에게 입히는 물리 및 마법 대미지 +50%","desc":"“아캄 나쿤 사캄, 그게 바로 \\'암나남\\', 유일한 저주이자 네가 들어본 적 없는, 너를 죽일 언어다. 이제, 눈물을 흘릴 시간이다!”"},{"id":"rogue_4_relic_fight_13","orderId":"142","name":"중력 무시 장치","usage":"모든 적의 무게 -2","desc":"내스티 루노레이의 걸작은 살카즈로 하여금 그들을 오랫동안 괴롭혔던 대지를 떠나게 했다. 그 후, 살카즈는 비록 구름 사이를 떠돌아다녔지만, 하늘에 단단히 자신의 뿌리를 내렸다."},{"id":"rogue_4_relic_fight_17","orderId":"143","name":"광륜","usage":"[살카즈] 적의 이동 속도 -30%","desc":"“내가 그 문으로 들어갔을 때, 오라버니는 이미 고리와 날개가 나 있었어. 그가 돌아서서 내게 인사를 건넸는데, 전해온 말은 마치 열쇠처럼 내 마음속의 고통을 풀어주었어. 그래서 내가 소리 높여 대답했을 때, 고리의 연결이 완성되었고, 나도 그렇게 깨달음을 얻었어.”"}]},{"name":"전문 도구","items":[{"id":"rogue_4_relic_legacy_97","orderId":"144","name":"클로 - 돌파","usage":"모든 [뱅가드] 오퍼레이터의 배치 코스트 -2, HP +60%","desc":"파도에 돌을 던지면 거대한 파도를 가르며 안개가 걷혀진다."},{"id":"rogue_4_relic_legacy_98","orderId":"145","name":"클로 - 폭발","usage":"모든 [뱅가드] 오퍼레이터의 초기 SP +15","desc":"그가 후속 부대의 일을 이미 전부 마쳤는데, 다른 사람들이 할 일이 뭐가 더 있을까?"},{"id":"rogue_4_relic_legacy_99","orderId":"146","name":"클로 - 정통","usage":"모든 [뱅가드] 오퍼레이터의 SP 소모 -35%","desc":"평소에 가장 먼저 전장에 나서는 오퍼레이터로, 그들이 겪은 일들은 상상도 할 수 없다."},{"id":"rogue_4_relic_legacy_100","orderId":"147","name":"클로 - 백전","usage":"모든 [뱅가드] 오퍼레이터의 공격력, 방어력 +50%","desc":"“새까맣게 나를 향해 몰려드는 적들을 보며 나는…… 저것들이 이제 다 끝장이라 생각할 뿐이었다.”"},{"id":"rogue_4_relic_legacy_101","orderId":"148","name":"브로큰 스피어 - 돌파","usage":"모든 [가드] 오퍼레이터의 배치 코스트 -3, HP +40%","desc":"전사가 전장에 걸어 들어가고, 전사가 무기를 꺼내 들고, 전사가 전투를 맞이한다."},{"id":"rogue_4_relic_legacy_102","orderId":"149","name":"브로큰 스피어 - 창날","usage":"모든 [가드] 오퍼레이터의 공격력 +25%","desc":"“이번 달에 부러뜨린 칼만 벌써 일곱 자루라고.” “그런데 난 이번 달에 적을 여덟 명이나 베었는데.”"},{"id":"rogue_4_relic_legacy_103","orderId":"150","name":"브로큰 스피어 - 혈전","usage":"모든 [가드] 오퍼레이터가 공격 시 SP 2 획득","desc":"전투를 할수록 용맹해지는 전사는 극히 드물다. 그래서 전투 후에 긴장을 완화해 줄 수 있는 심리상담사를 좀 배치할 필요가 있다."},{"id":"rogue_4_relic_legacy_104","orderId":"151","name":"브로큰 스피어 - 임전무퇴","usage":"모든 [가드] 오퍼레이터의 방어력 -40%, 공격력 +40%, 공격 속도 +30","desc":"블레이즈에게 그 기술들을 배우라고 딱히 권장하고 싶진 않다."},{"id":"rogue_4_relic_legacy_105","orderId":"152","name":"프로텍터 - 돌파","usage":"모든 [디펜더] 오퍼레이터의 배치 코스트 -3, HP +40%","desc":"방패를 든 사람들이 끝없이 이어졌다. 그들은 살아있는 적에 맞서는 게 아니라, 운명과 부조리에 맞서는 것이다."},{"id":"rogue_4_relic_legacy_106","orderId":"153","name":"프로텍터 - 침략","usage":"모든 [디펜더] 오퍼레이터의 공격력 +60%","desc":"팀원과 전략적 목표에 대한 보호 행위는, 그들 본래의 침략성을 잊게 만드는 경우가 많다."},{"id":"rogue_4_relic_legacy_107","orderId":"154","name":"프로텍터 - 안정","usage":"모든 [디펜더] 오퍼레이터의 HP +40%, 방어력 +40%, 마법 저항 +20","desc":"운명의 타격이 얼마나 무겁든, 그 무게를 짊어져라."},{"id":"rogue_4_relic_legacy_108","orderId":"155","name":"프로텍터 - 무봉","usage":"모든 [디펜더] 오퍼레이터가 피격 시 SP 2 획득","desc":"그들은 공격을 받을 때마다 공격을 분노로 바꾸어 몇 배로 돌려준다."},{"id":"rogue_4_relic_legacy_109","orderId":"156","name":"브로큰 보우 - 돌파","usage":"모든 [스나이퍼] 오퍼레이터의 배치 코스트 -2, HP +60%","desc":"장전, 조준, 발사, 그리고 파멸은 어김없이 다가온다."},{"id":"rogue_4_relic_legacy_110","orderId":"157","name":"브로큰 보우 - 백발백중","usage":"모든 [스나이퍼] 오퍼레이터의 공격력 +20%","desc":"오리지늄 아츠가 오늘날처럼 발달하지 못했던 시대, 염국에선 타인의 궁술을 칭찬할 때 \\'백보천양\\'이라는 표현을 썼다."},{"id":"rogue_4_relic_legacy_111","orderId":"158","name":"브로큰 보우 - 교차 사격","usage":"모든 [스나이퍼] 오퍼레이터의 HP -40%, 공격력 +40%","desc":"촘촘하게 화력망을 배치하는 순간 스나이퍼 오퍼레이터들을 위험에 노출시키고, 그다음은 가늠쇠에 관한 게임이 이어진다."},{"id":"rogue_4_relic_legacy_112","orderId":"159","name":"브로큰 보우 - 신속","usage":"모든 [스나이퍼] 오퍼레이터의 공격 속도 +70","desc":"고대 빅토리아 전설의 궁수는 화살을 거의 일직선으로 연결할 수 있다고 한다."},{"id":"rogue_4_relic_legacy_113","orderId":"160","name":"브로큰 스태프 - 돌파","usage":"모든 [캐스터] 오퍼레이터의 배치 코스트 -3, HP +60%","desc":"아츠가 손끝에서 춤을 추고 비바람을 불러오고 현실을 교란시켜 자신의 위대한 목적을 달성한다."},{"id":"rogue_4_relic_legacy_114","orderId":"161","name":"브로큰 스태프 - 위버","usage":"모든 [캐스터] 오퍼레이터의 공격력 +25%, 공격 속도 +25","desc":"라이타니엔에서 고탑을 올려다볼 때 종종 이상한 현상을 목격하곤 했다…… 심지어 천체 현상을 목격한 적도 있다."},{"id":"rogue_4_relic_legacy_115","orderId":"162","name":"브로큰 스태프 - 집중","usage":"모든 [캐스터] 오퍼레이터의 SP 회복 +0.4/초","desc":"“한 캐스터가 전력을 다하기로 하면 스카이파이어 같이 성격이 나쁜 캐스터도 전혀 다른 기질을 보일 수 있어.”"},{"id":"rogue_4_relic_legacy_116","orderId":"163","name":"브로큰 스태프 - 고난의 주술","usage":"모든 [캐스터] 오퍼레이터의 HP -40%, 공격 시 마법 대미지 +70%","desc":"살카즈가 오리지늄을 접하게 된 기원에 대해서는 거의 고증할 길이 없다. 고대 아츠의 시작은 물질 현실과 논리 상식을 벗어난 지 오래다."},{"id":"rogue_4_relic_legacy_117","orderId":"164","name":"스트럿 - 돌파","usage":"모든 [서포터] 오퍼레이터의 배치 코스트 -2, HP +60%","desc":"\\'임무가 조금 남았\\'을 때 필요한 것은 바로 그 \\'조금\\' 남은 일을 도와줄 사람이다."},{"id":"rogue_4_relic_legacy_118","orderId":"165","name":"스트럿 - 근면","usage":"모든 [서포터] 오퍼레이터의 SP 소모 -40%","desc":"별거 아닌 일인 것처럼 보여도 오퍼레이터들은 전력을 다할 것이다. 게다가 사실 전혀 별거 아닌 일도 아니다."},{"id":"rogue_4_relic_legacy_119","orderId":"166","name":"스트럿 - 케어","usage":"모든 [서포터] 오퍼레이터의 공격 범위 내 아군 유닛 공격력 +20%","desc":"식사를 건네주거나, 길을 알려주거나, 심지어는 마음의 대화를 나누거나. 승패의 관건은 바로 이런 사소한 일에 달려 있다."},{"id":"rogue_4_relic_legacy_120","orderId":"167","name":"스트럿 - 약화","usage":"모든 [서포터] 오퍼레이터의 공격 범위 내 적군 유닛 방어력 -20%, 마법 저항 -20%","desc":"적의 방어를 약화시키는 방법은 다양하다. 위치 장치, 아츠 아머 관통, 약점 표시…… 아니면 배를 아프게 만들거나……"},{"id":"rogue_4_relic_legacy_121","orderId":"168","name":"힐러 - 돌파","usage":"모든 [메딕] 오퍼레이터의 배치 코스트 -2, HP +60%","desc":"구원은 인류가 칭찬해야 하는 미덕이며, 이 모든 것을 가능하게 하는 버팀목이다."},{"id":"rogue_4_relic_legacy_122","orderId":"169","name":"힐러 - 자생","usage":"모든 [메딕] 오퍼레이터 SP 회복 +0.3/초","desc":"누가 의사는 제 병을 못 고친다고 했는가, 그들은 단지 각성제 한 알을 먹은 뒤, 계속하여 다른 사람을 돕는 일을 선택했을 뿐이다."},{"id":"rogue_4_relic_legacy_123","orderId":"170","name":"힐러 - 명의","usage":"모든 [메딕] 오퍼레이터의 공격 속도 +50","desc":"죽음의 문턱에서 목숨을 건진 위대한 업적에 비하면, 그 뒤에 겨우 3일 혼수상태에 빠지는 것쯤이야 무슨 대수겠는가?"},{"id":"rogue_4_relic_legacy_124","orderId":"171","name":"힐러 - 고착화","usage":"모든 [메딕] 오퍼레이터의 공격 범위 내의 아군 유닛 저항 획득","desc":"신체를 이동도시처럼 튼튼하게 만드는 건 이상에 가까운 일이지만, 의사들은 이 발상을 실천할 준비가 되어 있다."},{"id":"rogue_4_relic_legacy_125","orderId":"172","name":"러스트 블레이드 - 돌파","usage":"모든 [스페셜리스트] 오퍼레이터의 배치 코스트 -2, HP +60%","desc":"수단은 여러 가지 있지만, 결말은 결국 하나뿐이다."},{"id":"rogue_4_relic_legacy_126","orderId":"173","name":"러스트 블레이드 - 연마","usage":"모든 [스페셜리스트] 오퍼레이터의 공격 속도 +30","desc":"아무리 갈아도 끊임없는 녹슨 자국, 아무리 해도 끝이 안 보이는 일."},{"id":"rogue_4_relic_legacy_127","orderId":"174","name":"러스트 블레이드 - 보이는 고요함","usage":"모든 [스페셜리스트] 오퍼레이터의 재배치 시간 -35%","desc":"소리는 오직 그림자가 덮쳐오는 순간에만 들린다. 그 소리를 들을 자는 다음 피해자이다."},{"id":"rogue_4_relic_book_1","orderId":"175","name":"클로 - 포식","usage":"전장에 배치된 뱅가드 오퍼레이터 1명당 3초마다 배치 코스트 +1 (최대 8회 중첩)","desc":"굶주린 짐승 무리가 포식의 순간을 기다린다."},{"id":"rogue_4_relic_book_2","orderId":"176","name":"브로큰 스피어 - 쇄암","usage":"전장에 배치된 가드 오퍼레이터 1명당 모든 아군 유닛의 공격력 +8% (최대 8회 중첩)","desc":"힘 있는 자들은 늘 서로를 성취시킨다."},{"id":"rogue_4_relic_book_3","orderId":"177","name":"브로큰 스태프 - 파문","usage":"전장에 배치된 캐스터 오퍼레이터 1명당 모든 적군이 받는 마법 대미지 +12% (최대 8회 중첩)","desc":"같은 주파수를 맞춰 함께 선율을 연주한다."},{"id":"rogue_4_relic_book_4","orderId":"178","name":"러스트 블레이드 - 영주","usage":"전장에 배치된 스페셜리스트 오퍼레이터 1명당 모든 적군 유닛의 이동 속도 -5% (최대 8회 중첩)","desc":"주인이 손님을 원하지 않으면, 손님은 문 앞에 다다를 수 없다."},{"id":"rogue_4_relic_book_5","orderId":"179","name":"러스트 블레이드 - 고립","usage":"[스페셜리스트] 오퍼레이터 주변 4칸에 아군 유닛이 없을 경우, 공격력 +70%","desc":"외로움."},{"id":"rogue_4_relic_legacy_165","orderId":"180","name":"긁기의 손","usage":"[감속자], [약화자], [비호자]가 공격 시 추가로 목표 HP의 3%에 해당하는 마법 대미지 부여","desc":"작은 것도 막으려야 막을 수가 없다."},{"id":"rogue_4_relic_hand_1","orderId":"181","name":"포식의 손","usage":"[척후병], [돌격수], [전술가]가 스킬을 발동시킬 때마다 자신의 공격력 및 방어력 +10%(최대 10회 중첩), \\'클로 - 포식\\' 보유 시 SP 회복 +0.5/초","desc":"짐승 무리에 뛰어들어 몸뚱이를 찢어버린다."},{"id":"rogue_4_relic_hand_2","orderId":"182","name":"쇄암의 손","usage":"[리퍼], [솔로블레이드], [파이터]의 공격이 목표의 방어력 70% 무시, \\'브로큰 스피어 - 쇄암\\' 보유 시 자신의 HP가 초당 2.5% 회복","desc":"산을 깎고 땅을 부숴 흙을 먹고 돌을 삼킨다."},{"id":"rogue_4_relic_hand_3","orderId":"183","name":"파문의 손","usage":"[스플래시 캐스터], [체인 캐스터], [메카 캐스터]가 적군에 대미지를 입힐 때마다 SP 2 회복, \\'브로큰 스태프 - 파문\\' 보유 시 공격 속도 +20","desc":"한 번 휩쓸면 귀가 찢어질 듯하다."},{"id":"rogue_4_relic_hand_4","orderId":"184","name":"영주의 손","usage":"[매복자], [상인], [기인]이 배치 후 30초마다 공격력 +25%(최대 5회 중첩), \\'러스트 블레이드 - 영주\\' 보유 시 최대 8회 중첩","desc":"전장은 집과도 같아서 오랫동안 머무를 수 있다."},{"id":"rogue_4_relic_hand_5","orderId":"185","name":"비밀의 손","usage":"[코어 캐스터], [프라이멀 캐스터], [의식술사]가 스킬을 발동할 때마다 자신의 SP 자연 회복 속도 +0.5/초 (최대 4회 중첩)","desc":"찾아 헤매다 진실에 가까워진다."},{"id":"rogue_4_relic_hand_6","orderId":"186","name":"울림의 손","usage":"[포격사수], [진법 캐스터], [투척수]가 대미지를 입힐 때마다 자신의 공격력 +15%, 최대 +150%, 5초간 대미지를 입히지 못하면 버프 초기화","desc":"표적을 명중시키고 대지를 뒤흔든다."}]},{"name":"현명한 수집","items":[{"id":"rogue_4_relic_legacy_44","orderId":"187","name":"고대 주물","usage":"오퍼레이터 3명 즉시 랭크 상승 (희망 소모 없음)","desc":"“하늘에는 커다란 용광로가 있고, 땅에는 금, 은, 동, 석, 철, 다섯 가지 금속이 난다”…… 다양한 일에 사용되긴 하지만 아무도 구체적인 원리를 모른다."},{"id":"rogue_4_relic_legacy_53","orderId":"188","name":"녹슨 쇠망치","usage":"상품 구매 시 소모 오리지늄각뿔 -50%","desc":"“변혁은 필수다. 폭풍우가 더 빨리 휘몰아쳐야 한다.”"},{"id":"rogue_4_relic_legacy_54","orderId":"189","name":"로도스 아일랜드 전술 무전","usage":"전투 후 모집권 선택 옵션 1종 추가","desc":"무전대기, 곧 지원군이 도착한다."},{"id":"rogue_4_relic_legacy_55","orderId":"190","name":"네잎클로버 화석","usage":"소원성취 및 전투 종료 후 소장품 선택 옵션 1종 추가","desc":"마젤란이 생명이 사라진 곳에서 찾은 행운의 상징. 이 돌이 대지의 격변을 겪은 건 틀림없으나, 다행히 살아남았고, 마지막 남은 자그마한 희망을 발견자에게 줄 것이다. "},{"id":"rogue_4_relic_legacy_57","orderId":"191","name":"입체 예술 장식품","usage":"목표 HP +7, 전투가 종료될 때마다 추가로 목표 HP +1","desc":"라인 랩이 사람들에게 주는 인상은 마치 이 예술 장식품과도 같다. 뭔가 신비롭고 겹겹이 둘러싸여 영원히 그 내부를 알 수 없는 것처럼."},{"id":"rogue_4_relic_legacy_146","orderId":"192","name":"황금 술의 성배","usage":"보유한 오리지늄각뿔 5개당 아군 유닛의 공격 속도 +7","desc":"성자, 기사, 독실한 신자를 막론하고 이걸 위해 미치지 않는 사람이 없다. 세상에나, 성배조차도 순금인데!"},{"id":"rogue_4_relic_legacy_154","orderId":"193","name":"제왕의 왕관","usage":"목표 HP가 1이 될 경우, 모든 아군 유닛의 공격력 +50%, 국왕의 소장품 3개 이상 획득 시 +150%로 변경","desc":"이름 없는 왕들이여, 왕국이 멸망하더라도 부디 이베리아를 지켜주소서."},{"id":"rogue_4_relic_legacy_157","orderId":"194","name":"캔낫의 표식","usage":"교활한 상인에서 아이템 1개 구매, 또는 득과 실에서 아이템 1회 교환할 때마다 희망 +1","desc":"캔낫의 체면을 세워주는 사람도 있고, 캔낫이 \\'체면\\'을 세워줄 만한 사람도 있다."},{"id":"rogue_4_relic_legacy_159","orderId":"195","name":"원형 제단","usage":"전투 후 일정 확률로 모든 아군 유닛의 공격력 및 방어력이 영구적으로 +5% (최대 10회 중첩)","desc":"제물을 바쳐 보답을 받는다. 너무나도 편리해서 사람들은 무엇을 향해 제사를 지내는지도 모른다."},{"id":"rogue_4_relic_legacy_161","orderId":"196","name":"옛 땅의 나무 열매","usage":"소장품 3개 즉시 획득","desc":"사미 아이들은 소원을 빈 씨앗을 새하얀 눈에 묻는다. 나무가 자라 열매를 맺으면 최초의 열매 네 개를 따서, 가장 작은 열매는 소원용으로 후대에 남겨준다. 그리고 나머지 열매는 바로 사미에게 답을 비는 공물이다."},{"id":"rogue_4_relic_legacy_162","orderId":"197","name":"Friston.P","usage":"긴급 작전을 1회 클리어할 때마다, 영구적으로 아군 유닛의 공격 속도 +5 (최대 15회 중첩)","desc":"프리스턴은 당연히 또 다른 선행 인류의 비밀을 캘 기회를 놓칠 리 없다. 마침 서브마인드 백업 건을 클로저는 모르고 있으니, 절대 알려서는 안 된다!"},{"id":"rogue_4_relic_legacy_163","orderId":"198","name":"탐험가 배낭","usage":"상태 이상에서 회복된 모든 오퍼레이터의 공격력 +60%, 동시에 저항 획득, 15초간 지속","desc":"그들은 항상 생존에 도움이 되는 물자들을 가방 안에 넣어 둔다. 그리고는 용감한 결의와 의지를 가지고 인지의 경계에 도전한다."},{"id":"rogue_4_relic_legacy_164","orderId":"199","name":"미노스의 찬가","usage":"긴급 작전을 1회 클리어할 때마다, 영구적으로 아군 유닛의 HP +5% (최대 15회 중첩)","desc":"“사람이 없는 곳을 탐험하는 것보다 더 칭송받을 쾌거가 있을까? 마침 하나가 있으니 북쪽으로 가자, 그곳에서 영웅의 장을 써 내려가는 것이다!”"},{"id":"rogue_4_relic_legacy_166","orderId":"200","name":"기사의 랜스 Pro","usage":"보물 상자에서 더 많은 오리지늄각뿔 획득","desc":"기사 스포츠 복권. 위에 추상적인 무기 광고가 인쇄되어 있다."},{"id":"rogue_4_relic_legacy_174","orderId":"201","name":"코인 인형","usage":"보유한 오리지늄각뿔 5개당 아군 유닛의 공격 속도 +3","desc":"이런 스타일을 왜 좋아하는지 모르겠지만, 전체적인 디자인은 나쁘지 않다…… 코인만 투입하면 석상이 움직일 수도 있다. 진심이다."},{"id":"rogue_4_relic_legacy_175","orderId":"202","name":"기사 계율 · 신편","usage":"보유한 오리지늄각뿔 5개당 아군 유닛의 공격 속도 +5","desc":"엄숙하게 선서하는 것도 다 옛날식이다. 현대 기사 정신은 보다 자유로운 표현 방식이 필요하다. 통신 장치에 자신의 번호를 입력하기만 하면 바로 영광스러운 기사가 될 수 있다."},{"id":"rogue_4_relic_legacy_187","orderId":"203","name":"인사부 비밀서한","usage":"6성 오퍼레이터 모집 시 희망 소모 -2, 일정 확률로 랜덤 승급 6성 오퍼레이터 전체 등장","desc":"“■■■ 씨가 준 거라고? 그럼 됐어.”"},{"id":"rogue_4_relic_fight_1","orderId":"204","name":"\\'지식의 다리\\'","usage":"영감을 사용할 때마다, 모든 아군 오퍼레이터의 최대 HP +5% (최대 10회 중첩)","desc":"이걸 움켜쥐면 진동을 통해 리치의 지식 전당이 있는 방향을 알려준다고 한다. 정말 이런 식으로 지식 전당의 문에 도달할 수 있을까? 이것은 지금 입을 다물고 있다. 그리고 이런 의심을 하지 않은 사람은 확실히 그 문에 도달한 적이 없다."},{"id":"rogue_4_relic_fight_4","orderId":"205","name":"용병의 장신구","usage":"랜덤 1명 오퍼레이터의 공격력, 방어력, 최대 HP +5%, 완벽한 작전을 수행할 때마다 추가로 +5% (최대 10회 중첩)","desc":"이것은 그가 완벽함을 추구하기 위해 치른 소소한 대가이다. 소소하다고 하는 이유는 그의 독서와 쓰기에 별다른 영향이 없기 때문이다."},{"id":"rogue_4_relic_fight_6","orderId":"206","name":"성벽의 아이","usage":"방어 포인트 주변 8칸에 배치된 오퍼레이터의 저지 가능 수 +2, 최대 HP +50%","desc":"토석의 아이는 카즈델의 성벽을 정성껏 가꾸었고, 또 그것에게 자신을 강인하게 만들어 사람들을 지킬 수 있도록 가르쳤다. 오랜 평화의 시대가 도래하면서, 그것은 수많은 조각으로 분해되어 미지의 땅으로 향하는 탐험가들에게 부적으로 주어졌다."},{"id":"rogue_4_relic_legacy_150","orderId":"207","name":"국왕의 새 창","usage":"목표 HP가 1이 될 경우, 모든 아군 유닛의 공격 속도 +50","desc":"절망 속에서의 아름다운 기원은 사람들에게 희망을 준다. 설령 그게 진실이 아닐지라도."},{"id":"rogue_4_relic_fight_7","orderId":"208","name":"국왕의 갑옷","usage":"실드 +3, 목표 HP가 전부 실드로 전환, 전투 종료 후 목표 HP -1 및 실드 +1","desc":"왕궁의 정문 앞과 광장에는 한때 수많은 금빛 진열장이 있었고, 사방의 진귀한 물건들이 전시되었다. 그런데 지금은 단지 그 장면을 회상하는 것만으로도 사람을 다치게 한다."},{"id":"rogue_4_relic_fight_8","orderId":"209","name":"국왕의 연장","usage":"목표 HP가 1이 될 경우, 모든 오퍼레이터가 추가로 2초당 SP +1 및 HP +3%","desc":"성장하고, 현실을 똑바로 인식하며, 강인함과 진중함으로 자신을 무장하고, 포용과 자비로 친구를 무장시킨다."},{"id":"rogue_4_relic_fight_9","orderId":"210","name":"개인용 주술 단말","usage":"전투에 진입 시, 영감을 사용한 경우 모든 오퍼레이터의 공격 속도 +35","desc":"“우리는 \\'티카즈의 주술\\'이라는 이름을 이어받아 몽매했던 시절 선조들의 발견을 기리고자 한다. 그리고 지금, 그것은 하나의 학문으로 자리 잡았고, 이미 테라 각 방면에 스며들었지만, 그에 관한 개발과 탐구는 아직 끝나지 않았다.”"},{"id":"rogue_4_relic_fight_10","orderId":"211","name":"원시의 흔적","usage":"전투에 진입 시, 영감을 미사용한 경우 모든 오퍼레이터의 배치 코스트 -6","desc":"이런 동물의 가장 큰 변화는 광석병 감염 후에 발생하는 변이다. 그 외에 그것들에 관한 기록은 긴 세월 동안 아무런 변화도 없다."},{"id":"rogue_4_relic_fight_11","orderId":"212","name":"재난의 근원","usage":"모든 적군 유닛이 받는 마법 대미지 +20%, 원소 피해 +100%","desc":"살카즈는 타르강길스 거대 광맥을 파헤쳤고, 카즈델에는 오리지늄 결정이 솟구쳤다. 살카즈의 패망은 이미 예정되었다. 그래서 그들은 대지의 모든 것을 순장하려고 한다."},{"id":"rogue_4_relic_fight_12","orderId":"213","name":"노예 포획기","usage":"모든 적군 유닛이 공중 부양, 강제 이동, 무중력 상태에서 받는 대미지 +50%, 10초간 지속","desc":"내스티의 설계를 입수한 뒤 살카즈는 즉시 이를 전쟁에 활용했다. 그들은 하늘로 날아올라 절대적인 우세로 에인션츠에게 분노를 퍼부었다. 영원히 멈추지 않는 전쟁은 이로써 새로운 국면에 접어들었다."},{"id":"rogue_4_relic_fight_14","orderId":"214","name":"마왕의 침대","usage":"목표 HP가 최대인 경우, 모든 오퍼레이터의 방어력 +20%, 마법 저항 +10","desc":"이 자리에 있는 자, 잠이 들면 영면할지니."},{"id":"rogue_4_relic_fight_15","orderId":"215","name":"마왕의 깃발","usage":"목표 HP가 최대인 경우, 모든 오퍼레이터의 공격 속도 +30","desc":"이 자리에 있는 자, 저항하면 추락하리라."},{"id":"rogue_4_relic_fight_18","orderId":"216","name":"통솔자의 초상화","usage":"모든 아군 유닛의 공격력 및 최대 HP +10%, 험난한 길에서 추가로 공격력 및 최대 HP +20%","desc":"초상화 속에는 한 걸출한 인물이 그려져 있는데, 그녀는 서로를 의심하던 군주들을 화해시켰고, 언어가 다른 병사들을 서로 어깨를 나란히 서게 했다…… 만약 그녀가 살아있다면 테라의 통일도 꿈이 아닐 것이다."},{"id":"rogue_4_relic_fight_21","orderId":"217","name":"영혼 속박의 뼈","usage":"보유한 생각 1개당 모든 오퍼레이터의 공격력 +3%","desc":"한 엘더 레버넌트가 자신의 뼈로 동족을 봉인하는 우리를 만들었다. 그 후, 그는 과거가 된 자신의 몸을 짊어지고 대지 곳곳에 흩어져 있는 레버넌트 동포들을 잡으러 떠났다."},{"id":"rogue_4_relic_fight_22","orderId":"218","name":"생명 용광로의 땔감","usage":"보유한 생각 1개당 모든 오퍼레이터의 공격력 +5%","desc":"용광로에 뼈를 던지자 눈 깜빡할 사이에 불꽃이 용광로 속에서 터져 나왔다. 레버넌트들이 서로 얽혀 불만, 분노, 평온, 수치 등 감정이 쏟아져 나왔고, 이는 카즈델을 움직이는 동력이 되었다."},{"id":"rogue_4_relic_res_2","orderId":"219","name":"주인 없는 기억","usage":"지난번 탐험에서 남은 생각 최대 5개 즉시 획득","desc":"장로에게 용광로로 던져진 순간, 마침내 자신의 출신과 책임을 떠올린 일부 레버넌트는 서약으로 다시 신념을 다졌고, 뭔가를 깨달은 다른 일부는 욕설을 퍼부으며 용광로의 불길을 더욱 거세게 타오르게 했다."},{"id":"rogue_4_relic_res_3","orderId":"220","name":"탐령의 백작","usage":"부하 임계치 +2, 전투 후 확률적으로 구상 1개 획득 가능","desc":"“알브레히트 폰 무스비스트, 장미 호른의 탑 백작, 당신을 위해 잃어버린 보물과 숨겨진 지혜를 찾아줄 것을 약속한다! ” 그는 그중 일부만을 보수로 요구했으며, 이는 아내와 자식을 위한 것이라고 덧붙였다."},{"id":"rogue_4_relic_res_6","orderId":"221","name":"《강인한 정신의 노래》","usage":"영감 1개 사용할 때마다 실드 +1","desc":"노래 가사에 디얄은 타인의 두려움을 감지할 수 있는 능력을 타고났다고 했고, 그녀도 차라리 느낀 것을 모두 말해줬지만, 사람들은 여전히 그녀에 대한 경계를 늦추지 않았다. 훗날, 그녀는 이 재능을 쓰지 않는 능력을 연마했지만, 그럼에도 사람들에게 \\'아크라이어\\'라고 불렸다."},{"id":"rogue_4_relic_res_7","orderId":"222","name":"5초 전을 위한 닻","usage":"전투에 진입 시, 영감을 사용한 경우 전투 후 영감 1개 추가 획득","desc":"젊은 리치는 종종 5초 전에 갑자기 떠오른 영감을 기억하지 못해 짜증이 났고, 스쳐 지나간 생각을 잡으려고 이 닻을 만들었다. 그런데 나중에는 이 닻을 써야 한다는 사실마저 잊어버린 것 같았다."},{"id":"rogue_4_relic_res_12","orderId":"223","name":"휴대용 붓","usage":"구상의 부하 -1","desc":"화가는 이 붓을 들고 자신을 찍어 다음 작품을 그리곤, 그림을 본 사람으로 하여금 기꺼이 같은 방법으로 한 획을 보태게 만들었다. 엘더 레버넌트는 그림으로 가득 찬 긴 복도를 지나, 붓으로 봉인의 부적을 그리곤 동포를 자신의 뼈에 봉인해 넣었다."},{"id":"rogue_4_relic_res_14","orderId":"224","name":"탐욕의 저울","usage":"생각의 부하 총합이 20 초과 시, 비전투 노드 진입할 때마다 오리지늄각뿔 +3","desc":"상인들은 돈, 보물, 심지어 자기 목숨과 영혼까지 바쳤으나 끝내 저울의 균형을 맞추지 못해 깃털처럼 가벼운 빛을 가져가지 못했다. 엘더 레버넌트는 자신의 영혼으로 저울을 부숴버리곤 동포를 자신의 뼈에 봉인해 넣었다."},{"id":"rogue_4_relic_res_15","orderId":"225","name":"기도문 조각칼","usage":"<시대의 가시>, <흐느낌의 가시> 방어력 -50%","desc":"과거 살카즈 석공이 애용하던 도구. 통곡의 가시 위에 기도문을 새기면 레버넌트의 분노를 가라앉힐 수 있다고 한다. 조각칼은 아직 날카로우나, 기도문을 아는 사람은 이제 아무도 없다."},{"id":"rogue_4_relic_res_16","orderId":"226","name":"생각의 포수","usage":"생각을 해석할 때마다 오리지늄각뿔 +1","desc":"거짓과 진실을 판별하는 건 기나긴 과정인지라, 항상 새어 나가는 생각들이 있다. 이럴 때, 전문 훈련을 받은 하인들을 출격하면 그 생각들을 실재하는 부로 바꿀 수 있다."},{"id":"rogue_4_relic_explore_2","orderId":"227","name":"희망 시대의 낙서","usage":"희망 +3, 노드 새로고침 시 더는 긴급 작전이 출현하지 않음, 우연한 만남에서 기묘한 효과 발동","desc":"“나는 티카즈 고아다. 아빠 엄마가 재앙으로 죽어, 이웃집 필라인 아저씨가 나를 입양해 가족으로 받아주었다. 나는 당당히 말할 수 있다, 나는 에인션츠의 후손이다.”"},{"id":"rogue_4_relic_explore_3","orderId":"228","name":"원한 시대의 증오","usage":"모든 아군 유닛과 적의 공격력 +20%, 노드 새로고침 시 긴급 작전이 더 자주 출현, 우연한 만남에서 기묘한 효과 발동","desc":"“내 여동생은 뱀파이어에게 물려 죽었고, 아빠는 나흐체러르에게 끌려갔다. 나는 엄마와 함께 도망쳐 나왔다. 나는 절대 살카즈와 타협하지 않는다. 설령 참회해야 하더라도, 그건 살카즈가 멸종한 후의 일이다.”"},{"id":"rogue_4_relic_explore_5","orderId":"229","name":"목자의 핸드벨","usage":"팀에 버든비스트 여행가 합류, 소원성취에서 소장품 선택 옵션 1종 추가","desc":"채찍으로 때리면 녀석은 놀라서 도망치고, 고삐를 당기면 녀석은 고개를 흔들며 저항한다. 핸드벨을 흔들고 노래를 흥얼거리면, 녀석은 세상 끝까지 당신을 따라갈 것이다."},{"id":"rogue_4_relic_encounter_1","orderId":"230","name":"혈세의 수수께끼","usage":"모든 아군 유닛과 적군의 최대 HP -35%, 괴이한 단장에서만 적용","desc":"“두카렐은 결국 실패했다. 그가 나섰지만, 여전히 자신의 형제 단솔을 막지 못했으며, 곧이어 검붉은 사슬이 대지의 모든 생명을 옭아맸다. 지금 우리가 걷는 걸음마다 핏자국이 남는 이유는 그 때문이며, 이 혈세는 그때 진 빚을 갚기 위해서이다.”"},{"id":"rogue_4_relic_encounter_2","orderId":"231","name":"결정의 수수께끼","usage":"모든 지상 오퍼레이터의 방어력 +600, 단 배치 시 15초간 빙결, 괴이한 단장에서만 적용","desc":"“사람들은 \\'가고일\\'에 빗대어 \\'방부처리사\\'의 후손들을 \\'아이스 가고일\\'이라고 불렀다. 그들은 얼음처럼 단단한 인내심과 강력한 힘을 지녔으며, 늘 다이아볼릭과 함께하며 서로의 단점을 보완했다. 그러나 후에 카르나불디카 에게 속아 블랙 플로우를 막기 위해 내려간 뒤, 다시는 지상에 돌아오지 못했다.”"},{"id":"rogue_4_relic_encounter_3","orderId":"232","name":"의심의 수수께끼","usage":"전투 후 오리지늄각뿔 2배 획득, 단 목표 HP 감소량 2배, 괴이한 단장에서만 적용","desc":"“\\'멀리 쫓겨난 자\\'가 유적지에 보인 신중함에 공개적으로 의심을 제기한 두라캄은 자손들을 데리고 곧장 지하로 내려갔다. 예언에는 그가 \\'만고 불치\\'의 상처에서 붕괴할 것이고, 그의 자손들은 \\'두린\\'이라 자처할 것이며, 그들의 탐사는 대지의 심장까지 이어질 것이지만, 그들을 다시 볼 수 있는 사람은 아무도 없을 것이라 했다.” "},{"id":"rogue_4_relic_encounter_4","orderId":"233","name":"오만의 수수께끼","usage":"초기 배치 코스트 +50, 단 배치 코스트의 자연 회복 속도 -50%, 괴이한 단장에서만 적용","desc":"“과거 \\'대 기만자\\'가 이 사고의 경계에 방문한 적이 있는데, 그녀는 다채로운 이야기로 이곳의 풍경을 더욱 빛나게 했고, 살카즈들을 초대해 옛이야기를 들려주며 수수께끼를 남겼다. 그러면서 그걸 풀면 역사를 통찰할 수 있다고 했다. 하지만 사람들은 \\'디얄 아크라이어가 한 이야기는 모두 거짓말\\'이라 했고, 살카즈들도 떠난 뒤 그녀의 말이 사실이 아니라고 굳게 믿었다.”"},{"id":"rogue_4_relic_encounter_5","orderId":"234","name":"예지의 수수께끼","usage":"전투 획득 지휘 경험치 +20%, 단 전투 시 추가 적 출현, 괴이한 단장에서만 적용","desc":"“무르란나그는 자신의 외눈을 도려내고 리치에게 자신을 추방해달라 부탁함으로써 가끔씩 보였던 그 광경을 영원히 없애려 했다. 그 후, 새로 태어난 사이클롭스는 점차 다른 살카즈처럼 두 눈을 갖게 되었다. 하지만 그 예언은 누군가에게 기록되어 여전히 들어맞았다.”"},{"id":"rogue_4_relic_encounter_6","orderId":"235","name":"낙인의 수수께끼","usage":"모든 오퍼레이터의 초기 SP +30, 단 SP의 자연 회복 속도 -50%, 괴이한 단장에서만 적용","desc":"“종장의 승인 아래, 북풍의 마녀 칼라이샤는 나흐체러르들에게 영원한 사냥의 변하지 않는 법칙에서 힘을 얻는 방법을 가르치기 시작했다. 네츠살렘에게 있어, 이는 부하들이 이성으로 천성을 이기는 시작이 되었다. 모두의 예상을 뛰어넘은 그의 결정에 나흐체러르들은 영혼을 지키는 자가 된 후에도 그를 종장으로써 존경하게 되었다.”"},{"id":"rogue_4_relic_encounter_7","orderId":"236","name":"고요의 수수께끼","usage":"모든 아군 유닛과 적군의 공격력 -25%, 괴이한 단장에서만 적용","desc":"“아니우스 산 정상에서부터 히파리온 호수의 중심까지, 뿌리 없는 자들의 사원이 널리 퍼져 있다. 사원은 종소리에 맞춰 깨어나고, 종소리에 맞춰 쉰다. 그 종소리는 마치 만물의 근원에서 나온 것 같았고, 또 영원 속에서 오래도록 울려 퍼져, 서쪽 확장을 저지하고 동쪽 약탈을 포기하게 했다. 그래서 빅토리아, 카즈델 두 나라는 지금까지 평화롭다.”"},{"id":"rogue_4_relic_encounter_8","orderId":"237","name":"계약의 수수께끼","usage":"오퍼레이터의 주변 8칸에 다른 오퍼레이터가 존재할 경우 지속해서 대미지를 입음, 없을 경우 공격 속도 +50, 괴이한 단장에서만 적용","desc":"“리치인 베르사는 어렸을 때부터 고대 지식에 기록된 \\n\\'다른 종의 살카즈\\'에 매료되었고, \\'속기사\\'가 된 다음날 곧바로 동물과 강제로 주술 계약을 맺어 녀석에게 지혜를 내려주었다. 이게 바로 \\'슬러그카즈\\'의 진실이다. 그는 지금도 자신의 실을 숨기고 있으며, 다른 리치들을 만나는 걸 두려워하고 있다.”"}]},{"name":"전술 도구","items":[{"id":"rogue_4_active_tool_1","orderId":"238","name":"지원 - 보급기","usage":"전투 시 휴대용 보급기 1개 사용 가능","desc":"외근 오퍼레이터에게 긴급 제공되는 휴대용 보급기"},{"id":"rogue_4_active_tool_2","orderId":"239","name":"지원 - 지뢰세트","usage":"전투 시 방해지뢰 3개 사용 가능","desc":"외근 오퍼레이터에게 긴급 제공되는 방해지뢰"},{"id":"rogue_4_active_tool_3","orderId":"240","name":"지원 - 럼블","usage":"전투 시 미스터 럼블 2개 사용 가능","desc":"외근 오퍼레이터에게 긴급 제공되는 미스터 럼블"},{"id":"rogue_4_active_tool_4","orderId":"241","name":"지원 - 크레인","usage":"전투 시 스노우상트의 안전한 크레인 2개 사용 가능","desc":"외근 오퍼레이터에게 긴급 제공되는 스노우상트의 안전한 크레인"},{"id":"rogue_4_active_tool_5","orderId":"242","name":"지원 - 진압장치","usage":"전투 시 진압장치 2개 사용 가능","desc":"외근 오퍼레이터에게 긴급 제공되는 휴대용 진압장치"},{"id":"rogue_4_active_tool_6","orderId":"243","name":"지원 - 포그머신","usage":"전투 시 고장난 무대용 포그머신 1개 사용 가능","desc":"외근 오퍼레이터에게 긴급 제공되는 고장 난 무대용 포그머신"}]},{"name":"스토리 텔러","items":[{"id":"rogue_4_relic_final_1","orderId":"244","name":"바벨의 서약","usage":"모든 오퍼레이터의 배치 코스트 +3, 탐험 결말이 변경","desc":"바벨은 두 살카즈 마왕이 직접 인솔한, 군사, 과학, 의료 등 분야에서 모두 성과를 거둔 조직이다. 그것의 최초이자 궁극적인 목적은 수단과 방법을 가리지 않고 전쟁 자체를 없애는 데 있다."},{"id":"rogue_4_relic_final_2","orderId":"245","name":"선지자의 뿔","usage":"노드 새로고침 시 운명의 암시 출현, 괴이한 단장에서 적용 불가","desc":"엘더즈와 에인션츠를 정복한 것은 총기가 아니라 율법이다. 얼마 지나지 않아, \\'티카즈\\'라는 단어의 의미는 종족을 초월했고, 카즈델 또한 모든 생명의 터전이 되었다."},{"id":"rogue_4_relic_final_3","orderId":"246","name":"열 개의 반지","usage":"군주의 잔상의 최대 HP -50%","desc":"아미야는 마왕의 힘을 빌리기보다는 자신의 힘으로 이 세상을 바꾸길 더 희망했다. 마왕의 호의를 거절한 그녀는 자신만의 굳은 의지와 결심으로 테라 각지를 돌아다니며, 광석병이 자신의 목숨을 앗아갈 때까지 사람들을 구하고 평화를 호소했다."},{"id":"rogue_4_relic_final_4","orderId":"247","name":"빛과 시간","usage":"시대가 더 자주 출현, 생각의 부하 +1, 탐험 결말이 변경","desc":"율법을 깨우는 첫 번째 울부짖음."}]},{"name":"테라의 비밀","items":[{"id":"rogue_4_relic_legacy_169","orderId":"248","name":"\\'글로리 팩\\'","usage":"아군 유닛이 쓰러질 경우, 주변 4칸 범위의 적이 6초간 기절","desc":"주최 측이 기사 스포츠 기간에 출시한 특별 베팅 항목. 여러 혜택이 조화를 이루어 단일 경기의 손실을 최소화할 수 있다."},{"id":"rogue_4_relic_legacy_188","orderId":"249","name":"무지개 항아리","usage":"적이 방어 포인트에 침입할 때마다, 무작위로 재배치 중인 유닛 1명의 현재 재배치 시간을 0으로 감소","desc":"사미 사람들은 보통 무지개가 지는 곳에 이것을 보관해 천재와 인재를 막고자 한다."},{"id":"rogue_4_relic_fight_2","orderId":"250","name":"\\'마족 토벌 깃발\\'","usage":"모든 오퍼레이터가 [살카즈] 적에게 대미지를 입힐 시 SP 2 회복","desc":"이베리아에 충성하던 살카즈 용병이 라이타니엔에 충성하는 살카즈 용병을 도륙하기 위해 만들었다. 지금의 이름은 빅토리아에 충성하는 살카즈 용병이 이걸 주웠을 때 지은 이름이다."},{"id":"rogue_4_relic_fight_5","orderId":"251","name":" \\'신성한 도시의 포옹\\'","usage":"[살카즈] 적으로부터 받는 대미지 -35%","desc":"“오, 신성하신 카즈델이여! 나의 총알을 축복해 주소서, 마치 당신께서 영원한 맹약을 축복하듯이. 나의 총구를 목표에 연결해 주소서, 마치 당신께서 살카즈와 산크타를 연결하듯이.”"},{"id":"rogue_4_relic_fight_16","orderId":"252","name":"\\'큐브\\'","usage":"모든 아군 유닛의 최대 HP +10%, 외나무다리에서 추가로 최대 HP +80%","desc":"리치들의 초시공 탐승 기구. 비현실적인 상황에서 오히려 더욱 견고하다. 에르망가르드가 오랜 시간을 들여 겨우 고쳤다."},{"id":"rogue_4_relic_fight_19","orderId":"253","name":"노래하는 자의 베일","usage":"모든 적군 유닛이 받는 마법 대미지 +10%, 원소 피해 +50%","desc":"전임 밴시의 주인은 마치 원래부터 그랬던 것처럼 사람들에게 친근한 인상을 남겼다…… 그녀가 골필을 뽑아 가볍게 노래를 부르며 모든 침입자의 생각에 비명을 박아 넣을 때까지."},{"id":"rogue_4_relic_fight_20","orderId":"254","name":"담대함의 칼날","usage":"전투 시 배치 코스트가 가장 높은 아군 오퍼레이터의 공격력 및 방어력 +50%","desc":"그는 카즈델을 위해 성문을 지켰다. 가울의 화포 부대, 라이타니엔 캐스터 부대, 빅토리아 기사들이 파상 공세를 퍼부으며 이 단 한 명의 살카즈가 지키는 방어선을 뚫으려 했다. 하지만 성문이 무너지고, 연합군이 철수할 때까지, 이 골리앗 검사는 한 발짝도 물러서지 않았다."},{"id":"rogue_4_relic_explore_1","orderId":"255","name":"\\'아치\\'와 \\'구난\\'","usage":"1회에 한해, 리더 전투 또는 최종 전투가 아닌 작전에서 실패해도 탐험이 끝나지 않으며, 괴이한 단장에 있지 않을 경우 특별한 괴이한 단장에 진입","desc":"예로부터 카즈델은 북방의 눈보라 속에 숨어 있었다. 사이클롭스는 다른 살카즈들을 이끌고 영적 힘이 있는 암호 문장을 만들었고, 위급한 순간에 이것을 눈 위에 덮어두면 발밑에 있는 베헤모스의 마음속에 숨어 \\'적\\'을 피할 수 있다."},{"id":"rogue_4_relic_legacy_149","orderId":"256","name":"\\'문명의 존속\\'","usage":"모든 적군 유닛의 피격 트루 대미지 +150%","desc":"검은색 작은 왕관."},{"id":"rogue_4_relic_legacy_152","orderId":"257","name":"\\'미니 그란파로\\'","usage":"적이 방어 포인트에 진입할 때마다 전장의 모든 적들은 5초간 기절","desc":"리버스 엔지니어링으로 \\'이베리아의 눈\\'을 분석하여 만든 조명 장치. 겹겹이 쌓인 먹구름을 뚫을 수도, 일시적으로 강적을 물리칠 수도 있다."},{"id":"rogue_4_relic_legacy_153","orderId":"258","name":"\\'더 샤드의 기억\\'","usage":"적이 방어 포인트에 진입할 때마다 전장의 모든 적들에게 트루 대미지를 5000 입힘","desc":"“빅토리아의 심장에 박혀, 제국이 피 흘리는 모습을 지켜볼 수밖에 없다.”"},{"id":"rogue_4_relic_legacy_184","orderId":"259","name":"인사부 동인장","usage":"랭크 상승한 5성 랜덤 오퍼레이터 1명 임시 모집","desc":"■■■가 긴급 배치 전령을 받은 후 특정 오퍼레이터에게 발급한 인장. 이것을 받으면 ■■■가 의뢰를 완료했음을 의미한다."},{"id":"rogue_4_relic_legacy_185","orderId":"260","name":"박사의 은인장","usage":"랭크 상승한 6성 랜덤 오퍼레이터 1명 임시 모집","desc":"이 인장은 출발하기 전 당신이 지휘 시스템에 적절한 시기에 지급하라고 당부해 놓은 것이다. 현재 당신이 선택한 오퍼레이터가 야영지에 도착해 외근 임무에 합류하면서 이 물건을 당신에게 돌려줬다."}]}]},"is6":{"meta":{"title":"모래 위에 핀 연꽃","short":"IS:6","color":"#c89b4a"},"categories":[{"name":"다원 기물","items":[{"id":"rogue_5_relic_legacy_28","orderId":"001","name":"피트 과일 믹스","usage":"편성 가능 인원수 +3, 모든 아군 유닛의 공격력, 방어력, HP +3%","desc":"피트 브랜드의 과일 믹스 캔디, 다양한 맛과 높은 가성비로 그 인기가 마마존스 캔디와 맞먹을 정도다. 뮤엘시스가 가장 좋아하는 제품이기도 하다."},{"id":"rogue_5_relic_legacy_32","orderId":"002","name":"특선 비스트 통조림","usage":"편성 가능 인원수 +1, 모든 아군 유닛이 초당 HP 3 회복","desc":"먼 길을 떠나는 여행자에겐 \\'즉각취식\\'의 편리함이 맛보다 중요한 때가 많다."},{"id":"rogue_5_relic_legacy_33","orderId":"003","name":"지형도","usage":"배치 가능 인원수 +1, 모든 아군 유닛의 방어력 +4%","desc":"꽤 오래돼 보이는 수제 지도. 지도상의 명칭과 지형은 많이 바뀌었고, 축척에도 문제가 있는 것 같다."},{"id":"rogue_5_relic_legacy_34","orderId":"004","name":"신탁의 소라","usage":"배치 가능 인원수 +1, 모든 아군 유닛의 HP +4%","desc":"이것을 불면 당신이 본 적도 들은 적도 없는 신들이 응답할 것이다. 사실은 그저 소라 껍데기일 뿐이다."},{"id":"rogue_5_relic_legacy_35","orderId":"005","name":"숲 속의 야화","usage":"배치 가능 인원수 +2, 모든 아군 유닛의 방어력 +6%","desc":"요양정원에서 외근 오퍼레이터들을 위해 제작한 방향제 세트. 15가지 식물 성분을 채취해 172가지로 조합할 수 있다. 숲에 바람이 불어오면 만물이 속삭이니, 편하게 잠들 수 있다."},{"id":"rogue_5_relic_legacy_36","orderId":"006","name":"교회 구호식권","usage":"배치 가능 인원수 +2, 모든 아군 유닛의 HP +6%","desc":"몰락한 이베리아 해안 도시의 일부 교회에서는 정기적으로 신도들에게 구호식권을 나눠준다. 식권의 발급 대상 기준은 비밀이지만."},{"id":"rogue_5_relic_legacy_119","orderId":"007","name":"열린 소품 상자","usage":"희망 +4","desc":"극단 소품 담당자의 상자. 골무부터 마네킹까지 없는 게 없다."},{"id":"rogue_5_relic_legacy_121","orderId":"008","name":"밴시의 입맞춤","usage":"희망 +6, 오리지늄각뿔 +6 즉시 획득","desc":"이종족이 이걸 얻으면 종종 자신을 초월하는 용기를 보여주곤 하는데, 보기 드문 남성 밴시인 로고스는 이미 익숙해져 있었다."},{"id":"rogue_5_relic_legacy_124","orderId":"009","name":"만능열쇠","usage":"희망 +6","desc":"은으로 만든 낡은 열쇠로, 열 수 없는 문이 없다. 관리자로서, 극단 매니저로서 당연히 모든 비밀을 열 수 있는 이 은 열쇠를 손에 쥐어야 한다."},{"id":"rogue_5_relic_legacy_130","orderId":"010","name":"해초 무침","usage":"편성 가능 인원수 +1, 모든 아군 원거리 유닛의 공격력 +2%","desc":"한때 이베리아인들이 자랑스러워했던 전통 미식이었으나, 시본이 횡포한 지금 점점 사람들의 기억에서 잊혀 가고 있다."},{"id":"rogue_5_relic_legacy_131","orderId":"011","name":"오렌지 스톰","usage":"편성 가능 인원수 +1, 모든 아군 근거리 유닛의 공격력 +2%","desc":"마마존스 캔디 제품 중에서도 가장 잘 팔리는 오렌지 맛. 저렴한 가격과 달콤한 맛을 어필하여 아이들 사이에 특히 인기가 많다."},{"id":"rogue_5_relic_legacy_132","orderId":"012","name":"커피 플레인 커피 캔디","usage":"편성 가능 인원수 +2, 모든 아군 원거리 유닛의 공격력 +3%","desc":"도솔레스 유명 커피 브랜드의 커피 캔디 제품으로 현재 각지에서 널리 판매되고 있다. 실제로 카페인을 첨가하여 출근부터 퇴근까지 맑은 정신을 유지하게 해준다."},{"id":"rogue_5_relic_legacy_133","orderId":"013","name":"스크리밍 체리","usage":"편성 가능 인원수 +2, 모든 아군 근거리 유닛의 공격력 +3%","desc":"마마존스의 새콤달콤한 체리 맛 캔디로, 판매량은 인기 제품에 비해 보잘것없으나 소수의 마니아들이 꾸준히 찾고 있다. 듣기로는 마마존스의 한 이사가 이 맛을 좋아한다고 한다."},{"id":"rogue_5_relic_legacy_134","orderId":"014","name":"낡은 악보","usage":"희망 +3, 모든 아군 원거리 유닛의 공격력 +4%","desc":"음표가 흐려져 잘 보이지 않는 낡은 악보의 찢긴 한 페이지. 과연 이 곡엔 어떤 사연이 담겨 있을지 궁금하다."},{"id":"rogue_5_relic_legacy_135","orderId":"015","name":"계약해지서","usage":"희망 +4","desc":"서명 하나만 받아내면 이 극단에서 완전히 벗어날 수 있다."}]},{"name":"생존 지원","items":[{"id":"rogue_5_relic_legacy_1","orderId":"016","name":"클로 - 전훈","usage":"[뱅가드] 오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"강력한 무기, 용감히 앞으로 나아가는 마음."},{"id":"rogue_5_relic_legacy_2","orderId":"017","name":"브로큰 스피어 - 전훈","usage":"[가드] 오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"활도, 아츠도 사용할 줄 모르기에 어쩔 수 없이 검을 사용하는 사람들이 있지만, 검을 사용할 수밖에 없기에 검을 사용하는 사람들도 있다."},{"id":"rogue_5_relic_legacy_3","orderId":"018","name":"프로텍터 - 전훈","usage":"[디펜더] 오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"상처는 훈장이다. 하지만 가루처럼 부서져 버린 전사들은 누가 기억해 줄 것인가?"},{"id":"rogue_5_relic_legacy_4","orderId":"019","name":"브로큰 보우 - 전훈","usage":"[스나이퍼] 오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"“화력을 잘 제어하든지, 목표를 정확히 겨냥하든지 하라고, 알겠어?”"},{"id":"rogue_5_relic_legacy_5","orderId":"020","name":"브로큰 스태프 - 전훈","usage":"[캐스터] 오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"“어떤 캐스터 오퍼레이터들의 \\'공연\\'을 보고 난 뒤, 나는 라이타니엔 교재를 묵묵히 거둬들이기로 결심했다.”"},{"id":"rogue_5_relic_legacy_6","orderId":"021","name":"스트럿 - 전훈","usage":"[서포터] 오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"그들은 행동할 때 항상 제각각이다."},{"id":"rogue_5_relic_legacy_7","orderId":"022","name":"힐러 - 전훈","usage":"[메딕] 오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"모든 사람이 의사가 되어 삶의 병터라는 병을 완치할 수 있는 때가 온다면, 우리는 더 이상 의사가 필요하지 않을 것이다."},{"id":"rogue_5_relic_legacy_8","orderId":"023","name":"러스트 블레이드 - 전훈","usage":"[스페셜리스트] 오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"스페셜리스트 오퍼레이터들과 실전 연습을 할 때, \\'준비를 제대로 하기도 전에 얻어맞을\\' 마음의 준비를 단단히 하길."},{"id":"rogue_5_relic_legacy_9","orderId":"024","name":"오락실 관리자 카드","usage":"오퍼레이터 1명 즉시 랭크 상승 (희망 소모 없음)","desc":"이게 있으면 로도스 아일랜드의 오락실 대권을 잡은 거나 마찬가지다. 오퍼레이터의 이상한 요청 사항은 신중하게 처리할 것…… 그리고 문단속은 확실하게 할 것.   "},{"id":"rogue_5_relic_legacy_10","orderId":"025","name":"미스 크리스틴 쓰담권","usage":"오퍼레이터 2명 즉시 랭크 상승 (희망 소모 없음)","desc":"당신은 이미 미스의 허락을 받았다!"},{"id":"rogue_5_relic_legacy_12","orderId":"026","name":"전기주전자","usage":"최대 목표 HP +1, 희망 +1","desc":"로도스 아일랜드 사무실에 있는 것과 같은 모델의 전기주전자. 한밤중에 이걸로 라면을 끓여 먹는 사람들도 종종 있는데, 이는 건강하지 않은 생활습관이다……"},{"id":"rogue_5_relic_legacy_27","orderId":"027","name":"그윽한 향의 특급 원두","usage":"편성 가능 인원수 +1, 배치 가능 인원수 +1, 실드 +1","desc":"커피 농부들이 독특한 향이 나는 파울비스트에게 원두를 먹이고, 그 배설물에서 다시 채취 및 가공한 원두. 위산 발효 과정에서 원두가 독특한 향을 머금어, 덕분에 가격이 3배로 뛰었다."},{"id":"rogue_5_relic_legacy_29","orderId":"028","name":"빅토리아 \\'고철\\' 훈장","usage":"전투 획득 지휘 경험치 +20%","desc":"시즈가 임시로 다그다에게 만들어 준 기사 훈장. 재료는 형편없으나, 다그다에겐 그 의미가 아주 크다."},{"id":"rogue_5_relic_legacy_30","orderId":"029","name":"잃어버린 열쇠","usage":"전투 획득 지휘 경험치 +20%, 지휘 레벨 10 달성 시 오리지늄각뿔 50개 즉시 획득","desc":"“여러분, 이 열쇠는 잃어버린 왕도 카즈델의 보물창고를 열 수 있는 열쇠야. 어이, 거기 녹색 머리 필라인, 너의 저 후드 노예를 잘 감시해! 내 지도를 건드리지 못하게!”"},{"id":"rogue_5_relic_legacy_40","orderId":"030","name":"보물 반지","usage":"전투 드랍 오리지늄각뿔 +50%","desc":"라이타니엔 신화에 나오는 반지. 이 반지를 지니면 온 대지의 부를 가질 수 있으나, 결국 탐욕 때문에 파멸한다고 전해진다."},{"id":"rogue_5_relic_legacy_110","orderId":"031","name":"고대 주화","usage":"오리지늄각뿔 +10 즉시 획득","desc":"녹이 슬어 연도를 판별할 수 없는 고대 주화. 테라 황무지 어디에서나 볼 수 있다."},{"id":"rogue_5_relic_legacy_111","orderId":"032","name":"무결점 보옥","usage":"오리지늄각뿔 +25 즉시 획득","desc":"이것 때문에 성이 세 번이나 파괴되긴 했지만, 흠잡을 데 없는 보옥은 여전히 밝게 빛난다. 보옥을 소지한 사르곤 황제는 오늘날까지도 어떤 보석이 가장 잘 어울리는지 모른다. 전쟁의 총성만 영원히 따를 뿐."},{"id":"rogue_5_relic_legacy_112","orderId":"033","name":"유리로 만든 새","usage":"희망 +4, 편성 가능 인원수 +1","desc":"“나만의 낙원에서 이 작은 새는 영원히 노래한다.”"},{"id":"rogue_5_relic_legacy_113","orderId":"034","name":"괴상한 플루트","usage":"희망 +4, 편성 가능 인원수 +1","desc":"괴상하게 생긴 플루트로, 누군가 밤낮으로 불어댄다."},{"id":"rogue_5_relic_legacy_114","orderId":"035","name":"빨간 리본","usage":"희망 +2, 배치 가능 인원수 +1","desc":"팬텀이 선물한 첫 번째 선물, 미스 크리스틴이 아주 마음에 들어 한다."},{"id":"rogue_5_relic_legacy_115","orderId":"036","name":"블루 스카프","usage":"희망 +2, 편성 가능 인원수 +1","desc":"우아한 스카프, 그녀의 등장은 곧 안전함을 의미한다."},{"id":"rogue_5_relic_legacy_116","orderId":"037","name":"독주 오르골","usage":"희망 +4, 배치 가능 인원수 +1","desc":"낡은 오르골. 켜도 소리가 나지 않고 인형도 움직이지 않는다. 아무 소리도 없고 춤추는 사람도 없다. 팬텀과 공연하기 전에 여주인공은 늘 무대 뒤에서 멍하니 이 오르골을 바라보곤 했다."},{"id":"rogue_5_relic_legacy_117","orderId":"038","name":"오리지늄 아이리스","usage":"희망 +6, 편성 가능 인원수 +2","desc":"아주 럭셔리한 꽃다발. 커튼콜 할 때 단장이 주인공에게 꽃을 준 적은 손에 꼽을 정도다."},{"id":"rogue_5_relic_legacy_118","orderId":"039","name":"순금의 원정","usage":"희망 +4, 편성 가능 인원수 +1, 배치 가능 인원수 +1","desc":"군주는 황무지에서 출발했고, 그녀의 발길이 닿는 곳마다 시장이 봄날의 새싹처럼 피어났고, 번영의 길은 높은 산과 울창한 숲을 지나 그녀가 사라진 서쪽 파도의 절벽까지 이어졌다. ——사르곤 전래동화"},{"id":"rogue_5_relic_legacy_120","orderId":"040","name":"계화잔","usage":"희망 +4, 오리지늄각뿔 +5 즉시 획득, 득과 실에서 해당 소장품 교환 시 추가로 소장품 1개 획득","desc":"값어치를 가늠할 수 없을 정도로 귀한 도자기 잔. 뒷면에는 “이 잔을 쥐는 자, 계수를 꺾어 거처로 삼으리라.”라는 글귀가 새겨져 있다. 듣자 하니 모두 열두 개가 있는데, 어느 수집가가 마침 이 한 점이 모자란 듯하다."},{"id":"rogue_5_relic_legacy_122","orderId":"041","name":"디펜더-2","usage":"실드 +3","desc":"이건 양산형 방어용 드론이다. 꼭 적들만 조종할 수 있다는 법은 없다."},{"id":"rogue_5_relic_legacy_123","orderId":"042","name":"《옛 가울 지명 원류고》","usage":"실드 +6","desc":"민트가 박사 사무실에서 뒤져낸 옛 지명 역사책으로, 이 책에는 셀라이블라손에 관련된 내용이 기록돼 있다."},{"id":"rogue_5_relic_legacy_125","orderId":"043","name":"특수 저지 장치","usage":"최대 목표 HP +2, 목표 HP 2 회복","desc":"로도스 아일랜드의 개량형 저지 장치. 감염으로 인한 오리지늄 아츠 통제 불능 상태를 효과적으로 제어할 수 있다."},{"id":"rogue_5_relic_legacy_126","orderId":"044","name":"아카후알라 그릇","usage":"목표 HP +4, 실드 +2","desc":"과일은 현지인들의 주식 중 하나이며, 과일을 따고 현장에서 바로 먹는 것도 흔하게 있는 일이다."},{"id":"rogue_5_relic_legacy_127","orderId":"045","name":"뱀파이어의 침대","usage":"최대 목표 HP +4","desc":"고성의 분위기와 아주 잘 어울리는 럭셔리한 관. 와파린은 이런 게 고정관념이라고 한다."},{"id":"rogue_5_relic_legacy_128","orderId":"046","name":"영생의 상징","usage":"최대 목표 HP +6","desc":"한쪽은 시들지만, 한쪽은 자라고 있는 나뭇가지. 시든 쪽에서 살아나고, 번성한 쪽은 다시 시든다."},{"id":"rogue_5_relic_legacy_129","orderId":"047","name":"입체 예술 장식품","usage":"목표 HP +5, 최대 목표 HP +2, 전투가 종료될 때마다 추가로 목표 HP +1","desc":"라인 랩이 사람들에게 주는 인상은 마치 이 예술 장식품과도 같다. 뭔가 신비롭고 겹겹이 둘러싸여 영원히 그 내부를 알 수 없는 것처럼."}]},{"name":"투지의 기어","items":[{"id":"rogue_5_relic_legacy_13","orderId":"048","name":"바닐라 사르시 탄산음료","usage":"모든 자연 회복 스킬의 SP 회복 +0.2/초","desc":"볼리바르 지역의 저가 음료. 수백 년의 역사를 지니고 있으며 다양한 향료를 섞어 만들었다. 특징이라면 맛이 없다는 점."},{"id":"rogue_5_relic_legacy_14","orderId":"049","name":"매혹의 향수","usage":"모든 자연 회복 스킬의 SP 회복 +0.5/초","desc":"밴시들은 향수를 만들어 마음에 드는 사람에게 선물한다고 한다. 딱 한 방울, 한 방울이면 사람을 황홀하게 만들고, 예술가들의 영감과 아이디어도 이것에서 얻는다고 한다."},{"id":"rogue_5_relic_legacy_15","orderId":"050","name":"개선의 뿔피리","usage":"적이 받는 일회성 기절, 냉기, 빙결 등 상태 이상 시간이 100% 증가","desc":"뿔피리를 불고 구호를 높이 외쳐, 적들이 하늘을 뒤흔드는 포효 속에서 도망치게 하라!"},{"id":"rogue_5_relic_legacy_16","orderId":"051","name":"정신 치료 테이프","usage":"적이 받는 일회성 기절, 냉기, 빙결 등 상태 이상 시간이 150% 증가","desc":"이것은 그가 위험하다며, 이곳에 머물면 안 된다며 당신이 듣는 걸 여러 번 반대했던 것이다…… 이제 알겠는가? 당신은 지금 그의 노래를 듣고 있다."},{"id":"rogue_5_relic_legacy_17","orderId":"052","name":"\\'어벤져\\'","usage":"모든 적군 유닛이 받는 물리 대미지 +35%","desc":"아스카론이 군사위원회의 첫 번째 임무를 완성한 후 테레시스가 직접 선물하고 테레시아가 그녀에게 장착해 준 첫 번째 무기이다."},{"id":"rogue_5_relic_legacy_18","orderId":"053","name":"\\'찬란한 눈물\\'","usage":"모든 적군 유닛이 받는 마법 대미지 +40%","desc":"그의 피는 아직도 흐른다. 그는 단 한 번도 여기를 떠난 적이 없다."},{"id":"rogue_5_relic_legacy_20","orderId":"054","name":"군단 미러 아머","usage":"모든 아군 유닛의 방어력 +25%","desc":"한때 심장의 치명적인 피해를 막을 수 있는 흉갑이었으나, 가울이 몰락하면서 이런 구식 갑옷은 역사의 무대에서 사라지게 됐다."},{"id":"rogue_5_relic_legacy_21","orderId":"055","name":"오래된 증기 갑옷","usage":"모든 아군 유닛의 방어력 +35%","desc":"이런 구형 증기 갑옷마저도 빅토리아 군주들이 넓은 대륙을 비추었던 과거의 영광을 담고 있는 것만 같다."},{"id":"rogue_5_relic_legacy_22","orderId":"056","name":"황제의 은총","usage":"모든 아군 근거리 유닛 공격력 +15%","desc":"편지봉투를 개봉할 때 쓰는 날카로운 칼. 전대 우르수스 황제가 애용하던 일용품이지만, 대부분 봉투를 개봉하는 데 쓰지는 않았다."},{"id":"rogue_5_relic_legacy_23","orderId":"057","name":"올드 가디언의 창","usage":"모든 아군 근거리 유닛 공격력 +35%","desc":"올드 가디언의 희생을 지켜본 후 가울은 비로소 자신의 파멸을 맞이했다."},{"id":"rogue_5_relic_legacy_24","orderId":"058","name":"헌신의 목걸이","usage":"모든 아군 원거리 유닛 공격력 +15%","desc":"신앙은 심장 10센티미터 위에 걸려있고, 언어는 피에 흘러들며, 총알은 탄창에 미끄러져 들어간다."},{"id":"rogue_5_relic_legacy_25","orderId":"059","name":"망가진 리볼버 탄창","usage":"모든 아군 원거리 유닛 공격력 +35%","desc":"그녀는 험난한 순간에도 간사한 자들에게 고개를 숙인 적이 없었고, 그녀의 총구에서 나오는 불꽃은 마치 성난 태양 같았고, 그녀 머리 위의 고리는 대낮보다 환한 빛을 발했다. 이곳에 우리의 친구, 아웃캐스트가 잠들어 있다."},{"id":"rogue_5_relic_legacy_37","orderId":"060","name":"중력 무시 장치","usage":"모든 적의 무게 -2","desc":"내스티 루노레이의 걸작은 살카즈로 하여금 그들을 오랫동안 괴롭혔던 대지를 떠나게 했다. 그 후, 살카즈는 비록 구름 사이를 떠돌아다녔지만, 하늘에 단단히 자신의 뿌리를 내렸다."},{"id":"rogue_5_relic_legacy_38","orderId":"061","name":"호수의 방패","usage":"실드 +1, 실드 보유 시 전투 시작 후 모든 아군 유닛의 최대 HP +60%","desc":"30년 전, 아이의 장난감 방패가 호수에 떨어졌다. 30년 후, 그는 얼어붙은 호수를 깨고 방패를 꺼내 영웅의 길을 떠났다."},{"id":"rogue_5_relic_legacy_42","orderId":"062","name":"유기농 통조림","usage":"모든 오퍼레이터가 스킬 발동 후 1초간 공격력 +60%","desc":"수많은 카우투스들은 이 통조림을 먹으면 힘이 폭발한다고 믿고 있다. 뛰어난 광고 효과 덕분에 업계의 대표적인 성공 사례가 되었다."},{"id":"rogue_5_relic_legacy_43","orderId":"063","name":"시라쿠사인의 분노","usage":"모든 오퍼레이터가 스킬 발동 후 1초간 공격력 +100%","desc":"가울 수도에 있던 \\'정통 시라쿠사 레스토랑\\'의 간판 메뉴로, 진한 초코 잼과 원석충 간으로 만든 소스는 독특한 풍미를 자랑하여 가울 귀족들의 호평을 받았다. 그러나, 시라쿠사와 가울의 외교 갈등도 유발할 뻔했다고 한다."},{"id":"rogue_5_relic_legacy_44","orderId":"064","name":"고성의 후손","usage":"전장에 80초간 배치한 오퍼레이터의 방어력 +400, 마법 저항 +30","desc":"시간만 충분하다면 이 상자는 또 다른 새로운 무대가 될 수 있다."},{"id":"rogue_5_relic_legacy_46","orderId":"065","name":"망가진 죽간","usage":"[소환물]의 HP +30%, 공격력 +30%, 배치 인원수를 소모하지 않음","desc":"“천 개의 산을 흔쾌히 잃어도, 만물엔 영혼이 깃드느라.”"},{"id":"rogue_5_relic_legacy_71","orderId":"066","name":"얼어붙은 몸","usage":"근거리 오퍼레이터가 대미지를 받으면 5초간 공격 속도 +40","desc":"윈터투스 산맥에 주둔하고 있는 사미 전사들은 생명이 땅으로 흘러들수록 얼어붙은 몸이 점점 가벼워진다는 환각에 자주 고무된다."},{"id":"rogue_5_relic_legacy_72","orderId":"067","name":"고대 벽화","usage":"적이 공중 부양, 무중력 상태에 돌입 또는 해제할 때마다 1000 마법 대미지를 받으며, 10초간 특수 능력 상실","desc":"동굴을 나와 고개를 들어서 보라. 자고로 모든 것이 다 그런 건 아니다."},{"id":"rogue_5_relic_legacy_73","orderId":"068","name":"스텔라리아의 휘광","usage":"적이 공중 부양, 무중력 상태에 돌입 또는 해제할 때마다 2000 마법 대미지를 받으며, 10초간 피격 대미지 +30%","desc":"그 순간, 진실의 빛이 대지 곳곳을 비추었다."},{"id":"rogue_5_relic_legacy_74","orderId":"069","name":"가시 고리","usage":"근거리 오퍼레이터가 치료를 받으면 자신과 주변 4칸 범위 내 오퍼레이터가 SP +1","desc":"당신은 이 왜곡된 두려움으로부터 자신을 안정시켜야 한다. 가시에 남은 핏자국은 제사장 것인지 당신 것인지 알 수 없다. 그들은 어떠한 수단을 쓰더라도 눈 하나 깜빡이지 않는다."},{"id":"rogue_5_relic_legacy_76","orderId":"070","name":"서리남의 견갑","usage":"모든 아군 유닛이 적 2명 이상 저지 시 공격력 +40%, 방어력 +40%, 30초간 지속","desc":"그의 시신에는 상처가 보이지 않았고, 두 눈에서만 피눈물이 말라 있을 뿐이었다."},{"id":"rogue_5_relic_legacy_77","orderId":"071","name":"넝쿨 포격수","usage":"적의 공중 유닛이 처치당할 경우, 주변의 적에 물리 대미지 5000 입힘","desc":"서로 다른 문화권의 사람들이 경계를 풀고 진심으로 소통하면 이런 기발한 무기가 탄생하는 것도 그리 놀라운 일은 아니다."},{"id":"rogue_5_relic_legacy_79","orderId":"072","name":"\\'헌신\\'","usage":"원거리 오퍼레이터가 공격 또는 치료 시, 공격 범위 내 무작위 1명의 적에게 300 마법 대미지 부여","desc":"고대로부터 이 부족은 자신들이 사미의 진실을 알고 있다고 믿었다. 바로 만물은 원래 소리가 있었는데, \\'그것\\'이 만물의 소리를 대신했다는 것."},{"id":"rogue_5_relic_legacy_80","orderId":"073","name":"\\'만개\\'","usage":"모든 오퍼레이터가 대미지를 입을 때마다 SP 1 회복, 원소 손상을 입을 때마다 SP 1 회복","desc":"터치의 시도에 자연이 잠시나마 당신을 향해 마음을 열었다."},{"id":"rogue_5_relic_legacy_81","orderId":"074","name":"황실의 금빛 브로치","usage":"모든 아군 유닛의 마법 저항 +15, 배치 후 공격 1회 저항","desc":"이것은 순금으로 만들어진, 대량의 값비싼 경화 오리지늄 결정이 박힌 가울 왕족 신분의 상징이다. 사실, 이 브로치는 단순한 액세서리라기보다는 방어용 아츠가 탑재된 통용 오리지늄 회로이다."},{"id":"rogue_5_relic_legacy_82","orderId":"075","name":"마리오네트","usage":"적이 기절, 빙결, 속박 상태에서 초당 마법 대미지 700 받음","desc":"벗어나려고 애쓸수록 실에 더 꽁꽁 묶인다. 정말 자신이 사고란 걸 하고 있다고 생각하는가?"},{"id":"rogue_5_relic_legacy_83","orderId":"076","name":"\\'동심 저격 인형\\'","usage":"적이 기절, 빙결, 속박 상태에서 초당 마법 대미지 1400 받음","desc":"이베리아 아이들이 바닷가의 이상한 물건으로 만든 초라한 인형. 이 인형을 안고 있으면 꿈속 세계가 다채로워진다고 한다."},{"id":"rogue_5_relic_legacy_84","orderId":"077","name":"가울 은행 수표","usage":"모든 오퍼레이터의 초기 SP +12","desc":"금과 은이 박힌 엄청 고급스러운 수표장. 지금은 현금으로 바꿀 수 없다."},{"id":"rogue_5_relic_legacy_88","orderId":"078","name":"낡은 사진","usage":"모든 적군 유닛의 HP -4%, 방어력 -8%","desc":"사진 속에 아는 사람이라도 있나?"},{"id":"rogue_5_relic_legacy_89","orderId":"079","name":"로즈몬티스의 포옹","usage":"모든 적군 유닛의 HP -10%, 방어력 -20%","desc":"“누가 심판하지?”"},{"id":"rogue_5_relic_legacy_90","orderId":"080","name":"\\'검은 밤의 속삭임\\'","usage":"모든 적군 유닛의 HP -10%","desc":"검은색 레코드, 만.지.지.마.시.오."},{"id":"rogue_5_relic_legacy_91","orderId":"081","name":"《고요함》","usage":"모든 적군 유닛의 HP -20%","desc":"이베리아 역사상 가장 컸던 재앙을 그린 작품. 붓 터치도, 색도, 사상도 아무 의미가 없다. “에기르는 안다, 에기르는 안다, 에기르는 안다.”"},{"id":"rogue_5_relic_legacy_92","orderId":"082","name":"악취 나는 지혈제","usage":"모든 아군 유닛의 HP +20%, [사촉인] 경우 추가로 +10%","desc":"“이런 원석충의 체액은 발효 처리 후 지혈제로 사용할 수 있다”——《로도스 아일랜드 야생 생존 지침》"},{"id":"rogue_5_relic_legacy_93","orderId":"083","name":"정체불명의 기기","usage":"모든 아군 유닛의 HP +50%, [사촉인] 경우 추가로 +30%","desc":"묻지 말라니까. 다 너 자신을 위한 거라 생각해."},{"id":"rogue_5_relic_legacy_94","orderId":"084","name":"살아 있는 장미","usage":"모든 아군 유닛이 받는 치료 및 HP 회복 효과 +20%","desc":"과연 당신이 보살피고 있는가, 아니면 장미가 당신을 지키고 있는가?"},{"id":"rogue_5_relic_legacy_95","orderId":"085","name":"창백해진 화관","usage":"모든 아군 유닛이 받는 치료 및 HP 회복 효과 +30%","desc":"뱀파이어가 의식을 치를 때 사용하던 화관 베일로, 새빨갛던 생명이 모두 바래져 지금은 창백함만 남았다."},{"id":"rogue_5_relic_legacy_136","orderId":"086","name":"모건 대장의 술","usage":"초기 SP +5, 모든 공격 및 피격 시 회복되는 스킬이 3초마다 SP 1 회복","desc":"이베리아 지역에서 생산되는 술. 빅토리아 중부 도시에서 인기가 좋지만, 현재는 단종되었다."},{"id":"rogue_5_relic_legacy_137","orderId":"087","name":"스피리터스","usage":"초기 SP +7, 모든 공격 및 피격 시 회복되는 스킬이 2.5초마다 SP 1 회복","desc":"도수가 매우 높은 우르수스의 독한 술, 마시면 머리가 아프긴 하지만, 건강한 우르수스인들은 몇 병이나 비울 수 있다고 한다."},{"id":"rogue_5_relic_legacy_138","orderId":"088","name":"로열 리큐어","usage":"초기 SP +7, 모든 공격 및 피격 시 회복되는 스킬이 1.5초마다 SP 1 회복","desc":"지금은 멸망한 국가 \\'가울\\'의 술. 이제는 수집가들의 애장품이 되어 가격이 매우 비싸다. 현재 생산지가 라이타니엔 영토 내에 있으며, 제조법은 이미 실전되었다."},{"id":"rogue_5_relic_legacy_143","orderId":"089","name":"《무감각과 저속함》","usage":"모든 아군 유닛의 마법 저항 +5, 마법 회피 +10%","desc":"200년 전 라이타니엔의 한 미치광이 조각가의 유작이자 유명한 예술품. 이 조각가는 재능이 넘치고 여러 잔인한 살인 사건에 연루된 것으로 잘 알려졌다. 하지만 역사 기록에 따르면 그는 생전에 작품보다도, 오히려 수려한 외모 때문에 많은 사랑을 받았다고 한다."},{"id":"rogue_5_relic_legacy_144","orderId":"090","name":"디자이너의 자","usage":"모든 아군 유닛의 물리 회피 +15%, 회피 발동 후 6초 동안 공격력 +30%","desc":"데이터와 경험 및 정밀한 측량을 기반으로 만든 갑옷을 입은 사람은 운이 좀 더 좋은 편이다."},{"id":"rogue_5_relic_legacy_145","orderId":"091","name":"\\'아츠 킬러\\'","usage":"모든 아군 유닛의 마법 회피 +15%, 회피 발동 후 6초 동안 공격력 +30%","desc":"라이타니엔인의 오리지늄 아츠가 음악과 직결돼 있다고 해서, 소음으로 아츠에 맞서는 미련한 생각을 떠올린 사람이 있을 줄이야."},{"id":"rogue_5_relic_legacy_146","orderId":"092","name":"《글로리어스 카시미어》","usage":"오퍼레이터가 회피 발동 후 15초 동안 공격 속도 +70","desc":"카시미어의 베스트셀러. 기사 스포츠를 빛낸 기사들의 일대기를 소설 형식으로 풀어냈다. 처참하게 추방당했지만, 다시 우승을 되찾은 니어의 이야기가 상당한 비중을 차지했다."},{"id":"rogue_5_relic_legacy_147","orderId":"093","name":"《귀환》","usage":"오퍼레이터가 회피 발동 후 15초 동안 공격력 +130%","desc":"카시미어의 베스트셀러. 팬덤의 집단 창작물이라고 한다. \\'니어\\'는 이미 복잡한 환상들이 뒤섞인 이미지의 복합체가 되어버렸다. “추방이지, 결코 도피는 아니다. 그녀는 돌아와 홀로 이 시대의 홍수를 맞설 것이다.”"},{"id":"rogue_5_relic_legacy_148","orderId":"094","name":"하늘의 먼지","usage":"원거리 오퍼레이터가 수동 스킬 발동 시, 공격 범위 내 모든 적을 5초간 공중 부양","desc":"그녀는 해가 뜨고 달이 지며 별이 바뀌는 기록을 수도 없이 불었다. 그렇게 그녀의 생명은 쉽게 날아가 버렸다."},{"id":"rogue_5_relic_legacy_149","orderId":"095","name":"\\'망치의 검\\'","usage":"모든 오퍼레이터의 배치 코스트 +3, 단 공격력, 방어력, HP +20%","d
