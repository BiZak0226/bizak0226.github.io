<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>명일방주 통합 소장품 도감</title>
<link rel="stylesheet" href="relics-style.css">

</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <h1>명일방주 <span>소장품</span></h1>
  <div class="is-tabs" id="is-tabs-top"></div>
  <div class="search-wrap">
    <input type="text" id="search-desktop" placeholder="이름 / 효과 검색…">
  </div>
</div>

<!-- MOBILE: search + category pill bar -->
<div class="mobile-search-bar">
  <input type="text" id="search-mobile" placeholder="이름 / 효과 검색…">
</div>
<div class="mobile-cat-bar" id="mobile-cat-bar"></div>

<!-- LAYOUT -->
<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main"></div>
</div>

<!-- MOBILE BOTTOM NAV -->
<div class="mobile-bottom-nav">
  <div class="is-tabs" id="is-tabs-bottom"></div>
</div>

<script src="relics-data.js"></script>
<script src="relics.js"></script>
</body>
</html>
