esc":"커다란 바위에 꽂혀 있는 검. 대체 누가 이딴 장난을 치는 건지."},{"id":"rogue_5_relic_fight_1","orderId":"096","name":"봉신령","usage":"오퍼레이터를 침입 포인트 주변 8칸에 배치 시 공격력 +100%","desc":"박물관에 소장된 대사냥 시대의 징집령. 이것으로 베헤모스의 소굴 깊숙이 잠입할 수 있는 부대를 징집할 수 있으며, 뒤에 있는 것은 죽음의 서약이다."},{"id":"rogue_5_relic_fight_3","orderId":"097","name":"구속의 끈","usage":"[소환물]의 배치 코스트 -5, 재배치 시간 -25%, 공격력 +30%","desc":"사세대에 편입된 창괴들이 일할 때 착용하는 표식이다. 스스로 따르는 찻주전자, 열심히 꽃에 물을 주는 물뿌리개, 이들은 단순하고 반복적인 일에 매우 능하다."},{"id":"rogue_5_relic_fight_4","orderId":"098","name":"\\'아멍\\'","usage":"모든 적군 유닛이 받는 원소 대미지 +100%","desc":"백 년 전, 쉐이가 깨어났을 때 사세대는 특별 훈련을 받은 백비스트의 도움으로 창괴를 수색하고 섬멸했다. 이 도자기는 당시 희생된 백비스트를 기리기 위해 제작되었다."},{"id":"rogue_5_relic_fight_5","orderId":"099","name":"권선랑","usage":"오퍼레이터가 회피 또는 무효화 발동 시, 다음에 입히는 대미지 +100%","desc":"천사부 학도들이 직접 개발한 시험 보조기기. 문제를 맞추면 아무것도 없지만, 틀리면…… 차라리 시도하지 않는 게 좋다."},{"id":"rogue_5_relic_fight_6","orderId":"100","name":"경중경","usage":"적이 최초로 입히는 대미지 -90%","desc":"계원의 문과 창문에 늘 걸려있는 거울. 뜻밖의 위기가 닥쳤을 때, 거울 속 세상은 사람들의 긴급 피난처가 된다. 그 거울이 산산이 부서질 때까지."},{"id":"rogue_5_relic_fight_7","orderId":"101","name":"등불의 안내","usage":"최초로 지상에 배치한 오퍼레이터의 공격력 +50%, 저항 획득, 원소 손상 50% 감소 획득, 쓰러지거나 퇴각할 때까지 지속","desc":"최초로 승천한 사람은 쉐이에게 정신이 잠식되지 않기 위해 손에 촛불을 들고 있었다 한다. 어둠이 밀려와도 촛불은 오래도록 밝게 타올라, 긴 어둠 속에서 의식이 돌아오는 길을 밝혀준다. \\'지촉\\'이라는 이름도 여기서 비롯되었다."},{"id":"rogue_5_relic_fight_8","orderId":"102","name":"\\'반디등불\\'","usage":"적이 쓰러질 경우, 주변의 오퍼레이터 및 소환물이 HP 300 회복","desc":"고향에서 보내온 화분은 점점 시들어 갔고, 서생은 차마 버리지 못했다. 그러던 어느 날, 화분 속 풀이 사라지더니, 반딧불이 그 위를 맴돌며 그의 책장을 밝혀주었다 한다."},{"id":"rogue_5_relic_fight_11","orderId":"103","name":"장난감 새총","usage":"오퍼레이터가 스킬 발동 후, 공격 범위 내 모든 적에게 공격력의 30%에 해당하는 마법 대미지를 입힘","desc":"용광로에서 탄생한 청동 새총으로, 고무줄을 당기면 작은 청동 인형이 몸을 웅크려 놀라울 만큼 무거운 탄환이 되어 발사된다. “자, 가져가서 놀아. 위험은 무슨, 그냥 장난감이야.”"},{"id":"rogue_5_relic_fight_13","orderId":"104","name":"군것질 광주리","usage":"전투 시작 후, 모든 오퍼레이터의 SP 자연 회복 속도 +100%, 임의의 오퍼레이터가 스킬 발동 시 해당 효과 상실","desc":"계원 밖에서 파는 군것질로 가득한 광주리가 입장할 때 압수되었다. 직원들은 어디서 났는지 캐물었고, 당신은 사실대로 말했다. 그러자 그들은 괜찮다고 달래면서, 곧바로 수상한 모양의 도구를 집어 들고 당신이 말한 방향으로 쫓아갔다."},{"id":"rogue_5_relic_fight_16","orderId":"105","name":"봄의 흔적","usage":"적이 쓰러질 때마다, 주변의 모든 적에게 6초간 냉기 효과 부여","desc":"어느 신선이 지나가다 남긴 봄꽃 한 가지."},{"id":"rogue_5_relic_fight_17","orderId":"106","name":"벽의 눈","usage":"오퍼레이터가 자신의 공격 범위 밖으로부터 받는 물리 및 마법 대미지 -50%","desc":"그것의 의식은 이미 존재하고, 그것의 걸음은 벽 속에 갇혀 있다. 그것은 당신을 바람으로부터 지켜주고, 그것은 당신이 멀어져 가는 것을 지켜본다."},{"id":"rogue_5_relic_bullet_1","orderId":"107","name":"조각판","usage":"오퍼레이터가 탄약류 스킬 발동 후, 대미지를 입힐 때마다 공격력 +2% (최대 30회 중첩)","desc":"유행 시집이 조각되어 있는 대추나무 목판. 자신들이 보기에 변변찮은 시가 널리 퍼지자, 고고한 문인들은 으레 코웃음을 쳤다. “흥, 가엾은 대추나무군. 이런 죄를 받을 정도는 아니었거늘.”"},{"id":"rogue_5_relic_bullet_2","orderId":"108","name":"세치 만상","usage":"오퍼레이터가 탄약류 스킬 발동 시 공격 속도 +100, 15초간 지속","desc":"옛날 염국 인쇄소에서 쓰던 활자 인쇄기. “군자는 글을 무기로 삼고, 소인은……” 한 번은 인쇄소의 \\'비\\'자가 도둑맞자, 반박문의 뜻이 순식간에 뒤바뀌게 되어, 사람들이 대략 난감해 했다고 한다."},{"id":"rogue_5_relic_bullet_3","orderId":"109","name":"《염국사전》","usage":"오퍼레이터가 탄약류 스킬 발동 후, 탄약이 최초로 30% 이하 시 최대 탄약의 30%를 즉시 장전","desc":"염국의 첫 번째 범용 사전으로, 민간의 한 저자가 십 년을 걸쳐 완성했다. 편집자는 책이 얇고 글자는 많다고 늘 탄식하며, 수록하지 못해 끝내 사라질 운명의 글자들을 위해 무덤을 세웠다고 한다."},{"id":"rogue_5_relic_bullet_4","orderId":"110","name":"《아집》","usage":"오퍼레이터가 탄약류 스킬 발동 후, 탄약이 최초로 30% 이하 시 최대 탄약의 50%를 즉시 장전","desc":"염국의 첫 번째 시집으로, 당시 유행하던 시를 대거 수록했다. 시집의 인기로 인해 민간에서는 시를 짓거나 베끼는 열정이 급증하여, 한때 종이와 먹이 부족할 지경까지 이르렀다고 한다."},{"id":"rogue_5_relic_legacy_140","orderId":"111","name":"가시와 잎의 띠","usage":"배치 가능한 랜덤 화경지 1개 지정, 해당 화경지에 오퍼레이터 배치 시 주변 8칸의 아군 유닛은 위장 효과 획득","desc":"이 고리 속에서만큼은 눈서리 내린 대지의 총애를 받아야 한다."},{"id":"rogue_5_relic_legacy_141","orderId":"112","name":"눈과 흙의 띠","usage":"배치 가능한 랜덤 화경지 1개 지정, 해당 화경지에 배치된 오퍼레이터가 공격 회복 또는 피격 회복 스킬 발동 시, 화경지에 배치된 모든 오퍼레이터의 SP +1","desc":"이 고리 속에서만큼은 가시와 잎의 편애를 받아야 한다."},{"id":"rogue_5_relic_legacy_142","orderId":"113","name":"먼 고향의 인도","usage":"배치 가능한 랜덤 화경지 1개 지정, 해당 위치에 배치된 아군 유닛은 초당 SP +1, HP +3%","desc":"상당히 오래된 반지 같지만, 실은 특수한 안내 장치로 에기르가 바다 곳곳에 숨겨둔 비상 물자를 찾을 수 있다. 해류를 따르라, 고향이 그대를 위한 선물을 선사할지니."},{"id":"rogue_5_relic_fight_12","orderId":"114","name":"\\'패옥의 결\\'","usage":"화경지에 배치된 오퍼레이터가 최초로 쓰러져도 퇴각하지 않고 HP 30% 회복","desc":"계원 주인이 선물한 패옥. 우연히 만난 벗이 당신을 집으로 초대했으나 당신은 거절했고, 억지로 당신을 끌다가 그 벗은 뭔가에 데인 듯 갑자기 손을 홱 거두고 달아났다. 한숨을 돌리고 보니 허리춤의 패옥이 한 조각 깨져 있었다."},{"id":"rogue_5_relic_fight_14","orderId":"115","name":"헌 신발","usage":"화경지에 배치된 소환물의 피격 물리 및 마법 대미지 -50%, 공격력 +50%","desc":"다리 밑에서 주운 낡은 짚신. 다리 위에서 한 노인이 신발을 돌려주길 기다리고 있었지만, 막상 올라가 보니 다른 한 짝의 짚신만 보였다. 곰곰이 생각해 보니, 그 노인은 어느 그림에서 본 것 같았다……"},{"id":"rogue_5_relic_farmer_1","orderId":"116","name":"이의 걸쇠","usage":"배치 가능한 랜덤 화경지 2개를 지정, 해당 화경지에 오퍼레이터를 배치할 때마다 배치 코스트 +8 (득과 실에서 업그레이드 가능)","desc":"이의 발명품 중 하나. 그러나 지가 더 많은 이익을 보았다. 장식품이자 퍼즐 완구로, 그 속의 비밀을 파악하면 \\'쉐이\\'애 대한 이해가 더 깊어질지도 모른다."},{"id":"rogue_5_relic_farmer_2","orderId":"117","name":"이의 역걸쇠","usage":"배치 가능한 랜덤 화경지 5개를 지정, 해당 화경지에 오퍼레이터를 배치할 때마다 배치 코스트 +10","desc":"발명자가 직접 개량한 버전. 구조가 더 복잡하고, 조합 방식이 상식을 벗어난다. 그러나 그 속의 비밀을 파악하면 \\'쉐이\\'에 대한 이해가 한층 더 깊어질지도 모른다."},{"id":"rogue_5_relic_farmer_3","orderId":"118","name":"모정","usage":"화경지에 배치된 오퍼레이터의 공격력 +10% (여흥에서 업그레이드 가능, 최대 10회)","desc":"구주 만방의 상징으로 아홉 개의 정을 사용했다. 그런데 이 정들은 어떻게 주조되었을까…… “당연히 모정이 낳은 거겠지!” 한 영화 거장이 웃으며 말했다."},{"id":"rogue_5_relic_farmer_4","orderId":"119","name":"연죽","usage":"화경지에 배치된 오퍼레이터의 HP +10% (여흥에서 업그레이드 가능, 최대 10회)","desc":"슈의 논밭에서 재배한 새 대나무. 결과는 있지만 이유는 없고, 순환을 거듭할 때마다 하나씩 늘어나, 마침내 열 마디가 돋아나면 처음과 끝이 서로 이어진다."},{"id":"rogue_5_relic_farmer_5","orderId":"120","name":"《바둑 입문 포석편》","usage":"전투 시작 후 배치 가능한 랜덤 3개의 화경지에 \\'고장 난 포그머신\\' 배치","desc":"사각과 원 사이, 이 수의 의도는 무엇일까? 바둑 두는 소리가 그치고, 통쾌함이 한껏 흘러넘친다. 대국이 끝나니…… 시절이 바뀌고 세상도 변했다."},{"id":"rogue_5_relic_farmer_6","orderId":"121","name":"승전기","usage":"화경지에 배치된 오퍼레이터가 스킬 발동 시, 기타 화경지에 배치된 오퍼레이터가 SP 1 회복","desc":"전설에 따르면, 백씨지란을 끝낸 그 진룡이 쓰던 것으로, 깃발을 흔들면 수백 장수가 뒤를 따랐다고 한다…… 진정 강대한 것은 깃발이 아니라, 전란을 억제하고 천하를 평정하려는 사람들의 뜻이다."},{"id":"rogue_5_relic_blockg_1","orderId":"122","name":"대춧빛 얼굴","usage":"모든 오퍼레이터가 저지 중인 적에게 받는 대미지 -50%, 저지 중인 적에게 입히는 대미지 +50%","desc":"한 고대 염국 영웅의 얼굴 분장. 기록에 따르면, 그의 충성심은 변함이 없고, 의를 지키기 위해 천 리 길을 달려 천군을 물리쳤다고 한다."},{"id":"rogue_5_relic_blockg_2","orderId":"123","name":"노자 얼굴","usage":"모든 오퍼레이터가 저지 중인 적에게 초당 공격력의 150%에 해당하는 마법 대미지를 입힘, 동시에 목표의 명중률 -15%","desc":"한 상고 염국 영웅의 얼굴 분장. 천사라는 이름의 원천이기도 하다. 전설에 따르면, 이 노자는 매우 박식하며, 염씨 일족을 위해 천 년의 태평을 도모한 뒤, 자취를 감추었다고 한다."},{"id":"rogue_5_relic_blockg_3","orderId":"124","name":"탄빛 얼굴","usage":"적이 최초로 저지당할 시 5초간 공포 효과 획득","desc":"한 고대 염국 영웅의 얼굴 분장. 기록에 따르면, 그는 대담하면서도 세심하며, 고함 한 번에 강이 끊길 정도였다고 한다."},{"id":"rogue_5_relic_blockg_4","orderId":"125","name":"월녀 얼굴","usage":"오퍼레이터가 적 1명 저지할 때마다 물리 및 마법 회피 +10%, 최대 5회 중첩","desc":"한 염국 전설 속 인물의 얼굴 분장. 남편을 찾기 위해 흘린 눈물은 강을 이루었고, 몸을 날려 달을 뒤쫓았다는 이야기는 지금까지도 전해지고 있다."}]},{"name":"전문 도구","items":[{"id":"rogue_5_relic_legacy_47","orderId":"126","name":"브로큰 스태프 - 파문","usage":"전장에 배치된 캐스터 오퍼레이터 1명당 모든 적군이 받는 마법 대미지 +12% (최대 8회 중첩)","desc":"같은 주파수를 맞춰 함께 선율을 연주한다."},{"id":"rogue_5_relic_legacy_48","orderId":"127","name":"클로 - 포식","usage":"전장에 배치된 뱅가드 오퍼레이터 1명당 3초마다 배치 코스트 +1 (최대 8회 중첩)","desc":"굶주린 짐승 무리가 포식의 순간을 기다린다."},{"id":"rogue_5_relic_legacy_49","orderId":"128","name":"러스트 블레이드 - 영주","usage":"전장에 배치된 스페셜리스트 오퍼레이터 1명당 모든 적군 유닛의 이동 속도 -5% (최대 8회 중첩)","desc":"주인이 손님을 원하지 않으면, 손님은 문 앞에 다다를 수 없다."},{"id":"rogue_5_relic_legacy_50","orderId":"129","name":"브로큰 스피어 - 쇄암","usage":"전장에 배치된 가드 오퍼레이터 1명당 모든 아군 유닛의 공격력 +8% (최대 8회 중첩)","desc":"힘 있는 자들은 늘 서로를 성취시킨다."},{"id":"rogue_5_relic_legacy_51","orderId":"130","name":"브로큰 보우 - 속사","usage":"전장에 배치된 스나이퍼 오퍼레이터 1명당 모든 아군 유닛의 공격 속도 +12 (최대 8회 중첩)","desc":"첫 번째 화살 소리가 들릴 때, 마지막 화살에 가슴이 뚫린다."},{"id":"rogue_5_relic_legacy_52","orderId":"131","name":"아이언 가드 - 모래탑","usage":"전장에 배치된 디펜더 오퍼레이터 1명당 모든 아군 유닛이 받는 물리 대미지 -10% (최대 8회 중첩)","desc":"모래로 탑을 쌓아, 그 위에서 몰려오는 적들을 내려다본다."},{"id":"rogue_5_relic_legacy_53","orderId":"132","name":"스트럿 - 연합","usage":"전장에 배치된 서포터 오퍼레이터 1명당 모든 자연 회복 스킬의 SP 회복 +0.2/초 (최대 8회 중첩)","desc":"손을 잡고 어깨를 나란히 하여 준비를 마치고 앞을 바라보라."},{"id":"rogue_5_relic_legacy_54","orderId":"133","name":"클로 - 정통","usage":"모든 [뱅가드] 오퍼레이터의 SP 소모 -35%","desc":"평소에 가장 먼저 전장에 나서는 오퍼레이터로, 그들이 겪은 일들은 상상도 할 수 없다."},{"id":"rogue_5_relic_legacy_55","orderId":"134","name":"클로 - 폭발","usage":"모든 [뱅가드] 오퍼레이터의 초기 SP +10, 공격력 +10%","desc":"그가 후속 부대의 일을 이미 전부 마쳤는데, 다른 사람들이 할 일이 뭐가 더 있을까?"},{"id":"rogue_5_relic_legacy_56","orderId":"135","name":"브로큰 스피어 - 창날","usage":"모든 [가드] 오퍼레이터의 공격력 +25%","desc":"“이번 달에 부러뜨린 칼만 벌써 일곱 자루라고.” “그런데 난 이번 달에 적을 여덟 명이나 베었는데.”"},{"id":"rogue_5_relic_legacy_57","orderId":"136","name":"브로큰 스피어 - 혈전","usage":"모든 [가드] 오퍼레이터가 공격 시 SP 2 획득","desc":"전투를 할수록 용맹해지는 전사는 극히 드물다. 그래서 전투 후에 긴장을 완화해 줄 수 있는 심리상담사를 좀 배치할 필요가 있다."},{"id":"rogue_5_relic_legacy_58","orderId":"137","name":"브로큰 스피어 - 임전무퇴","usage":"모든 [가드] 오퍼레이터의 방어력 -40%, 공격력 +40%, 공격 속도 +30","desc":"블레이즈에게 그 기술들을 배우라고 딱히 권장하고 싶진 않다."},{"id":"rogue_5_relic_legacy_59","orderId":"138","name":"프로텍터 - 침략","usage":"모든 [디펜더] 오퍼레이터의 공격력 +60%","desc":"팀원과 전략적 목표에 대한 보호 행위는, 그들 본래의 침략성을 잊게 만드는 경우가 많다."},{"id":"rogue_5_relic_legacy_60","orderId":"139","name":"프로텍터 - 안정","usage":"모든 [디펜더] 오퍼레이터의 HP +40%, 방어력 +40%, 마법 저항 +20","desc":"운명의 타격이 얼마나 무겁든, 그 무게를 짊어져라."},{"id":"rogue_5_relic_legacy_61","orderId":"140","name":"브로큰 보우 - 백발백중","usage":"모든 [스나이퍼] 오퍼레이터의 공격력 +20%","desc":"오리지늄 아츠가 오늘날처럼 발달하지 못했던 시대, 염국에선 타인의 궁술을 칭찬할 때 \\'백보천양\\'이라는 표현을 썼다."},{"id":"rogue_5_relic_legacy_62","orderId":"141","name":"브로큰 보우 - 신속","usage":"모든 [스나이퍼] 오퍼레이터의 공격 속도 +70","desc":"고대 빅토리아 전설의 궁수는 화살을 거의 일직선으로 연결할 수 있다고 한다."},{"id":"rogue_5_relic_legacy_63","orderId":"142","name":"브로큰 스태프 - 위버","usage":"모든 [캐스터] 오퍼레이터의 공격력 +25%, 공격 속도 +25","desc":"라이타니엔에서 고탑을 올려다볼 때 종종 이상한 현상을 목격하곤 했다…… 심지어 천체 현상을 목격한 적도 있다."},{"id":"rogue_5_relic_legacy_64","orderId":"143","name":"브로큰 스태프 - 집중","usage":"모든 [캐스터] 오퍼레이터의 SP 회복 +0.4/초","desc":"“한 캐스터가 전력을 다하기로 하면 스카이파이어 같이 성격이 나쁜 캐스터도 전혀 다른 기질을 보일 수 있어.”"},{"id":"rogue_5_relic_legacy_65","orderId":"144","name":"스트럿 - 근면","usage":"모든 [서포터] 오퍼레이터의 SP 소모 -40%","desc":"별거 아닌 일인 것처럼 보여도 오퍼레이터들은 전력을 다할 것이다. 게다가 사실 전혀 별거 아닌 일도 아니다."},{"id":"rogue_5_relic_legacy_66","orderId":"145","name":"힐러 - 자생","usage":"모든 [메딕] 오퍼레이터 SP 회복 +0.3/초","desc":"누가 의사는 제 병을 못 고친다고 했는가, 그들은 단지 각성제 한 알을 먹은 뒤, 계속하여 다른 사람을 돕는 일을 선택했을 뿐이다."},{"id":"rogue_5_relic_legacy_67","orderId":"146","name":"힐러 - 명의","usage":"모든 [메딕] 오퍼레이터의 공격 속도 +50","desc":"죽음의 문턱에서 목숨을 건진 위대한 업적에 비하면, 그 뒤에 겨우 3일 혼수상태에 빠지는 것쯤이야 무슨 대수겠는가?"},{"id":"rogue_5_relic_legacy_68","orderId":"147","name":"러스트 블레이드 - 돌파","usage":"모든 [스페셜리스트] 오퍼레이터의 배치 코스트 -2, HP +60%","desc":"수단은 여러 가지 있지만, 결말은 결국 하나뿐이다."},{"id":"rogue_5_relic_legacy_69","orderId":"148","name":"러스트 블레이드 - 연마","usage":"모든 [스페셜리스트] 오퍼레이터의 공격 속도 +30","desc":"아무리 갈아도 끊임없는 녹슨 자국, 아무리 해도 끝이 안 보이는 일."},{"id":"rogue_5_relic_legacy_70","orderId":"149","name":"러스트 블레이드 - 보이는 고요함","usage":"모든 [스페셜리스트] 오퍼레이터의 재배치 시간 -35%","desc":"소리는 오직 그림자가 덮쳐오는 순간에만 들린다. 그 소리를 들을 자는 다음 피해자이다."},{"id":"rogue_5_relic_legacy_78","orderId":"150","name":"프로텍터 - 임시요새","usage":"[디펜더] 오퍼레이터 배치 후 20초간 공격력과 방어력 +100%, 저지 가능 수 +1","desc":"아무도 그들의 방어선을 넘을 수 없고, 들어오면 아무도 나갈 수 없다. 모든 전사에게 사명이 있다면, 그들의 사명은 전장에 들어서는 순간 전세를 뒤집는 것이다."},{"id":"rogue_5_relic_legacy_85","orderId":"151","name":"힐러 - 샘물","usage":"전장에 배치된 메딕 오퍼레이터 1명당 모든 아군 유닛의 재배치 시간 -5% (최대 8회 중첩)","desc":"그들은 흐르는 물이 모여 이뤄진 샘물이고, 많은 생명을 치유한다."},{"id":"rogue_5_relic_legacy_96","orderId":"152","name":"스트럿 - 약화","usage":"모든 [서포터] 오퍼레이터의 공격 범위 내 적군 유닛 방어력 -30%, 마법 저항 -30%","desc":"적의 방어를 약화시키는 방법은 다양하다. 위치 장치, 아츠 아머 관통, 약점 표시…… 아니면 배를 아프게 만들거나……"},{"id":"rogue_5_relic_legacy_97","orderId":"153","name":"클로 - 백전","usage":"전투 시작 후 60초 동안 모든 [뱅가드] 오퍼레이터의 공격력, 방어력 +100%","desc":"“새까맣게 나를 향해 몰려드는 적들을 보며 나는…… 저것들이 이제 다 끝장이라 생각할 뿐이었다.”"},{"id":"rogue_5_relic_legacy_98","orderId":"154","name":"클로 - 돌파","usage":"모든 [뱅가드] 오퍼레이터의 배치 코스트 -50%, HP +60%","desc":"파도에 돌을 던지면 거대한 파도를 가르며 안개가 걷혀진다."},{"id":"rogue_5_relic_legacy_99","orderId":"155","name":"프로텍터 - 돌파","usage":"모든 [디펜더] 오퍼레이터의 배치 코스트 -6, HP +40%","desc":"방패를 든 사람들이 끝없이 이어졌다. 그들은 살아있는 적에 맞서는 게 아니라, 운명과 부조리에 맞서는 것이다."},{"id":"rogue_5_relic_legacy_100","orderId":"156","name":"브로큰 스피어 - 돌파","usage":"모든 [가드] 오퍼레이터의 배치 코스트 -3, HP +40%, 물리 회피 +15%","desc":"전사가 전장에 걸어 들어가고, 전사가 무기를 꺼내 들고, 전사가 전투를 맞이한다."},{"id":"rogue_5_relic_legacy_101","orderId":"157","name":"프로텍터 - 무봉","usage":"모든 [디펜더] 오퍼레이터가 피격 시 SP 2 획득, SP 소모 -20%","desc":"그들은 공격을 받을 때마다 공격을 분노로 바꾸어 몇 배로 돌려준다."},{"id":"rogue_5_relic_legacy_102","orderId":"158","name":"브로큰 보우 - 돌파","usage":"모든 [스나이퍼] 오퍼레이터의 배치 코스트 -2, HP +60%, 방어력 +100","desc":"장전, 조준, 발사, 그리고 파멸은 어김없이 다가온다."},{"id":"rogue_5_relic_legacy_103","orderId":"159","name":"브로큰 스태프 - 돌파","usage":"모든 [캐스터] 오퍼레이터의 배치 코스트 -3, HP +60%, 마법 저항 +10","desc":"아츠가 손끝에서 춤을 추고 비바람을 불러오고 현실을 교란시켜 자신의 위대한 목적을 달성한다."},{"id":"rogue_5_relic_legacy_104","orderId":"160","name":"스트럿 - 돌파","usage":"모든 [서포터] 오퍼레이터의 배치 코스트 -2, HP +40%, 마법 회피 +15%","desc":"임무가 \\'조금\\' 남았을 때 필요한 것은 바로 그 \\'조금\\' 남은 일을 도와줄 사람이다."},{"id":"rogue_5_relic_legacy_105","orderId":"161","name":"스트럿 - 케어","usage":"모든 [서포터] 오퍼레이터의 공격 범위 내 아군 유닛 공격력 +30%","desc":"식사를 건네주거나, 길을 알려주거나, 심지어는 마음의 대화를 나누거나. 승패의 관건은 바로 이런 사소한 일에 달려 있다."},{"id":"rogue_5_relic_legacy_106","orderId":"162","name":"힐러 - 돌파","usage":"모든 [메딕] 오퍼레이터의 배치 코스트 -2, HP +60%","desc":"구원은 인류가 칭찬해야 하는 미덕이며, 이 모든 것을 가능하게 하는 버팀목이다."},{"id":"rogue_5_relic_legacy_107","orderId":"163","name":"힐러 - 고착화","usage":"모든 [메딕] 오퍼레이터가 받는 치료 및 HP 회복 효과 +20%, 공격 범위 내의 아군 유닛 저항 획득","desc":"신체를 이동도시처럼 튼튼하게 만드는 건 이상에 가까운 일이지만, 의사들은 이 발상을 실천할 준비가 되어 있다."},{"id":"rogue_5_relic_legacy_108","orderId":"164","name":"브로큰 보우 - 교차 사격","usage":"모든 [스나이퍼] 오퍼레이터의 공격력 +40%","desc":"촘촘하게 화력망을 배치하는 순간 스나이퍼 오퍼레이터들을 위험에 노출시키고, 그다음은 가늠쇠에 관한 게임이 이어진다."},{"id":"rogue_5_relic_legacy_109","orderId":"165","name":"브로큰 스태프 - 고난의 주술","usage":"모든 [캐스터] 오퍼레이터가 입히는 마법 대미지+70%","desc":"살카즈가 오리지늄을 접하게 된 기원에 대해서는 거의 고증할 길이 없다. 고대 아츠의 시작은 물질 현실과 논리 상식을 벗어난 지 오래다."}]},{"name":"현명한 수집","items":[{"id":"rogue_5_relic_legacy_11","orderId":"166","name":"고대 주물","usage":"오퍼레이터 3명 즉시 랭크 상승 (희망 소모 없음)","desc":"“하늘에는 커다란 용광로가 있고, 땅에는 금, 은, 동, 석, 철, 다섯 가지 금속이 난다”…… 다양한 일에 사용되긴 하지만 아무도 구체적인 원리를 모른다."},{"id":"rogue_5_relic_legacy_26","orderId":"167","name":"로도스 아일랜드 전술 무전","usage":"전투 후 모집권 선택 옵션 1종 추가","desc":"무전대기, 곧 지원군이 도착한다."},{"id":"rogue_5_relic_legacy_31","orderId":"168","name":"기사의 랜스 Pro","usage":"보물 상자에서 더 많은 오리지늄각뿔 획득","desc":"힘이 모자랄까 걱정하지 마라! 작은 지렛대를 이용하면 더 많이 들고 더 많이 이길 수 있다! 그 보상으로 사미 바캉스 투어가 차려질 테니!"},{"id":"rogue_5_relic_legacy_39","orderId":"169","name":"성벽의 아이","usage":"방어 포인트 주변 8칸에 배치된 오퍼레이터의 저지 가능 수 +2, 최대 HP +50%","desc":"토석의 아이는 카즈델의 성벽을 정성껏 가꾸었고, 또 그것에게 자신을 강인하게 만들어 사람들을 지킬 수 있도록 가르쳤다. 오랜 평화의 시대가 도래하면서, 그것은 수많은 조각으로 분해되어 미지의 땅으로 향하는 탐험가들에게 부적으로 주어졌다."},{"id":"rogue_5_relic_legacy_41","orderId":"170","name":"황금 술의 성배","usage":"보유한 오리지늄각뿔 5개당 아군 유닛의 공격 속도 +7","desc":"성자, 기사, 독실한 신자를 막론하고 이걸 위해 미치지 않는 사람이 없다. 세상에나, 성배조차도 순금인데!"},{"id":"rogue_5_relic_legacy_45","orderId":"171","name":"노예 포획기","usage":"모든 적군 유닛이 공중 부양, 강제 이동, 무중력 상태에서 받는 대미지 +50%, 10초간 지속","desc":"내스티의 설계를 입수한 뒤 살카즈는 즉시 이를 전쟁에 활용했다. 그들은 하늘로 날아올라 절대적인 우세로 에인션츠에게 분노를 퍼부었다. 영원히 멈추지 않는 전쟁은 이로써 새로운 국면에 접어들었다."},{"id":"rogue_5_relic_legacy_75","orderId":"172","name":"극지용 개량 팩","usage":"지원 도구 사용 시 주변 4칸에도 동시 적용","desc":"볼보트 코친스키 극한 환경 설비 테스트부 제공. 다양한 보급형 모델을 극지용으로 개조할 수 있어 추운 환경에서 더 큰 효과를 발휘할 수 있게 한다."},{"id":"rogue_5_relic_legacy_139","orderId":"173","name":"북풍의 창조물","usage":"[요괴] 적이 최초로 대미지를 입힐 경우, 자신은 즉시 5초간 공포 효과 획득","desc":"자주 실패로 끝난다 해도, 그녀는 비참한 운명에 도전하는 사람들을 기꺼이 돕길 원한다."},{"id":"rogue_5_relic_legacy_150","orderId":"174","name":"캔낫의 표식","usage":"해당 소장품을 소지하고 전투 클리어 시, 보유한 오리지늄각뿔의 60%가 \\'미래를 위한 투자\\' 시스템의 예치금 잔액에 저장 (1회 탐험당 최대 60)","desc":"캔낫의 체면을 세워주는 사람도 있고, 캔낫이 \\'체면\\'을 세워줄 만한 사람도 있다."},{"id":"rogue_5_relic_fight_2","orderId":"175","name":"《권경삼문》","usage":"오퍼레이터가 스킬을 발동할 때마다 자신의 공격력 +5% (최대 40회 중첩)","desc":"숴의 권법에 대한 생각을 최초로 기록한 노트. 첫째는 초식을, 둘째는 의미를, 셋째는 경지를 묻는다. 그러나 말이 너무 난해하여 학생들이 이해하지 못했고, 이후 그는 여동생에게 부탁해 다시 고쳤다고 한다."},{"id":"rogue_5_relic_fight_9","orderId":"176","name":"단석묵보","usage":"전투 시작 후, 해당 전투에서만 사용 가능한 랜덤 전술 도구 1개 획득","desc":"린수가 그림 속에서 헤엄치며 내뿜는 거품은 기묘한 효과를 불러온다. 사람들이 멋대로 건드려도 그림의 주인은 개의치 않는다. 어차피 얼마 지나지 않아 거품은 바람에 흩어져 사라질 테니까."},{"id":"rogue_5_relic_fight_10","orderId":"177","name":"창물방 장부","usage":"전술 도구, 소환물, 장치의 배치 코스트 -10","desc":"류아가 당신에게 새 발명품의 \\'체험\\'을 권했지만, 당신은 주머니 사정이 넉넉지 않다며 거절했고, 이에 그녀는 장부에 몇 줄을 쓱쓱 그어버렸다. 이제, 그 핑계는 더 이상 통하지 않는다."},{"id":"rogue_5_relic_fight_15","orderId":"178","name":"수행용 뇌침","usage":"오퍼레이터가 스킬을 발동할 때마다 자신의 SP 자연 회복 속도 +0.4/초, 최대 5회 중첩","desc":"천사부 산꼭대기에 있는 뇌법 수련처에서, 뇌법 학도들이 처음 벼락을 유도하는 법을 익힐 때 사용하는 뇌침이다. 천사부에서는 \\'선배\\'라고 불리기도 한다."},{"id":"rogue_5_relic_fight_18","orderId":"179","name":"부지깽이","usage":"오퍼레이터가 [요괴]에게 대미지를 입힐 시, 추가로 공격력의 50%에 해당하는 마법 대미지를 입힘","desc":"어느 노천사가 이것으로 마물을 물리치고 베헤모스를 제압했다고 한다. 그러나 대부분 때에는 그저 부엌 한쪽에 방치되어 있고, 아궁이에 장작을 넣고 헤집을 때만 집어 든다."},{"id":"rogue_5_relic_explore_1","orderId":"180","name":"인화수쟁","usage":"쉐이의 잔식에 진입할 때마다 촛불 +1","desc":"베헤모스의 모습을 고안하여 만든 연. 띠에 불을 붙이면 꺼지지도 않고, 연을 태우지도 않는다. 쉐이의 잔식에서 이 불빛으로 더 멀리 나아갈 수 있다 한다."},{"id":"rogue_5_relic_explore_2","orderId":"181","name":"\\'화복상의\\'","usage":"주화 상자에 모험 주화가 1개 추가될 때마다 티켓 +1","desc":"계원에서 반쪽짜리 시를 마주치면, 즉시 이 복숭아나무 장식으로 진압할 것. 작은 화는 피할 수 없으나, 화는 복이 되기도 한다. 절대 시로 화답하지 말 것!"},{"id":"rogue_5_relic_explore_3","orderId":"182","name":"가정식 요리","usage":"모든 오퍼레이터의 HP +20%, 공격력 +20%, 쉐이의 잔식에서 전투를 완료할 때마다 추가로 +10%","desc":"하늘은 덮개이고, 땅은 냄비이며, 희로애락은 양념이다. 인간은 밥만 잘 먹어도 살아갈 수 있다."},{"id":"rogue_5_relic_explore_4","orderId":"183","name":"로도스 아일랜드 응급차","usage":"희망 +2, 쉐이의 잔식에서 전투 시 랜덤 1명 로도스 아일랜드 정예 오퍼레이터의 지원을 받음","desc":"당신의 명령이 어디를 가리키든…… 정예 오퍼레이터, 반드시 달려간다!"},{"id":"rogue_5_relic_explore_5","orderId":"184","name":"나무덩어리","usage":"다음 쉐이의 잔식에서 촛불 +2, 쉐이의 잔식 중 모든 \\'회수\\' 및 \\'전설\\' 노드 완료 시 티켓 +10","desc":"평범해 보이는 창물. 류아 말로는 동해 바닷가에서 얻은 귀중한 물건이라 한다. 하지만 온화한 나뭇결과 정신을 맑게 하는 은은한 향 말고는, 딱히 특별한 점이 없어 보인다……"},{"id":"rogue_5_relic_explore_6","orderId":"185","name":"버든 택시","usage":"편성에 [사촉인]이 1명 있을 때마다 모든 [사촉인]의 공격 속도 +5 (최대 10회 중첩)","desc":"염국의 치도가 처음 개통됐을 당시, 선풍적인 인기를 끌었던 운송 수단. 하지만 치도의 보급과 더 빠른 운송 수단의 등장으로 버든 택시는 점차 사라졌다. 그와 함께, 언제든지 떨어져 나갈 수 있는 아찔한 승차 경험도 점차 잊혀지고 있다."},{"id":"rogue_5_relic_richg_1","orderId":"186","name":"밥 사장의 증표","usage":"보유한 오리지늄각뿔 3개당 초기 배치 코스트 +1","desc":"“밥 사장이 지켜보고 있다.”"},{"id":"rogue_5_relic_richg_2","orderId":"187","name":"원목 바퀴","usage":"초기 배치 코스트 +5, 편성에 [뱅가드] 오퍼레이터가 1명 있을 때마다 추가로 +10","desc":"산에서 굴러떨어진 둥근 바위가 재앙이 만들어낸 오리지늄 결정 군집을 부수었고, 그 모습은 사람들에게 빠른 이동에 대한 영감도 떠올리게 했다."},{"id":"rogue_5_relic_richg_3","orderId":"188","name":"가마","usage":"최대 배치 코스트 +15, [뱅가드] 오퍼레이터의 공격력 +25%, 배치 후 차감된 배치 코스트 반환","desc":"의자 하나와 장대 두 개가 사람을 위아래, 높고 낮음으로 나누었다. 이제 가마는 대부분 박물관에 들어갔지만, 남에게 높이 떠받들려 군림하길 바라는 이들은 여전히 남아있다."},{"id":"rogue_5_relic_blockg_5","orderId":"189","name":"명적통","usage":"오퍼레이터의 HP가 30% 감소할 경우, 공격 범위 내 모든 적에게 10초간 공포 효과 부여","desc":"신호 전달이나 경보에 쓰이는 부는 화살통. 피가 묻기라도 하면, 명적의 울부짖는 소리가 귀청이 터질 듯 요란하고 처절하여, 듣는 이로 하여금 본능적으로 도망치게 한다."},{"id":"rogue_5_relic_speg_2","orderId":"190","name":"셸비스트 석상","usage":"모험 주화가 3개 나올 경우, 즉시 최대 목표 HP +3, 실드 +3","desc":"연못에 셸비스트 석상이 있는데, 아무리 동전을 던져도 반응이 없었다. 한 개구쟁이 아이가 쓰레기를 던지자, 석상은 그걸 삼켰고, 아이는 엉엉 울음을 터뜨렸다. 이후 석상이 다시 입을 벌려 예쁜 구슬을 토해내자, 아이는 기뻐 어쩔 줄 몰라 했다."},{"id":"rogue_5_relic_speg_3","orderId":"191","name":"길운유삼","usage":"꽃잎 주화가 3개 나올 경우, 즉시 오리지늄각뿔 +8, 희망 +1","desc":"아침엔 파울비스트 울음소리를 들으니 하늘은 그림 같고, 봄엔 계수꽃 향기를 맡으니 구름이 파도처럼 굽이치며, 겨울엔 남풍이 일면 서리가 꽃처럼 피어난다."},{"id":"rogue_5_relic_speg_4","orderId":"192","name":"양산하","usage":"주화 상자에 있는 꽃잎 주화 1개당 모든 오퍼레이터의 공격력 +10%, HP +20%","desc":"나쁜 술과 좋은 술을 각각 한 표주박씩 떠서, 흘러내리는 폭포처럼 호리병 속에 담는다. 호리병 속에서는 자기만의 세상이 돌아가니, 해를 넘겨 다시 맛보면 그 맛이 사뭇 달라져 있다."},{"id":"rogue_5_relic_speg_5","orderId":"193","name":"옛 봉화의 유산","usage":"모험 주화가 1회 나올 때마다 전투 획득 지휘 경험치 +15%","desc":"번개와 폭우가 몰아치고, 전투의 함성이 하늘을 찌른다. 금빛 창과 철기가 꿈을 밟으며 다가온다."},{"id":"rogue_5_relic_speg_6","orderId":"194","name":"금속전고","usage":"주화 던지기를 할 때마다 모든 오퍼레이터의 공격력 +15%(최대 10회 중첩), 모험 주화만 나올 경우 추가로 1회 중첩","desc":"군부대의 \\'노장\\'. 과거 전쟁에서 신호를 알리며 풍상을 겪고 승패를 지켜보았으나, 지금은 더 선진적인 전령 수단에 자리를 내주었다. 하지만 출정하기 전에는 여전히 전고가 울려 퍼져 병사들의 사기를 북돋는다."},{"id":"rogue_5_relic_custog_1","orderId":"195","name":"\\'균형 수확\\'","usage":"모든 [가드] 오퍼레이터의 HP +35%, 공격력 +35%","desc":"부절 두 쪽이 서로 맞으니, 옛사람들과 얽힌 지난 일은 얼마나 되겠는가?"},{"id":"rogue_5_relic_custog_2","orderId":"196","name":"\\'꽃잎 수확\\'","usage":"모든 [가드] 오퍼레이터의 배치 코스트 +3, 저지 가능 수 +1, 방어력 +50%","desc":"부절 두 쪽이 서로 맞으니, 옛사람들과 얽힌 지난 일은 얼마나 되겠는가?"},{"id":"rogue_5_relic_custog_3","orderId":"197","name":"\\'모험 수확\\'","usage":"모든 [가드] 오퍼레이터가 배치 후 초당 최대 HP의 5%씩 회복, 20초간 지속","desc":"부절 두 쪽이 서로 맞으니, 옛사람들과 얽힌 지난 일은 얼마나 되겠는가?"},{"id":"rogue_5_relic_custog_4","orderId":"198","name":"\\'균형 투척\\'","usage":"모든 [원거리] 오퍼레이터의 HP +25%, 공격력 +25%","desc":"부절 두 쪽이 서로 맞으니, 옛사람들과 얽힌 지난 일은 얼마나 되겠는가?"},{"id":"rogue_5_relic_custog_5","orderId":"199","name":"\\'꽃잎 투척\\'","usage":"모든 [원거리] 오퍼레이터의 배치 코스트 +2, 배치 시 실드 2회 획득","desc":"부절 두 쪽이 서로 맞으니, 옛사람들과 얽힌 지난 일은 얼마나 되겠는가?"},{"id":"rogue_5_relic_custog_6","orderId":"200","name":"\\'모험 투척\\'","usage":"모든 [원거리] 오퍼레이터가 저항 획득, 마법 회피 +15%","desc":"부절 두 쪽이 서로 맞으니, 옛사람들과 얽힌 지난 일은 얼마나 되겠는가?"},{"id":"rogue_5_relic_custog_7","orderId":"201","name":"\\'균형 목도\\'","usage":"적이 강제 이동 상태에서 방어력, 마법 저항 -30%, 10초간 지속","desc":"부절 두 쪽이 서로 맞으니, 옛사람들과 얽힌 지난 일은 얼마나 되겠는가?"},{"id":"rogue_5_relic_custog_8","orderId":"202","name":"\\'꽃잎 목도\\'","usage":"오퍼레이터가 스킬을 발동할 때마다 최대 HP 10%의 보호막 획득, 10초간 지속 (중첩 불가)","desc":"부절 두 쪽이 서로 맞으니, 옛사람들과 얽힌 지난 일은 얼마나 되겠는가?"},{"id":"rogue_5_relic_custog_9","orderId":"203","name":"\\'모험 목도\\'","usage":"오퍼레이터가 [요괴] 적에게 입히는 물리 및 마법 대미지 +50%","desc":"부절 두 쪽이 서로 맞으니, 옛사람들과 얽힌 지난 일은 얼마나 되겠는가?"},{"id":"rogue_5_relic_custog_10","orderId":"204","name":"\\'쉐이 균형\\'","usage":"[사촉인]의 공격력 +50%, 방어력 +50%","desc":"부절 두 쪽이 서로 맞으니, 옛사람들과 얽힌 지난 일은 얼마나 되겠는가?"},{"id":"rogue_5_relic_custog_11","orderId":"205","name":"\\'쉐이 꽃잎\\'","usage":"모든 오퍼레이터의 배치 코스트 +3, 편성에 [사촉인]이 1명 있을 때마다 모든 [사촉인]의 HP, 공격력, 방어력 +10%","desc":"부절 두 쪽이 서로 맞으니, 옛사람들과 얽힌 지난 일은 얼마나 되겠는가?"},{"id":"rogue_5_relic_custog_12","orderId":"206","name":"\\'쉐이 모험\\'","usage":"[사촉인]은 배치 후 10초간 공격력 +100%, 오퍼레이터가 작전을 통해 [사촉인]이 될 때마다 지속 시간 +5초 (최대 15회)","desc":"부절 두 쪽이 서로 맞으니, 옛사람들과 얽힌 지난 일은 얼마나 되겠는가?"}]},{"name":"전술 도구","items":[{"id":"rogue_5_active_tool_1","orderId":"207","name":"지원 - 보급기","usage":"전투 시 휴대용 보급기 1개 사용 가능","desc":"외근 오퍼레이터에게 긴급 제공되는 휴대용 보급기"},{"id":"rogue_5_active_tool_2","orderId":"208","name":"지원 - 지뢰세트","usage":"전투 시 방해지뢰 3개 사용 가능","desc":"외근 오퍼레이터에게 긴급 제공되는 방해지뢰"},{"id":"rogue_5_active_tool_3","orderId":"209","name":"지원 - 럼블","usage":"전투 시 미스터 럼블 2개 사용 가능","desc":"외근 오퍼레이터에게 긴급 제공되는 미스터 럼블"},{"id":"rogue_5_active_tool_4","orderId":"210","name":"지원 - 크레인","usage":"전투 시 스노우상트의 안전한 크레인 2개 사용 가능","desc":"외근 오퍼레이터에게 긴급 제공되는 스노우상트의 안전한 크레인"},{"id":"rogue_5_active_tool_5","orderId":"211","name":"지원 - 진압장치","usage":"전투 시 진압장치 2개 사용 가능","desc":"외근 오퍼레이터에게 긴급 제공되는 휴대용 진압장치"},{"id":"rogue_5_active_tool_6","orderId":"212","name":"지원 - 포그머신","usage":"전투 시 고장 난 포그머신 1개 사용 가능","desc":"외근 오퍼레이터에게 긴급 제공되는 고장 난 무대용 포그머신"}]},{"name":"스토리 텔러","items":[{"id":"rogue_5_relic_final_3","orderId":"213","name":"은접묵","usage":"해당 소장품 보유 시 전투 중에 \\'쉐이의 몸\\'의 공격을 받음","desc":"류아가 연구 중인 창물. 숴의 무공 비급을 바탕으로 쉐이 능묘의 돌을 연마해 만들었다. 원래는 쉐이의 모습으로 만들려고 했으나, 쉐이의 모습이 흩어져 나비 모양으로 바꾸었다. 그러나 나비는 쉐이의 위협을 두려워하여, 반드시 쉐이를 몰아내고 나비를 지켜야 한다."},{"id":"rogue_5_relic_final_4","orderId":"214","name":"묵화잔비","usage":"전투 시작 후 랜덤 오퍼레이터 1명을 지정해 배치 코스트를 0으로 변경, 해당 소장품 보유 시 운명의 암시에서 탐험 결말이 변경","desc":"나비가 먹 끝에 있으며, \\'글자\\'가 겹겹이 쌓여 드러났다. 사라진 부분은 이제 알 수 없으나, 글자의 모양으로 미루어보아 이는 가족에 대한 그리움을 담은 글 같다."},{"id":"rogue_5_relic_final_1","orderId":"215","name":"흑과 백","usage":"오퍼레이터가 배치 후 60초간 초당 최대 HP의 2%씩 감소, 탐험 결말이 변경","desc":"인간에게는 옳고 그름이 있고, 바둑에는 흑과 백이 있다. 그러나 쉐이는 그 분명함의 여부를 신경 쓰지 않는다. 설령 교묘하게 세상을 바꾼다 하더라도, 쉐이의 마음에 들어야 그의 능묘에 들어갈 수 있다."},{"id":"rogue_5_relic_final_2","orderId":"216","name":"망생진롱","usage":"오퍼레이터가 배치 후 SP -50%, 해당 소장품 보유 시 길라잡이에 특별한 전투 생성","desc":"한 네모난 목판이 있는데, 정면은 바둑판이고 뒷면은 활자판으로, 서로 기대어 마치 빈틈이 없는 것처럼 보인다. 그러나 활자판에는 \\'시에\\'라는 글자가 돌출되어, 글을 찍을 수도 없고, 그걸 눌러 내려가게 할 수도 없다."}]},{"name":"테라의 비밀","items":[{"id":"rogue_5_relic_legacy_19","orderId":"217","name":"\\'문명의 존속\\'","usage":"모든 적군 유닛의 피격 트루 대미지 +150%","desc":"검은색 작은 왕관."},{"id":"rogue_5_relic_richg_4","orderId":"218","name":"전차","usage":"최대 배치 코스트 +30, 배치 코스트가 99 이상 달성 시 아군 유닛의 HP +50%, 저지 가능 수 +1","desc":"하나의 상자, 두 개의 바퀴, 짐승 네 마리가 끌고 달린다. 그 속도는 당연히 두 다리보다 빠를…… 까? 카간의 나이츠모라 정병들을 보라. 네 마리의 짐승, 열여섯 개의 다리가 달려도, 테라의 변화 속도를 따라가지 못한다."},{"id":"rogue_5_relic_richg_5","orderId":"219","name":"누각","usage":"최대 배치 코스트 +15, 배치 코스트가 99 이상 달성 시 방어 포인트 주위 12칸 범위에서 적의 은신 효과 상실, 명중률 -35%","desc":"버든비스트 위에 있는 사람들이 건장한 용사들의 호위를 받으며, 재앙이 없는 정토로 향하고 있다. 이것이 최초의 \\'이동도시\\'이다."},{"id":"rogue_5_relic_richg_6","orderId":"220","name":"\\'미니 백조\\'","usage":"오퍼레이터를 배치할 때마다 모든 적에게 배치 코스트의 일정 비례에 해당하는 트루 대미지를 입힘, 만약 배치 코스트가 30 이상일 경우 추가로 5초간 기절시킴","desc":"전쟁, 오리지늄, 피와 눈물의 결정."},{"id":"rogue_5_relic_richg_7","orderId":"221","name":"\\'창동\\'","usage":"배치 코스트가 99 이상 달성 시 10초마다 모든 적에게 3000 마법 대미지를 입히고 2초간 기절시킴","desc":"린 칭옌의 패검, 뽑을 때 울리지 않고, 숨기기 쉬우며 꾸밈이 없다. 만약 하늘의 번개를 두른다면, 바람을 가르고 불을 스치며 순식간에 이를 것이다."},{"id":"rogue_5_relic_legacy_86","orderId":"222","name":"\\'시간의 끝\\'","usage":"1회에 한해, 리더 전투 또는 최종 전투가 아닌 작전에서 실패할 경우, 탐험을 끝내지 않고 목표 HP +1 상태로 계속 탐험 가능","desc":"새로운 순환이 시작되지 않은 한 아직 잘못을 만회할 기회가 있다."},{"id":"rogue_5_relic_legacy_87","orderId":"223","name":"치엔창 꾸러미","usage":"전투 시작 후 모든 오퍼레이터의 배치 코스트가 랜덤으로 변경","desc":"여덟 개가 한 몸이 되어 창괴로 변해도 각자 생각이 다르다. 그들을 꿰어놓은 실을 잡아도 가만히 있지 않는다."},{"id":"rogue_5_relic_cardg_1","orderId":"224","name":"사방회료","usage":"전투당 1회에 한하여, 오퍼레이터를 4명 배치한 경우, 다음에 배치하는 오퍼레이터의 HP +50%, 방어력 +50%, 저지 가능 수 +5","desc":"시가 직접 조제한 세상에 드문 염료, 동시에 그녀의 신표이기도 하다. 네 가지 색만으로도 경치를 만들어 낸다."},{"id":"rogue_5_relic_cardg_2","orderId":"225","name":"사시단청호","usage":"전투당 1회에 한하여, 오퍼레이터를 4명 배치한 경우, 다음에 배치하는 오퍼레이터가 저항 획득, 공격력 +50%, 피격 원소 손상 -50%","desc":"시가 직접 제작한 세상에 드문 붓, 동시에 그녀의 신표이기도 하다. 그림을 그리면 사계절이 변함이 없다."},{"id":"rogue_5_relic_cardg_3","orderId":"226","name":"장수 인형","usage":"배치 구역의 가장 오른쪽 오퍼레이터를 배치할 때마다, 전장에 배치된 모든 오퍼레이터가 배치 코스트 일정 비례에 해당하는 보호막 획득","desc":"변방의 성을 지킨 한 장수를 기리기 위해 만든 그림자극 인형. 전해지기로 그 장수가 몇몇 병사들만 데리고 성을 백 일 동안이나 사수했으며, 성이 함락됐을 때 성루에 선 채로 황사에 묻혀 사라졌다고 한다. 옥문이 완공된 후, 그를 기리는 추모 동상도 세워졌다."},{"id":"rogue_5_relic_cardg_4","orderId":"227","name":"장인 인형","usage":"배치 구역의 가장 왼쪽 오퍼레이터를 배치할 때마다, 전장에 배치된 모든 오퍼레이터가 배치 코스트 100%에 해당하는 SP 획득","desc":"한 뛰어난 장인을 기리기 위해 만든 그림자극 인형. 그는 평생 기술의 극치를 추구했다. 악인들은 그의 기술을 탐냈으나, 그는 금전에 현혹되지도, 육신의 고통에 흔들리지도 않았다. 그는 도적의 소굴에서 생을 마쳤고, 그의 저작 또한 불길 속에서 사라져 후세에 전해지지 못했다."},{"id":"rogue_5_relic_cardg_5","orderId":"228","name":"무용수 인형","usage":"전투 시작 후, 배치 구역의 가장 왼쪽 오퍼레이터의 초기 SP +10, 공격 속도 +30, 공격력 +30%","desc":"전설적인 무용수를 기리기 위해 만든 그림자극 인형. 전해지기로 그가 강에서 춤추면 거대한 파도가 일었고, 그가 숲에서 춤추면 봄이 찾아온다고 한다. 그는 평생을 춤췄지만, 노년에 부상을 입고 세상을 떠났다. 수많은 후배들이 그의 춤은 따라 할 수 있지만, 그 경지는 따라 할 수 없다며 한탄한다."},{"id":"rogue_5_relic_cardg_6","orderId":"229","name":"상인 인형","usage":"전투 시작 후, 배치 구역의 가장 오른쪽 오퍼레이터의 저지 가능 수 +2, 방어력 +50%, 최대 HP +50%, 배치 후 차감된 배치 코스트의 50% 반환","desc":"재산이 많고 장사에 능한 한 상인을 기리기 위해 만든 그림자극 인형. 그는 한때 민간 수송대를 조직해, 재앙 다발 지역을 누비며 도시와 농촌에 물자의 결핍을 덜어주었다. 그러나 도시 간 치도가 완공되었을 때, 그는 뜻밖의 사고로 세상을 떠났다고 한다."},{"id":"rogue_5_relic_res_1","orderId":"230","name":"임연부","usage":"계원에서 매 구역의 첫 번째 전투에 진입할 때마다 추가로 랜덤 모집권 1개 획득, 모집권 최대 저장 수량 +1","desc":"당신에 대한 믿음으로, 사세대는 더 많은 오퍼레이터를 동반하여 계원에 들어가려는 당신의 신청을 승인했다. 다만, 냇가의 린수가 강에 들어갈 때 신중하고 또 신중해야 한다는 도리를 새로 온 이들도 이해하길 그들은 바라고 있다."},{"id":"rogue_5_relic_res_2","orderId":"231","name":"삼족금추","usage":"획득 시 보유한 오리지늄각뿔, 희망, 실드 중 랜덤 1개 자원이 2배로 증가","desc":"기이한 발을 지닌 상서로운 영물. 세 개의 발이 각각 성쇠, 생사, 흥망에 해당한다고 전해지며, 어느 발이 먼저 사람에게 내려앉느냐에 따라 그 사람은 그 방면에서 영원한 복을 누린다고 한다. 사세대의 연구에 따르면, 이 생물의 외형과 습성은 파울비스트와 유사하지만, 아마도……"},{"id":"rogue_5_relic_raidian_1","orderId":"232","name":"라이디언의 게임기","usage":"전장에 배치된 소환물 1개당 모든 [소환물]의 공격력 +100%, 방어력 +100 (최대 10회 중첩)","desc":"수많은 작은 게임들이 설치되어 있는 게임기. 게임 속 주인공에게는 라이디언이 다루는 기계의 모습이 자주 보이지만, 정작 라이디언의 모습은 보이지 않는다."},{"id":"rogue_5_relic_speg_1","orderId":"233","name":"계심청령","usage":"오퍼레이터가 작전을 통해 [사촉인]이 될 때마다 모든 [사촉인]의 공격력 +40%, 배치 후 배치 코스트 +4, 재배치 시간 -4% (최대 4회 중첩)","desc":"신임 지촉인은 취임식을 마친 뒤 선배들을 찾아뵙는다. 사무실에는 매듭으로 엮은 종이 걸려 있는데, 그 고리와 색이 모두 제각각이다. 청아한 종소리를 들은 후, 신임 지촉인은 맞물린 매듭에 새 고리 하나를 더 엮는다."}]}]}};

const IS_COLORS = {is2:'#4a9eff',is4:'#e8864a',is5:'#3ec8c8',is6:'#c89b4a'};
const IS_LABELS = {is2:'IS:2',is4:'IS:4',is5:'IS:5',is6:'IS:6'};

let currentIS = 'is2';
let currentCat = 0;
let searchQ = '';

function setAccent(is) {
  document.documentElement.style.setProperty('--accent', IS_COLORS[is]);
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function matchSearch(item) {
  if (!searchQ) return true;
  const q = searchQ.toLowerCase();
  return (item.name||'').toLowerCase().includes(q)
      || (item.usage||'').toLowerCase().includes(q)
      || (item.desc||'').toLowerCase().includes(q);
}

function renderTabs() {
  const tabHtml = Object.entries(IS_LABELS).map(([k,label]) => {
    const title = DATA[k].meta.title;
    const active = k === currentIS ? ' active' : '';
    return `<button class="is-tab${active}" data-is="${k}" onclick="switchIS('${k}')">
      ${label}<span class="tab-sub">${title}</span>
    </button>`;
  }).join('');
  document.getElementById('is-tabs-top').innerHTML = tabHtml;
  document.getElementById('is-tabs-bottom').innerHTML = tabHtml;
}

function renderSidebar() {
  const cats = DATA[currentIS].categories;
  let html = '';
  cats.forEach((cat, i) => {
    const matchCount = searchQ ? cat.items.filter(matchSearch).length : cat.items.length;
    if (searchQ && matchCount === 0) return;
    const active = i === currentCat ? ' active' : '';
    html += `<div class="sidebar-cat${active}" onclick="selectCat(${i})">${esc(cat.name)}<span class="cat-count">${matchCount}</span></div>`;
  });
  document.getElementById('sidebar').innerHTML = html;
}

function renderMobileCatBar() {
  const cats = DATA[currentIS].categories;
  let html = '';
  cats.forEach((cat, i) => {
    const matchCount = searchQ ? cat.items.filter(matchSearch).length : cat.items.length;
    if (searchQ && matchCount === 0) return;
    const active = i === currentCat ? ' active' : '';
    html += `<span class="mobile-cat-pill${active}" onclick="selectCat(${i})">${esc(cat.name)}<span class="pill-count">${matchCount}</span></span>`;
  });
  const bar = document.getElementById('mobile-cat-bar');
  bar.innerHTML = html;
  // scroll active pill into view
  const activePill = bar.querySelector('.active');
  if (activePill) activePill.scrollIntoView({inline:'center',block:'nearest'});
}

function renderMain() {
  const cats = DATA[currentIS].categories;
  const cat = cats[currentCat] || cats[0];
  if (!cat) { document.getElementById('main').innerHTML = '<div class="no-results">카테고리가 없습니다.</div>'; return; }

  let items = cat.items.filter(matchSearch);
  const title = DATA[currentIS].meta.title;

  if (items.length === 0) {
    document.getElementById('main').innerHTML = `<div class="cat-header"><h2>${esc(cat.name)}</h2></div><div class="no-results">검색 결과가 없습니다.</div>`;
    return;
  }

  let cardsHtml = items.map(item => {
    const isNew = item.new === true;
    const orderId = item.orderId || item.id || '';
    return `<div class="card">
      <div class="card-top">
        <div class="item-name">${esc(item.name||'')}${isNew ? '<span class="new-badge">NEW</span>' : ''}</div>
        <div class="item-id">#${esc(orderId)}</div>
      </div>
      <div class="item-usage">${esc(item.usage||'')}</div>
      <div class="item-desc">${esc(item.desc||'')}</div>
    </div>`;
  }).join('');

  document.getElementById('main').innerHTML = `
    <div class="cat-header">
      <h2>${esc(cat.name)} <span class="count-badge">${items.length}개</span></h2>
      <div class="cat-sub">${esc(title)}</div>
    </div>
    <div class="grid">${cardsHtml}</div>
  `;
}

function switchIS(is) {
  currentIS = is;
  currentCat = 0;
  setAccent(is);
  renderTabs();
  renderSidebar();
  renderMobileCatBar();
  renderMain();
  document.getElementById('main').scrollTop = 0;
}

function selectCat(idx) {
  currentCat = idx;
  renderSidebar();
  renderMobileCatBar();
  renderMain();
  document.getElementById('main').scrollTop = 0;
}

function handleSearch(q) {
  searchQ = q;
  if (q) {
    const cats = DATA[currentIS].categories;
    const first = cats.findIndex(c => c.items.some(matchSearch));
    if (first !== -1 && first !== currentCat) currentCat = first;
  }
  renderSidebar();
  renderMobileCatBar();
  renderMain();
}

document.getElementById('search-desktop').addEventListener('input', function() { handleSearch(this.value.trim()); });
document.getElementById('search-mobile').addEventListener('input', function() {
  document.getElementById('search-desktop').value = this.value;
  handleSearch(this.value.trim());
});

setAccent(currentIS);
renderTabs();
renderSidebar();
renderMobileCatBar();
renderMain();
</script>
</body>
</html>
