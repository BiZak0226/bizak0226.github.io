<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>Operator Memory Archive</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link
  href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@500;700&family=Share+Tech+Mono&display=swap"
  rel="stylesheet"
>

<style>

:root{
  --bg:#0d1018;
  --surface:#151925;
  --surface2:#1b2130;

  --border:#2b3247;
  --border2:#3b4767;

  --text:#edf1ff;
  --text-dim:#9ca7c7;
  --text-fade:#5f6886;

  --accent:#5d93ff;

  --sidebar-width:300px;
}

/* ───────────────── RESET ───────────────── */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  background:var(--bg);
  color:var(--text);

  font-family:'Noto Sans KR', sans-serif;

  min-height:100vh;

  overflow-x:hidden;
}

/* ───────────────── BG GRID ───────────────── */

body::before{
  content:'';

  position:fixed;
  inset:0;

  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);

  background-size:40px 40px;

  pointer-events:none;

  touch-action:none;

  z-index:0;
}

/* ───────────────── HEADER ───────────────── */

.header{
  position:sticky;
  top:0;

  z-index:120;

  height:64px;

  display:flex;
  align-items:center;
  gap:14px;

  padding:0 18px;

  background:rgba(12,15,24,0.9);

  backdrop-filter:blur(10px);

  border-bottom:1px solid var(--border);
}

.menu-button{
  width:42px;
  height:42px;

  border:none;
  outline:none;

  border-radius:12px;

  background:rgba(255,255,255,0.05);

  color:white;

  font-size:20px;

  cursor:pointer;

  position:relative;
  z-index:200;
}

.title-area{
  display:flex;
  flex-direction:column;
}

.title-eyebrow{
  font-size:10px;

  letter-spacing:2px;

  color:var(--text-fade);

  text-transform:uppercase;

  font-family:'Share Tech Mono', monospace;
}

.title-main{
  font-size:18px;
  font-weight:700;

  font-family:'Noto Serif KR', serif;
}

/* ───────────────── SIDEBAR ───────────────── */

.sidebar{
  position:fixed;

  left:-320px;
  top:0;

  width:var(--sidebar-width);
  height:100vh;

  background:#121722;

  border-right:1px solid var(--border);

  z-index:150;

  transition:left 0.25s ease;

  display:flex;
  flex-direction:column;
}

.sidebar.open{
  left:0;
}

.sidebar-header{
  height:64px;

  display:flex;
  align-items:center;

  padding:0 20px;

  border-bottom:1px solid var(--border);
}

.sidebar-title{
  font-size:14px;

  letter-spacing:2px;

  color:var(--accent);

  font-family:'Share Tech Mono', monospace;
}

.search-wrap{
  padding:16px;
  border-bottom:1px solid var(--border);
}

.search-input{
  width:100%;

  padding:12px 14px;

  border-radius:12px;

  border:1px solid var(--border2);

  background:#0d1119;

  color:white;

  outline:none;
}

.file-list{
  flex:1;

  overflow-y:auto;

  list-style:none;

  padding:10px;
}

.file-item{
  margin-bottom:6px;
}

.file-button{
  width:100%;

  display:flex;
  align-items:center;
  gap:10px;

  padding:12px;

  border:none;

  border-radius:12px;

  background:transparent;

  color:var(--text-dim);

  text-align:left;

  cursor:pointer;

  transition:0.15s;
}

.file-button:active{
  transform:scale(0.98);
}

.file-button:hover{
  background:rgba(255,255,255,0.04);

  color:var(--text);
}

.file-icon{
  opacity:0.6;
}

.file-name{
  flex:1;

  font-size:13px;

  line-height:1.5;
}

/* ───────────────── OVERLAY ───────────────── */

.overlay{
  position:fixed;
  inset:0;

  background:rgba(0,0,0,0.45);

  opacity:0;
  pointer-events:none;

  transition:0.2s;

  z-index:140;
}

.overlay.show{
  opacity:1;
  pointer-events:auto;
}

/* ───────────────── MAIN ───────────────── */

.main{
  position:relative;
  z-index:1;

  width:100%;

  display:flex;
  justify-content:center;

  padding:28px 14px 120px;
}

.reader{
  width:100%;
  max-width:860px;
}

/* ───────────────── INTRO ───────────────── */

.intro{
  margin-bottom:28px;
}

.intro-eyebrow{
  font-size:11px;

  letter-spacing:2px;

  color:var(--text-fade);

  text-transform:uppercase;

  font-family:'Share Tech Mono', monospace;

  margin-bottom:8px;
}

.intro-title{
  font-size:30px;
  font-weight:700;

  font-family:'Noto Serif KR', serif;

  margin-bottom:10px;
}

.intro-desc{
  color:var(--text-dim);

  line-height:1.8;

  font-size:14px;
}

/* ───────────────── STORY ───────────────── */

.story-area{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.dialogue{
  background:var(--surface);

  border:1px solid var(--border);

  border-radius:18px;

  padding:18px;
}

.dialogue-name{
  font-size:12px;

  color:var(--accent);

  letter-spacing:1px;

  margin-bottom:10px;

  font-family:'Share Tech Mono', monospace;
}

.dialogue-text{
  line-height:2;

  font-size:15px;

  word-break:keep-all;
}

.narration{
  padding:4px 8px;

  color:var(--text-dim);

  line-height:2;

  font-size:15px;
}

/* ───────────────── MOBILE ───────────────── */

@media(max-width:768px){

  .header{
    padding:0 14px;
  }

  .intro-title{
    font-size:24px;
  }

  .dialogue{
    padding:16px;
    border-radius:16px;
  }

  .dialogue-text{
    font-size:14px;
  }

  .narration{
    font-size:14px;
  }

}

</style>
</head>

<body>

<!-- ───────────────── HEADER ───────────────── -->

<header class="header">

  <button
    class="menu-button"
    id="menuButton"
    aria-label="menu"
  >
    ☰
  </button>

  <div class="title-area">
    <div class="title-eyebrow">
      Arknights Archive
    </div>

    <div class="title-main">
      Operator Memory
    </div>
  </div>

</header>

<!-- ───────────────── SIDEBAR ───────────────── -->

<aside
  class="sidebar"
  id="sidebar"
>

  <div class="sidebar-header">
    <div class="sidebar-title">
      MEMORY FILES
    </div>
  </div>

  <div class="search-wrap">

    <input
      type="text"
      class="search-input"
      id="searchInput"
      placeholder="파일 검색..."
    >

  </div>

  <ul
    class="file-list"
    id="fileList"
  ></ul>

</aside>

<!-- ───────────────── OVERLAY ───────────────── -->

<div
  class="overlay"
  id="overlay"
></div>

<!-- ───────────────── MAIN ───────────────── -->

<main class="main">

  <div class="reader">

    <section class="intro">

      <div class="intro-eyebrow">
        / operator memory archive
      </div>

      <h1 class="intro-title">
        오퍼레이터 기록 열람
      </h1>

      <div class="intro-desc">
        좌측 메뉴에서 파일을 선택하세요.<br>
        연출 및 커맨드는 제거되고 텍스트만 표시됩니다.
      </div>

    </section>

    <section
      class="story-area"
      id="storyArea"
    ></section>

  </div>

</main>

<script>

(function(){

/* ───────────────── ELEMENTS ───────────────── */

var menuButton =
  document.getElementById('menuButton');

var sidebar =
  document.getElementById('sidebar');

var overlay =
  document.getElementById('overlay');

var fileList =
  document.getElementById('fileList');

var storyArea =
  document.getElementById('storyArea');

var searchInput =
  document.getElementById('searchInput');

/* ───────────────── MENU ───────────────── */

function openMenu(){

  sidebar.classList.add('open');

  overlay.classList.add('show');
}

function closeMenu(){

  sidebar.classList.remove('open');

  overlay.classList.remove('show');
}

menuButton.addEventListener('click', openMenu);

overlay.addEventListener('click', closeMenu);

/* ───────────────── FILE LIST ───────────────── */

var files = [];

/*
memory/filelist.json 예시

[
  "amiya.txt",
  "chen.txt",
  "texas.txt"
]
*/

fetch('../memory/filelist.json')

.then(function(res){
  return res.json();
})

.then(function(data){

  files = data;

  renderFileList(files);

})

.catch(function(err){

  console.error(err);

  fileList.innerHTML =
    '<li style="padding:16px;color:#ff8080;">파일 목록 로드 실패</li>';

});

/* ───────────────── RENDER FILE LIST ───────────────── */

function renderFileList(list){

  fileList.innerHTML = '';

  list.forEach(function(file){

    var li =
      document.createElement('li');

    li.className = 'file-item';

    var button =
      document.createElement('button');

    button.className = 'file-button';

    button.innerHTML =
      '<span class="file-icon">◈</span>' +
      '<span class="file-name">' +
      file.replace('.txt','') +
      '</span>';

    button.addEventListener('click', function(){

      loadStory(file);

      closeMenu();

    });

    li.appendChild(button);

    fileList.appendChild(li);

  });

}

/* ───────────────── SEARCH ───────────────── */

searchInput.addEventListener('input', function(){

  var keyword =
    this.value.toLowerCase();

  var filtered =
    files.filter(function(file){

      return file
        .toLowerCase()
        .includes(keyword);

    });

  renderFileList(filtered);

});

/* ───────────────── LOAD STORY ───────────────── */

function loadStory(filename){

  fetch('../memory/' + filename)

  .then(function(res){
    return res.text();
  })

  .then(function(text){

    renderStory(text);

  })

  .catch(function(err){

    console.error(err);

    storyArea.innerHTML =
      '<div class="narration">파일 로드 실패</div>';

  });

}

/* ───────────────── PARSE STORY ───────────────── */

function renderStory(content){

  storyArea.innerHTML = '';

  var lines =
    content.split('\n');

  lines.forEach(function(line){

    var trimmed =
      line.trim();

    if(!trimmed){
      return;
    }

    /*
      [name="Amiya"] text
    */

    var match =
      trimmed.match(/^\[name="(.+?)"\](.+)$/);

    if(match){

      var card =
        document.createElement('div');

      card.className = 'dialogue';

      card.innerHTML =
        '<div class="dialogue-name">' +
        match[1] +
        '</div>' +

        '<div class="dialogue-text">' +
        escapeHtml(match[2]) +
        '</div>';

      storyArea.appendChild(card);

      return;
    }

    /* 커맨드 제거 */

    if(trimmed.startsWith('[')){
      return;
    }

    /* 일반 텍스트 */

    var narration =
      document.createElement('div');

    narration.className = 'narration';

    narration.textContent =
      trimmed;

    storyArea.appendChild(narration);

  });

}

/* ───────────────── ESCAPE ───────────────── */

function escapeHtml(text){

  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

}

})();

</script>

</body>
</html>
