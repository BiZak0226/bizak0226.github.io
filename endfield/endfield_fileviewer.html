<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>엔드필드 오퍼레이터 파일 아카이브</title>
<link rel="stylesheet" href="endfield_weapons.css">
<script src="../nav.js" data-depth="1"></script>
</head>
<body>

<!-- 모바일 드로어 오버레이 -->
<div class="drawer-overlay" id="drawer-overlay"></div>

<!-- ── HEADER ── -->
<header>
  <!-- 패널 토글 버튼 -->
  <button class="panel-toggle" id="panel-toggle" title="목록 패널 열기/닫기" aria-label="목록 패널 열기/닫기">
    <!-- 세 줄 아이콘 (햄버거 → 화살표) -->
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <line x1="2" y1="4"  x2="14" y2="4"/>
      <line x1="2" y1="8"  x2="14" y2="8"/>
      <line x1="2" y1="12" x2="14" y2="12"/>
    </svg>
  </button>

  <div>
    <div class="logo">ARKNIGHTS ENDFIELD</div>
    <div class="logo-main">오퍼레이터 파일</div>
  </div>
  <div class="header-divider"></div>

  <!-- 필터 -->
  <div class="filters">
    <div class="filter-group">
      <span class="filter-label">희귀도</span>
      <button class="filter-btn active" data-rarity="all">전체</button>
      <button class="filter-btn" data-rarity="6" style="color:var(--r6)">★6</button>
      <button class="filter-btn" data-rarity="5" style="color:var(--r5)">★5</button>
      <button class="filter-btn" data-rarity="4" style="color:var(--r4)">★4</button>
      <button class="filter-btn" data-rarity="3" style="color:var(--r3)">★3</button>
    </div>
    <div class="header-divider" style="margin:0 4px"></div>
    <div class="filter-group">
      <span class="filter-label">종류</span>
      <button class="filter-btn active" data-type="all">전체</button>
      <button class="filter-btn" data-type="한손검">한손검</button>
      <button class="filter-btn" data-type="양손검">양손검</button>
      <button class="filter-btn" data-type="장병기">장병기</button>
      <button class="filter-btn" data-type="권총">권총</button>
      <button class="filter-btn" data-type="아츠 유닛">아츠 유닛</button>
    </div>
  </div>

  <div class="search-box">
    <input type="text" id="search" placeholder="오퍼레이터 검색...">
  </div>
</header>

<!-- ── MAIN ── -->
<div class="main">

  <!-- LEFT PANEL -->
  <div class="panel-left" id="panel-left">
    <div class="panel-left-header">
      <span>WEAPONS</span>
      <span><span id="weapon-count">0</span> / 66</span>
    </div>
    <div class="weapon-list" id="weapon-list"></div>
  </div>

  <!-- CENTER PANEL -->
  <div class="panel-center" id="panel-center">
    <div class="empty-state" id="empty-state">
      <div class="empty-state-icon">⚔</div>
      <div class="empty-state-text">오퍼레이터를 선택하세요</div>
    </div>
    <div class="weapon-detail" id="weapon-detail" style="display:none"></div>
  </div>

</div>

<!-- 모바일 FAB (목록 열기 버튼) -->
<div class="fab-list" id="fab-list">
  <button class="fab-btn" id="fab-open-list">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <line x1="2" y1="4"  x2="14" y2="4"/>
      <line x1="2" y1="8"  x2="14" y2="8"/>
      <line x1="2" y1="12" x2="14" y2="12"/>
    </svg>
    목록
  </button>
</div>


<!-- ── SCRIPT ── -->
<script defer>
/* ─────────────────────────────────
   상수 (tier 기준)
───────────────────────────────── */
const TIER_COLORS = { 6:'#ff7100', 5:'#ffcc00', 4:'#b380ff', 3:'#33C2FF' };
const TIER_LABELS = { 6:'★★★★★★', 5:'★★★★★', 4:'★★★★', 3:'★★★' };

/* ─────────────────────────────────
   상태
───────────────────────────────── */
let OPERATORS   = [];
let activeTier  = 'all';
let searchQuery = '';
let selectedIdx = null;

/* ───────────────────────────────── */
const isMobile = () => window.innerWidth <= 640;

function openPanel() {
  if (isMobile()) document.body.classList.add('panel-open');
  else document.body.classList.remove('panel-collapsed');
}
function closePanel() {
  if (isMobile()) document.body.classList.remove('panel-open');
  else document.body.classList.add('panel-collapsed');
}
function togglePanel() {
  if (isMobile()) {
    document.body.classList.contains('panel-open') ? closePanel() : openPanel();
  } else {
    document.body.classList.contains('panel-collapsed') ? openPanel() : closePanel();
  }
}

/* ───────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  bindPanelEvents();
  bindFilterEvents();
  loadData();
});

/* ───────────────────────────────── */
function bindPanelEvents() {
  document.getElementById('panel-toggle').addEventListener('click', togglePanel);
  document.getElementById('drawer-overlay').addEventListener('click', closePanel);
  document.getElementById('fab-open-list').addEventListener('click', openPanel);

  window.addEventListener('resize', () => {
    if (!isMobile()) document.body.classList.remove('panel-open');
  });
}

/* ─────────────────────────────────
   필터 (tier만 사용)
───────────────────────────────── */
function bindFilterEvents() {
  document.querySelectorAll('.filter-btn[data-rarity]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn[data-rarity]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeTier = btn.dataset.rarity;
      renderList();
    });
  });

  document.getElementById('search').addEventListener('input', e => {
    searchQuery = e.target.value.trim();
    renderList();
  });
}

/* ─────────────────────────────────
   데이터 로드
───────────────────────────────── */
async function loadData() {
  try {
    const res = await fetch('./data/endfield_operator_file.json'); // 파일명 변경
    OPERATORS = await res.json();
    renderList();
  } catch (e) {
    console.error(e);
  }
}

/* ───────────────────────────────── */
function getFiltered() {
  return OPERATORS.filter((o, i) => {
    o._origIdx = i;
    if (activeTier !== 'all' && o.tier !== parseInt(activeTier)) return false;
    if (searchQuery && !o.name.includes(searchQuery)) return false;
    return true;
  });
}

/* ─────────────────────────────────
   리스트 (좌측)
───────────────────────────────── */
function renderList() {
  const list = document.getElementById('weapon-list');
  const filtered = getFiltered();

  document.getElementById('weapon-count').textContent = filtered.length;

  list.innerHTML = filtered.map(o => {
    const color = TIER_COLORS[o.tier];
    const stars = '★'.repeat(o.tier);
    const sel = selectedIdx === o._origIdx ? 'selected' : '';

    return `
      <div class="weapon-item ${sel}" data-idx="${o._origIdx}">
        <div class="rarity-dot" style="background:${color}"></div>
        <div class="weapon-item-info">
          <div class="weapon-name-list">${o.name}</div>
          <div class="weapon-meta">
            <span style="color:${color}">${stars}</span>
          </div>
        </div>
      </div>
    `;
  }).join('');

  list.querySelectorAll('.weapon-item').forEach(el => {
    el.addEventListener('click', () => {
      selectItem(parseInt(el.dataset.idx));
      if (isMobile()) closePanel();
    });
  });
}

/* ─────────────────────────────────
   상세 (중앙)
───────────────────────────────── */
function selectItem(idx) {
  selectedIdx = idx;
  const o = OPERATORS[idx];

  document.getElementById('empty-state').style.display = 'none';
  const detail = document.getElementById('weapon-detail');
  detail.style.display = 'block';

  const color = TIER_COLORS[o.tier];

  // files 렌더링
  const filesHTML = (o.files || []).map(f => {
    if (!f) return '';
    return `<div class="file-item">${f}</div>`;
  }).join('');

  detail.innerHTML = `
    <div class="detail-header">
      <div class="detail-name">${o.name}</div>
    </div>

    ${o.description ? `
    <div class="section-block">
      <div class="section-label">소개글</div>
      <div class="desc-box">${esc(o.description)}</div>
    </div>` : ''}

    ${o.profile_summary ? `
    <div class="section-block">
      <div class="section-label">인사 요약서</div>
      <div class="desc-box">${esc(o.profile_summary)}</div>
    </div>` : ''}

    ${o.base_file ? `
    <div class="section-block">
      <div class="section-label">기본 파일</div>
      <div class="desc-box">${esc(o.base_file)}</div>
    </div>` : ''}

    ${filesHTML ? `
    <div class="section-block">
      <div class="section-label">추가 자료</div>
      <div class="desc-box">${filesHTML}</div>
    </div>` : ''}
  `;

  renderList();
}

/* ───────────────────────────────── */

function esc(str) {
  return str
    ?.replace(/&/g, '&amp;')
    ?.replace(/</g, '&lt;')
    ?.replace(/>/g, '&gt;')
    ?.replace(/\r\n/g, '<br>')
    ?.replace(/\n/g, '<br>')
    ?.replace(/\r/g, '<br>');
}

</script>

</body>
</html>
