<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>엔드필드 오퍼레이터 파일</title>
<link rel="stylesheet" href="endfield_operator_file.css">
<script src="../nav.js" data-depth="1"></script>
</head>
<body>

<!-- 모바일 드로어 오버레이 -->
<div class="drawer-overlay" id="drawer-overlay"></div>

<!-- ── HEADER ── -->
<header>
  <!-- 패널 토글 버튼 -->
  <button class="panel-toggle" id="panel-toggle" title="목록 패널 열기/닫기" aria-label="목록 패널 열기/닫기">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <line x1="2" y1="4"  x2="14" y2="4"/>
      <line x1="2" y1="8"  x2="14" y2="8"/>
      <line x1="2" y1="12" x2="14" y2="12"/>
    </svg>
  </button>

  <div>
    <div class="logo">ARKNIGHTS ENDFIELD</div>
    <div class="logo-main">오퍼레이터 파일</div>
  </div>
  <div class="header-divider"></div>

  <!-- 필터 -->
  <div class="filters">
    <div class="filter-group">
      <span class="filter-label">등급</span>
      <button class="filter-btn active" data-tier="all">전체</button>
      <button class="filter-btn" data-tier="6" style="color:var(--r6)">★6</button>
      <button class="filter-btn" data-tier="5" style="color:var(--r5)">★5</button>
      <button class="filter-btn" data-tier="4" style="color:var(--r4)">★4</button>
    </div>
  </div>

  <div class="search-box">
    <input type="text" id="search" placeholder="오퍼레이터 검색...">
  </div>
</header>

<!-- ── MAIN ── -->
<div class="main">

  <!-- LEFT PANEL -->
  <div class="panel-left" id="panel-left">
    <div class="panel-left-header">
      <span>OPERATORS</span>
      <span><span id="operator-count">0</span> / 25</span>
    </div>
    <div class="operator-list" id="operator-list"></div>
  </div>

  <!-- CENTER PANEL -->
  <div class="panel-center" id="panel-center">
    <div class="empty-state" id="empty-state">
      <div class="empty-state-icon">◈</div>
      <div class="empty-state-text">오퍼레이터를 선택하세요</div>
    </div>
    <div class="operator-detail" id="operator-detail" style="display:none"></div>
  </div>

</div>

<!-- 모바일 FAB -->
<div class="fab-list" id="fab-list">
  <button class="fab-btn" id="fab-open-list">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <line x1="2" y1="4"  x2="14" y2="4"/>
      <line x1="2" y1="8"  x2="14" y2="8"/>
      <line x1="2" y1="12" x2="14" y2="12"/>
    </svg>
    목록
  </button>
</div>


<!-- ── SCRIPT ── -->
<script defer>
/* ─────────────────────────────────
   상수
───────────────────────────────── */
const TIER_COLORS = { 6:'#ff7100', 5:'#ffcc00', 4:'#b380ff' };
const TIER_LABELS = { 6:'★★★★★★', 5:'★★★★★', 4:'★★★★' };

/* ─────────────────────────────────
   파일 탭 정의
───────────────────────────────── */
const FILE_TABS = [
  { key: 'base_file',      label: '기본 파일' },
  { key: 'profile_summary',label: '프로필 개요' },
  { key: 'file01',         label: '파일 01' },
  { key: 'file02',         label: '파일 02' },
  { key: 'file03',         label: '파일 03' },
  { key: 'file04',         label: '파일 04' },
];

/* ─────────────────────────────────
   상태
───────────────────────────────── */
let OPERATORS   = [];
let activeTier  = 'all';
let searchQuery = '';
let selectedIdx = null;
let activeTab   = 'base_file';

/* ─────────────────────────────────
   패널 토글
───────────────────────────────── */
const isMobile = () => window.innerWidth <= 640;

function openPanel() {
  if (isMobile()) document.body.classList.add('panel-open');
  else            document.body.classList.remove('panel-collapsed');
}
function closePanel() {
  if (isMobile()) document.body.classList.remove('panel-open');
  else            document.body.classList.add('panel-collapsed');
}
function togglePanel() {
  if (isMobile()) document.body.classList.contains('panel-open') ? closePanel() : openPanel();
  else            document.body.classList.contains('panel-collapsed') ? openPanel() : closePanel();
}

/* ─────────────────────────────────
   초기화
───────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  bindPanelEvents();
  bindFilterEvents();
  loadOperators();
});

/* ─────────────────────────────────
   패널 이벤트
───────────────────────────────── */
function bindPanelEvents() {
  document.getElementById('panel-toggle').addEventListener('click', togglePanel);
  document.getElementById('drawer-overlay').addEventListener('click', closePanel);
  document.getElementById('fab-open-list').addEventListener('click', openPanel);
  window.addEventListener('resize', () => {
    if (!isMobile()) document.body.classList.remove('panel-open');
  });
}

/* ─────────────────────────────────
   필터 이벤트
───────────────────────────────── */
function bindFilterEvents() {
  document.querySelectorAll('.filter-btn[data-tier]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn[data-tier]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeTier = btn.dataset.tier;
      renderList();
    });
  });

  document.getElementById('search').addEventListener('input', e => {
    searchQuery = e.target.value.trim();
    renderList();
  });
}

/* ─────────────────────────────────
   데이터 로드
───────────────────────────────── */
async function loadOperators() {
  try {
    const res = await fetch('./data/endfield_operator_file.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    OPERATORS = await res.json();
    renderList();
  } catch (e) {
    console.error('JSON 로드 실패:', e);
    document.getElementById('operator-list').innerHTML =
      '<div class="no-results">데이터를 불러올 수 없습니다</div>';
  }
}

/* ─────────────────────────────────
   필터
───────────────────────────────── */
function getFiltered() {
  return OPERATORS.filter((op, i) => {
    op._origIdx = i;
    if (activeTier !== 'all' && op.tier !== parseInt(activeTier)) return false;
    if (searchQuery && !op.name.includes(searchQuery)) return false;
    return true;
  });
}

/* ─────────────────────────────────
   리스트 렌더링
───────────────────────────────── */
function renderList() {
  const list = document.getElementById('operator-list');
  if (!list) return;

  const filtered = getFiltered();
  document.getElementById('operator-count').textContent = filtered.length;

  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-results">조건에 맞는 오퍼레이터가<br>없습니다</div>';
    return;
  }

  list.innerHTML = filtered.map(op => {
    const color = TIER_COLORS[op.tier];
    const stars = '★'.repeat(op.tier);
    const sel   = selectedIdx === op._origIdx ? 'selected' : '';
    return `
      <div class="operator-item ${sel}" data-idx="${op._origIdx}">
        <div class="tier-dot" style="background:${color}"></div>
        <div class="operator-item-info">
          <div class="operator-name-list">${op.name}</div>
          <div class="operator-meta">
            <span class="tier-stars" style="color:${color}">${stars}</span>
          </div>
        </div>
      </div>`;
  }).join('');

  list.querySelectorAll('.operator-item').forEach(el => {
    el.addEventListener('click', () => {
      activeTab = 'base_file'; // 새 오퍼레이터 선택 시 탭 초기화
      selectOperator(parseInt(el.dataset.idx));
      if (isMobile()) closePanel();
    });
  });
}

/* ─────────────────────────────────
   상세 표시
───────────────────────────────── */
function selectOperator(origIdx) {
  selectedIdx = origIdx;
  const op = OPERATORS[origIdx];

  document.getElementById('empty-state').style.display = 'none';
  const detail = document.getElementById('operator-detail');
  detail.style.display = 'block';

  const color = TIER_COLORS[op.tier];
  const stars = TIER_LABELS[op.tier];

  // description 정제
  let desc = op.description || '';
  //if (desc.startsWith('"') && desc.endsWith('"')) desc = desc.slice(1, -1);
  desc = desc.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const descParagraphs = desc
    .split(/\n{2,}/)
    .map(p => p.trim()).filter(p => p)
    .map(p => `<p>${escHtml(p).replace(/\n/g, '<br>')}</p>`)
    .join('');

  detail.className = `operator-detail rc-${op.tier}`;
  detail.style.setProperty('--tier-color', color);

  // 사용 가능한 탭만 추출
  const availableTabs = FILE_TABS.filter(t => op[t.key] && op[t.key].trim());

  detail.innerHTML = `
    <div class="detail-header">
      <div class="detail-tier-badge" style="color:${color};border-color:${color}40;background:${color}10">
        ${stars} · TIER ${op.tier}
      </div>
      <div class="detail-name">${op.name}</div>
    </div>

    <div class="section-block">
      <div class="section-label">오퍼레이터 소개</div>
      <div class="desc-box">${descParagraphs}</div>
    </div>

    ${availableTabs.length > 0 ? `
    <div class="section-block">
      <div class="section-label">오퍼레이터 파일</div>
      <div class="file-tabs" id="file-tabs">
        ${availableTabs.map(t => `
          <button class="file-tab-btn ${activeTab === t.key ? 'active' : ''}" data-key="${t.key}">
            ${t.label}
          </button>`).join('')}
      </div>
      <div class="file-content" id="file-content"></div>
    </div>` : ''}
  `;

  // 탭 콘텐츠 렌더링 & 이벤트
  if (availableTabs.length > 0) {
    // activeTab이 현재 오퍼레이터에 없으면 첫 탭으로
    if (!op[activeTab]) activeTab = availableTabs[0].key;
    renderFileContent(op);

    detail.querySelectorAll('.file-tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        detail.querySelectorAll('.file-tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeTab = btn.dataset.key;
        renderFileContent(op);
      });
    });
  }

  document.getElementById('panel-center').scrollTo({ top: 0 });
  renderList();
}

/* ─────────────────────────────────
   파일 탭 콘텐츠 렌더링
───────────────────────────────── */
function renderFileContent(op) {
  const box = document.getElementById('file-content');
  if (!box) return;
  let text = op[activeTab] || '';
  text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

  // base_file: 키-값 구조 파싱
  if (activeTab === 'base_file') {
    const lines = text.split('\n');
    let html = '<div class="base-file-grid">';
    for (const line of lines) {
      const m = line.match(/^\[(.+?)\]\s*(.*)$/);
      if (m) {
        html += `<div class="bf-row"><span class="bf-key">${escHtml(m[1])}</span><span class="bf-val">${escHtml(m[2])}</span></div>`;
      } else if (line.trim()) {
        html += `<div class="bf-row bf-plain"><span class="bf-val">${escHtml(line)}</span></div>`;
      }
    }
    html += '</div>';
    box.innerHTML = html;
  } else {
    // 일반 텍스트 파일
    const paragraphs = text
      .split(/\n{2,}/)
      .map(p => p.trim()).filter(p => p)
      .map(p => `<p>${escHtml(p).replace(/\n/g, '<br>')}</p>`)
      .join('');
    box.innerHTML = `<div class="lore-text">${paragraphs}</div>`;
  }
}

/* ─────────────────────────────────
   유틸
───────────────────────────────── */
function escHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}
</script>

</body>
</html>
