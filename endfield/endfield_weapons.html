<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>엔드필드 무기 아카이브</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b0e;
    --surface: #0f1117;
    --surface2: #151820;
    --surface3: #1c2030;
    --border: #252a3a;
    --border-glow: #2d3550;
    --text-primary: #d4d8e8;
    --text-secondary: #7a8098;
    --text-muted: #454d6a;
    --r6: #ff7100;
    --r5: #ffcc00;
    --r4: #b380ff;
    --r3: #33C2FF;
    --accent: #3a7bd5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Noto Sans KR', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ─── HEADER ─── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.5;
  }
  .logo {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    line-height: 1.4;
  }
  .logo-main {
    font-family: 'Noto Serif KR', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: 1px;
  }
  .header-divider { width: 1px; height: 32px; background: var(--border); }

  .filters {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    flex: 1;
  }
  .filter-label {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: 'Share Tech Mono', monospace;
  }
  .filter-group { display: flex; gap: 6px; align-items: center; }
  .filter-btn {
    padding: 4px 12px;
    border-radius: 2px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--border-glow); color: var(--text-primary); }
  .filter-btn.active {
    background: var(--surface3);
    border-color: var(--accent);
    color: var(--text-primary);
  }
  .filter-btn[data-rarity="6"].active { border-color: var(--r6); color: var(--r6); }
  .filter-btn[data-rarity="5"].active { border-color: var(--r5); color: var(--r5); }
  .filter-btn[data-rarity="4"].active { border-color: var(--r4); color: var(--r4); }
  .filter-btn[data-rarity="3"].active { border-color: var(--r3); color: var(--r3); }

  .search-box {
    margin-left: auto;
    position: relative;
  }
  .search-box input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text-primary);
    padding: 5px 12px 5px 30px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    width: 160px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box::before {
    content: '🔍';
    position: absolute;
    left: 8px; top: 50%;
    transform: translateY(-50%);
    font-size: 11px;
    pointer-events: none;
  }

  /* ─── MAIN LAYOUT ─── */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* ─── LEFT PANEL ─── */
  .panel-left {
    width: 260px;
    min-width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }
  .panel-left-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .panel-left-header span {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }
  #weapon-count {
    color: var(--accent);
    font-weight: 600;
  }

  .weapon-list {
    overflow-y: auto;
    flex: 1;
    padding: 4px 0;
  }
  .weapon-list::-webkit-scrollbar { width: 4px; }
  .weapon-list::-webkit-scrollbar-track { background: transparent; }
  .weapon-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .weapon-item {
    padding: 10px 16px;
    cursor: pointer;
    transition: all 0.12s;
    border-left: 3px solid transparent;
    position: relative;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .weapon-item:hover {
    background: var(--surface2);
    border-left-color: var(--border-glow);
  }
  .weapon-item.selected {
    background: var(--surface3);
    border-left-color: var(--accent);
  }
  .weapon-item.selected .weapon-name-list { color: #fff; }

  .rarity-dot {
    width: 4px;
    height: 28px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .weapon-item-info { flex: 1; min-width: 0; }
  .weapon-name-list {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-family: 'Noto Serif KR', serif;
  }
  .weapon-meta {
    font-size: 10px;
    color: var(--text-muted);
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }
  .rarity-stars {
    font-size: 9px;
    letter-spacing: -1px;
  }

  .no-results {
    padding: 40px 16px;
    text-align: center;
    color: var(--text-muted);
    font-size: 12px;
    line-height: 1.8;
  }

  /* ─── CENTER PANEL ─── */
  .panel-center {
    flex: 1;
    overflow-y: auto;
    background: var(--bg);
    position: relative;
  }
  .panel-center::-webkit-scrollbar { width: 4px; }
  .panel-center::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    gap: 16px;
    user-select: none;
  }
  .empty-state-icon {
    font-size: 48px;
    opacity: 0.2;
  }
  .empty-state-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .weapon-detail {
    padding: 40px 48px;
    max-width: 860px;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .detail-header {
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .detail-header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0;
    width: 80px; height: 1px;
    background: var(--rarity-color, var(--accent));
    transition: background 0.3s;
  }

  .detail-rarity-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 10px;
    border-radius: 2px;
    border: 1px solid;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }
  .detail-name {
    font-family: 'Noto Serif KR', serif;
    font-size: 32px;
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  .detail-type-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .detail-type-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    font-size: 11px;
    color: var(--text-secondary);
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 0.5px;
  }
  .detail-id {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }

  .section-block {
    margin-bottom: 36px;
  }
  .section-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .desc-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--rarity-color, var(--border));
    border-radius: 2px;
    padding: 18px 20px;
    font-size: 14px;
    line-height: 1.9;
    color: var(--text-secondary);
  }

  .lore-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 28px 32px;
    position: relative;
    overflow: hidden;
  }
  .lore-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--rarity-color, var(--accent)), transparent);
  }
  .lore-text {
    font-family: 'Noto Serif KR', serif;
    font-size: 14px;
    line-height: 2.1;
    color: var(--text-secondary);
    white-space: pre-wrap;
  }
  .lore-text em { font-style: normal; color: var(--text-primary); }

  /* rarity colors applied via JS class */
  .rc-6 { --rarity-color: var(--r6); }
  .rc-5 { --rarity-color: var(--r5); }
  .rc-4 { --rarity-color: var(--r4); }
  .rc-3 { --rarity-color: var(--r3); }

  /* scrollbar global */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">ARKNIGHTS ENDFIELD</div>
    <div class="logo-main">무기 아카이브</div>
  </div>
  <div class="header-divider"></div>
  <div class="filters">
    <div class="filter-group">
      <span class="filter-label">희귀도</span>
      <button class="filter-btn active" data-rarity="all">전체</button>
      <button class="filter-btn" data-rarity="6" style="color:var(--r6)">★6</button>
      <button class="filter-btn" data-rarity="5" style="color:var(--r5)">★5</button>
      <button class="filter-btn" data-rarity="4" style="color:var(--r4)">★4</button>
      <button class="filter-btn" data-rarity="3" style="color:var(--r3)">★3</button>
    </div>
    <div class="header-divider" style="margin: 0 4px;"></div>
    <div class="filter-group">
      <span class="filter-label">종류</span>
      <button class="filter-btn active" data-type="all">전체</button>
      <button class="filter-btn" data-type="한손검">한손검</button>
      <button class="filter-btn" data-type="양손검">양손검</button>
      <button class="filter-btn" data-type="장병기">장병기</button>
      <button class="filter-btn" data-type="권총">권총</button>
      <button class="filter-btn" data-type="아츠 유닛">아츠 유닛</button>
    </div>
  </div>
  <div class="search-box">
    <input type="text" id="search" placeholder="무기 검색...">
  </div>
</header>

<div class="main">
  <div class="panel-left">
    <div class="panel-left-header">
      <span>WEAPONS</span>
      <span><span id="weapon-count">0</span> / 66</span>
    </div>
    <div class="weapon-list" id="weapon-list"></div>
  </div>
  <div class="panel-center" id="panel-center">
    <div class="empty-state" id="empty-state">
      <div class="empty-state-icon">⚔</div>
      <div class="empty-state-text">무기를 선택하세요</div>
    </div>
    <div class="weapon-detail" id="weapon-detail" style="display:none"></div>
  </div>
</div>

<script>
const WEAPONS = [{"name": "백야의 별", "type": "한손검", "description": "미에슈코 공업에서 출시한 고품질 사브르 제품. 상업연합회 상류층 인사들 사이에서 큰 인기를 끌고 있다. 정교하게 조각된 외관 아래, 신뢰할 수 있는 성능까지 갖추고 있다.", "lore": "\"그녀는 자신이 왜 이 임무에 선택되었는지를 떠올리기 시작했다.\r\n\r\n\r\n단지 설원 환경에 더 잘 적응할 수 있게 해 주는 동결 오리지늄 아츠에 능했기 때문만이 아니었다. 그녀는 황무지에서 길을 찾는 능력이 탁월했다. 거의 본능에 가까웠다. 밤이 되어도 그녀는 하늘의 별빛을 인도 등처럼 바라보며 방향을 잃지 않았다. 막 창설된 지 채 1년도 되지 않은 철의 서약군 안에서 문명과의 연결을 복원하고 길을 개척할 사람을 찾는다면 그건 분명 그녀였다.\r\n\r\n\r\n그녀는 그것을 알고 있었고, 그래서 그 하드디스크를 품고 길을 나섰다.\r\n\r\n\r\n그 속엔 철의 서약군이 지난 1년간 수집한 모든 데이터, 북쪽 지역, 적과 동료에 관한 기록이 담겨 있었다. 한때 죽음을 두려워하지 않는 이들이 대열에서 앞으로 나섰고, 한데 모여 강철 같은 맹세를 외치며 문명으로부터 등을 돌려 북쪽으로 향했다. 스스로를 미끼로 삼아, 아겔로스의 공세를 유인하며, 파괴된 전장을 걸었다. 많은 이들이 그들의 출정을 하나의 신호로 보았다. 문명 붕괴의 전조. 비관론자들은 확신했다. 자기를 희생한 이들... 지금은 철의 서약군이라 불리는 이들의 등장은 더 많은 이들이 문명에서 버림받을 서막이라. 철의 서약군은 그 사실을 알고 있었다. 그렇기에 반드시 문명과의 연락을 복원해야 했다. 생명을 대가로 얻은 정보는 반드시 앞길을 밝히는 별빛이 되어야 했다.\r\n\r\n\r\n작은 '별빛'은 지금 전달자의 소포 속에 있다. 그녀는 깊게 숨을 들이쉬며, 얼음과 눈 위를 한 걸음 한 걸음 옮겼다.\r\n\r\n\r\n피가 팔을 타고 흘러내렸다. 얼어붙은 땅 위로 붉은 점들이 찍힌다. 왼팔과 왼쪽 다리는 거의 으스러져 있었고, 뼛조각이 몸속에서 스치는 감각이 선명했다. 그 상처는 한 번도 본 적 없는 새로운 아겔로스에게서 입은 것이었다. 그녀는 생각했다. '자신의 사지를 부순 이 아겔로스는 원래 성문을 공격하기 위해 만들어진 개체인가?'\r\n\r\n\r\n복잡한 생각들이 머릿속을 스쳤다. 철의 서약군이 처음 북쪽 지역으로 향하던 길엔, 거의 매일 듣도 보도 못한 아겔로스들과 마주쳤다. 마치 어떤 심문관이 고문 도구를 자랑하듯, 수많은 변종의 아겔로스들이 인간을 더욱 효율적으로 죽이기 위해 전장에 쏟아져 나왔다. 그것들을 쓰러뜨리려면, 대가가 필요했다... 수많은 목숨이 희생되었다.\r\n\r\n\r\n쓰러뜨려야 한다... 그래...\r\n\r\n\r\n전달자는 문득, 자신이 아직 살아 있다는 걸 떠올렸다. 쓰러진 건 아겔로스였고, 살아남은 건 자신이었다. 그녀는 달려드는 거대한 바윗덩어리를 얼려서... 부쉈다... 부서진 파편들이 햇빛 아래서 별빛처럼 반짝였다.\r\n\r\n\r\n또 다른 생각이 스쳤다.\r\n\r\n\r\n별빛은 길을 비춘다. 아버지와 어머니가 말해 주었었다. 별빛은 황무지의 여행자를 인도한다고... 아니다... 우리가 바로 별빛이다... 나는 사람들에게 알려야 한다. 죽음보다 더 차가운 북쪽에서, 우리가 굳건히 버티고 있음을. 그러면 사람들은 다시 희망을 가질 것이다.\r\n\r\n\r\n더 많은 피가 흐르고 동토에 스며들었다.\r\n\r\n\r\n하지만 별빛은 어디에 있지? 내 손안?\r\n\r\n\r\n나는 또 어디에 있지?\r\n\r\n\r\n눈앞은 어둠뿐인데, 왜... 하나의 별빛조차 나를 비추지 않는 걸까?\r\n\r\n\r\n......\r\n\r\n\r\n그제야 깨달았다. 옛 별빛은 이미 꺼졌고, 새 별빛은 아직 태어나지 않았다는 걸...\r\n\r\n\r\n그녀는 가능한 한 높이 손을 들어 올렸다. 오리지늄 아츠로 만들어진 얼음이 퍼져나갔다. 피로 물든 땅에서 시작된 얼음은 그녀의 몸을 덮고, 얼굴을 덮고, 그리고 손끝을 따라 하늘로 어딘가 안전한 방향으로 뻗어 갔다.\r\n\r\n\r\n더 높이, 조금만 더 높이... 적어도 누군가에게 길을 보여줄 수 있기를. 그것이 마지막 생각이었다. 그리고 마침내, 얼음으로 빚어진 별빛이 세상 위에 고요히 서 있었다.\r\n\r\n\r\n......\r\n\r\n\r\n그녀는 몰랐다. 수십 일이 지난 후, 누군가가 그 별빛의 인도를 따라 다시 남쪽으로 향할 것이란 걸. 그들의 발걸음은 얼어붙은 동토의 끝에서 멈췄지만, 더 많은 사람들이 고통의 노래를 부르며 전장을 가로지르며, 그 뒤를 따를 것이다.\r\n\r\n\r\n작은 '별빛'은 사람들의 손에서 손으로 전해졌고, 마침내 그 끝에서 제강호가 그것으로 북쪽 하늘을 밝혔다.\"", "weaponId": "wpn_sword_0014", "rarity": 6}, {"name": "위대한 이름", "type": "한손검", "description": "미에슈코 공업에서 출시한 고품질 사브르, 탈로스 II 상업연합회 상류층 인사들 사이에서 큰 인기를 끌고 있습니다. 정교하게 다듬어진 외관만큼이나 그 성능 또한 믿을 수\r\n\r\n있습니다.", "lore": "\"그래서, 내 어린 제자... 자네가 죽인 게 맞나? 어째서지?\"\r\n\r\n\r\n\"오... 아아... 그 어린 제자분 말이군요. 휴, 사실 다 오해입니다. 그게... 주로... 그 친구가 저희 지하 투기장에 와서 10연승을 해버렸잖아요. 저희가 주최한 시합을 발판 삼아 유명해지려고 했던 거죠. 저희도 골드티켓은 벌어야 하니까... 그래서 몇 사람을 보내서... 아, 물론 제가 보낸 건 아니고요... 그냥 좀 타일러 보라고 몇 명 보낸 건데, 그게 참, 일이 이렇게 될 줄은 아무도 몰랐다니까요...\"\r\n\r\n\r\n\"틀렸어.\"\r\n\r\n\r\n\"뭐... 뭐가 말입니까?\"\r\n\r\n\r\n\"일이 커질 줄 몰랐던 게 아니야. 내가 너희 코앞까지 쳐들어올 줄 몰랐던 거겠지... 그리고 그렇게 비굴한 척 연기할 필요 없다. 역겨우니까.\"\r\n\r\n\r\n\"어르신, 이러시면 좀 재미없는데요.\"\r\n\r\n\r\n\"재미가 없다? 그럼 내가 아스팔트 라운드어바웃의 역사나 한번 들려주지.\"\r\n\r\n\r\n\"경청하죠.\"\r\n\r\n\r\n\"처음엔 아무도 아스팔트 라운드어바웃이 지금처럼 변할 거라고는 상상도 못 했지. 도로 공사 작업자들이 숙소로 쓰던 곳이었는데, 나중엔 장거리 트럭 운전기사들이 가족을 데려와 살기 시작했어. 도로에 화물 운송이 더해지니 자연스레 교통의 요지가 됐고, 온갖 인간들이 모여들었지. 지하 투기장이나 각종 시합도 그때 생겨난 거야. 여기선 온갖 무기나 장비는 물론이고 명품도 꽤나 구할 수 있었어. 가장 번성했을 때는 무력, 욕망, 돈... 이 아스팔트 라운드어바웃엔 없는 게 없었지. 물론, '지켜야 할 선'이라는 것도 있었고.\"\r\n\r\n\r\n\"나도 그땐 도로 작업자 중 하나였어. 작은 거주지가 조금씩 커져서 한때는 자유 도시 규모까지 가는 걸 보며 정말 기뻤지. 짓다 만 탈로스 성보다 아스팔트 라운드어바웃이 훨씬 낫다고 생각했어. 가끔은 나처럼 '집단의 명예' 따위를 신경 쓰는 사람은 연맹 공단으로 전근 신청을 하는 게 더 어울리지 않았을까 고민하기도 했지. 이해가 가나?\"\r\n\r\n\r\n\"이해 갑니다.\"\r\n\r\n\r\n\"아니, 젊은이. 자네 꼴을 보게. 자네는 명예를 이해할 위인이 못 돼. 자네가 아는 건 고작 '체면' 뿐이지. 하지만 자네 탓은 아니야. 지금 여기엔 자네랑 똑같은 놈들이 널렸으니까... 반면인이니, 토마시노 씨니 하는 작자들 말이야... 우리가 도로 공사를 멈추고 여기가 더 이상 교통 건설의 요지가 아니게 되자 많은 사람이 떠났어. 하지만 그 뒤에 몰려온 놈들은 하나같이 자네 같았지. 거리낄 것 없이 선을 넘고, 멀쩡하던 아스팔트 라운드어바웃을 난장판으로 만들었어...\"\r\n\r\n\r\n\"그 점은 확실히 궁금하군요, 어르신. 제가 형제들을 데리고 아스팔트 라운드어바웃에서 살아남기로 결심했을 때, 이곳에 대해 아주 철저히 조사했습니다. 미에슈코 공업에서 정식으로 영업 허가를 따내는 것부터, 각 파벌에 미리 인사를 돌리는 것까지. 틈바구니에서 살아남기 위해 모든 절차를 완벽하게 처리했다고 자부합니다. 전 진심으로 양지로 나오고 싶었고, 확실하게 규칙대로 일 처리를 했습니다... 그런데 왜 어르신 말씀만 들어보면, 그 철없는 제자가 아니라 제가 규칙을 어긴 사람처럼 들리는 거죠?\"\r\n\r\n\r\n\"규칙이 뭐냐고? 규칙은 딱 하나다. 남을 인간으로 대하고, 자신 또한 인간으로 여기는 것... 단지 그뿐인데, 너희 놈들은 죽었다 깨나도 그걸 못 하는군.\"\r\n\r\n\r\n\"그건 또 처음 듣는 소리네요. 어르신이 지어낸 규칙입니까?\"\r\n\r\n\r\n\"내가 평생 피와 땀으로 지켜온 규칙이다.\"\r\n\r\n\r\n\"그렇군요, 그렇군요. 이제 알겠습니다. 어르신은 그런 '복면 영웅' 부류시군요... 하하, 동화책에나 나오는 줄 알았는데... 솔직히 말씀드리면, 저도 어릴 땐 어르신 같은 사람이 되고 싶었습니다. 심지어 제가 100년만 일찍 태어났으면 제1차 아겔로스 전쟁을 끝낸 영웅 중 한 명이 될 수 있지 않았을까 상상도 했었죠. 하지만 어르신, 참 딱하십니다. 그건 현실이 아니잖아요. 지금은 영웅의 시대가 아닙니다. 명성을 떨치려면 다른 방법을 써야죠.\"\r\n\r\n\r\n\"나 같은 늙은이나, 너 같은 쓰레기나... 감히 영웅이란 말을 입에 올릴 계제가 된다고 보나?\"\r\n\r\n\r\n\"알겠습니다, 알겠어요. 어르신, 그럼 우리 검으로 대화하시죠.\"", "weaponId": "wpn_sword_0013", "rarity": 6}, {"name": "테르밋 커터", "type": "한손검", "description": "노스마치 중공업 지원소 '개척자' 시리즈의 기본 제품, 4형 테르밋 커터는 특허받은 고온 소재를 사용하여 강력한 절단 성능을 자랑하며, 많은 공학자에게 호평받고 있습니다.", "lore": "노스마치 중공업 지원소에서 몇 번이나 공개적으로 자신들이 설계한 모든 제품은 그저 개인용 공업 기계와 시공 설비일 뿐이라고 강조했지만, 도구로서의 이 절단기는 참 별로야. 대검으로 사용했을 때 더 뛰어난걸.\r\n\r\n- 제품 사용 리뷰 1\r\n\r\n\r\n설명서에 속지 마시길, 이건 분명 절단기가 아니라 무기다. 화상을 입지 않게 취급 시 주의하도록.\r\n\r\n- 제품 사용 리뷰 2\r\n\r\n\r\n바꿔 생각해 보니까, 이 장비를 가지고 다니는 한 무기를 따로 들고 다닐 필요가 없겠더라고, 그렇지?\r\n\r\n- 제품 사용 리뷰 3", "weaponId": "wpn_sword_0012", "rarity": 6}, {"name": "부요", "type": "한손검", "description": "홍산 무기 대장간에서 제작한 고급 사브르 제품, 탁월한 공로를 인정받은 이들에게 수여하며, 명칭은 홍산 과학원 내부 공모를 통해 선정되었습니다.", "lore": "부요에게:\r\n\r\n어젯밤, 엄마는 또 네 꿈을 꾸었단다. 지금쯤 너는 아빠와 함께 백조로 돌아가서, 할아버지 할머니, 외할아버지 외할머니와 다시 만났겠지? 그 시간쯤이면 거리마다 설날 음식 냄새가 퍼지고 있겠구나. 만두는 먹었니? 이번엔 제발 네 아빠가 빚은 게 아니길 바란다. 그 사람은 매번 반죽을 제대로 못 해서 만두피가 너무 두껍거나 얇고, 반죽은 늘 덜 숙성됐거든. 그래도 혹시 직접 빚었다면, 제발 이번엔 괜찮게 했기를 바라자. 네 돌잔치 때 기억나니? 아빠가 몰래 만두에 동전을 넣었다가, 그게 목에 걸려서 네 얼굴이 퍼렇게 변했지. 그땐 진짜 심장이 멎는 줄 알았단다. 다행히 그때 나이 든 천사님이 마침 놀러 오셨다가 널 살려주셨지.\r\n\r\n\r\n아쉽게도 우리 가족이 함께 만두를 먹던 이동식 판잣집은 '앵커'에 산산이 부서져 버렸단다. 비뚤게 붙여 둔 주련과 함께 땅속에 묻혔어. 지금 엄마는 개척 기지 사람들의 남쪽 철수를 엄호하고 있어. 다행히 네 아빠는 이번 주 휴가라서, 내가 널 데리고 고향에 가라고 했단다... 그렇지 않았다면, 이 험한 길의 흔들림과 추위, 배고픔 때문에 넌 분명 울음을 멈추지 못했을 거야. '아겔로스'라 불리는 그 괴물들은 잔혹하고 냉혹하지만, 걱정 말렴. 엄마의 뇌법도 만만치 않거든.\r\n\r\n\r\n오늘 밤 우리는 한 골짜기에서 쉬고 있어. 같이 온 전문 농업인 아주머니가 남은 재료로 떡국을 끓여 모두에게 나눠 주셨단다. 엄마도 간단한 창문 전지를 몇 장 만들어 임시로 세운 대피소에 붙였어. 바깥에선 우르수스와 빅토리아어를 쓰는 작업자들이 합창하고 있단다. 거칠고 허스키하지만 뜨겁고 살아 있는 노래야. 탈로스 II에서 맞는 두 번째 설날을 이렇게 너희와 떨어져 보내게 될 줄은 몰랐어.\r\n\r\n\r\n엄마는 네가 너무 보고 싶다. 만약 엄마가 보고 싶으면, 포대기 속에 넣어 둔 그 인형을 꼭 쥐렴. 엄마가 직접 만든 거야. 별들이 아무리 멀어도, 엄마는 분명 네 손의 온기를 느낄 수 있을 거야.\r\n\r\n엄마가\r\n\r\n\r\n부요에게:\r\n\r\n이제 곧 학교에 진학할 나이가 되었겠구나. 지금은 얼마나 컸을까? 엄마를 더 닮았을까, 아니면 아빠를 더 닮았을까? 공부는 잘하고 있니? 아쉽게도 엄마가 곁에서 숙제를 봐 줄 수가 없구나. 아빠는 학궁을 졸업했지만, 수학은 늘 꽝이었거든. 혹시라도 그게 네 공부에 방해가 되진 않을까 걱정이구나. 그런데 넌 어떤 과목을 좋아하니?\r\n\r\n\r\n네 이름의 뜻을 알고 있니? 우리가 별하늘에 대한 열정을 안고 탈로스 II에 왔고, 너는 스타게이트 아래에서 태어났단다. 언젠가 네가 하늘을 향해 도약하는 '우주 천사'가 되길 바라며 이름을 '부요'라 지었어. 하지만, 이름은 어디까지나 바람일 뿐이지. 엄마의 진짜 소원은 네가 무사히, 평온하게 자라는 거란다. 공부를 좋아하든, 다른 걸 좋아하든, 네가 스스로 선택한 길이라면 엄마는 언제나 응원할게.\r\n\r\n\r\n이곳의 전쟁은 점점 더 치열해지고 있어. 얼마 전 스승님이 엄마를 불러서, 탈로스 II 궤도 위에 높이 띄울 함선을 건설하는 데 참여해 달라고 하셨단다. 우리를 비롯해, 테라에서 와 이곳에 남은 수많은 사람들이... 모두가 자신이 가진 마지막 기술, 다시는 재현할 수 없을 걸작들을 내어놓고 있어. 승리를 위해, 모두가 모든 것을 걸고 있단다.\r\n\r\n\r\n엄마도 그중 한 사람으로, 작은 지원 모듈 하나의 설계와 시공을 맡았단다. 사실, 내 손으로 별로 향하는 날이 이렇게 빨리 올 줄은 몰랐어. 하지만... 동시에, 이 순간이 너무 늦게 찾아온 것만 같구나.\r\n\r\n\r\n우리는 이 행성에서 너무나 긴 세월을 버텨 왔고, 엄마는 네가 성장해 가는 소중한 순간을 놓쳐 버렸구나.\r\n\r\n엄마가\r\n\r\n\r\n부요에게\r\n\r\n전쟁은 끝났단다. 하지만 '승리' 이후에 벌어진 일들을 떠올릴 때마다 엄마는 마음 깊은 곳에서 씁쓸함이 밀려온단다. 우리는 이제 다시는 테라로 돌아갈 수 없고, 고향으로 통하는 문은 영영 닫혀 버린 것 같구나. 우리는 더 멀리 나아가지 못했고, 오히려 서로를 해치며 무너질 뻔했단다.\r\n\r\n\r\n어젯밤 엄마는 또 네 꿈을 꾸었단다. 꿈속에서 너는 훌쩍 자라, 천사의를 받쳐 들고, 훌륭한 천사가 되어 있었지. 그런데 깨어나고 나니, 아무리 해도 꿈속의 네 얼굴이 떠오르지 않더구나. 이렇게 오랜 세월이 흘렀는데, 넌 아직 엄마 얼굴을 기억하고 있을까? 만약 지금의 날 본다면, 아마 넌 엄마를 알아보지 못하겠지... 엄마는 이제 더는 젊지 않으니까. 지금 홍산... 거대한 환형산은 이제 탈로스 II에 남은 천사들에게 내어주었단다. 여기엔 염국의 동포들도 많아. 우리는 함께 '홍산 과학원'을 세우고, 이곳에서 작물을 기르고 있어. 엄마는 옛날 행성간 항법 기술 예행연습을 준비하며 익혀 둔 수중 재배 지식을 꺼내 들었고, 몇 해를 들인 끝에 드디어 풍년을 맞았단다. 다음 차수 종자가 완전히 길러지면, 더 많은 이들이 배고픔을 걱정하지 않아도 될 거야.\r\n\r\n\r\n식량 창고가 가득 차고, 모두가 배불리 먹게 될 그날, 우리가 다시 한번 시선을 별하늘로 돌릴 수 있기를 바란단다. 설령 다시는 스타게이트에 닿지 못하더라도, 엄마는 함선을 타고 하늘로 치솟아, 무수한 별을 건너 너에게 갈 거란다.\r\n\r\n\r\n그날이 올 때까지 기다려 주렴, 나의 아가.\r\n\r\n엄마가", "weaponId": "wpn_sword_0011", "rarity": 6}, {"name": "끝없는 방랑", "type": "한손검", "description": "용광로 요새에서 제작한 무기 중 하나, 거듭된 재단조로 겉으로 드러나는 날카로움은 줄었지만, 여전히 압도적인 위압감을 내뿜습니다.", "lore": "하늘을 향해 포효하던 대포가 용광로 요새에 밤을 돌려주자, 증기의 굉음이 멈추고 마지막 남은 아겔로스는 자갈 더미로 으스러졌다. 승리의 나팔 소리가 눈밭을 타고 무너진 방벽을 지나, 전사자들의 시신이 임시로 안치된 석실 안으로 흘러들었다.\r\n\r\n\r\n용광로 요새의 장인들에게 있어, 이 나팔 소리는 전사들과 나누는 작별 인사에 더 가까웠다. 한 용광로 장인이 막 회수한 장비를 수레에 싣고 가다 한 젊은 전사 앞에서 멈춰 섰다. 그는 이미 숨이 멎은 지 오래였다.\r\n\r\n\r\n무엇이 장인의 발걸음을 붙들었을까? 죽음에 대한 공포? 그는 그렇게 생각하지 않았다. 철의 서약군 입대 신청서를 제출하던 날부터, 그는 자신도 언젠가 이 전사처럼 쓰러질 날이 올 것임을 예감하고 있었다. 용광로 요새에 당도했을 때, 그는 이곳에 박힌 '전장의 못'처럼 자리를 지키겠다고 다짐했었다. 만약 어느 날 그가 더 이상 망치를 휘두를 필요가 없게 된다면, 그것은 그가 바라던 미래를 목격했거나, 혹은 다른 누군가가 그의 자리를 대신해야 할 날이 왔기 때문일 것이다.\r\n\r\n\r\n장인은 몸을 굽혀 젊은 전사가 쥐고 있던 칼을 집어 들었다.\r\n\r\n\r\n그의 시선은 전사의 얼굴에서 좀처럼 떨어지지 않았다. 이것은 함께 싸운 전우에게 고하는 작별인가? 아니었다. 남쪽에 머물며 아직 북쪽으로 떠나기 전이었던 시절, 그 역시 수많은 사람과 이별을 겪었다. 그는 혈육이 자신을 등지고 눈물 흘리는 모습을 보았고, 사랑하는 이의 아쉬움 가득한 눈빛을 보았으며, 심지어 훈련소에 입소하기 전날 밤에는 절친한 친구의 장례식에도 참석했었다.\r\n\r\n\r\n하지만 지금처럼 알 수 없는 감정에 사로잡혀 발이 묶인 적은 없었다. 어서 자리를 뜨라고 스스로를 다그쳐 봐도 소용없었다.\r\n\r\n\r\n석실 안에 갑자기 묵직한 발걸음 소리가 울려 퍼졌다. 고개를 든 장인은 순간 숨을 멈췄다.\r\n\r\n\r\n\"제라드 성주님! 죄송합니다, 저는 그저... 회수 작업을 하던 중이었습니다.\"\r\n\r\n\r\n갑옷을 두른 거인이 손을 뻗어 장인의 손에서 칼을 건네받았다. 칼날은 이미 휘어 있었고, 칼몸에는 희미하게 균열이 가 있었다.\r\n\r\n\r\n\"아는 사이인가?\"\r\n\r\n\r\n\"아... 아닙니다, 안다고 할 정도는 아니고, 며칠 전 저희 환영회 때 술잔을 한번 부딪친 게 다입니다...\"\r\n\r\n\r\n\"이 칼은 어떻게 할 셈이지?\"\r\n\r\n\r\n장인은 칼을 돌려받아 자루에 쌓인 눈을 털어내고는, 칼몸의 상처를 유심히 살폈다. \"이 칼을 용광로에 넣어 다시 제련할 수 있다면 영광일 겁니다. 성주님과 모두가 아겔로스 무리를 격퇴하는 걸 지켜본 것처럼 말이죠. 그는 영웅입니다... 아무도 기억해주지 않을 영웅 말입니다.\"\r\n\r\n\r\n\"또한 평범한 사람이기도 하지. 이 칼처럼 말일세.\"\r\n\r\n\r\n\"성주님... 그럼 이 칼을 어찌하면 좋겠습니까?\"\r\n\r\n\r\n\"아무리 좋은 칼이라도 언젠가는 부러지는 법이야.\" 제라드는 장인의 어깨를 두드렸다. \"용광로로 돌아가게. 그 칼은 철의 서약군 안에서 계속 전해지며, 그가 미처 완수하지 못한 임무를 다하게 될 걸세.\"", "weaponId": "wpn_sword_0016", "rarity": 6}, {"name": "장대한 염원", "type": "한손검", "description": "엔드필드 공업에서 제작한 고급 무기, 실험용 오리지늄 소재를 검신 주재료로, 창의적으로 활용하여 뛰어난 에너지 전도 성능을 갖췄습니다.", "lore": "우물 같다...\r\n\r\n\r\n그는 전망대 난간에 팔꿈치를 걸치고, 바다 멀리로 날아가던 열두 번째 빈 술병의 궤적을 눈으로 쫓았다. 그리고 거대한 '링'을 보았다. 어떤 시설이고 그의 직장이기도 했다. 이렇게 높고, 이렇게 멀리서 내려다본 건 오늘이 처음이었다.\r\n\r\n\r\n대체 무엇을 하는 물건일까? 해저 대피소 같은 건가? 아니면 발사 같은 얘기도 들은 것 같고...\r\n\r\n\r\n그는 쓸데없는 추측을 늘어놓다가 곧 스스로를 다잡았다. 저 시설이 왜 존재하든, 자신과는 상관없는 일... 아마 몇 달만 일찍이었더라면, 자기 팀이 전멸하기 전이라면, 자신이 눈을 하나 잃기 전이라면, 선발 인원에 들어가, 그 시설의 더 깊은 비밀에 닿았을지도 모른다. 하지만 지금의 그는 인류를 위해 헌신하겠다는 열정 따윈 남아 있지 않았다. 그 모든 건 이미 전우들의 유골 아래 함께 묻혔다.\r\n\r\n\r\n이제 그는 그저 평범한 갑판 청소부일 뿐... 어디 소속이더라? 가슴에 걸린 사원증을 내려다본다... 아, 엔드필드 공업. 됐다, 어디든 다 거기서 거기... 엔드필드 공업이든, 공단이든, 상업연합회든, 홍산 과학원이든... 이곳엔 별별 사람이 다 모인 곳이니까.\r\n\r\n\r\n이처럼 주요 전선에서 멀리 떨어진 곳에서도, 각 세력의 거물들은 여전히 무언가 거대한 계획을 이어가고 있었다.\r\n\r\n\r\n무슨 소용이람... 전선은 줄줄이 무너지고, 인류의 터전은 점점 좁아지고 있는데, 대체 뭘로 이 상황을 막을 수 있다는 거지?\r\n\r\n\r\n그만 생각하자... 괜히 머리만 아프지.\r\n\r\n\r\n이미 아무렇게나 대충 살아가기로 마음먹은 이상 그렇게 해야지. 그럼에도 불구하고 그의 귀엔 여전히 사람들의 말이 스며들었다. 군인 집안의 외아들, 한때의 영재, 타락을 자초한 남자. 전장에서 가장 멀리 물러나, 갑판 청소부로 전락한 자.\r\n\r\n\r\n그는 그런 말들이 아직도 자신을 찌른다는 사실에 놀랐다. 그래서 오늘 이곳까지 와서 스스로를 달래보려 했던 것이다. 물론, 그 ‘달래기’란 결국 끝없는 술로 자신을 적시는 일이었다.\r\n\r\n\r\n열세 번째 빈 병이 바다로 떨어졌다.\r\n\r\n\r\n그래서, 왜일까? 아직도 내려놓지 못한 게 있나? 훈장? 전부 버렸다. 무기? 어디 묻어 뒀더라? 아... 맞다, 그거. 하, 참... 눈앞에 두고도 못 본 체했네.\r\n\r\n\r\n그는 안대를 풀었다. 아무리 덮어도 따뜻해지지 않던 것을 눈구멍에서 꺼낸다. 금과 오리고 크러스트로 만든 의안이 손바닥에서 그를 응시했다. 대대로 전해 내려온 이야기 속, 그것은 왕들의 하사한 황금으로 주조된 것이었다... 그의 조상은 사황 결전의 전장에서, 가울의 멸망을 직접 보았다... 돈 많은 상인도, 테라를 떠도는 여행자도... 그 의안은 대대로 이어받아 왔다. 그리고 마침내, 그것은 이 패배자의 손에 와 있었다.\r\n\r\n\r\n황금 실로 엮인 홍채 너머로 가문의 영광이 그를 꿰뚫는 듯한 시선으로 노려보았다.\r\n\r\n\r\n그는 주먹을 꼭 쥐어, 끝없이 이어지는 역사를 손으로 가리더니, 망설임 없이 그 의안을 바다로 던졌다.\r\n\r\n\r\n좋아, 이걸로 깔끔하게 해결됐어.\r\n\r\n\r\n그는 딸꾹질을 하며 먼 링을 바라본다. 정말 우물처럼 보였다. 테라에서 유학하던 시절, 작은 마을에서 보았던 소원의 우물이 떠올랐다. 사람들은 금화와 은화를 우물에 던지며 소원을 빈다. 더 귀한 것을 던질수록, 더 큰 소원이 이루어진다고 했다.\r\n\r\n\r\n하, 참 어리석지.\r\n\r\n\r\n만약 그 말이 진짜라면, 방금 '우물'에 던져 버린 그것은, 어떤 소원을 이루어 줄까?\r\n\r\n\r\n대국의 붕괴와 문명의 변천을 직접 보아 온 보물. 살육과 탄생, 파괴와 지속을 함께 본 보물. 그런 것이 '우물'에 흡수된다면 대체 무엇이 되어 돌아올까?\r\n\r\n\r\n됐다, 그만 이제 자야지.\r\n\r\n\r\n그는 손을 들어 열네 번째 술병을 허공에 던졌다. 그리고, 병이 하늘에 멈춰 섰다.\r\n\r\n\r\n소원의 우물이 답례를 보냈다.\r\n\r\n\r\n\r\n모든 것이 정지했다. 그리고 거대한 클러스터가 나타났다.\r\n\r\n\r\n하늘이 열렸고, 오리지늄의 길이 하늘에서 내려왔다.\r\n\r\n\r\n구름 뒤에 매우 많은 커다란 형상들이 숨었다. 거대한 스타게이트가 그들 뒤에서 빛났다.\r\n\r\n\r\n왜죠? 왕들이여, 왜입니까?\r\n\r\n\r\n제가 그대들의 하사품을 내던졌기 때문입니까? 제가 가문의 역사, 혈통, 영광을 버렸기 때문입니까?\r\n\r\n\r\n전사한 전우들이 오리지늄의 길 위에서 돋아났다. 마르고 마른 손 발과 부서진 무기를 뻗어, 그를 붙잡아 두려 했다.\r\n\r\n\r\n그래서 그는 장창을 뽑아 들었다.\r\n\r\n\r\n시신 하나를 꿰뚫을 때마다, 그의 몸에 많은 글자가 떠올랐다. 글자는 무거웠다. 내려다보니 그것은 하나하나의 이름이었다.\r\n\r\n\r\n아버지의 이름, 할아버지의 이름, 파샤의 이름, 교종의 이름, 심판관의 이름, 개척자의 이름, 광부의 이름...\r\n\r\n\r\n그는 죽은 자들의 강을 거슬러 올라, 사서 속에만 있던 그림자들까지 지나쳤다.\r\n\r\n\r\n왕들은 자신의 이름을 그의 창끝에 남겼다.\r\n\r\n\r\n그래서 그는 부러진 창을 높이 들어, 그 거대한 문짝을 찔렀고, 굉음과 함께 깨어났다.\r\n\r\n\r\n먼 링 위에서, 바다가 열렸다. 날카로운 창... 모든 세력, 모든 이의 절망과 희망, 갈망과 상처로 주조된, 우물안의 거물이 하늘을 향해 치솟았다.\r\n\r\n\r\n\r\n██년 ██월 ██일, 제강호 발사 성공.", "weaponId": "wpn_sword_0021", "rarity": 6}, {"name": "용조의 불꽃", "type": "한손검", "description": "주술 타임에서 제작한 날카로운 무기 중 하나, 특수 정련을 거쳐 검신이 붉은빛을 띠며, 독특한 액화 오리지늄을 적용한 아츠 유닛은 마치 용광로에서 흘러내린 피눈물 한 방울을 연상시킵니다.", "lore": "깊은 밤이었다. 맞은편 공방의 굴뚝에서 짙은 연기가 솟아오르고 있었다. 쇳덩이가 부딪히는 소리가 먼 거리 밖까지 울려 퍼져나갔다. 일부러 그런 듯, 거칠고 요란하기도 했다.\r\n\r\n\r\n\"잘난척은...\", 처음엔 신경 쓰지 않으려 했다. 하지만 문득 떠올랐다. 이웃의 그 여자가 지난달부터 중얼거리던 말. '곧 완성된다.' 그 생각이 떠오르자 그는 외투를 집어 들었다. 걸음을 돌리며 속으로 중얼거렸다. \"설마 정말 성공하는 건 아니겠지.\"\r\n\r\n\r\n공방 앞에 다가가니, 문틈으로 불씨가 새어 나왔다. 그는 뜨거운 열기에 숨이 막혔다. 불빛에 이끌려, 근처에서 일하던 또 다른 여자도 찾아왔다. 가벼운 옷차림으로 입가에는 비웃음이 번졌다.\r\n\r\n\r\n\"옷은 왜 그렇게 두껍게 입었어? 요즘은 대장간에 불도 안 붙이나 보지?\", 그녀는 어릴 적부터 늘 이런 식이었다. 독을 품은 말투, 차가운 눈빛.\r\n\r\n\r\n그는 대꾸하지 않고 문을 밀었다. 안은 불길로 물든 붉은 세상이었다. 광기 어린 장인이 용광로 앞에 서 있었고, 그녀의 몸에는 땀과 열기만이 남아 있었다. 안으로 들어서자 그녀는 광기에 찬 웃음을 터뜨렸다.\r\n\r\n\r\n\"너무 늦었어. 이 무기는 내 손에서 태어나야 해.\"\r\n\r\n\r\n용광로 속 쇳물은 끓어오르고 있었다. 두 번째 여자가 불길을 들여다보고는 얼굴을 굳혔다. \"안 돼... 정말 완성될지도 모르겠어.\"\r\n\r\n\r\n그 말에 질투가 가슴 깊숙이 치밀었다.\r\n\r\n\r\n세 사람은 한때 가장 친한 친구였고, 지금은 서로를 가장 증오하는 적이 되어 있었다. 언제부터 미움이 생겼는지는 기억나지 않았다. 함께 성장하며 술잔을 나누던 시절도 아득했다. 다만 하나, 세쉬카 시에 떠도는 예언만은 잊을 수 없었다. 올해 겨울, 세 명의 대장장이가 세상을 바꿀 전설의 무기를 만든다. 그 행운과 불행의 주인공은 바로 그 셋이었다.\r\n\r\n\r\n그날 이후로, 세 사람은 오직 한 가지에 집착했다. 다른 두 사람보다 먼저 완성해야 한다는 욕망. 만나면 서로를 몰아붙였고, 각자의 불길은 증오와 경쟁으로 타올랐다.\r\n\r\n\r\n지금, 말은 필요 없었다. 최고의 장인이라면 불길의 색만 보아도 그 안에 깃든 온도를 읽을 수 있었다. 광기에 사로잡힌 여자는 풍구를 잡았다. 온 힘을 다해 불을 불어넣었다. 그러나 아무리 시도해도 온도는 오르지 않았다. 그녀는 얼굴의 땀을 훔치며 숨을 몰아쉬었다.\r\n\r\n\r\n옆에 서 있던 여자가 낮게 말했다. \"이대로면 실패야.\"\r\n\r\n\r\n그러나 그녀는 미소 지으며 고개를 저었다. \"아니, 아직 끝나지 않았어.\" 그러고는 손에 들고 있던 칼끝을 자신의 목으로 가져갔다. 순간, 붉은 피가 용암처럼 끓어오르며 용광로로 흘러들었다.\r\n\r\n\r\n둘이 동시에 손을 뻗었지만, 이미 늦었다. 그녀의 몸이 불길 속으로 떨어졌고, 폭발음이 천둥처럼 울렸다. 불길이 솟구쳐 공방을 뒤덮었다. 밤이 붉게 물들고, 하늘조차 겁을 먹은 듯 눈을 내려 그 불을 덮으려 했다.\r\n\r\n\r\n타오르는 열기 속에서, 그는 옆의 여자를 바라보았다. 말없이 서로의 눈을 마주했다. 오랜 세월의 직감이 있었다. 지금은 아무 말도 필요 없다는 걸.\r\n\r\n\r\n두 사람은 다시 풍구를 잡았다. 피부가 타들어 가는 고통조차 잊은 채, 끊임없이 공기를 불어 넣었다. 그러나 용광로 안의 무기는 울림으로 그들에게 대답했다. 아직 모자라다. 더 뜨겁게, 더 높이. 내가 원하는 불길은 하늘까지 태워 뚫어야 한다고. 그녀가 짧게 웃었다. 그의 눈 속에, 불꽃 같은 빛이 어렸다. 분노와 슬픔, 질투와 욕망이 뒤섞인 불꽃이었다. 그녀는 그대로 불 속으로 걸어 들어갔다. 불길이 그녀를 삼켰다. 하지만 그는 멈추지 않았다. 이 밤의 눈보라가 그들의 불을 꺼뜨리려 하는 한, 자신이 마지막 불씨가 되어야 했다.\r\n\r\n그는 오리지늄 아츠를 다루지 못했다. 그저 수많은 세월 동안 풍구를 열고 닫는 법만 배웠을 뿐이었다. 그의 손이 움직일 때마다 불길이 살아났다. 피부가 타들어 갔지만, 용광로 속의 검이 조금씩 주조되며 형태를 갖출수록 그는 더 크게 웃었다.\r\n\r\n\r\n아프냐고? 그녀가 과거 싸움 중에 자신의 뺨을 물어뜯던 그 고통보다는 덜했다.\r\n\r\n\r\n마지막 순간, 그는 술집에서 함께 웃던 그녀들의 웃음소리를 들었다.\r\n\r\n\r\n불길은 결국 눈보라와 맞섰다. 언젠가 꺼질지도 모른다. 하지만 그는 알고 있었다. 불길 속엔 무언가가 남을 것이다. 그 불더미 한가운데에서, 세 명의 혼이 녹아든 한 자루의 검이 만들어지고 있었다. 세상의 모든 것을 가를 검.", "weaponId": "wpn_sword_0006", "rarity": 6}, {"name": "암흑의 횃불", "type": "한손검", "description": "레이시언 공업에서 출시한 차세대 경량화 무기, 검신 전체가 특수 제작된 합성 금속으로 만들어졌으며, '전문가'들에게 큰 인기를 끌고 있습니다.", "lore": "\"하... 제닝스, 드디어 전화를 받았군.\"\r\n\r\n\r\n\"잘 들어, 이건 상업 전쟁, 아니 정치적 박해야. 그들은 우리가 무엇을 손에 넣었는지 알아. 이 기술이 세상에 나오면 어떤 파장을 일으킬지도 알고 있지!\"\r\n\r\n\r\n\"그래서 그들이, 그 망할 놈들이 우리의 연구 성과를 노리고, 우리를 쫓고 있단 말이야. 온 세상을 뒤지면서!\"\r\n\r\n\r\n\"그들은 반드시 후회하게 될 거야. 난 그들의 얼굴, 말투, 하나도 잊지 않을 거야. 이건 내가 모든 걸 걸고 얻어낸 결과야. 레이시언 공업은 우리를 지켜주지 못해. 그들에게 넘어가는 순간 끝이라고!\"\r\n\r\n\r\n\"절대 그들에게 넘기지 않겠어. 그들은 절대로 그걸 손에 넣지 못할 거야. 지금 바로 네 쪽으로 갈게. '너티'가 우리를 위해 차를 준비했어. 지금 바로 네가 있는 곳으로 갈게. '너티'가 우리를 위해 차를 준비했어. 우린 '밴드'를 떠날 거야. 바깥에서 우릴 기다리는 친구도 있고.\"\r\n\r\n\r\n\"그들은 싸움을 좋아하는 사람들이라 네가 그들을 마음에 들어 하지 않는 건 알지만, 그래도 저 유리 빌딩 안에 있는 쓰레기들보다는 믿을 수 있어!\"\r\n\r\n\r\n\"선택의 여지는 없어, 제닝스. 이건 세상을 뒤집을 물건이야! 그들은 독점을 잃고 싶지 않아서 우리를 제거하려는 거야. 하지만 그들도 결국 후회하게 될 거야. 그러려면 일단 살아남아야 해, 제닝스. 살아야만 미래를 만들 수 있어.\"\r\n\r\n\r\n\"여보세요, 제닝스, 들려? 제닝스?\"\r\n\r\n\r\n\"뚜... 뚜... 뚜...\"\r\n\r\n\r\n남자는 창가로 걸어갔다. 유리에 비친 건 초췌한 자신의 얼굴. 눈 밑은 깊게 패였고, 얼마나 오래 잠을 이루지 못했는지 그대로 드러나 있었다. 순간, 그는 거울처럼 비친 그 얼굴이 자신이라는 사실을 믿기 어려웠다.\r\n\r\n\r\n\"젠장!\"", "weaponId": "wpn_sword_0010", "rarity": 6}, {"name": "강철의 여운", "type": "한손검", "description": "엔드필드 공업에서 제작한 오퍼레이터 고급 장비 중 하나, 손잡이와 글러브가 일체형으로 설계되었으며, 응력 충전 메커니즘이 운동 에너지를 충전하여 무기의 살상력을 높입니다.", "lore": "난 네가 누구인지, 어디서 왔는지 알아.\r\n\r\n\r\n너도 한때 그들 중 하나였지, 안 그래? 네 눈엔 용광로의 불길이 일렁이고 있어. 밤낮으로 그 곁을 지켰던 흔적이겠지.\r\n\r\n\r\n넌 아겔로스가 안겨준 악몽을 더는 마주하기 싫어서 남쪽으로 도망쳤어. 하지만 '진짜' 탈영병이 되고 싶진 않아서, 이름을 숨기고 엔드필드에 합류해 우리의 무기고 공학자가 됐지. 여기서 넌 평범한 삶의 가치를 찾았어. 넌 다른 이들이 각자의 싸움에서 살아남도록 도왔고, 사람들은 네가 만든 무기를 찬양했지. 손에 착 감기고 가볍다면서 말이야. 설계자의 오랜 실전 경험이 녹아든 무기였으니까. 넌 엔드필드의 신기술을 보며 생각했을 거야. '그때 이 기술이 있었다면, 많은 게 달라졌을 텐데'라고.\r\n\r\n\r\n두말할 것도 없이, 그 아이는 널 무척 따랐어. 넌 괴팍한 성격의 어른이지만, 아이의 부모조차 해주지 못한 이야기를 해줬으니까. 그 이야기엔 용사가 있고, 몸을 아끼지 않은 전투와 삶, 그리고 알려지지 않은 희생이 있었지. 너도 그 아이에게 기술을 좀 배웠지? 그런 일체형 설계는... 네가 예전에 일하던 곳에선 보기 드문 방식이었을 테니까.\r\n\r\n\r\n그래서 그 아이가 검술을 가르쳐달라고 했을 때, 넌 망설였던 거야. 처음엔 패기 넘치던 시절을 떠올리며, 검술이 아이를 지켜줄 거라 생각했겠지. 그러다 생각을 고쳐먹었어. '이 아이에게 검술이 왜 필요하겠어? 엔드필드의 무기고가 있고, 사랑해 주는 부모도 있는데.' 넌 그 아이에게 탈영병이자 실패한 도살자의 가르침 따윈 필요 없다고 생각했어. 이미 버려진 길 위에 또 다른 나그네를 세울 필요는 없다며 말이야.\r\n\r\n\r\n그 후, 넌 부서 이동을 신청했어. 무기고를 떠나 억지로라도 다시 전선으로 돌아가려 했지. 적어도 엔드필드 공업의 전선으로 말이야.\r\n\r\n\r\n그렇게 쳐다보지 마. 난 디얄도 아니고 기계로 네 마음을 읽은 것도 아니야.\r\n\r\n\r\n하지만 전해줄 말이 있어. 네가 어떤 선택을 하든, 펠리카 감독관님은 네 결정을 반대하지 않을 거야. 다만, 그 아이를 슬프게 하지는 말아줘. 알겠지?", "weaponId": "wpn_sword_0005", "rarity": 5}, {"name": "숭배의 시선", "type": "한손검", "description": "홍산 무기 대장간에서 출시한 고급 무기, 전 제품군 중에서도 특히 인기가 높아, 황무지에서조차 수많은 모조품이 유통될 정도입니다.", "lore": "초가을, 탈로스 II의 북쪽에는 벌써 눈발이 흩날리고 있었다. 잿빛 하늘 아래, 눈송이는 살을 에는 칼바람을 타고 사방을 휩쓸었다. 눈발은 들판을 가로지르고 마른풀을 헤치며, 사방에서 바람이 새는 낡은 초소로 파고들더니... 마침내 모닥불의 온기에 살짝 가로막혀 소년의 얼굴 위에 내려앉았다.\r\n\r\n\r\n\"에취!\"\r\n\r\n\r\n재채기도 젊은 페로의 허기를 막지 못했다. 고기국 한 그릇에 빵 두 조각, 그는 식기까지 핥아먹을 기세였다.\r\n\r\n\r\n\"감... 감사합니다...\"\r\n\r\n\r\n\"별말씀을. 차가운 바람에 떠밀려 이곳에서 만났으니, 우린 이미 친구나 다름없지.\"\r\n\r\n\r\n서른 살쯤 되어 보이는 포르테 '요리사'가 모닥불 건너편에 앉아 싱글벙글 그를 바라보고 있었다.\r\n\r\n\r\n\"그래서, 이보게 친구. 어찌하여 홀로 이 북쪽 지역까지 오게 되었는가?\"\r\n\r\n\r\n\"천하의 고수들을 찾아다니며 <천하무평>을 써볼까 해서요! 어, 그러니까 고수들의 무공과 일대기를 기록한 책 같은 건데... 저희 홍산에 진지천이라는 선배 고수가 계시거든요. 행방불명되셨다는 소문을 듣고 조사를 좀 해볼까 해서 북쪽 지역으로 왔는데... 운이 없어서 아겔로스한테 쫓겨 여기까지 오게 된 거예요. 젠장, 이러다 또 앵커라도 떨어지는 거 아닌가 몰라.\"\r\n\r\n\r\n포르테가 자기 그릇에 국을 한 국자 더 덜으며 말했다.\r\n\r\n\r\n\"그 고수라면 나도 알지. 어린 시절 부모를 여의고 담검당에 들어간 뒤 성적은 바닥을 기었지만, 강호를 유람한 뒤 젊은 세대의 으뜸가는 고수로 우뚝 서더니, 누구나 인정하는 검술의 대가가 되었지... 가정도 화목했는데, 남편 또한 경공에 능한 고수였지. 딸도 하나 있었는데, 이름이 진천우였던가?\"\r\n\r\n\r\n\"그렇게 잘 아시는 걸 보니, 아저씨도 검술의 대가이신가요?\"\r\n\r\n\r\n\"젊었을 때 방랑자들에게 황무지의 검술을 몇 수 배웠을 뿐이라네.\"\r\n\r\n\r\n\"그럼 아저씨한테 진지천 선배님은 어떤 존재이신가요?\"\r\n\r\n\r\n\"모두가 우러러보는 경지에 오른 분이시지.\"\r\n\r\n\r\n\"맞아요... 검을 배우는 사람치고 그분을 존경하지 않는 사람이 없죠. 그분의 검은 단순히 빠른 게 아니라 자유로운 경지에 이르렀다고 들었어요. 그분의 검이 허공을 가를 때면 '천지'가 느껴진다고 하더라고요. 마치 이 하늘과 땅 사이의 모든 것, 가장 높은 산봉우리와 가장 깊은 바다까지도 그 검 안에 녹아들어 있는 것처럼요. 하지만 그러면서도 그 검은 가볍고 자연스러워서, 한 톨의 먼지나 한 줄기 맑은 바람처럼, 검세가 만물에 깃들어 어디에나 존재하는 것 같대요... 그분의 검을 막아낼 수 있는 게 세상에 존재할지 상상조차 안 가요. 무슨 아겔로스 따위가...\"\r\n\r\n\r\n\"앵커.\"\r\n\r\n\r\n\"맞아요, 아무리 거대한 앵커라도 단번에 두 동강 내버리시겠죠...\"\r\n\r\n\r\n\"내 말은, 앵커가 하늘에서 날아오고 있다는 뜻일세.\"\r\n\r\n\r\n말이 끝나기가 무섭게 젊은 페로는 고개도 들지 않은 채 순간적으로 튀어 올라, 모닥불을 뛰어넘어 밖으로 내달렸다.\r\n\r\n\r\n\"뛰어봤자 앵커보다 빠를 순 없을 텐데.\"\r\n\r\n\r\n\"적어도 앵커에 깔려 죽지는 말아야죠! 그러고 나서 아겔로스보다 빨리 달리면 되잖아요!\"\r\n\r\n\r\n\"하하, 그건 좀 어려울걸. 우린 예전에 그러다 따라잡혔거든.\"\r\n\r\n\r\n포르테는 느긋하게 걸음을 옮겼다.\r\n\r\n\r\n\"어릴 적, 방랑자들을 따라 스톡비스트를 몰고 다니다가 아겔로스에게 포위된 적이 있었지. 그때 철검을 든 한 여검객이 '적홍'을 그어 아겔로스를 부숴버렸고, 경공에 능한 분이 나를 둘러업고 포위망을 뚫고 나갔어... 그 후로 오랫동안 사방을 수소문하고 홍산을 여러 번 찾아갔지만, 두 분을 다시 뵙진 못했네. 그래도 마음속으로는 그분들을 깊이 존경하고 있지...\"\r\n\r\n\r\n그는 허리춤에서 단검을 뽑아 들었다.\r\n\r\n\r\n\"두 분의 경지에는 도달할 수 없었지만, 마음만은 늘 그곳을 동경했네. 그래서 반평생을 허송세월하며, 겨우 그 시절 검세의 반 푼어치 정도나마 흉내 낼 수 있게 되었지. 오늘 운 좋게 자네에게 보여줄 수 있겠구먼.\"\r\n\r\n\r\n앵커가 굉음과 함께 떨어지며, 방금 전까지 두 사람이 머물던 작은 정자를 폐허로 만들었다.\r\n\r\n\r\n그 직후, 검광이 무지개처럼 뻗어 나갔다.", "weaponId": "wpn_sword_0015", "rarity": 5}, {"name": "O.B.J. 엣지 오브 라이트", "type": "한손검", "description": "엔드필드 공업에서 제작한 제식 장비 시리즈, 베테랑 무기고 공학자 오페로가 구성한 프로토타입 기획팀의 설계작. 검 손잡이에 탈착할 수 있는 보조 부품이 장착되어 있습니다.", "lore": "...그러니까 네 말은, 사관학교 출신도 아니고 '도치' 녀석이 훈련시킨 엘리트도 아니니까, 너희 소대가 대항 훈련에서 Z7 그 녀석들한테 깨지는 게 당연하다, 뭐 그런 뜻이냐?\r\n\r\n\r\n변명은 집어치워라. 애송아. 너처럼 생각하는 신입들을 내가 얼마나 많이 굴려봤는지 기억도 안 난다. 하나같이 출신이 별로라 남보다 뒤처진다고 생각하더군.\r\n\r\n\r\n표정을 보아하니, 내가 이제 와서 '출신이나 학력 따윈 중요하지 않다' 같은 뻔한 설교라도 늘어놓을 줄 알았나? 하하, 착각하지 마라! 난 너희 교관이지 심리 상담사가 아니야. 내 적성에도 안 맞고 말이지.\r\n\r\n\r\n그래도 말이 나왔으니 하는 얘긴데, 당연히 중요하지. 아주 중요하고말고.\r\n\r\n\r\n하지만 그게 없다고 해도, 다 먹고살 구멍은 있는 법이야.\r\n\r\n\r\n\r\n아니면 내가 어떻게 이 교관 자리까지 왔는지, 한번 맞춰보겠나?\r\n\r\n\r\n땡! 나, 사토 미츠고는 평생 제대로 공부란 걸 해본 적이 없어. 빅토리아어 글쓰기도 제강호에서 배웠지. 내가 너만 했을 땐 '신 츠쿠시'에서 돈 떼먹은 놈들 쫓아다니며 수금이나 하고 있었다고!\r\n\r\n\r\n뭐? 수금원이 뭔지 모른다고? ...됐다, 그냥 돈 받고 사람 패주는 해결사라고 생각해.\r\n\r\n\r\n어쨌든 한 3~4년 동안은 맨날 누굴 패거나 얻어맞는 게 일상이었어. 물주가 돈만 찔러주면 뭐든 했지.\r\n\r\n\r\n\r\n그때 나도 이십 대였는데, 평생 그렇게 살 줄 알았는데 말이지... 그런데 웬걸, 금방 사고가 터지더군.\r\n\r\n\r\n그래... 사람을 잘못 건드린 거야. 어디 거물급 인사도 아니었고, 상업연합회의 보안 업체도 아니었어. 바로 우리 사무소 보스였지.\r\n\r\n\r\n휴, 내가 왜 너희들한테 기술 쓸 때 항상 주변 좀 잘 살피라고 잔소리하겠냐? 내가 바로 그것 때문에 피를 봤거든.\r\n\r\n\r\n\r\n그날은 날씨도 참 좋았는데 말이지. 아침부터 사무소 애들 스무 명쯤 데리고 카지노를 포위했어. 상대는 고작 일곱여덟 명이니, 식은 죽 먹기라고 생각했지.\r\n\r\n\r\n근데 그놈들 죄다 싸움귀신일 줄 누가 알았겠냐. 순식간에 우리 쪽 절반이 나가떨어졌어. 난 뭐, 방법은 없고 애들을 버리고 도망갈 수도 없어서, 에라 모르겠다 하고 카지노에 있는 회전문이라도 써먹자 한 거지...\r\n\r\n\r\n어떻게 써먹었냐고? 아, 그냥 옆에 있던 안전 레버를 당겨버렸지. 멈춰 있던 게 죄다 돌아가게 말이야... 어쨌든 놈들 중 둘이 순식간에 문에 끼어서 돌아갔고, 우리 사무소 애들이랑 같이 겨우겨우 놈들을 쫓아냈어.\r\n\r\n\r\n근데 그 문이 2층 문이랑 연동돼 있을 줄 내가 어떻게 알았겠냐? 연결된 건 그렇다 쳐도, 하필이면 구경하러 온 우리 보스가 거기에 딱 걸려버린 거야. 그대로 꼬리가 말려 들어가서 댕강 잘려나갔지... 그 양반이 루포였는데, 꼬리가 목숨보다 중하거든.\r\n\r\n\r\n\r\n그다음? 그다음이야 뻔하지, 개척 지역으로 야반도주했지! 화물 운전기사 2년, 청소부 4년, 현상금 사냥꾼 3년... 허리가 거의 작살날 때쯤 겨우 운이 좀 트여서, 예전 단골 추천으로 여기까지 오게 된 거야.\r\n\r\n\r\n자, 이제 네가 말할 차례다. 다음엔 어떻게 Z7 녀석들을 이길 거지?", "weaponId": "wpn_sword_0019", "rarity": 5}, {"name": "십이문", "type": "한손검", "description": "황무지에서 제작된 날카로운 장검, 무기 장인마다 장식을 두르는 방식이 제각각인 부분이 인상적입니다.", "lore": "...그리하여, 아직 사자가 되지 못한 오리사는 열두 구의 시신 곁에서 사막 도적에게 물었다.\r\n\r\n\r\n\"너는 어찌하여 만물의 대지 사람들을 학살하였는가?\"\r\n\r\n\r\n\"혐오하기 때문이다.\" 사막 도적이 대답했다.\r\n\r\n\r\n\"어찌하여 혐오하는가?\"\r\n\r\n\r\n\"흑과 백이 서로를 너무도 선명히 비추니까.\" 사막 도적이 다시 대답했다.\r\n\r\n\r\n만물의 대지가 택한 길은 랜드브레이커의 길을 부정했다. 만물의 대지는 사람들에게 재난을 피하는 수단을 가르쳐 다툴 이유를 없앴고, 작물을 기르는 법을 가르쳐 서로 죽일 이유를 없앴다... 학살자의 눈에 이것은 자신의 삶을 송두리째 부정하는 명백한 증거였다.\r\n\r\n\r\n...이에, 사막 도적은 열두 구의 시신 곁에서 오리사에게 물었다.\r\n\r\n\r\n\"너는 어찌하여 비겁한 삶을 자처하는가?\"\r\n\r\n\r\n\"이것이야말로 가장 위대한 용기이기 때문이다.\" 오리사가 대답했다.\r\n\r\n\r\n\"너는 어찌하여 살육을 거부하는가?\"\r\n\r\n\r\n\"우리의 적은 서로가 아니니까.\" 오리사가 다시 대답했다.\r\n\r\n\r\n만물의 대지는 자연을 택했고, 그들이 고른 길은 훨씬 더 멀고도 험난한 여정이었다. 탈로스 II와 공존하는 일은 비겁함이 아니며, 약자를 돕는 일은 피의 본성을 버리는 것이 아니다. 최초의 가장 고통스러운 노래를 시작점으로 소리가 이어져 울려 퍼질 때, 이 세상에 버림받는 이는 더 이상 없을 것이다.\r\n\r\n\r\n...이에, 오리사는 열두 구의 시신 곁에서 칼을 뽑아 들고 사막 도적에게 마지막 질문을 던졌다.\r\n\r\n\r\n\"만년을 가로지른 흔적은 어디에서 왔는가?\"\r\n\r\n\r\n\"저 높은 하늘의 별빛은 어디로 흐르는가?\"\r\n\r\n\r\n\"대지를 물들인 이 색채는 무엇으로 멈추는가?\"\r\n\r\n\r\n\"자연을 보고도 생각지 않으니, 어찌 지혜라 하겠는가?\"\r\n\r\n\r\n\"투쟁의 굴레에 스스로를 가둔 것은, 정녕 스스로가 원해서인가?\"\r\n\r\n\r\n\"칼과 총으로 약자를 해치면서, 어찌 용기라 칭하겠는가?\"\r\n\r\n\r\n\"약탈만 일삼고 보호하지 않으니, 어찌 동행이라 하겠는가?\"\r\n\r\n\r\n\"만물의 변화를 보고도 눈을 감으니, 어찌 영원히 남겠는가?\"\r\n\r\n\r\n\r\n학살에 심취한 사막 도적에게는 내놓을 답이 없었고, 아직 젊은 사자 또한 그에게 깨우침을 주려는 것은 아니었다.\r\n\r\n\r\n열두 개의 맞물린 질문, 그것은 그 자체로 하나의 무기였다.\r\n\r\n\r\n복수의 완성은, 상대의 마음을 완전히 부숴 버리는 데에 있다.", "weaponId": "wpn_sword_0018", "rarity": 5}, {"name": "린수를 찾아서 3.0", "type": "한손검", "description": "노스마치 중공업 지원소 '아웃도어 익스플로러' 시리즈의 주력 제품, 자연 친화적 설계 이념과 뛰어난 휴대성으로 많은 탐험가와 린수 사냥 마니아들에게 극찬받고 있습니다.", "lore": "쿠어, 이 형님이 결국 그 해왕 린수를 잡았다.\r\n\r\n\r\n봐라, 네 기억 속 모습처럼 여전히 눈부신지.\r\n\r\n\r\n그때 우리에겐 로사호가 있었고, 그 폭우 전까지만 해도 바다에서 우리가 못 잡을 린수는 없었지.\r\n\r\n\r\n베타 녀석이 돛대 위에서 놈을 가장 먼저 발견했어. 전설 그대로 온몸이 황금빛으로 빛나는 린수가 정말 존재했던 거야!\r\n\r\n\r\n그 순간 나는 생각했지. 이 한 탕만 성공하면 탈로스 II의 린수 잡이 역사에 우리가 한 획을 그을 수 있을 거라고. 그래서 린크스 형의 충고 따윈 귓등으로도 안 듣고 배를 그 폭풍 속으로 몰고 들어갔지...\r\n\r\n\r\n휴... 솔직히 말하면, 그날 이후 난 줄곧 후회했다. 난 남의 말은 죽어도 안 듣는 나이만 먹은 멍청이였으니까.\r\n\r\n\r\n그 린수 하나 때문에 로사호는 박살이 났고, 베타는 휠체어 신세가 됐어. 린크스 형님도 두 번 다시 날 찾지 않더군.\r\n\r\n\r\n하지만 억울했어. 자타공인 린수 잡이 일인자인 나 스펜서가 그 해왕 린수를 남에게 넘길 순 없었지. 남들의 술안줏거리가 되는 건 더더욱 못 참았고.\r\n\r\n\r\n눈만 감으면 그 금빛이 아른거렸어. 매일같이 스스로에게 되뇌었지. 저놈만 잡으면, 잃어버린 걸 다 되찾을 수 있다고.\r\n\r\n\r\n너만은 날 믿어줬지... 왜 그렇게 바보 같았던 거냐. 이 늙은 망나니를 믿고 탈로스 II 상업연합회 대출까지 끌어다 새 배를 사주다니. 너도 남들처럼 진작 떠났어야지!\r\n\r\n\r\n그랬으면 네 금쪽같은 2년의 청춘을 이 허깨비 같은 금빛에 허비하지도, 우리가 놈을 거의 다 잡았던 그 폭우 속에서 네 목숨을 잃지도 않았을 텐데...\r\n\r\n\r\n그 뒤의 일은 너도 모르겠지? 아이러니하게도 가장 죽어 마땅한 난 살아남았어... 그 뒤로 난 두 번 다시 바다에 나가지 않았지.\r\n\r\n\r\n지난주에 천둥소리에 잠을 깨기 전까진 말이야. 문틈 너머로 익숙한 금빛이 일렁이길래 문을 열었더니, 글쎄 그 해왕 린수가 우리 집 어항 속에 있는 게 아니겠냐! 하지만 그럴 리가 없잖아! 그건 네 형수가 어느 가게에서나 대충 사 온, 흔해 빠진 열대 린수일 뿐이었는데!\r\n\r\n\r\n예전 공단 친구들에게 부탁해 검사해 봤더니, 정말 그냥 평범한 열대 린수더라. 전설 속의 그 황금빛은... 몸에 변이로 생긴 지방층 일부가 번개 빛을 받아 금색으로 굴절된 것뿐이라더군...\r\n\r\n\r\n그러니까, 쿠어. 형은 결국 그놈을 잡긴 잡았어.\r\n\r\n\r\n하지만 알고 보니 그놈이 미끼였고, 내가 바로 린수였더구나.\r\n\r\n\r\n허무의 바다에서, 집착이라는 미끼를 물어버린 린수 말이다.", "weaponId": "wpn_sword_0020", "rarity": 5}, {"name": "불사의 성주", "type": "한손검", "description": "용광로 요새에서 제작한 무기 중 하나, 구식 설계지만 견고하고 내구성이 뛰어나며, 묵직한 검신은 전선이 이동할 때마다 동토에 깊은 흔적을 남깁니다.", "lore": "육중한 몸뚱이가 트레일러의 잔해에 기대어 있고, 두꺼운 갑옷 틈새로 피가 배어 나오고 있었다.\r\n\r\n\r\n남자는 미동도 하지 않은 채, 두 눈을 부릅뜨고 북쪽을 응시하고 있었다.\r\n\r\n\r\n\"우리가 실패할 거란 생각은 한 번도 안 해봤겠지, 안 그래?\"\r\n\r\n\r\n제리스는 흙투성이 소매로 기침과 함께 뱉어낸 피거품을 닦아내며, 덩치 큰 남자 앞으로 다가갔다. 사방에는 아겔로스의 잔해가 널려 있었고, 제리스는 바닥에 떨어진 부서진 무기를 주워 옆으로 던져버리고는 자신이 앉을 공간을 만들었다.\r\n\r\n\r\n\"우린 남쪽으로 가고 있어. 젠장, 우린 남쪽으로 가고 있다고! 출발할 땐, 우리가 남쪽으로 향하게 될 줄 누가 알았겠냐고?\"\r\n\r\n\r\n제리스는 손에 쥔 만년필을 만지작거렸다. 잉크는 다 쓴지 오래였고, 손에 남은 건 그저 빈 껍데기뿐이었다.\r\n\r\n\r\n\"뭘... 어떻게 써야 할지 모르겠어. 아니... 진작에 이 빌어먹을 곳을 떠났어야 했는데.\"\r\n\r\n\r\n트레일러에 실려 있던 화물은 전부 박살 났고, 화물을 고정했던 로프만 제리스 옆에 늘어져 있었다.\r\n\r\n\r\n\"살아남아야 했던 건 너야... 넌 군대의 영웅이고, 살아서 돌아갈 유일한 희망이었다고... 너였어야 했어.\"\r\n\r\n\r\n\"난 그저 기자일 뿐인데, 이 참패를 대체 어떻게 묘사하란 말이야? 사람들은 내가 위대한 전투를 모독한다고 떠들어대겠지!\"\r\n\r\n\r\n제리스는 괴로운 듯 머리를 감싸 쥐었다. 그의 몸은 멈추지 않고 계속해서 떨리고 있었다.\r\n\r\n\r\n한참 뒤, 제리스가 몸을 일으켰다. 북쪽에서 바람이 불어오고 있었다.\r\n\r\n\r\n\"이런 이야기를 들은 적이 있어. 영웅의 이름은 찬가에 남아, 결코 이렇게 소리소문없이 죽지 않는다고.\"\r\n\r\n\r\n\r\n\"돌아가야겠어.\"\r\n\r\n\r\n그는 중얼거렸다. 그는 모든 것을 내려놓았다. 기억도, 책임도 전부 그 자리에, 그 두꺼운 갑옷 곁에 버려두었다.\r\n\r\n\r\n\"집에 가야지...\"\r\n\r\n\r\n그는 어딘가를 향해 걸음을 옮기며 길게 발자국을 남겼다. 그는 집으로 돌아가고 있었다.", "weaponId": "wpn_sword_0007", "rarity": 5}, {"name": "긴급 대책", "type": "한손검", "description": "엔드필드 공업에서 제작한 오퍼레이터 돌파 장비 중 하나, 간결한 모듈화 구조로 가볍고 균형 잡힌 그립감을 제공하며, 검날의 내구성이 뛰어납니다.", "lore": "기록 A: 구조 요청, 구조 요청, 들리는 사람 있나? 여기는 침식 구역에 있는 엔드필드 공업 탐색 팀이다... 지지직... 생존자, 우리는 습격을... 지지직... 원거리 통신 설비 파손. 이 채널로 계속 위치 정보를 보내겠다. 지원 바란다!\r\n\r\n\r\n기록 B: 6시간이 지났지만 여전히 응답이 없다. 우리 힘으로 해결해야 할 것 같다. 팀의 제식 무장은... 침식 때문에 전부 망가졌다. 이곳에서 살아서 나가려면 새로운 무기가 필요하다. 생존 매뉴얼에 적힌 방법으로 목숨은 부지하겠지만, 날카로운 돌멩이와 신호탄으로 랜드브레이커를 쫓아내라고? 말도 안 되는 소리다.\r\n\r\n\r\n기록 C: 방법이 생겼다. 내 임기응변이 먹혀서 천만다행이야! 드론의 프로펠러를 떼어내기로 했다. 어차피 비행 시스템도 고장 났으니, 이렇게라도 써먹어야지. 프로펠러와 관측 설비의 지지대를 결합하면... 합금 날개는 아주 튼튼하고 날도 꽤 날카롭다. 이렇게 하면 우리에게도 무기가 생긴다!\r\n\r\n\r\n기록 D: 우린... 앞을 가로막던 녀석들을 쫓아냈다. 손실은 경미하다. 세상에, 급조한 무기가 이렇게 쓸만할 줄이야! 이제 반나절만 더 걸으면 침식 구역을 벗어나 가장 가까운 상업연합회 거점에 구조를 요청할 수 있다! 그들이 내밀 구조 청구서에 0이 너무 많이 찍히지 않았으면 좋겠군.\r\n\r\n\r\n기록 E: 병상에 누워있는 동안 이 녀석의 설계를 더 다듬었다. 무기고의 높으신 분들이 이 한손검을 마음에 들어 했으면 좋겠군. 그래야 내 손가락 두 개를 잃은 게 헛된 일이 아닐 테니까.", "weaponId": "wpn_sword_0008", "rarity": 4}, {"name": "거대한 격랑", "type": "한손검", "description": "미에슈코 공업의 중급 라인 제품 중 하나, 유행에 맞고 혁신적인 디자인과 놀라운 가성비로 탈로스 II 상업연합회에서 새로운 인기 패션 아이템으로 자리 잡았습니다.", "lore": "황무지 어딘가, 대형 트럭 한 무리가 바리케이드 앞에서 시동을 끄고 멈춰 섰다. 바람에 날린 황사가 차창을 거칠게 긁어댔고, 멀리서는 폭발음과 땅을 울리는 굉음이 희미하게 들려왔다.\r\n\r\n젊은 운전기사가 차창을 내리고 고개를 내밀며 소리쳤다. \"이놈의 날씨, 또 비가 오려나 보네! 앞엔 또 아겔로스가 길을 막은 거야? 이번 달만 벌써 세 번째라고!\"\r\n\r\n나이 든 운전기사는 차에서 내렸다. 등 뒤 트럭의 오리지늄 장치가 앞유리의 누런 모래를 닦아내고 있었다. \"관리소에서 보낸 응급팀이 이미 올라간 것 같아. 저기 앞의 공사 차량 보여? 벌써 도로의 낙석을 치우고 있잖아.\"\r\n\r\n\"저기, 형님, 보아하니 연배도 좀 있어 보이시는데, 뭐 특별한 아겔로스라도 본 적 있어요?\" 젊은 운전기사가 호기심 어린 목소리로 물었다.\r\n\r\n나이 든 운전기사는 담배에 불을 붙였다. \"10년 전쯤, 이 근처 정착지에서 트럭보다 더 큰 녀석을 본 적이 있지. 당시 운전기사 하나가 급하게 차에 타는 걸 봤어.\"\r\n\r\n\"그래서, 도망은 쳤대요?\"\r\n\r\n\"그 아겔로스도 따라 기어올랐는데, 중심을 잃는 바람에 트럭에 있던 화물 상자와 함께 굴러떨어졌지. 그리고 수십 톤짜리 오리지늄 원석에 깔려 박살이 나더군.\"\r\n\r\n\"운이 좋았네요. 멍청한 아겔로스를 만났으니까. 듣자 하니 그땐 이 일대가 온통 아겔로스 천지였다면서요?\"\r\n\r\n\"그보다 훨씬 심각했지.\" 나이 든 운전기사가 담배 연기를 내뿜으며 말했다. \"이 도로도 없었고, 상업연합회의 관리소도, 지원하러 올 부대도 없었어. 그 시절엔 이 주변 정착지들이 크건 작건 간에 통조림 몇 개 두고 약탈하러 온 랜드브레이커들과 허구한 날 싸워야 했으니까.\"\r\n\r\n젊은 운전기사는 갑자기 흥미가 동했는지 몸을 반쯤 차창 밖으로 내밀었다. \"아니, 고작 통조림 몇 개 때문에 랜드브레이커랑 싸우던 곳이 어떻게 지금처럼 공예품 파는 사람이 모이게 되었대요? 옐시에서 온 사람도 있던데.\"\r\n\r\n\"상업연합회가 막 세워졌을 때랑 똑같아. 처음엔 경험 많은 운전기사 십여 명이 자진해서 이곳으로 물자를 배달하러 왔지. 내 사수도 그 팀에 있었고.\" 나이 든 운전기사가 웃으며 말했다. \"저쪽에 엔드필드 공업 주둔지 보이지? 10년 전 저곳에 식량이 떨어진 적이 있었는데, 우리가 랜드브레이커가 득실대던 이 구역을 목숨 걸고 통과해서 식량을 배달했어. 내가 처음 트럭을 몰고 식량을 전해준 것도 그때였지.\"\r\n\r\n\"식량을 끌어안고 펑펑 울었겠네요.\"\r\n\r\n\"아니. 우리가 도착하기도 전에 랜드브레이커 한 무리가 죽고 싶었는지 그 사람들한테 시비를 걸었다가 아주 박살이 나서 도망쳤더군. 엔드필드 사람들은 랜드브레이커의 음식으로 허기를 채우고 있었고.\"\r\n\r\n\r\n폭발음이 점점 가까워지고, 부서진 바위가 폭포수처럼 먼 산비탈에서 쏟아져 내렸다. 하지만 운전기사들은 여전히 느긋하게 제자리를 지키며 통행 신호를 기다렸다.\r\n\r\n\"요즘 관리소는 허구한 날 무슨... '규정에 따른 운영' 타령이라니까요.\" 젊은 운전기사는 차 안으로 몸을 움츠리며 커다란 초콜릿을 꺼내 한 조각 부러뜨려 차 아래 서 있는 운전기사에게 던져 주었다. \"노선 승인받는 거야 시간 좀 쓰면 되니 그렇다 쳐요. 근데 이젠 오리지늄 에너지 보충도 통일된 가격을 받겠다니, 그것도 엄청 비싸게 말이에요. 이건 뭐 우리한테서 골드티켓을 강탈하겠다는 거나 다름없잖아요.\"\r\n\r\n\"그러게 말이야...\" 산책 겸 차에서 내린 다른 운전기사가 두 사람의 대화를 듣고는 다가왔다. \"상업연합회에 수수료 안 떼이고 살 수 있으면 얼마나 좋을까.\"\r\n\r\n그 말을 듣고 나이 든 운전기사가 빙그레 웃으며 연기를 훅 뿜었다. \"상업연합회가 없으면 누가 탈로시안 화폐를 찍어내겠나? 누가 우리 같은 영세 상인들을 보호해 주고?\"\r\n\r\n\"아?\"\r\n\r\n\"그땐 상단 패스트푸드점에서 튀긴 파울비스트 튀김도 못 먹고, 정상 가격에 받고 차에 오리지늄 연료 채울 곳도 찾기 힘들걸.\"\r\n\r\n\"난...\" 그 사람은 잠시 치열한 내적 갈등을 겪는 듯하더니, 손을 내저으며 자기 차로 돌아갔다. \"농담도 못 하겠네, 재미없게.\"\r\n\r\n\r\n또 한 번 폭발음이 들려왔다. 아까보다 더 가까운 거리였다.\r\n\r\n\"탈로스 II 상업연합회에 요즘 대기업이 얼마나 많은데...\", 젊은 운전기사가 머뭇거리다 말했다. \"안 그래도 얼마 전에 누군가 오리지늄 에너지 공급을 독점하려 한다는 소문을 들었는데요...\"\r\n\r\n나이 든 운전기사는 멀리 피어오르는 포연을 바라보았다.\r\n\r\n\"독점이라... 지난번에 협약 위반하고 독점하려던 놈은 이미 합동 회의에서 쓸어버려서 감옥 밥 먹고 있을걸. 하지만 다시 생각해 보면, 중요 물자 거래를 통제하는 건 맞지만 그건 다 북쪽 전선을 위해서잖아. 나도 몇 번 배달해 봤는데, 그 규모가 어찌나 살벌하던지.\"\r\n\r\n\"아, 북쪽 얘기가 나와서 말인데, 전에 운전하다가 아겔로스를 치어 죽인 적도 있었네.\"\r\n\r\n\r\n차 대열 앞쪽에 있던 몇 사람이 갑자기 바리케이드를 치웠고, 트럭의 오리지늄 통신 설비에서 걸걸한 목소리가 흘러나왔다. \"전방 도로 정리 완료. 차간 거리 유지하며 통행하십시오.\"\r\n\r\n젊은 운전기사가 창밖으로 소리쳤다. \"형님, 4번 협곡 가시는 거죠? 그럼 여기서 헤어지겠네요!\"\r\n\r\n\"나랑 그렇게 수다 떨기 싫었나? 나도 무릉으로 가!\" 나이 든 운전기사가 운전석에 올라 백미러를 확인하며 외쳤다. \"갈라지려면 아직 한참 남았어.\"\r\n\r\n\"에이, 형님 왜 저 따라오세요?\"\r\n\r\n\"누가 따라간대? 무릉 가서 식량 싣고 4번 협곡으로 갔다가, 오리지늄을 가지고 옐시 갔다가, 공예품 받아 라반도르마로 되돌아갈 거거든.\"\r\n\r\n투닥거리며, 둘은 각자 엔진에 시동을 걸었고, 끊임없이 오가는 차 대열 속으로 다시 섞여 들어갔다.", "weaponId": "wpn_sword_0009", "rarity": 4}, {"name": "타르 11", "type": "한손검", "description": "엔드필드 공업에서 제작한 오퍼레이터 기본 장비 중 하나, 무기고 공학자 타르가 설계를 담당했습니다. 많은 외근 오퍼레이터가 처음으로 사용하는 무기로 알려져 있습니다.", "lore": "긴장 풀어. 보이는 게 곧 결과니까.\r\n\r\n양날에 두터운 검등, 손잡이 쪽으로 살짝 쏠린 무게 중심.\r\n\r\n초보자가 쓰기엔 가드가 좀 작고, 곡선이 들어가 있어.\r\n\r\n들어 봐.\r\n\r\n한 손으로 쥐는 거야. 꽉 쥐되, 손목이 움직일 틈은 남겨 둬.\r\n\r\n자, 표적 앞에 서서 온몸의 힘을 실어 봐.\r\n\r\n위에서 아래로, 어깨에서 반대편 가슴을 향해. 계속 반복해.\r\n\r\n관리자님처럼 싸우고 싶어? 영영 그 경지엔 닿지 못할까 봐 두렵나?\r\n\r\n한눈팔지 마. 네가 보는 그대로가, 곧 네가 얻게 될 결과야.", "weaponId": "wpn_sword_0003", "rarity": 3}, {"name": "분쇄의 군주", "type": "양손검", "description": "주술 타임에서 출시한 한정판 특수 무기 중 하나, 어떤 고대 전설에서 영감받은 듯한 외형으로, 악몽 속 절규를 현실로 끌어낸 듯한 섬뜩한 아우라를 발산합니다.", "lore": "나는 산처럼 우람한 살카즈 전사에게 한 손으로 들린 채, 세쉬카의 어떤 구석으로 끌려가고 있었다.\r\n\r\n\r\n주변의 아이들이 우리를 가리키며 들떠서 부모들과 신나게 수군거렸다. 아마 우리를 '제왕정의 행진' 때 각 왕정의 주인'과 가까이서 교류하는 이벤트 중 하나로 착각한 모양이었다.\r\n\r\n\r\n아버지가 처음 날 이 공중 낙원에 데려왔을 때를 떠올리니, 그때의 나도 똑같이 들떠 있었지.\r\n\r\n\r\n하지만 지금, 표정 하나 드러내지 않는 이 침묵에 빠진 전사에게 곧 극형을 선고받을 것만 같았다.\r\n\r\n\r\n\"저, 저 표를 안 산 건 잘못했어요!\"\r\n\r\n\r\n\"......\"\r\n\r\n\r\n혹시 제목도 기억 안 나는 어떤 오래된 영화처럼, 우아한 뱀파이어에게 피를 모조리 뽑혀 그의 만찬 전 와인잔을 가득 채우게 되는 걸까?\r\n\r\n\r\n\"제, 제가 어릴 때 여기 와 본 적 있어요. 제일 좋아하던 건 '유랑자 대모험'이었어요! 그냥 그때의 좋은 추억을 다시 느껴 보고 싶었을 뿐이라고요!\"\r\n\r\n\r\n\"......\"\r\n\r\n\r\n혹은 어릴 적 누구나 한 권씩 들고 다니던 만화 <카즈데일 전기>에 나오듯, 사람 키만 한 대검에 여덟 토막 나서 어느 용광로에 던져져 연료가 되고, 뜨거운 먼지가 되어 허공에 흩어지는 걸까?\r\n\r\n\r\n\"제, 제가 표 검사 구역에 사람들로 미어터질 때, 아이들 상대하느라 정신없는 부모들 주머니에서 골드티켓을 좀 훔쳤어요! 잘못했어요!”\r\n\r\n\r\n\"...\"\r\n\r\n\r\n먹히질 않는다. 설마, 이 주술 미궁 어딘가에 숨은 사이클롭스가 내 진짜 속셈을 이미 내다본 걸까? 그럼 끝장이다. 목숨을 생각해서라도 솔직해지자!\r\n\r\n\r\n\"인정합니다, 인정! 정말 돈이 없어서 그랬어요! 약간... 범죄적 의도를 품고 있었던 건 사실이에요. 이를테면, 세쉬카 오픈 데이 마지막 순간에, 주술 타임 브랜드 본점에서 디자이너 친필 사인이 들어간 '분쇄의 군주'를 몰래 들고 나오는 그런 짓! 하지만 그건 그냥 마음속의 사악한 생각이었을 뿐이에요! 전 세쉬카에 막 들어오자마자 당신한테 잡혔다고요! 아직 아무 일도 일어나지 않았잖아요, 맹세해요! 진짜예요!!\"\r\n\r\n\r\n\"사람 데려왔어. 꽤 시끄럽네.\"\r\n\r\n\r\n쾅 하는 소리와 함께, 나는 칠흑 같은 어둠 속으로 내팽개쳐졌다. 조심스레 눈을 뜨자, 예상했던 지하 감옥의 돌바닥이 아니라 정교하고 폭신한 소파 위에 떨어져 있었다.\r\n\r\n\"용감한 유랑자여, 귀환을 환영합니다.\"\r\n\r\n\r\n정장 차림에 퍼레이드 가면을 쓴 살카즈가 내 맞은편의 고풍스러운 돌 테이블 뒤에 앉아, 내가 어린 시절 수없이 클리어했던 '유랑자 대모험'의 명대사를 읊었다.\r\n\r\n\r\n\r\n\"아스팔트 라운드어바웃에서 오신 막시밀 씨. 당신이 마지막으로 세쉬카를 찾으신 지 벌써 16년이 지났습니다. 하지만, 당신의 상품은 저희가 줄곧 보관해 왔지요.\"\r\n\r\n\r\n잠깐만, '유랑자 대모험'의 진행자는 원래 레트로풍 예복을 차려입고 신비한 주술 예언자로 분장하잖아? 생각을 정리할 틈도 없이, 마주하기 싫던 기억들이 한꺼번에 밀려왔다.\r\n\r\n\r\n지난번 '유랑자 대모험'을 클리어했을 때, 마침내 최종 '마왕 대상'... 정교함의 극치를 찍은 장난감 사브르를 바꿔 받을 수 있었다. 그건 어린 날의 나를 사로잡았던 물건이었다. 하지만 오픈 데이의 종이 울렸고, 그날 마지막 교환 시간을 놓쳐 버렸다. 아버지는 위로했다. 다음에 세쉬카가 다시 돌아오면, 그때 다시 오자고.\r\n\r\n\r\n나는 세쉬카가 라반도르마에 재차 착륙하는 날을 기다리지 못했다. 대신 아버지에게서 들은 건, 우리가 이제 빈털터리라 아스팔트 라운드어바웃으로 '몸을 좀 숨겨야' 한다는 말이었다. 그다음으로, 나는 물론 용감한 유랑자가 되지 못했다. 내 곁에 남은 건 소매치기, 밀수, 사기뿐... 그리고 오늘, 한몫 크게 잡아 보겠다며 옛자리를 다시 찾았다.\r\n\r\n\r\n살카즈가 돌 테이블 위의 보를 확 젖혔다. 안에 있던 건 버튼만 누르면 빛나던 장난감 사브르가 아니었다. 그건 바로 '분쇄의 군주'! 진짜, 주술 장인이 공들여 벼린 예리한 검이었다! 그녀는 내 눈앞에서 허공에서 펜을 뽑아 들더니, 곧장 사인을 남겼다.\r\n\r\n\r\n\"정, 정말... 제가 16년 전 못 받아 간 상품이... 이 귀한 무기라는 말입니까?\"\r\n\r\n\r\n\"그렇습니다. 유랑자를 위한 무기. 예언이 가리킨 그대로.\"\r\n\r\n\r\n예언... 감히 하나만 더 여쭤봐도 될까요?\r\n\r\n\r\n\"말씀해 보십시오.\"\r\n\r\n\r\n\"제 삶은... 나아질까요?\"\r\n\r\n\r\n살카즈가 나를 바라보며 무언가를 말했다. 하지만 내 귀엔 16년 만에 다시 울려 퍼지는, 오픈 데이 종료를 알리는 종소리만 가득했다. 정신을 차리고 보니, 내 두 발은 다시 단단한 바닥을 디디고 있었다. 사람들이 나를 에워쌌다. 아이들, 어른들, 수많은 종족의 사람들이... 모두가 고개를 들어 불꽃을 쏘아 올리는 세쉬카에게 손을 흔들며 작별을 고했다. 나는 아이 때처럼 손에 쥔 검을 꽉 움켜쥐었다. 종소리가 조금만 늦게 울렸으면, 이 검도 버튼만 누르면 빛나면 얼마나 좋을까 싶었다.\r\n\r\n\r\n아니, 난 이미 원하는 걸 손에 넣었다. 그리고 이제 무엇을 해야 할지도 안다.\r\n\r\n\r\n유랑자의 모험이 곧 시작된다.", "weaponId": "wpn_claym_0008", "rarity": 6}, {"name": "과거의 일품", "type": "양손검", "description": "노스마치 중공업 지원소의 고급 제품, 구식 기술로 설계된 체인 커터로, 현재는 대규모 생산이 이루어지고 있지 않지만, 여전히 신뢰할 수 있는 설계와 품질을 자랑합니다.", "lore": "친애하는 클래머스 밥.\r\n\r\n당신의 메시지를 잘 받았어요. 원래 직접 만나서 이야기하고 싶었지만, 북쪽 전선으로 떠나는 차가 10시간 후에 출발할 예정이고, 출발 이후로는 통신 설비를 통해 연락하기가 어려울 테니 고민 끝에 서둘러 편지를 쓰기로 했어요.\r\n\r\n\r\n당신의 걱정을 이해하고, 당신의 팀이 지금 느끼는 슬픔과 좌절감도 알고 있어요. 하지만 당신의 스승으로서 내 판단은 개인적인 감정이 아닌 전체적인 상황에 대한 분석에 따른 것이니 믿어줬으면 해요. 내 개인적인 의견만으로는 마케팅 부서의 결정을 바꿀 수 없었을 거예요. 당신들이 제출한 기술 도면이 인정받을 수 있었던 것은 제품 디자인이 뛰어났기 때문이니, 이 점에서 더 자신감을 가져도 좋아요.\r\n\r\n\r\n두 달 전, 혁신 기술 부서의 공학자들이 새로운 소형화된 오리지늄 원심 엔진을 발표했을 때 정말 놀랐어요. 이 새로운 모델은 오리지늄 엔진의 기본 기술에서 혁신과 진화를 이뤄, 과거 많은 오리지늄 엔진에서 에너지 변환의 이론적 한계를 돌파했어요. 불과 1년 전만 해도 나는 그들의 프로토타입이 소형화될 가능성이 없다고 생각했고, 그들의 이론이 도면에만 머물 것이라 여겼어요. 그러나, 기술의 발전은 내가 안일한 사고방식에 빠져있었다는 것을 일깨워줬어요.\r\n\r\n\r\n하지만 그렇다고 해서 당신들의 학문적 능력에 대해 의심할 필요는 없어요. 당신들은 아직 젊고, 선택할 여지가 많아요. 전통적인 오리지늄 엔진 기술에 대한 깊은 연구는 여전히 중요한 가치를 지니고 있어요. 그러나 내가 이전에 말했듯이, 기술은 끊임없이 발전하는 법이에요. 오랫동안 해왔던 노력이 점점 의미를 잃어가고 있음을 인정하는 것은 어렵지만, 기술자로서 감정이 객관적인 판단을 흐리게 해서는 안 돼요.\r\n\r\n\r\n물론, 내 경험에 따르면 새로운 기술이 완전히 보급되기까지는 오랜 시간이 걸리는 경우가 많아요. 테라시대에 널리 쓰였던 구형 제품들은 비록 소음이 크고 오리지늄 에너지 전환 효율이 낮을지라도, 신형 제품은 갖고 있지 않은 견고한 구조와 유지보수가 쉽다는 장점이 있어요. 그러므로 구형 디자인은 완전히 대체되는 날까지 계속 사용될 거예요.\r\n\r\n\r\n그럼에도 불구하고, 당신들의 제품 디자인은 여전히 훌륭하며, 당신 또한 뛰어난 공학자예요. 나는 당신과 당신의 팀이 앞으로 새로운 발전 방향을 찾을 수 있을 것이라 믿어요.\r\n\r\n\r\n다음에 만날 때 당신들의 새로운 발전을 기대해 볼게요.\r\n\r\n\r\n당신의 친구이자 스승\r\n\r\n윌럼 싱클레어", "weaponId": "wpn_claym_0006", "rarity": 6}, {"name": "모범", "type": "양손검", "description": "미에슈코 공업이 최근 출시한 독자 개발 제품, 고요한 수도회에서 발굴한 유물을 바탕으로 설계되었다는 소문이 있으며, 극비 기술을 내장하여 그 어떤 것도 파괴할 수 있다고 합니다.", "lore": "나는 헨리의 생각에 동의할 수 없다.\r\n\r\n레이시언 공업의 제품은 항상 실용주의적 변명에 빠져있는데, 이는 분명히 자기기만에 불과하다. 형식은 전통의 축척이자, 경험의 총합이다. 이는 자연스레 사람들에게 이익을 추구하고 해를 피하는 직관적인 감각을 부여한다. 우아함과 조화로움은 오랜 역사 속에서 완벽이 무엇인지에 대한 무언의 대답이다.\r\n\r\n그들에게 이 점을 증명하기 위해서라도 이번 입찰을 반드시 따내야만 한다.\r\n\r\n\r\n나는 목표를 파괴할 아홉 가지 방법을 가지고 있지만, 어떤 방법도 이 크기의 무기에 사용해서는 안 된다.\r\n\r\n헨리가 폭발 펄스를 시도해 보겠다고 들었을 때, 웃음이 나왔다. 그건 한 자루의 칼이여야 한다. 고객은 우리가 대포에 손잡이를 달아주기를 원하지 않으니까.\r\n\r\n\r\n파라미터 기준 미달.\r\n\r\n헨리가 나는 잠시 대화를 나눴는데, 그들도 역시 해결책을 찾지 못한 것 같다. 입찰 경쟁 회사의 설계사들이 한자리에 모여 대화 나누는 모습을 고객이 보면 어떤 생각을 할지 궁금하네.\r\n\r\n\r\n지표가 너무 높게 설정되어 있다. 사장님이 왜 이런 요구를 승인했지?\r\n\r\n그 친구가 표본을 들고 본사에 가서, 단지 똑같은 물건을 원했다 하더라도 그건 괴짜들의 이상한 물건일 것이다. 체면을 잃을까 걱정할 게 아니라, 목숨을 잃을 걱정을 해야 하는 것이 아닌가?\r\n\r\n\r\n샤워를 하다가 아이디어가 번뜩였다. 최소 요구 사항을 충족시킬 수 있었다. 역시 노래는 효과가 있다.\r\n\r\n단 숨에 네 겹의 장갑차 핵심 장갑판을 잘라냈다. 레이시언 공업이 이보다 나은 해결책을 내놓을 수 있다고는 생각하지 않는다. 물리학에는 한계가 있으니까. 우리가 아무리 의견이 다를지라도 적어도 그 사실만큼은 모두 인정해야 한다.\r\n\r\n\r\n고요한 수도회가 그 표본을 무사히 다시 작동시켰다.\r\n\r\n16겹. 천장 수리가 끝나면 32겹에 도전할 생각인 것 같다.\r\n\r\n대각선으로 비스듬히 베어낸다.\r\n\r\n그래도 다시 한번 상사와 상의해 봐야겠다.", "weaponId": "wpn_claym_0004", "rarity": 6}, {"name": "헤라펜거", "type": "양손검", "description": "주술 타임에서 출시한 기묘한 무기 중 하나, 칼날은 평범한 얼음으로 제작되었지만, 표면에 부착된 특수한 오리지늄 아츠로 인해 파괴되지 않습니다.", "lore": "나흐체러르는 바닥에 주저앉아 있었고, 앞에는 그의 대검이 놓여 있었다.\r\n\r\n\r\n그는 벌써 황무지를 며칠째 떠돌고 있었다. 얼마 전 자신의 검 아래 쓰러진 자들을 떠올리니, 절망으로 가득한 그 두 눈으로 그의 두 뿔을 꽉 바라보고 있었다. 이처럼 증오로 가득 찬 눈길 따위엔 그는 이미 익숙했다. 그저 자신의 생명을 앗아간 자에 대한 증오, 그뿐이었다. 그는 그런 시선들을 삼켜버림으로써만 고통을 잠시 잊을 수 있었다.\r\n\r\n\r\n그의 두 다리는 부어올라 있었다. 타는 듯이 뜨거워, 마치 녹아내릴 것만 같았다. 알고 보니 그는 이미 굶주림과 상처의 괴사로 몸을 잔뜩 웅크린 채 있었다. 그는 아버지에게서 이 서리 빛 검을 이어받던 날, 이 칼을 자신의 또 하나의 생명이라 맹세했었다. 하지만 지금, 그는 그저 사람의 자취가 남은 곳을 찾아, 이 오래된 친구를 물과 식량으로 바꾸고 싶을 뿐이었다.\r\n\r\n\r\n하지만 눈앞의 폐허가 된 거주지에는 그런 것이 있을 리가 없었다. 나흐체러르가 일어나 발길을 돌리려는 순간, 등 뒤에서 거친 조롱 소리가 들려왔다.\r\n\r\n\r\n\r\n\"어이, 거기 마족 놈, 그 검 팔 거냐?\"\r\n\r\n\r\n\"...너흰 용병이냐, 아니면 랜드브레이커냐?\r\n\r\n\r\n\"흥, 그게 뭐가 중요해? 네 솜씨만 좋다면, 너까지 같이 사 줄 수도 있지.\"\r\n\r\n\r\n\r\n지친 나흐체러르는 거절하지 않았다. 그는 주먹을 살짝 쥐며 아직 팔에 얼마나 힘이 남았는지 가늠했다. \"좋아, 어느 정도면 되는 건데?\"\r\n\r\n\r\n\"저기 큰 바위 보여? 그걸 쪼개 봐!\"\r\n\r\n\r\n\"잘 봐.\"\r\n\r\n\r\n그 커다란 바위는 이 거주지에서 꽤 세월을 버틴 듯했다. 위에는 아이가 새겨 놓은 그림과, 이제는 잘 읽히지 않는 글씨가 남아 있었다. 나흐체러르가 대충 가늠해 보니, 두 팔을 벌려도 닿지 않을 정도로 큰 바위였다.\r\n\r\n\r\n그는 허리를 펴고 검을 들어 온 힘을 실었다. 바람과 먼지가 흩날리고 땅이 울렸다. 먼지가 가라앉자, 바위 아래에 동굴 하나가 모습을 드러냈다.\r\n\r\n\r\n그 안에는 공포에 찬 눈빛이 있었다. 그보다 더 약하고, 더 절망적인 존재. 뒤쪽에서 웃음소리가 터졌다. 거칠고 조롱 섞인 웃음이었다.\r\n\r\n\r\n\"꽤 하잖아. 우리랑 가자. 네 몸값은 네가 정해봐라.\"\r\n\r\n\r\n\"난 용병이지, 도살자는 아니야.\"\r\n\r\n\r\n\r\n잠시 정적이 흘렀다. 그러다 이내 다시 비웃음이 쏟아졌다.\r\n\r\n\r\n\"도살자가 아니라고? 하! 웃기고 있네! 마족 놈아, 네놈들이 요즘 잘나간다지만, 결국 너희도 피 위에서 살아가는 자들이잖아. 착한 척하지 마라.\"\r\n\r\n\r\n그들 말이 옳았다. 용병이라는 일엔 결백이란 없다. 한 번 생명을 앗은 이상, 그 어떤 변명도 통하지 않는다.\r\n\r\n\r\n그러나, 동굴 속에서 자신을 바라보는 눈빛은 달랐다. 그 시선엔 증오가 없었다. 그저 고요한 슬픔과 포기, 그것이 그를 아프게 했다.\r\n\r\n\r\n십여 년 전, 스타게이트를 통과하던 순간, 그는 다시는 그런 눈빛을 보지 않아도 될 줄 알았다.\r\n\r\n\r\n\"이 검은 안 판다.\"\r\n\r\n\r\n나흐체러르는 깊이 숨을 들이마시며 대검을 다시 들어 올렸다.\r\n\r\n\r\n\"살카즈도 안 판다.\"\r\n\r\n\r\n......\r\n\r\n\r\n피로와 굶주림은 나흐체러르를 천천히 먼 곳으로 끌고 갔다.\r\n\r\n\r\n지금의 탈로스 II는 아직 그가 검을 팔아야 할 때가 아니다.", "weaponId": "wpn_claym_0013", "rarity": 6}, {"name": "천둥의 흔적", "type": "양손검", "description": "엔드필드 공업에서 제작한 특별 장비 중 하나, 화염 모양의 검과 교차식 오리지늄 회로가 결합해 기질의 효율을 증가시킵니다. 탈로스 현상을 관측한 데서 영감받았다고 합니다.", "lore": "그녀는 남들보다 조금 더 또렷하게 볼 수 있었다.\r\n\r\n\r\n그 문을 넘어오는 여정은 생각했던 것보다 훨씬 비좁게 느껴졌다. 환영과 흐릿한 색채, 피부를 스치고 지나가는 비현실적인 감촉, 그리고 찰나의 현기증과 속삭임, 과거의 파편들... 그 뒤에 찾아온 것은 혹한이었다. 겨울에서 다시 겨울로 돌아온 듯한 추위는 지독히도 현실적이었다.\r\n\r\n\r\n그녀는 즉시 주변 사람들에게 물어보았지만, 돌아오는 대답은 제각각이었다. 누군가는 눈 한번 깜빡하니 끝났다고 했고, 누군가는 며칠 동안이나 시간이 멈춰 있었던 것 같다며 거친 숨을 몰아쉬었다.\r\n\r\n\r\n그녀는 자신이 목격한 것에 어떤 의미가 있는지 궁금했다. 호기심은 그녀의 본성이었으니까. 몇 시간 동안 머릿속에서 그 색채와 선, 불규칙한 음색들을 떠올리며 붙잡으려 했지만, 그것들은 봄날의 낮잠에 꾼 꿈처럼 잡히지 않았고 의미를 찾기 어려웠다.\r\n\r\n\r\n아름다운 빛 속에서, 아무런 차단층 없이 펼쳐진 별들의 바다를 마주하기 전까지는 말이다.\r\n\r\n\r\n탈로스.\r\n\r\n\r\n\r\n시간은 탈로스 II의 극점에 석양을 허락하지 않았고, 거대한 행성이 모든 이의 시야를 가득 메웠다. 그것은 마치 위치킹의 주술을 아득히 뛰어넘는 어떤 마법처럼, 그녀의 영혼을 단단히 옭아맸다. 그녀는 눈을 뗄 수 없었다. 지식과 부 이외에, 자연의 풍광이 이토록 자신을 매료시킬 줄은 상상도 하지 못했던 것이다. 우주라는 이 새로운 시각을 '자연'의 범주에 넣을 수 있다면 말이지만, 그녀로서는 확신할 수 없었다.\r\n\r\n\r\n그녀는 탈로스를 뚫어지게 바라보았다. 그곳엔 거의 정지한 듯한 거대한 행성이 귀여운 고리 모양의 리본을 두르고 있었다. 숙모의 재봉틀에서나 보았던, 마치 꽃잎의 가장자리처럼 사랑스러운 리본이었다. 이내 그녀는 그 정적이 탈로스가 부리는 귀여운 속임수일 뿐이라는 사실을 깨달았다. 행성은 아주 미세하게 움직이고 있었다. 표면의 광택이 흐르고 있었고, 바람 소리가 들려왔다.\r\n\r\n\r\n하지만 그 모든 것은 금세 사라졌고, 탈로스는 다시 미동도 없는 거대한 물체로 돌아갔다. 심장 박동이 빨라지며 불규칙한 생각들이 머릿속에 범람했다. 어린 시절 첫 번째 아츠 수업의 답안지부터, 작년 고탑에서 완성했던 야심 찬 연구까지. 부모님의 얼굴이, 선생님이, 무너진 담벼락 사이로 뻗어 나온 손이, 아득한 유사가 스쳐 지나갔다. 칠흑 같은 해안가에 발을 디디자 마지막으로 떠오른 것은 자신의 얼굴이었다. 어린 시절 올려다보았던 라이타니엔의 하늘, 그리고 별을 세던 소꿉친구는 어느새 무수히 많은 '나'의 모습으로 변해 있었다.\r\n\r\n\r\n생애 처음으로 그런 충동이 일었다. 그녀는 탈로스를 광적으로 사랑하게 되었고, 저 거대한 별에 닿고 싶다는 열망에 사로잡혔다.\r\n\r\n\r\n그녀는 저 거대한 별이 모든 것을 하나로 연결하고 있다고 느꼈다.\r\n\r\n\r\n그 연결에 화답하듯, 그녀의 체내를 흐르는 오리지늄이 나직한 합창을 시작했다.\r\n\r\n\r\n그날 이후로 그녀는 더 이상 변하지 않았다. 그녀는 자신이 그토록 열렬히 사랑한 저 행성처럼, 장생자가 되어야만 했던 것이다.", "weaponId": "wpn_claym_0007", "rarity": 6}, {"name": "O.B.J. 헤비 버든", "type": "양손검", "description": "엔드필드 공업에서 제작한 제식 장비 시리즈, 베테랑 무기고 공학자 오페로가 이끄는 프로토타입 기획팀이 설계했습니다. 실전 상황에 맞춰 다양한 모듈 키트를 장착할 수 있습니다.", "lore": "\"...이제 가봐야 해. 진 주임님 말씀 들어보니까 예전처럼 일단 제강호로 돌아가서 며칠 쉬고, 그다음에 추후 일정을 정하게 될 것 같아.\"\r\n\r\n\r\n\"원래는 이번 기회에 널 옐시로 보내줄까 했는데... 근데 쿤이 그러더라. 너랑 얘기해 보니까 설산 자락보단 앞으로는 좀 더 따뜻한 데서 지내고 싶다 했다고.\"\r\n\r\n\r\n\"그래서 우리가 공단 쪽에 신청서를 냈거든. 그쪽도 너를 위해서라면 뭐든 해주겠다면서, 이 공원 묘지에 좋은 자리를 마련해 줬어... 하긴, 그 사람들 말마따나 넌 4번 협곡의 영웅이니까.\r\n\r\n\r\n\"걱정 마, 네가 모아둔 영화 티켓 반쪽들은 다 정리해 뒀으니까. 네가 마지막에 말한 대로, Baker에서 채팅만 했다던 그 친구한테 보내주려고.\"\r\n\r\n\r\n\"그 친구, 널 꽤 걱정하더라. 우리한테 계속 '12관'님이 이직한 거냐고 묻는 거 있지? 네가 끝까지 비밀로 했던 그 '믿는 구석'이 뉴 랭크우드 스크립터 일일 줄은 몰랐네... 하하, 딱 너다운 일이긴 하다...\"\r\n\r\n\r\n\"그러니까 말이야. 돌아가서 영화도 열 편은 더 보고, 식당에서 사람들한테 파울비스트 다리 튀김도 쏘고, 무기고 공학자한테 가서 새 무기도 받아오겠다고... 그렇게 다 계획해 놨으면서...\"\r\n\r\n\r\n\"마지막엔 어쩌자고... 망설임도 없이 혼자 뛰어든 거야? 에휴...\"\r\n\r\n\r\n\"네가 구한 유랑자들은 다 무사해. 그 물자들도 네 대신 잘 전달했고...\"\r\n\r\n\r\n\"네가 막으려던 아겔로스 놈들은, 네가 터뜨린 한 방에 거의 다 정리됐어... 남은 녀석들도 지원 온 공단 친구들이 처리했고.\"\r\n\r\n\r\n\"아무튼... 헛된 일은 아니었어. 그러니 여기선 편히 쉬어. 우리도 지나갈 일 있으면 꼭 들를 테니까...\"\r\n\r\n\r\n\"참, 이 대검은 두고 갈게... 내가 신청서 내서 '긴급 징발' 항목에서 이제 네 앞으로 돌려놨거든...\"\r\n\r\n\r\n\"전에 바꾸고 싶다던 게 이 모델 맞지? 그렇게 급박한 상황에 물자 더미에서 이걸 딱 집어 들 줄이야... 이것도 인연이라면 인연이겠다, 그치?\"\r\n\r\n\r\n\"그 폭발 속에서도 마지막까지 너랑 함께했으니까... 앞으로도 쭉 곁에 두는 게 좋겠어.\"\r\n\r\n\r\n“어차피 너희 둘 꽤 닮았잖아. 둘 다 맷집 하나는 끝내주고, 또 둘 다... 끝까지 버텨냈으니까.\"\r\n\r\n\r\n\"앞으로 서로 곁을 지켜주면, 덜 외로울 거야.\"", "weaponId": "wpn_claym_0015", "rarity": 5}, {"name": "최후의 메아리", "type": "양손검", "description": "미에슈코 공업에서 소규모로 생산한 특별 제품, 미에슈코 공업과 기사 경기 전문가인 크런웰이 협력해서 만든 시리즈의 마지막 작품입니다.", "lore": "\"어둠의 기사의 무위는 군더더기 없이 강건하며, 그 기예는 실로 정교하다. 그녀는 어떠한 오리지늄 아츠에도 의존하지 않고, 오로지 힘만으로 상대를 압도한다. 단순히 힘으로 밀어붙이는 것처럼 보이지만, 실제로는 모든 공격이 정확하게 급소를 노리고 있다. 칼날이 맞부딪힐 때마다 어둠의 기사가 매번 우위를 점하는 것은, 지점과 균형에 대한 그녀의 이해가 상대를 훨씬 능가함을 방증한다. 소문에 의하면 이 대검은 어둠의 기사의 주무기가 아니라고 하며, 예전에 쉐라그에서 트윈 소드브레이커스로 천 명이 넘는 병사와 혈전을 벌이는 걸 목격한 이도 있다 하니, 내 추측을 뒷받침하기에 충분하다.\"\r\n\r\n\r\n\"피의 기사는 그녀보다 더 강력한 힘을 가지고 있으며, 전술 또한 매우 다채롭다. 어둠의 기사가 한 점을 돌파하는 전술을 주로 사용하는 것과 달리, 피의 기사는 오리지늄 아츠를 활용하여 상대를 압박하고, 자신이 원하는 타이밍에 결전을 벌이도록 유도하는 데 능숙하다. 가히 일인군단이라 부를 만하며, 가는 곳마다 판세를 주도한다.\"\r\n\r\n\r\n\"빛의 기사의 전투 기록은... 긴말은 필요 없다. 핵심은 그게 아니니까. 그녀의 뛰어난 기술은 의심할 여지가 없지만, 빛의 기사를 성공으로 이끈 근본 원인이 전투력 그 자체가 아니라는 건 누구나 아는 사실이다. 무기를 바꾸든, 전술을 바꾸든, 심지어 사람이 바뀐다 해도 상관없다. 그런 이념을 품고 그 순간에 나서서 행동으로 옮길 수만 있다면, 누구든 빛의 기사가 될 수 있다... 물론, 그 '이념'을 실천하는 것 자체가 애초에 배울 수 없는 영역이지만.\"\r\n\r\n\r\n......\r\n\r\n\r\n\"이 기사는... 기사가 맞긴 한가? 이 영상은 언제, 어디서 입수한 거지? 아니... 확실하지 않지만... 전혀 기억에 없는 사람이야. 화면은 끊기고 적들도 지리멸렬하지만, 강한 것만은 확실해. 왠지 모르겠지만, 이 자의 진정한 전장은... 바다? 그래, 바다가 아닐까? 저기 등 뒤를 봐... 저 모습을 보니 피가 끓어오르는군. 기술보다도 저 힘, 저 분노, 저건 마치 파도로 이루어진 한 곡의 노래 같아. 그래, 노랫소리. 난 여태 무슨 생각을 했던 거지? 진실, 연결... 너무 눈부셔. 목말라, 목이 탄다고, 난...\"\r\n\r\n\r\n\r\n\"끝났어?\"\r\n\r\n\r\n\"여기서 끊겼어. 글자도 다 못 썼잖아. 여기까지 쓰시곤 갑자기 인사불성이 되셨다더군.\"\r\n\r\n\r\n\"선생님이 이 지경이 됐는데, 이 원고 진짜 괜찮은 거 맞아?\"\r\n\r\n\r\n\"쓸데없는 생각 마, 임무는 임무니까. 선생님 손은 제자리에 돌려두고, 철수하자.\"", "weaponId": "wpn_claym_0012", "rarity": 5}, {"name": "고대의 강줄기", "type": "양손검", "description": "홍산 무기 대장간에서 제작한 고급 대검, 동급 제품보다 가벼우면서 살상력은 조금도 떨어지지 않습니다.", "lore": "나는 모든 이의 마음을 헤아릴 수는 없다. 하지만 적어도 내 마음만은 들여다볼 수 있다.\r\n\r\n\r\n지금 이 순간, 내 안에는 끝없는 공포뿐이다. 우리의 연구 기지, 저 끝이 보이지 않는 대균열에 맞서기 위해 마련한 '전망대'가 이렇게 침식에 잠겨버리다니, 절망스럽기 그지없다. 식양이 정말 효과가 있긴 한 걸까? 우리가 해 온 모든 일에 정말 의미가 있었을까? 초자연에 비하면 인간은 너무나도 미미한 존재다. 무릉도 삼켜질 것이고, 만물이 삼켜질 텐데, 우리가 어떻게 그 거대한 존재를 뒤흔들 수 있겠는가?\r\n\r\n\r\n......\r\n\r\n\r\n수로를 파야 한다. 지금은 사고 현장 피해자들에 대한 구조가 가장 중요하지만, 이 수로 역시 꼭 필요하다. 적어도 침투해 들어오는 침식 조류가 지하 수맥을 오염시키는 건 막아줄 테니까. 하지만 이 또한 아무 의미 없다. 그저 하루 일찍 죽느냐, 늦게 죽느냐의 차이일 뿐.\r\n\r\n\r\n......\r\n\r\n\r\n손이 온통 물집 투성이다. 공사에 대해선 쥐뿔도 모르는 설비 작업장 직원이지만, 지금은 나도 공사에 투입되어야 한다... 본부의 지원이 올 때까지는 우리끼리 버텨야 하니까.\r\n\r\n\r\n......\r\n\r\n\r\n손을 베였다. 수로 공사장에서 부러진 단검 한 자루를 파냈다. 이곳에 묻힌 지 얼마나 되었을까? 백 년? 내 손에 묻은 피를 봐라! 애써 외면하고 있던 이성의 끈은 진작에 끊어졌다! 부모님도, 아내와 아이도 이제 없는데, 영광이니 희생이니 하는 것들을 내가 믿을 것 같나. 난 왜 살아야 하지? 난 왜 살아야 해? 도대체 왜 살아야 하는 거냐고?\r\n\r\n\r\n......\r\n\r\n\r\n내일, 죽어버리자.\r\n\r\n\r\n......\r\n\r\n\r\n심야의 공사 현장을 자살 장소로 골랐다. 참 좋은 장소에, 날씨마저 완벽하다. 장대비가 쏟아져 모든 게 진흙탕에 잠긴 것 같다. 우리 같은 패배자는 이렇게 진흙 속에서 죽어 마땅하다.\r\n\r\n\r\n폭우가 아직 다 파지 못한 수로의 일부를 무너뜨렸다. 씻겨 내려간 흙 속에서, 희미한 금속 광택을 보았다. 왠지 모르게 발걸음이 그쪽으로 향했다. 양손으로 흙을 파헤쳐 그 아래 묻힌 것을 확인했다. 그건 녹슨 밸브였다.\r\n\r\n\r\n그랬던 거구나.\r\n\r\n\r\n자료도, 확인 절차도 없이 그저 급조한 공사였는데, 기가 막힌 우연으로 선인들이 미처 끝내지 못한 수로를 우리가 뚫어버린 것이다.\r\n\r\n\r\n녹이 슬어 부스러기가 떨어지는 밸브가 그 순간 다른 형상으로 보였다. 그것은 내 아버지의 당부였고, 내 어머니의 초상이었으며, 혹은 내 조부모님 무덤 앞의 종이꽃이기도 했다.\r\n\r\n\r\n그리고 마지막은 나, 더러운 빗물에 비친 나 자신의 모습이었다.\r\n\r\n\r\n그랬던 거구나.\r\n\r\n\r\n언제나 살아가길 바라는 이가 있고, 언제나 살아남는 이가 있다.\r\n\r\n\r\n세상은 무한하지 않으며, 공포 또한 결국에는 남김없이 잠식될 것이다.\r\n\r\n\r\n그러니 나는 더 이상 죽음을 생각하지 않으련다.\r\n\r\n\r\n내가 이어나가는 것은 그저 생명이 존속하려는 본연의 모습일 뿐이니, 이렇듯 반복되며 영원히 변치 않으리라.", "weaponId": "wpn_claym_0014", "rarity": 5}, {"name": "검은 추적자", "type": "양손검", "description": "홍산 무기 대장간에서 개발한 제식 대검, 검신에 신형 특수 코팅을 적용해 뛰어난 방호 성능을 자랑하며, 극한의 악조건에서도 영향받지 않습니다.", "lore": "\"실험 데이터는 아직도 안 맞는 건가?\"\r\n\r\n\r\n그는 고개를 푹 숙였다. 교수의 평가하는 듯한 시선이 또다시 무겁게 어깨를 짓누르는 게 느껴졌다.\r\n\r\n\r\n이어서 더 깊고 무거운 한숨 소리가 들려왔다.\r\n\r\n\r\n\"휴우, 자원. 자네가 이 '식양 출력 전환' 프로젝트를 맡은 지도 벌써 3년이 넘었지, 아마?\"\r\n\r\n\r\n그는 고개를 끄덕이며 기어들어가듯 대답했다.\r\n\r\n\r\n\"네, 3년 4개월 8일 됐습니다.\"\r\n\r\n\r\n\"그럼 옆 연구실 선배나, 자네랑 똑같이 식양 연구하는 명추가 프로젝트 진도를 얼마나 뺐는지 알고는 있나?\"\r\n\r\n\r\n\"...알고 있습니다.\"\r\n\r\n\r\n\"그럼 내가 더 할 말은 없군. 스스로... 다시 한번 잘 생각해 보게. 그래도 내 제자인데, 프로젝트 변경할 수 있게 자리 하나는 남겨둘 테니까.\"\r\n\r\n\r\n\r\n연구소를 나설 때는 이미 시간이 꽤 늦어 있었다. 수업이 끝날 무렵인지, 거리에는 삼삼오오 짝을 지어 걷는 어린 천사 제자들이 보였다.\r\n\r\n\r\n그는 여느 때처럼 방흥거리를 따라 걷다가, 두 번째 모퉁이에서 꺾어 일곱, 여덟 걸음을 더 옮긴 뒤에야 자그마한 국수 가게로 들어섰다.\r\n\r\n\r\n\"사장님, 고기조림 국수 하나요. 파는 빼주세요.\"\r\n\r\n\r\n평소 앉던 자리에 앉아, 늘 먹던 메뉴를 시켰다. 가게 주인도 평소처럼 말없이 익숙한 손놀림으로 금세 국수를 내왔다.\r\n\r\n\r\n그런데 한 입을 먹자마자 미간을 찌푸렸다. 면발은 유난히 뻣뻣하고, 조림고기는 지나치게 느끼했다.\r\n\r\n\r\n\"맛이... 왜 이렇게 달라졌죠? 주방장이 바뀐 건가요?\"\r\n\r\n\r\n가게 주인은 힐끗 그를 보고는 피식 웃으며, 평소와 다르게 말문을 열었다.\r\n\r\n\r\n\"젊은이, 우리 집 국수는 고명부터 면발까지 다 내가 직접 만든다네. 어제 자네가 먹은 거랑 다르지 않아. 내가 보기엔 국수 맛이 변한 게 아니라, 국수를 먹는 자네 '마음'이 변한 게야... 먹을 기분도 아닌데 뭣 하러 왔나?\"\r\n\r\n\r\n그는 잠시 침묵하다가 고개를 저었다.\r\n\r\n\r\n\"사장님이 잘 모르셔서 그래요... 전 이 일을 무려 3년이나 붙잡고 있었어요. 3년이요. 그래서 이제 끝낼 때가 되니, 마음은 식었어도 마무리는 제대로 하고 싶었던 겁니다... 게다가, 국수 맛이 어제보다 못한 건 사실이잖아요.\"\r\n\r\n\r\n\"허허, 말은 참 잘하네. 미련 때문에 못 놓는 건 본인이면서, 괜히 내 면 탓을 하는구먼.\"\r\n\r\n\r\n그는 쓴웃음을 지으며 더는 반박하지 않았다.\r\n\r\n\r\n\"미련이 남은 거라고 치죠. 하지만 남들은 몇 달 만에 성과를 내고, 전... 3년을 했는데도 아무것도 못 얻었어요.\"\r\n\r\n\r\n\"이제라도 그만둬야 망신이라도 덜하겠죠.\"\r\n\r\n\r\n가게 주인이 듣든 말든, 그는 그동안 누구에게도 하지 못했던 말을 한꺼번에 쏟아냈다.\r\n\r\n\r\n가게 주인은 한동안 그를 바라보다가, 이내 웃음을 거두고 진지한 표정을 지었다.\r\n\r\n\r\n\"그래서, 단지 '성과가 없어서' 포기하려는 건가?\"\r\n\r\n\r\n\"저는...\" 그는 멍하니 입을 다물 뿐, 반박하지 못했다.\r\n\r\n\r\n\"자네, 보아하니 재료학을 공부하는 것 같은데... 그럼 지난 3년 동안 실험은 몇 번이나 했고, 방안은 몇 번이나 바꿨으며, 참고 데이터는 몇 권이나 남겼는지 기억하나?\"\r\n\r\n\r\n\"기억하죠... 353번, 172가지, 561... 아니, 이번 데이터까지 합치면 562권이네요.\" 그는 힘겹게 숫자를 읊다가, 문득 가슴이 탁 트이는 기분을 느꼈다.\r\n\r\n\r\n\"거 봐, 그 많은 것들이 자네만의 또 다른 보물이 아니고 뭐겠나?\"\r\n\r\n\r\n\"결과만큼 과정에서 쌓인 경험도... 똑같이 소중하단 말씀이신가요?\"\r\n\r\n\r\n그는 무언가 깨달은 듯, 생각에 잠겨 감탄하며 말했다.\r\n\r\n\r\n\"부끄럽지만, 제가 천사 제자 생활만 8년 가까이 했는데, 오늘 어르신 말씀을 듣고서야 이 간단한 이치를 깨달았네요... 정말 크게 배웠습니다.\"\r\n\r\n\r\n가게 주인은 손을 내저었고, 예전의 기억을 떠올리는 듯 멀리 허공을 바라보았다.\r\n\r\n\r\n\"그런 인사는 됐네. 난 다만 아직 갈 길이 먼 젊은이들이 벌써 포기하려고 생각하는 게 못마땅했을 뿐이네...\"\r\n\r\n\r\n\"내 제자들은 달랐지. 정말로 막다른 데 다다라도, 목숨을 걸고 나아가길 택했거든.\"\r\n\r\n\r\n노인의 입가에, 알 듯 모를 듯한 미소가 번졌다가, 갓 끓인 육수의 김처럼 이내 사라졌다.\r\n\r\n\r\n\"운이 없었던 거야... 10년 전, 실실 웃으며 '교수님, 금방 균열 닫고 돌아와서 졸업 논문 내겠습니다' 말했던 놈들이, 결국 아무도 돌아오질 못했지...\r\n\r\n\r\n\r\n\"10년 전... 그 말씀은... 혹시...\"\r\n\r\n\r\n\r\n\"다 케케묵은 옛날의 슬픈 일일세... 그만두지!\"\r\n\r\n\r\n\"아니, 뭐하나? 얼른 안 먹고?\"\r\n\r\n\r\n\"불면 그땐 진짜 맛이 변하니까!\"", "weaponId": "wpn_claym_0011", "rarity": 5}, {"name": "공업 0.1", "type": "양손검", "description": "개척 지역에서 흔히 볼 수 있는 무기 유형, 기본 설계의 기원은 추적하기 어렵습니다. 제조 공정이 복잡하지 않아 일반 공업 설비로도 생산할 수 있습니다.", "lore": "문명의 청소부'라는 말, 처음 듣는 건 아니지만 직접 본 건 이번이 처음입니다.\r\n\r\n다들 이해하기 어려워하죠. 탈로스 II의 삶은 고난의 연속이니까요. 도시와 커뮤니티가 똘똘 뭉쳐야만 난관을 헤쳐 나갈 수 있는데, 여전히 적지 않은 사람들이 도시를 떠나 유랑자와 투기꾼의 삶을 선택합니다.\r\n\r\n하지만 전 이상할 게 없다고 봅니다. 잃은 게 너무 많은 사람들도 있으니까요. 지난주에 인터뷰한 유랑자 십여 명처럼 말이죠. 그들의 커뮤니티는 재해를 입었고 식량도 심각하게 부족했으니, 선택의 여지가 없었을 겁니다.\r\n\r\n하지만 또 질서를 따르기 싫어하거나 태생부터 구제 불능인 작자들도 있어서, 자진해서 폭력과 위험 속으로 뛰어들기도 합니다.\r\n\r\n하지만 결국 그들도 '문명' 자체를 벗어날 수 없습니다. 지난주에 주워 온 기계 도구로 무기를 제작하는 걸 봤는데, 도대체 어디서 멀쩡한 선반을 구했나 궁금했거든요. 답은 아주 간단했습니다. 도시의 쓰레기 더미를 뒤져서 필요한 모든 걸 찾아내는 거죠.\r\n\r\n'문명의 청소부'라는 말이 딱 들어맞지 않습니까?\r\n\r\n아, 그리고 신문사의 그 애송이 기자 말인데, 다음번엔 저한테 붙이지 마십시오. 평생 성벽 안 안전한 도시에서나 살아야 할 사람입니다. 침낭 하나도 못 견디는 사람이 개척 지역을 돌아다녀서야 되겠습니까? 얌전히 스타들 뒤꽁무니나 쫓아다니는 게 훨씬 어울릴 겁니다.", "weaponId": "wpn_claym_0003", "rarity": 4}, {"name": "불꽃의 시험", "type": "양손검", "description": "용광로 요새에서 제작한 제식 대검, 숙련자는 드물지만 다루기 쉬워 신병들의 입문용 무기로 꾸준히 선택받고 있습니다.", "lore": "\"...너희가 무슨 생각하는지 다 안다. 이 늙은 필라인은 피도 눈물도 없나, 고작 훈련 두 달 받은 햇병아리들을 아겔로스 소굴로 밀어 넣다니 제정신인가 싶겠지! 하지만 이건 명령이다! 너희 입에서 나올 말은 '알겠습니다' 딱 한마디뿐이다! 알겠나?!\"\r\n\r\n\"꼭 내 입 아프게 두 번 말해야 알아듣나? 난 너희 교관이자, 너희를 강철로 벼려낼 '대장장이'다. 내 임무는 딱 하나, 아겔로스와의 실전은 소꿉장난이 아니란 걸 너희 머리통에 하루라도 빨리 박아 넣는 거야! 지금은 날 죽도록 미워해도 상관없다. 머지않아... 결국엔 나에게 감사하게 될 테니까...\"\r\n\r\n\r\n\"컷!\"\r\n\r\n\r\n정신을 차리고 보니, 또 같은 대사에서 말문이 막힌 뒤였습니다.\r\n\r\n로드 감독이 씩씩거리며 달려오더니 제 코앞에 삿대질을 해댔죠.\r\n\r\n\"허드슨 씨! 자네 입은 버든비스트한테 짓밟히기라도 했나? 이 간단한 대사 하나 제대로 못 쳐? 벌써 세 번째야, 세 번째! 다음에도 이러면 당장 내 세트장에서 꺼져버려!\"\r\n\r\n\r\n......\r\n\r\n\r\n대기실로 돌아오자, 매니저 대니크가 더는 못 참겠다는 듯 인상을 팍 구기며 쏘아붙였습니다.\r\n\r\n\"루카스, 대체 무슨 생각이야? 명문 뉴 랭크우드 연극 학교 우등생 실력이 고작 이 정도는 아니잖아!\"\r\n\r\n전 잠시 입을 다물고 있다가, 메모로 빼곡한 대본을 꺼내 들었습니다. 그러곤 빨간 동그라미가 쳐진 이름, '가이 크릴러'를 손가락으로 가리켰죠. 제가 맡은 철의 서약군 장교 역이었습니다.\r\n\r\n\"가이 크릴러. 고결한 성품을 지닌 철의 서약군 군인의 표본이야. 지난 시즌까지만 해도 어땠어? 부당한 대우를 받는 신병들을 위해 발 벗고 나서고, 상부의 불합리한 명령엔 정면으로 맞서던... 그런 온화한 교관이었다고.\"\r\n\r\n\"그런데 이 대본에선 어때? 오만하고 냉혹하기 짝이 없어. 신병들을 무슨 쓰다 버릴 소모품 취급하질 않나, 성적 좀 안 나온다고 벌레 보듯 경멸하고 있잖아...\"\r\n\r\n\r\n\"...그래서, 하고 싶은 말이 뭔데?\"\r\n\r\n대니크는 시큰둥한 표정으로, 제 말엔 쥐뿔도 관심 없다는 듯 굴더군요.\r\n\r\n\r\n전 한숨을 내쉬었습니다. 한때 \"난 네 1호 팬이야\"라는 말을 입에 달고 살던 그였기에, 제 생각을 진지하게 전하려 애썼습니다.\r\n\r\n\"내 말은, 이번 캐릭터 설정에 큰 문제가 있다는 거야. <강철의 부대> 시리즈가 벌써 3편째야. 그런데 핵심 조연을 이렇게 개연성 없이 망가뜨리면 안 되지. 게다가 철의 서약군을 대표하는 상징적인 캐릭터인데, 우리가 이걸...\"\r\n\r\n\r\n\"그놈의 예술가 타령 좀 집어치울 수 없어? 루카스, 아직도 학교 다니는 줄 알아?\"\r\n\r\n대니크가 짜증 섞인 목소리로 말을 끊었습니다. 익숙했지만, 설마 그에게서 보게 될 줄은 몰랐던 비꼬는 표정이었습니다.\r\n\r\n\"똑바로 좀 봐! 여긴 네 선생님의 연기 수업 시간이 아니야!\r\n\r\n무슨 캐릭터 설정이니, 대본 퀄리티니... 그런 건 감독, 작가, 제작자들이 알아서 머리 싸매고 고민할 일이지, 네가 나설 자리가 아니라고!\"\r\n\r\n\"그리고 뭐? '철의 서약군 이미지'? 웃기지 마. 이 시리즈 뜨고 나서 철의 서약군 지원자가 얼마나 늘었는지 알아? 거기 사람들은 아무 말 없던데 왜 네가 난리야?\"\r\n\r\n대니크는 쐐기를 박듯 차갑게 내뱉었습니다.\r\n\r\n\"정신 똑바로 차려. 뉴 랭크우드 바닥에 자기 주제도 모르는 배우가 설 자린 없으니까.\r\n\r\n알았으면 얼른 가서 아까 그 씬이나 마무리해!\"\r\n\r\n\r\n전 대니크를 바라보며 인정할 수밖에 없었습니다... 녀석의 말이 하나도 틀린 게 없다는 걸요.\r\n\r\n\r\n그렇습니다. 전 갓 데뷔한 신인 배우일 뿐이고, 제겐 아무런 결정권도 없었으니까요. 제가 가본 가장 먼 도시도 공단의 트리글라바뿐. 소위 '철의 서약군'이란 것도 스크린이나 포스터 속에서나 봤을 뿐입니다.\r\n\r\n이 군복만 벗어 던지면 아겔로스든, 북방 요새든, 철의 서약군 정신이든... 저랑은 아무 상관 없는 남의 일일 겁니다.\r\n\r\n...그렇지 않습니까?\r\n\r\n\r\n하지만... 퇴역 군인의 감수까지 거쳐 실제와 똑같은 원단으로 만들었다는 이 장교복. 그리고 그 가슴에 붙은, '원정'을 상징하는 저 선명한 휘장. 전 묵묵히 그것들을 내려다보았습니다.\r\n\r\n가슴 깊은 곳에서, 주체할 수 없이 뜨거운 무언가가 천천히 끓어오르는 게 느껴졌습니다.\r\n\r\n\r\n전 고개를 들어, 저의 첫 번째이자 마지막 매니저가 될 그를 조용히 응시했습니다.\r\n\r\n\"미안해, 대니크. 네 말이 맞아.\"\r\n\r\n\"이곳엔 더 이상 내가 설 자리가 없는 것 같네.\"\r\n\r\n\"그러니, 나는 이곳에 어울리는 '가이 크릴러'가 될 수 없어.\"\r\n\r\n\"...잘 있어.\"\r\n\r\n\r\n그렇게 전 매니저와 계약 해지서, 그리고 위약금까지 몽땅 휴게실에 남겨둔 채 홀로 촬영장을 빠져나왔습니다.\r\n\r\n\r\n......\r\n\r\n\r\n보름 뒤. 주변 정리를 마친 전 짐을 챙겨 뉴 랭크우드 최대의 장거리 운송 터미널로 향했고, 망설임 없이 북쪽으로 가는 표를 끊었습니다.\r\n\r\n\r\n...그 뒤로 어떻게 됐냐고요?\r\n\r\n이곳으로 와서 입대 신청서를 썼고, 지옥 같은 테스트와 훈련을 거쳐...\r\n\r\n지금, 이렇게 상관님 앞에 서게 된 겁니다.", "weaponId": "wpn_claym_0009", "rarity": 4}, {"name": "다호프 7", "type": "양손검", "description": "엔드필드 공업에서 제작한 오퍼레이터 기본 장비 중 하나, 무기고 공학자 다호프가 설계를 담당했습니다. 공략 임무에 특화된 장비입니다.", "lore": "12인 1개 정규 작전 소대 편제 시, 최소 2~3명의 오퍼레이터는 근접전용 중화기를 장비해야 한다고 판단됩니다. 해당 인원은 극도로 높은 전투 숙련도와 강인한 정신력, 그리고 풍부한 경험을 겸비해야 합니다. 거점 확보 및 돌파를 포함한 고위험 임무의 성공 여부가 이들에게 달려 있기 때문입니다. 아겔로스가 엔드필드 시설에 가하는 위협이 날로 격화됨에 따라, 훈련 기준을 재수립하고 실전 시뮬레이션 강도를 상향하며, 소대 병력 구성을 조정해야 합니다. 구체적인 방안은 다음과 같습니다...", "weaponId": "wpn_claym_0010", "rarity": 3}, {"name": "J.E.T.", "type": "장병기", "description": "노스마치 중공업 지원소의 실험형 고급 제품, 지금은 해체된 항공기 연구 센터에서 그 원형을 설계했습니다. 이 장비는 오리지늄 가압 분사기를 탑재하여 놀라운 성능을 자랑합니다.", "lore": "\"'테라'라는 이름의 고향은 저 먼 별하늘 속, 끝없는 창공 너머에 있다.\"\r\n\r\n\r\n항공기 연구 센터가 해체된다는 소식을 들었을 때, 셰인은 딱히 슬퍼하지 않았다. 지난 몇 달간 과학 연구 요원으로서의 이성이 그의 사고를 완전히 지배하고 있었기 때문이다. 그는 현재 탈로스 II 사회가 처한 곤경을 이해하고 있었고, 노스마치 중공업 지원소가 짊어진 막중한 사명들을 고려할 때 하늘을 향한 탐색은 더 현실적이고 중요한 프로젝트를 위해 뒤로 미루어질 수밖에 없다는 사실도 납득하고 있었다.\r\n\r\n\r\n하지만 실험실을 비우며 짐을 정리하던 중, 책장에 꽂힌 <퍼디낸드 물리학> 상·하권을 마주한 순간 형언할 수 없는 공허와 상실감이 견고한 이성의 벽에 가로막혀 잠시 맴돌았다. 지나온 삶을 돌이켜보니, 한때 그토록 집착하고 사랑했던 모든 것이 마치 천으로 가려진 그림처럼 느껴졌다.\r\n\r\n\r\n어린 시절 들었던 동화 <시어의 전설>, 학창 시절 푹 빠져 살았던 외계 행성에서의 모험을 그린 판타지 소설들, 그리고 위대한 물리학자 퍼디낸드 클루니가 설파한 물리학의 진리까지. 셰인은 자신의 영혼이 단 한 번도 어느 한 곳에 얽매인 적이 없다고 늘 생각해 왔다.\r\n\r\n\r\n지난 40년 동안 셰인은 오리지늄 추진기, 내열 소재, 특수 처리된 압축 오리지늄 연료와 같은 일반인은 이해하기 힘든 기술 설비를 연구하는 데 대부분의 시간을 바쳤다. 그는 뜻을 함께하는 수많은 동료와 별에 닿을 가능성을 탐구해 왔다. 비록 테라의 대지를 직접 본 적은 없지만, 그는 테라가 저 닿을 수 없는 끝없는 심연의 우주 속에 존재하며, 별들 사이에는 무수한 의문과 결과, 그리고 해답이 숨겨져 있다고 굳게 믿었다.\r\n\r\n\r\n그날 밤, 셰인은 중대한 결정을 내렸다. 그는 규정에 따라 수년간의 연구 성과를 일괄적으로 문서 보관소에 봉인하는 대신, 데이터 하드디스크와 도면을 챙겨 노스마치 중공업 지원소의 혁신 기술 부서 책임자에게 연락을 취했다. 수많은 사람의 피와 땀이 어린 이 최첨단 연구 성과가, 비록 다시는 별들을 향해 날아오르지 못할지라도 테라인이 탈로스 II를 탐색하는 데 분명 도움이 될 것이라 믿었기 때문이다.\r\n\r\n\r\n이 모든 일에는 반드시 의미가 있어야만 했다.", "weaponId": "wpn_lance_0011", "rarity": 6}, {"name": "용사", "type": "장병기", "description": "미에슈코 공업의 중급 라인 제품 중 하나, 레트로 대형 화살 디자인과 뛰어난 실전 활용성 덕분에 오늘날에도 가격을 매길 수 없는 가치를 자랑합니다.", "lore": "물론 저도 '미덕'이 가치 있다는 점은 인정합니다. 오히려 적극 지지하죠! 하지만 선생님, 가치란 수치로 환산할 수 있는 법입니다.\r\n\r\n\r\n충성심과 용기 중 어느 쪽이 더 이목을 끌까요? 관용과 연민 중 어느 쪽이 더 사랑을 받을까요? 공정한 심판관 따위는 필요 없습니다. 우리에겐 훨씬 더 확실한 게 있으니까요. 바로 시장이죠! 선생님 정도 연배시라면, 화면 위에서 춤추던 숫자들과 심장이 쫄깃해지는 차트들을 기억하고 계시겠죠? 오! 조부님을 따라 상업연합회에 가보신 적이 있다고요...? 정말 잘됐군요! 멋진 어린 시절의 추억이네요! 그렇다면 긴말 필요 없겠군요. 그때 보셨던 것들이 바로 수치화된 '미덕'의 결과물이라는 걸 아실 테니까요. 즉, 거래 가능한 가치라는 뜻이죠.\r\n\r\n\r\n맞습니다, 맞아요. 상업이야말로 인간에게만 허락된 지혜죠. 오, 제 말 믿으세요. 금융학에 대한 신랄하고 가시 돋친 비판들은 잊어버리십시오. 전 우리가 발 딛고 있는 땅이 구체든, 삼각형이든, 원기둥이든 신경 안 씁니다. 그 위에 사는 게 인간이라면, 우리 입장에서는 본질적으로 다를 게 없으니까요. 테라에서도 그랬고, 이곳 탈로스 II에서도 마찬가지입니다. 우린 우리 자신을 떠난 적이 없지 않습니까? 집을 옮긴다고 해서 뇌까지 갈아 끼우는 건 아니니 말입니다.\r\n\r\n\r\n앞만 보고 달리는 사람들은 이곳을 위기가 도사리는 땅이라 묘사하지만, 뒤집어 생각하면 아직 아무도 발을 들이지 않은 기회의 땅 아니겠습니까! 단언컨대, 이 프로젝트의 투자 전망과 잠재력은 가늠할 수 없을 정도입니다. '미덕' 시리즈 장비 출시는 이 거대한 전략의 아주 작은 첫걸음에 불과합니다... 그리고 잘 들으세요, 이 사업 기회의 냄새를 맡은 사람이 저 하나뿐인 건 절대 아닙니다.\r\n\r\n\r\n이 땅이 사람들로 미어터지기 전에, 아직 '미덕'에 값을 매길 수 있을 때... 데리안 님, 장담하건대 오늘 이 계약서에 서명하시는 획 하나하나가 훗날 마르지 않는 부로 돌아올 겁니다.\r\n\r\n\r\n네, 네! 여기 서명하시면 됩니다... 역시, 투자 안목이 아주 날카로우시군요. 제가 사람을 제대로 봤습니다. 응, 뭐라고? 알았어, 귀빈실로 안내해 드려.\r\n\r\n\r\n- 그럼, 살펴 가십시오.", "weaponId": "wpn_lance_0010", "rarity": 6}, {"name": "산의 지배자", "type": "장병기", "description": "홍산 무기 대장간에서 개발한 실험형 장창, 창대 주조 시 매우 특수한 금 합금을 혼합하여 강도를 유지하면서도 유연성을 대폭 증가시켰습니다.", "lore": "선조께서는 상촉에 사셨는데, 이곳저곳 유람하며 학문을 닦기를 즐기셨다. 하루는 먼 길을 떠났다가 갑작스런 소나기를 만나 산벼랑 아래로 피신하셨고, 마른 풀을 모아 불을 지펴 몸을 녹이고 계셨다. 막 잠시 쉬려던 참에, 홀연히 검은 옷을 입은 사람이 나타났다. 그 형상이 몹시 기이하여 눈과 입이 없었고, 팔은 산과 이어져 있었다. 선조께서 이를 이상하게 여겨 물으셨다.\r\n\r\n\r\n\"선생, 어찌하여 손이 바위에 박혀 자라난 것이오?\"\r\n\r\n\r\n괴인이 답했다.\r\n\r\n\r\n\"옛날 내가 백조에 살 때, 하루는 노란 옷의 소인이 내 손바닥 위에 서 있는 꿈을 꾸었소. 그가 내게 사람의 목숨이 얼마나 무겁냐 묻더군. 그래서 '사람 목숨은 산보다 무겁다'고 답했지. 그 소인이 듣고 기뻐하며 웃더니 '나는 그대 손바닥 안 나라의 임금이다'라고 하더군. 말을 마치고는 사라져 그 뒤로 다시는 보이지 않았소. 내 차마 그 나라를 뒤엎을 수 없어 손을 땅에 내려놓고 백 년이 넘도록 움직이지 않았지. 세월이 흐르고 깊어지며 손바닥 위에 점차 큰 산이 자라났으니, 그대가 지금 보고 있는 것이 바로 그것이라오.\"\r\n\r\n\r\n선조께서는 이해가 되지 않아 다시 물으셨다.\r\n\r\n\r\n\"선생께서는 참으로 어질고 자비로우십니다만, 어찌 자신은 돌보지 않으십니까? 손목을 잘라 자유로워지는 편이 낫지 않겠습니까?\"\r\n\r\n\r\n괴인이 말했다.\r\n\r\n\r\n\"나는 '내 손바닥 안의 나라'와 '내 팔 끝에 달린 손바닥' 중 무엇이 더 중한지 알지 못하오. 훗날 이치를 깨닫게 되면, 어쩌면 이 산을 짊어지고 다닐 수 있을지도 모르지.\"\r\n\r\n괴인이 덧붙였다.\r\n\r\n\r\n\"내 걱정은 말고 편히 주무시오.\"\r\n\r\n\r\n이에 선조께서는 잠을 청하셨다. 날이 밝자 괴인은 온데간데없었다.\r\n\r\n\r\n내가 듣기로 상촉 땅에는 '침황'이라는 풀이 있다는데, 약간의 독성이 있어 이를 태우면 환각을 본다고 한다. 선조께서도 아마 그 풀에 홀리셨던 게 아닐까!", "weaponId": "wpn_lance_0012", "rarity": 6}, {"name": "중심력", "type": "장병기", "description": "레이시언 공업 맞춤형 제품 라인의 대표 모델, 군용 장창 형태를 기반으로 다양한 특수 기능과 개성 있는 디자인을 더했습니다.", "lore": "이 도시엔 여러 가문이 있다. 가장 화목하고 단란한 가문이 어디냐 묻는다면 누구도 선뜻 답하지 못하겠지만, 가장 불화가 심한 집안을 꼽으라면 모두가 주저 없이 '웨버 가문'이라고 말할 것이다. 자식이 이토록 많으면서 이토록 갈등이 깊은 집안은 드물다. 64제곱킬로미터당 웨버가의 자식은 오직 한 명만 발을 붙일 수 있었고, 그렇지 않으면 이 불행한 땅에는 어김없이 유혈 사태가 벌어지곤 했다.\r\n\r\n\r\n지난달, 웨버가의 장남은 전장에서 한 통의 편지를 받았다. 눈앞의 적을 쓰러뜨린 뒤 그는 상관에게 한 달 휴가를 받아 귀향길에 올랐다. 숲을 지나다 남동생을 만난 그는, 도끼가 얼굴을 강타하기 직전 편지의 내용을 외쳤다. 동생은 즉시 도끼를 팽개치고 짐을 대충 챙겨 함께 긴 여정에 올랐다.\r\n\r\n\r\n강가에는 여동생이 일찌감치 배를 타고 기다리고 있었다. 그녀가 쥔 거대한 노 때문에 그들은 내내 경계를 늦출 수 없었다. 지난번 그녀 앞에서 방심했다가 사흘 뒤에야 깨어났던 적이 있었기 때문이다.\r\n\r\n\r\n남은 시간은 많지 않았지만, 가야 할 길은 멀었다.\r\n\r\n\r\n앞에는 가로질러야 할 광활한 사막이 펼쳐져 있었다. 시시각각 모양이 바뀌는 모래언덕 사이에서 길을 잃었을 때, 때마침 차량 행렬이 도착했다. 선두 차량의 창문이 내려가자 그들이 뼈저리게 혐오하는 얼굴이 드러났다. 바로 비열하고 파렴치한 작은삼촌이었다. 어릴 때부터 그들이 곤경에 처할 때면, 삼촌은 만 리 길도 마다치 않고 달려와 조롱하곤 했다.\r\n\r\n\r\n\"타라, 이 애송이들아.\" 삼촌은 자신에게 쏟아지는 세 쌍의 눈총을 무시하며 손짓으로 그들을 불렀다. 뒤따르던 차들이 일제히 경적을 울리며 어서 타라고 재촉했다. 그 소음 뒤에 또 얼마나 많은 성가신 친척들이 숨어 있을지 알 수 없었다.\r\n\r\n\r\n차량 행렬은 다시 출발했고, 사막에는 금세 사라질 바퀴 자국 몇 줄기만이 남았다. 밤낮없이 달린 끝에 마침내 마지막 목적지에 도착했다. 물이 불어난 호수는 폭풍에 휩싸여 거대한 물보라를 일으키고 있었다. 다행히 가장 부유한 고모에게는 웨버가 사람들 모두를 태울 만큼 견고하고 웅장한 배가 있었다.\r\n\r\n\r\n폭풍우 속에서 고모는 파도를 맞으며 요동치는 갑판 위를 당당하게 걸어 다녔다. 왼쪽 콧구멍으로는 구토하는 이들을 경멸하고, 오른쪽 콧구멍으로는 난간에 기대 사색이 된 이들을 비웃으며. 그렇게 광풍의 호위를 받으며 그들은 무사히 고향에 도착했다.\r\n\r\n\r\n그날 도시 안에서는 웨버가 일족이 일 분 일 초를 다투며 대로를 질주하는 광경에 모두가 혀를 내둘렀다. 거리 끝에서 끝까지 이어진 거대한 행렬은 곧장 가장 큰 병원으로 향했다.\r\n\r\n\r\n마침내 그들은 병실에 모여 강보에 싸인 여자아이를 겹겹이 에워쌌다. 아이는 힘겹게 눈꺼풀을 들어 올려 좌중을 훑었고, 이내 세상의 풍파를 모르는 그 두 눈은 영원히 감겼다.\r\n\r\n\r\n\"아이의 마지막을 보러 와줘서 고마워요.\" 차갑게 식어가는 아이를 꼭 껴안으며, 웨버가의 막내딸이 나직하게 말했다.", "weaponId": "wpn_lance_0006", "rarity": 5}, {"name": "O.B.J. 스파이크", "type": "장병기", "description": "엔드필드 공업에서 제작한 제식 장비 시리즈, 베테랑 무기고 공학자 오페로가 이끄는 프로토타입 기획팀이 설계했습니다. 사용자가 창끝 부품을 자유롭게 조정할 수 있습니다.", "lore": "그는 루드슨 워커와 다시 만나는 장면을 수없이 그려왔다.\r\n\r\n\r\n뉴 랭크우드의 전쟁 블록버스터 촬영장에서 스태프들의 예우를 받으며 자문하는 군사 고문, 혹은 마르스폴리스의 도서관 앞에서 철의 서약군 대표로 공단의 청년들에게 군인의 삶을 논하는 모습...\r\n\r\n\r\n가능성은 무궁무진했고, 하나같이 철의 서약군의 옛 '떠오르는 별'이자 언제나 최전선에 서던 그의 빛나는 이미지에 걸맞은 것들이었다. 하지만 지금 이 순간은 그 시나리오에 없었다.\r\n\r\n라반도르마행 버스 안, 출발 시간을 착각했다며 일렉트릭 기타를 멘 채 '옵시디언 뮤직 페스티벌' 포스터를 보며 땅이 꺼져라 한숨 쉬는 모습이라니. 마치 일생일대의 난제라도 만난 표정 아닌가.\r\n\r\n\r\n\"사람을 잘못 본 게 틀림없다\"는 확신을 얻으려는 듯, 그는 전우와 지나치게 닮은 그 중년 남성에게 다가가 정석적인 군례를 올렸다. 상대가 영문을 모르겠다는 얼굴로 쳐다봐주길 바라며. 하지만 유감스럽게도, 그가 놀라움에 차 이름을 외치는 순간 실낱같은 기대는 산산조각 났다.\r\n\r\n\r\n\"벅? 자네인가?!\"\r\n\r\n\r\n루드슨과 닮은 중년 남자는... 아니, 이 사람은 분명 루드슨 본인이었다. 탈로스 II를 통틀어 그를 '벅'이라 부르는 사람은 다섯 손가락 안에 꼽으니까.\r\n\r\n\r\n\"어디 보자, 우리가 못 본 지 얼마나 됐지...\" 루드슨은 진지하게 날짜를 세는가 싶더니 이내 깊은 한숨을 내쉬었다. \"휴, 벌써 20년 가까이 됐나? 세월 참 빠르군...\"\r\n\r\n\r\n그가 고개를 끄덕이며 대답을 고르기도 전에, 루드슨은 회상에 잠겨 혼잣말처럼 이어갔다.\r\n\r\n\r\n\"그때 부대에서 '전역' 노래를 부르고 다니던 건 기억나나? 자네가 제일 먼저 고향으로 돌아갈 거라고 빈센트 녀석들과 내기도 했었는데 말이야.\"\r\n\r\n\r\n\"결국 내가 졌지 하하. 빈센트가 제일 먼저 돌아갔거든. 그 녀석이 말야...\"\r\n\r\n\r\n\"...도대체 왜입니까?\" 그가 결국 참지 못하고 끼어들었다. \"분명... '이 목숨, 전장에 뼈를 묻겠다'고... 하지 않으셨습니까?\"\r\n\r\n\r\n수많은 사선을 넘은 영웅이, 왜 끝까지 버티지 못했을까?\r\n\r\n\r\n루드슨은 침묵했다. 얼굴에 걸려 있던 미소가 순식간에 굳어졌다. 한참 뒤, 음악 축제 포스터를 꽉 쥐고 있던 중년의 남자는 쓴웃음을 지으며 입을 열었다.\r\n\r\n\r\n\"내게 그걸 묻는 사람이 자네가 처음일 줄은 몰랐군... 전역 신청서를 냈을 때, 성주님도 아무 말씀 안 하셨는데.\"\r\n\r\n\r\n\"하지만 굳이 해명을 원한다면... 이렇게 말할 수밖에 없겠네. 두려워지기 시작했거든.\"\r\n\r\n\r\n\"오로라 실드 너머의 금지 구역으로 정찰을 나가는 게 무서워졌고, 죽여도 죽여도 끝이 없고 점점 더 강해지는 괴물들을 계속 상대해야 한다는 게 두려워졌어...\"\r\n\r\n\r\n\"느껴지더군... '용기'라 불리던 것이 내 몸에서 서서히 빠져나가는 게. 그걸 붙잡을 방법은 도무지 찾을 수가 없었어. 언젠가는 붙잡을 기력조차 남지 않을 것 같더군.\"\r\n\r\n\r\n\"어차피 붙잡을 수 없다면, 적어도 서로에게 최소한의 체면은 지킬 수 있는 '작별'을 고해야 하지 않겠나? 그래서 전역을 택했네... 어느 날 눈을 떴을 때, 이길 수 없는 아겔로스 앞에서 겁에 질려 동굴 속에 숨은 탈영병이 된 내 모습을 보느니 그편이 나으니까.\"\r\n\r\n\r\n\r\n\"...그럼 지금은요? 그 일렉트릭 기타는 또 뭡니까?\"\r\n\r\n\r\n\r\n그러자 46세의 루드슨 워커는 20년 전 얼굴에 달고 살던 그 찬란한 미소를 지어 보였다.\r\n\r\n\r\n\"이거 말인가? 내 손에 제일 잘 맞는 훌륭한 무기지.\"\r\n\r\n\r\n\"가끔 삑사리가 나긴 하지만, 밴드 전우들과 합은 꽤 잘 맞는 편이거든...\"\r\n\r\n\r\n\"그리고 이 친구들과 이 녀석 덕분에, 이름 없는 삼류 헤비메탈 연주자로 사는 틈틈이 상상할 수 있다네. 머릿속으로나마 일렉트릭 기타의 어느 줄로 아겔로스의 목을 졸라 끊어버릴지 말이야.\"", "weaponId": "wpn_lance_0013", "rarity": 5}, {"name": "키메라의 정의", "type": "장병기", "description": "엔드필드 공업에서 설계한 실험형 장창, 실제 생산량은 적으며, 복잡하고 변화무쌍한 전장에 대응하기 위해 분해와 조립이 쉬운 모듈화 설계를 채택했습니다.", "lore": "내 얘기 좀 들어봐요, 네? 아주 간단한 얘기니까. 내가 왜 이 낡고 녹슨 데다, 자루 틈새엔 씻기지 않는 핏자국이 눌어붙은 엔드필드제 장창을 들고, 여러분이 이렇게 말리는데도 기어코 병원을 나가려는지... 그 이유 말이에요. 날 좀 믿어봐요. 내 얘기가 끝나면 당신들도 이해하게 될 겁니다. 날 무슨 물건에 미친 미치광이 취급해서 휠체어에 묶어두는 대신 말이죠.\r\n\r\n정말 간단한 이야기라니까요, 거짓말이 아닙니다. 4년 전, 정확히는 1522일 전, 4번 협곡 보안팀 6명이 야외에 고립된 일가족을 구조하려다 아겔로스의 습격을 받았습니다. 열 마리의 아겔로스... 감정이라곤 없는 그 괴물 열 마리가 그들을 포위했죠. 결말은 뻔해요. 대충 짐작 가시잖아요?\r\n\r\n\r\n딱 두 사람만 남았습니다.\r\n\r\n\r\n오직 두 사람만 살아남았죠. 팀에서 가장 건장했던 남자 하나가 맨주먹으로 전우들의 시체 더미 곁에 서 있었습니다. 등 뒤엔 울음을 그치지 않는 어린아이가, 맞은편엔 반쯤 박살 난 아겔로스 한 마리가 있었고요. 아겔로스는 비록 팔다리는 부러졌지만, 아직 돌진할 힘은 남아 있는 상태였고요... 아, 손에 든 게 아무것도 없는데 이를 어찌할까요?\r\n\r\n다행히 금세 그는 방법을 떠올렸습니다. 이건 엔드필드 공업에 감사해야겠네요, 그렇죠? 엔드필드 공업의 이 창은 자유롭게 조립할 수 있었으니까요. 그래서...\r\n\r\n그는 팀장의 시신에서 창날을 뽑고, ██████의 부러진 뼈에서 첫 번째 자루를, █████의 손에서 기질 모듈을, ██████의 등에서 두 번째 자루를 꺼냈습니다. 그리고 마지막으로, 아내의 미간에서 마지막 자루를 뽑아냈죠.\r\n\r\n그리고 승리했습니다. 아이를 데리고 4번 협곡으로 돌아와, 그의 장창을 물려주었...\r\n\r\n잠깐,\r\n\r\n왜 다들 알겠다는 표정이죠?\r\n\r\n제가 그 생존자냐고요? 제가 제 창에 '키메라의 정의'란 이름을 붙였냐고요?\r\n\r\n제가 그 아이고? 그래서 은혜라도 갚으려는 거냐고요?\r\n\r\n아뇨.\r\n\r\n절대 아닙니다.\r\n\r\n제 손에 들린 창을 잘 보세요. 이건 그저 엔드필드 공업의 제식 제품일 뿐입니다.\r\n\r\n그럼, 다시 절 똑바로 보세요.\r\n\r\n전 그저 선천적인 약골이고, 그 이야기와는 직접적인 관련도 없습니다.\r\n\r\n하지만...\r\n\r\n제 각막, 제 심장, 제 몸에 흐르는 피를 느껴보세요. 인류의 존속을 위해 헌신한, 제 몸속의 영혼들이 외치는 소리를 들어보세요. 그들의 절규를 들어보시라고요.\r\n\r\n이대로 말라비틀어질 수는 없습니다.\r\n\r\n제가 바로 '키메라의 정의'가 되어야 합니다.", "weaponId": "wpn_lance_0004", "rarity": 5}, {"name": "아겔로스 사냥꾼", "type": "장병기", "description": "용광로 요새에서 철의 서약군 일반 병사들을 위해 생산한 제식 장창, 날카로움으로 유명하며, 아겔로스에 대항하기 위해 특별히 설계되었습니다.", "lore": "이번 전선 시찰에서 저는 일선 병사들에게 무엇이 필요한지 파악하는 데 중점을 두었습니다. 철의 서약군 소속 전사 한 명 한 명은 무엇과도 바꿀 수 없는 대체 불가능한 전력이기에, 병사 한 명의 사상조차 문명에는 막대한 손실입니다.\r\n\r\n......\r\n\r\n아겔로스는 기이한 존재입니다. 작전 기술도, 전략도 없습니다. 하지만 그들은 고통을 모르고, 공포를 느끼지 않으며, 절대 물러서지 않습니다. 오랫동안 아겔로스와 싸운 병사들은 종종 무력감에 빠지곤 합니다. 이는 살육 때문이 아니라, 마주한 적들이 마치 끝없이 이어진 산맥처럼 앞을 가로막고 있기 때문입니다.\r\n\r\n......\r\n\r\n저는 일선 병사들에게 장창을 대량으로 보급할 것을 제안합니다. 이 고전적인 무기는 아겔로스를 상대할 때 새로운 가치를 발휘할 것입니다. 긴 자루 덕분에 병사들은 아겔로스와 교전할 때 안전거리를 유지할 수 있고, 날카로운 창끝은 아겔로스의 방어를 뚫을 수 있습니다. 하지만 우리에겐 새로운 설계가 필요합니다. 신제품은 충분한 내구성을 갖춰야 하며, 그 외에 필요한 것은 오직 날카로움, 날카로움, 그리고 또 날카로움뿐입니다.\r\n\r\n......\r\n\r\n설계 초안은 본부에 전송했습니다. 역사를 되짚어보면 카시미어의 기사부터 살카즈 용병에 이르기까지, 장창은 언제나 기초적인 장비였습니다. 그리고 오늘날, 이 무기가 다시금 진가를 발휘하게 될 것입니다.", "weaponId": "wpn_lance_0008", "rarity": 4}, {"name": "개척자의 이정표", "type": "장병기", "description": "엔드필드 공업에서 제작한 오퍼레이터 돌파 장비 중 하나, 간결한 디자인과 가벼운 무게, 뛰어난 균형감을 갖추고 있어 로도스 아일랜드 뱅가드 오퍼레이터의 제식 장창을 연상시킵니다.", "lore": "\"리더, 우리 지금 어디로 가는 겁니까?\"\r\n\r\n\"13km 밖의 엔드필드 시설이다. 하위 거주 구역이 또 하나 아겔로스에게 함락됐어. 서둘러 관리자를 만나야 한다.\"\r\n\r\n\"알아요, 아는데... 그냥 계속 여기서 빙빙 돌고 있는 기분이 들어서요...\"\r\n\r\n\"아겔로스 놈들이 차를 뒤집어엎는 바람에 전용 내비게이션도 박살 났잖아. 안 그랬으면 한 시간 전에 이 언덕 지대는 통과했겠지.\"\r\n\r\n\"아, 리더! 생각났어요! 도베르만 교관님이 가르쳐주셨잖아요! 창을 땅에 꽂고 그림자 방향이랑 태양 위치를 보면 방위를 알 수 있다고요!\"\r\n\r\n\"관둬라. 그 방식은... 여기선 안 통해.\"\r\n\r\n\"네...? 교관님 방법이 틀렸단 말입니까?\"\r\n\r\n\"여긴 테라가 아니야. 잊었나? 우리 발밑에 있는 건 거대 기체 행성의 위성이라고.\"\r\n\r\n\"아, 맞다... 그럼 저거, 우리 머리 위에 떠 있는 저 큰 행성... 이름이 뭐였죠?\"\r\n\r\n\"탈로스. 거대 기체 행성 탈로스다. 우리가 '문'을 넘어 여기 온 지도 벌써 꽤 됐건만.\"\r\n\r\n\"헤헤, 제가 저거 때문에 헷갈렸나 봅니다... 리더, 근데 우리... 길을 찾을 수는 있는 거죠?\"\r\n\r\n\"말 그만하고 체력 아껴. 부상이 심하잖아.\"\r\n\r\n\"리더... 저 그냥 내려주세요. 더는 못 버틸 것 같아요.\"\r\n\r\n\"아니. 어떻게든 길을 찾아낼 거다. 만약 '문'이 다시는 열리지 않는다면, 이 탈로스 II가 우리의 새 집이 될 테니까.\"\r\n\r\n\"하, 리더 마음대로 하십쇼... 리더가 그렇다면... 그런 거겠죠...\"", "weaponId": "wpn_lance_0003", "rarity": 4}, {"name": "오페로 77", "type": "장병기", "description": "엔드필드 공업에서 제작한 오퍼레이터 기본 장비 중 하나, 베테랑 무기고 공학자 오페로가 설계를 담당했습니다. 편안한 그립감 덕분에 신입 오퍼레이터도 쉽게 다룰 수 있습니다.", "lore": "결론부터 말하자면, 무기는 실용성이 최우선이어야 한다는 점을 재차 강조해야겠군요. 77의 마름모꼴 홈은 완전히 실패한, 군더더기 설계일 뿐입니다! 아시다시피 우리의 적은 더 이상 피와 살을 가진 동족이 아닙니다. 앞으로의 설계는 절대로 로도스 아일랜드의 엔지니어링 데이터를 답습해서는 안 됩니다.\r\n\r\n미관이라고요?! 정말 모욕적으로 들리는군요. 무기에서 가장 중요한 것은 결코 겉모습이 아닙니다! 그런 설계를 하고 싶었다면 진작에 미에슈코 공업으로 이직했을 겁니다!\r\n\r\n- 오페로 79 설계 회의 3차 회의록", "weaponId": "wpn_lance_0009", "rarity": 3}, {"name": "클래니벌", "type": "권총", "description": "레이시언 공업에서 제작한 특수 총기, 사용 난도가 매우 높습니다. 실험용 무기이기 때문에, 시장에는 소량의 샘플만 풀렸습니다.", "lore": "\"그러므로 나는 너희에게 저주한다. 너희의 피는 황폐한 대지를 타고 흘러 웅덩이를 이루리라. 너희의 족속과 너희가 사랑하는 자들은 모두 그 피의 웅덩이에 빠져 죽을 것이다.\"\r\n\r\n\r\n오래된 낡은 노트에는 이렇게 적혀 있었다. 그는 잠시 생각하더니, 자신의 편지지를 꺼내 글을 쓰기 시작했다.\r\n\r\n\r\n\"왜 랜드브레이커가 랜드브레이커를 죽이기 위해 추적하는지 아는 이는 거의 없다. 어쨌든 그들은 한때 꽤나 단결된 집단이었고, 같은 우두머리에게 지휘받았었으니까... 비록 그들이 나중에는 분열했다지만, 이렇게 격렬한 증오가 생겨날 이유는 없었다. 이 노트에 기록된 원한은 뼈에 사무칠 만큼 깊었고, 저자가 포로로 잡은 랜드브레이커들에게 가한 잔혹한 고문... 그건 오직 '공포'라는 말로밖에 표현할 수 없다.\"\r\n\r\n\r\n그는 생각을 이어가다가 결론이 마음에 들지 않았는지, 다시 펜을 움직였다.\r\n\r\n\r\n\"나는 이 기록들 속에서 어떤 '공통점'을 찾으려고 했다. 랜드브레이커들이 정말 '만나면 반드시 죽여야 할' 죄를 저질렀는지, 혹은 지금까지 이어지는 어떤 사악한 계획을 꾸미고 있는지... 직업적으로든, 혹은 단순한 호기심이든, 역사 속 숨겨진 비밀을 파헤치는 일은 언제나 나를 들뜨게 만든다. 하지만 불행히도 이 노트의 저자는 단순한 악인일 뿐이다. 전리품 분배 문제로 다툰 끝에 '동료'의 가족 전부를 교수형에 처한 살인마니까.\"\r\n\r\n\r\n그는 펜을 잠시 멈추었다가, 이전보다 더 큰 힘으로 글을 이어갔다.\r\n\r\n\r\n\"개인적인 원한은 아무런 의미가 없다. 이런 기록들은 추진 중인 <탈로스 II 수호 안전법안>에 아무 도움도 되지 않는다. 오직 규칙과 문명에 대한 인식, 모든 흑과 백, 그리고 회색의 지대에서 랜드브레이커들을 완전히 지워낼 때 비로소 인류는 안전해질 것이다.\"\r\n\r\n\r\n마치 종이 위의 글자들이 그에게 끊임없이 힘을 주는 듯, 그의 글 속도는 점점 빨라졌다.\r\n\r\n\r\n\"모든 문명에는 언제나 부패한 가장자리가 존재한다. 그것은 결코 사라지지 않지만, 적어도 우리는 그것을 도려낼 의지와 행동을 가져야 한다.\"\r\n\r\n\r\n그는 마지막 문장을 썼다.\r\n\r\n\r\n\"나는 랜드브레이커로서 30년을 살아왔다. 그러니 내 말을 믿어야 한다.\"", "weaponId": "wpn_pistol_0009", "rarity": 6}, {"name": "쐐기", "type": "권총", "description": "노스마치 중공업 지원소의 전설적인 제품, 노스마치 중공업의 스타일인 '강력한 파괴력, 절대적인 신뢰성, 그리고 어려운 조작성'을 완벽히 구현했습니다.", "lore": "\"우리는 탈로스 II에 박힌 쐐기야.\" 어머니는 항상 그렇게 말씀하셨다.\r\n\r\n\r\n어렸을 때 나는 어머니가 집에 돌아와서 나를 안을 때마다 그 무거운 작업복을 벗지 않는다고 불평하곤 했다. 그 품 안은 마치 어머니가 아닌 강철 덩어리를 끌어안는 것 같았다. 어머니는 나를 꼭 안아주셨고, 그 딱딱한 도구들의 압박으로 내 몸에는 깊은 자국을 남겼다. 그 자국은 오랫동안 사라지지 않았다.\r\n\r\n\r\n나는 어머니가 내게 골라준 장난감들도 맘에 들지 않았다. 나는 크롤러 드릴과 트럭 모형이 싫었다. 매일 같은 것들을 봐야 했기 때문이다. 집 앞에서 그 거대한 기계들이 굉음을 내며 북쪽으로 끝없이 출발하는 모습을 날마다, 해마다 봐왔으니까.\r\n\r\n\r\n그리고 어머니는 이곳을 \"집\"이라고 부르지 않았다. 어머니는 늘 말씀하시곤 했다. \"탈로스 II는 너무 위험해, 이곳은 우리의 집이 아니야.\"\r\n\r\n\r\n탈로스 II에서 태어나 자란 나는 어머니의 말을 이해할 수 없었지만, 그 말들은 어머니의 단단한 포옹처럼 내 몸에 깊은 자국을 남겼다. 당시에는 그 '자국'들이 무엇을 의미하는지 알지 못했다.\r\n\r\n\r\n어느 날, 어머니는 북쪽에서 돌아오지 않았다. 월터 외삼촌이 어머니의 작업복을 나에게 가져다주었는데, 그 목깃에는 어둡게 말라붙은 핏자국이 묻어 있었다. 나는 그 작업복을 꼭 안았고, 그 익숙한 거친 질감과 차갑고 단단한 느낌을 다시 느낄 수 있었다. 그리고 작업복 속에서 이 총을 발견했다. 내 몸에 깊은 자국을 남겼던 그 총이었다. 총열 아래에는 작은 틈이 있었다.\r\n\r\n\r\n어머니는 마지막 탄환을 쏜 후, 총열로 아겔로스 한 마리를 내리쳤다.\r\n\r\n\r\n나는 월터 외삼촌에게 총열을 다시 주조해 달라고 부탁했고, 그 위에 체인 커터기를 달았다. 북쪽으로 향하는 차량들이 다시 굉음을 낼 때, 나는 어머니의 자리를 대신하게 되었다.\r\n\r\n\r\n나는 탈로스 II에 박힌 쐐기다.", "weaponId": "wpn_pistol_0008", "rarity": 6}, {"name": "예술의 폭군", "type": "권총", "description": "미에슈코 공업이 야심차게 선보인 아티스트 콜라보레이션 시리즈의 베스트셀러 중 하나, 독창적인 디자인과 압도적인 성능의 완벽한 조화로, 중고 시장에서의 높은 프리미엄이 폭발적인 인기를 입증합니다.", "lore": "탈로스 II의 현 '아방가르드' 예술에 던지는 도전장\r\n\r\n\r\n자칭 '아방가르드'하다는 위대한 예술가분들에게.\r\n\r\n\r\n안녕하십니까? 폐허 벽에 그림이나 그리고, 라반도르마의 지하 바에서 고함이나 지르며 스스로 '전례 없는' 예술을 창조한다고 믿는 당신들 말입니다.\r\n\r\n\r\n잔혹한 진실을 하나 알려드리죠. 당신들이 말하는 그 아방가르드 예술의 9할은 테라의 역사 속에서 꺼낸 케케묵은 골동품에 불과합니다.\r\n\r\n\r\n라반도르마의 신생 랩 레이블? 시에스타 옵시디언 뮤직 페스티벌의 10대 레전드 라이브 영상을 보고 나니, 그들이 '제왕'이라는 랩 스타보다 리듬이나 라임에서 조금이라도 혁신적인 부분이 있는지 모르겠더군요. [링크 만료됨]\r\n\r\n\r\n아스팔트 라운드어바웃의 100인 그라피티? 제가 조사한 자료에 따르면, 이런 건 테라의 옛 우르수스 공장 기지에선 널리고 널린 것들이었습니다. 아주 오래전, 감염자 작업자들이 공장 벽에 똑같은 걸 그렸으니까요. [첨부 파일 유실됨]\r\n\r\n\r\n뉴 랭크우드의 신청년 영화제는 어떻고요? 그건 더 웃기지도 않습니다. 애초에 자유 도시의 이름부터 테라의 랭크우드를 그대로 갖다 쓴 주제에!\r\n\r\n\r\n진정으로 탈로스 II만의 아방가르드 예술은 어디에 있습니까?\r\n\r\n\r\n그러니 여러분이 정말 혁신을 갈망한다면, 제가 무엇이 진짜 아방가르드인지 알려드리죠.\r\n\r\n\r\n이건 제가 발굴한 엔드필드의 프로토콜 오리지늄 기술 관련 영상입니다. [작성자가 유료 시청으로 설정한 동영상입니다]\r\n\r\n\r\n예술을 논하다 갑자기 웬 프로토콜 오리지늄 기술이냐, 의아해하실 분들도 계실 겁니다. 하지만 생각해 보십시오. 예술은 공학 기술과 떼려야 뗄 수 없는
