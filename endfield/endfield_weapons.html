<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>엔드필드 무기 아카이브</title>
<link rel="stylesheet" href="endfield_weapons.css">
<script src="../nav.js" data-depth="1"></script>
</head>
<body>

<!-- 모바일 드로어 오버레이 -->
<div class="drawer-overlay" id="drawer-overlay"></div>

<!-- ── HEADER ── -->
<header>
  <button class="panel-toggle" id="panel-toggle" title="목록 패널 열기/닫기" aria-label="목록 패널 열기/닫기">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <line x1="2" y1="4"  x2="14" y2="4"/>
      <line x1="2" y1="8"  x2="14" y2="8"/>
      <line x1="2" y1="12" x2="14" y2="12"/>
    </svg>
  </button>

  <div>
    <div class="logo">ARKNIGHTS ENDFIELD</div>
    <div class="logo-main">무기 아카이브</div>
  </div>
  <div class="header-divider"></div>

  <!-- 필터 -->
  <div class="filters">
    <div class="filter-group">
      <span class="filter-label">희귀도</span>
      <button class="filter-btn active" data-rarity="all">전체</button>
      <button class="filter-btn" data-rarity="6" style="color:var(--r6)">★6</button>
      <button class="filter-btn" data-rarity="5" style="color:var(--r5)">★5</button>
      <button class="filter-btn" data-rarity="4" style="color:var(--r4)">★4</button>
      <button class="filter-btn" data-rarity="3" style="color:var(--r3)">★3</button>
    </div>
    <div class="header-divider" style="margin:0 4px"></div>
    <div class="filter-group">
      <span class="filter-label">종류</span>
      <button class="filter-btn active" data-type="all">전체</button>
      <button class="filter-btn" data-type="sword">한손검</button>
      <button class="filter-btn" data-type="greatsword">양손검</button>
      <button class="filter-btn" data-type="polearm">장병기</button>
      <button class="filter-btn" data-type="handcannon">권총</button>
      <button class="filter-btn" data-type="arts_unit">아츠 유닛</button>
    </div>
  </div>

  <div class="search-box">
    <input type="text" id="search" placeholder="무기 검색...">
  </div>
</header>

<!-- ── MAIN ── -->
<div class="main">

  <!-- LEFT PANEL -->
  <div class="panel-left" id="panel-left">
    <div class="panel-left-header">
      <span>WEAPONS</span>
      <span><span id="weapon-count">0</span> / <span id="weapon-total">0</span></span>
    </div>
    <div class="weapon-list" id="weapon-list"></div>
  </div>

  <!-- CENTER PANEL -->
  <div class="panel-center" id="panel-center">
    <div class="empty-state" id="empty-state">
      <div class="empty-state-icon">⚔</div>
      <div class="empty-state-text">무기를 선택하세요</div>
    </div>
    <div class="weapon-detail" id="weapon-detail" style="display:none"></div>
  </div>

</div>

<!-- 모바일 FAB -->
<div class="fab-list" id="fab-list">
  <button class="fab-btn" id="fab-open-list">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <line x1="2" y1="4"  x2="14" y2="4"/>
      <line x1="2" y1="8"  x2="14" y2="8"/>
      <line x1="2" y1="12" x2="14" y2="12"/>
    </svg>
    목록
  </button>
</div>

<!-- ── SCRIPT ── -->
<script defer>
/* ═══════════════════════════════════════════════
   상수
═══════════════════════════════════════════════ */
const RARITY_COLORS = { 6:'#ff7100', 5:'#ffcc00', 4:'#b380ff', 3:'#33C2FF' };
const RARITY_LABELS = { 6:'★★★★★★', 5:'★★★★★', 4:'★★★★', 3:'★★★' };

// type_key → 표시 레이블
const TYPE_LABELS = {
  sword:      '한손검',
  greatsword: '양손검',
  polearm:    '장병기',
  handcannon: '권총',
  arts_unit:  '아츠 유닛',
};
// type_key → 아이콘
const TYPE_ICONS = {
  sword:      '⚔',
  greatsword: '⚔',
  polearm:    '🗡',
  handcannon: '🔫',
  arts_unit:  '✦',
};
// JSON 키 순서 유지
const TYPE_ORDER    = ['sword','greatsword','polearm','handcannon','arts_unit'];
const RARITY_ORDER  = [6, 5, 4, 3];

// 구 버전 JSON 호환용 (한국어 타입명 → type_key)
const KO_TO_TYPE_KEY = {
  '한손검':   'sword',
  '양손검':   'greatsword',
  '장병기':   'polearm',
  '권총':     'handcannon',
  '아츠 유닛':'arts_unit',
};

/* ═══════════════════════════════════════════════
   상태
═══════════════════════════════════════════════ */
// WEAPONS_FLAT: 필터·렌더링에 사용할 평탄화 배열
// 각 항목: { id, name, type_key, type, rarity, description, lore }
let WEAPONS_FLAT = [];
let activeRarity = 'all';
let activeType   = 'all';
let searchQuery  = '';
let selectedId   = null; // 선택된 무기의 id (string)

/* ═══════════════════════════════════════════════
   패널 토글
═══════════════════════════════════════════════ */
const isMobile = () => window.innerWidth <= 640;

function openPanel() {
  isMobile()
    ? document.body.classList.add('panel-open')
    : document.body.classList.remove('panel-collapsed');
}
function closePanel() {
  isMobile()
    ? document.body.classList.remove('panel-open')
    : document.body.classList.add('panel-collapsed');
}
function togglePanel() {
  if (isMobile()) {
    document.body.classList.contains('panel-open') ? closePanel() : openPanel();
  } else {
    document.body.classList.contains('panel-collapsed') ? openPanel() : closePanel();
  }
}

/* ═══════════════════════════════════════════════
   초기화
═══════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  bindPanelEvents();
  bindFilterEvents();
  loadWeapons();
});

function bindPanelEvents() {
  document.getElementById('panel-toggle').addEventListener('click', togglePanel);
  document.getElementById('drawer-overlay').addEventListener('click', closePanel);
  document.getElementById('fab-open-list').addEventListener('click', openPanel);
  window.addEventListener('resize', () => {
    if (!isMobile()) document.body.classList.remove('panel-open');
  });
}

function bindFilterEvents() {
  document.querySelectorAll('.filter-btn[data-rarity]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn[data-rarity]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeRarity = btn.dataset.rarity;
      renderList();
    });
  });
  document.querySelectorAll('.filter-btn[data-type]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn[data-type]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeType = btn.dataset.type;
      renderList();
    });
  });
  document.getElementById('search').addEventListener('input', e => {
    searchQuery = e.target.value.trim();
    renderList();
  });
}

/* ═══════════════════════════════════════════════
   데이터 로드 & 평탄화
═══════════════════════════════════════════════ */
async function loadWeapons() {
  try {
    const res = await fetch('./data/endfield_weapons_lore.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();

    // 형식 자동 감지
    // 새 형식: { "weapon": { "sword": { "6": { id: {...} } } } }
    // 구 형식: [ { name, type, rarity, ... } ]
    if (json.weapon && typeof json.weapon === 'object') {
      // 새 구조
      WEAPONS_FLAT = flattenWeapons(json.weapon);
    } else if (Array.isArray(json)) {
      // 구 평면 배열 — 임시 호환 처리
      console.warn('[loadWeapons] 구 버전 JSON 감지. 새 형식 파일로 교체를 권장합니다.');
      WEAPONS_FLAT = json.map((w, i) => ({
        id:          w.weaponId?.trim() || w.name,
        name:        w.name,
        type_key:    KO_TO_TYPE_KEY[w.type] ?? 'sword',
        type:        w.type,
        rarity:      w.rarity,
        description: w.description ?? '',
        lore:        w.lore ?? '',
      }));
    } else {
      throw new Error('알 수 없는 JSON 형식입니다.');
    }

    document.getElementById('weapon-total').textContent = WEAPONS_FLAT.length;
    renderList();
  } catch (e) {
    console.error('JSON 로드 실패:', e);
    document.getElementById('weapon-list').innerHTML =
      '<div class="no-results">데이터를 불러올 수 없습니다</div>';
  }
}

/**
 * weapon 객체를 평탄한 배열로 변환
 * 정렬: TYPE_ORDER → RARITY_ORDER(내림차순) → 이름 가나다순
 */
function flattenWeapons(weaponObj) {
  const result = [];
  for (const typeKey of TYPE_ORDER) {
    const rarityMap = weaponObj[typeKey];
    if (!rarityMap) continue;
    for (const rarity of RARITY_ORDER) {
      const bucket = rarityMap[String(rarity)];
      if (!bucket) continue;
      for (const [id, w] of Object.entries(bucket)) {
        result.push({
          id,
          name:        w.name,
          type_key:    w.type_key   ?? typeKey,
          type:        w.type       ?? TYPE_LABELS[typeKey],
          rarity:      w.rarity     ?? rarity,
          description: w.description ?? '',
          lore:        w.lore        ?? '',
        });
      }
    }
  }
  return result;
}

/* ═══════════════════════════════════════════════
   필터
═══════════════════════════════════════════════ */
function getFiltered() {
  return WEAPONS_FLAT.filter(w => {
    if (activeRarity !== 'all' && w.rarity !== parseInt(activeRarity)) return false;
    if (activeType   !== 'all' && w.type_key !== activeType)           return false;
    if (searchQuery  && !w.name.includes(searchQuery))                 return false;
    return true;
  });
}

/* ═══════════════════════════════════════════════
   리스트 렌더링 (무기 종류별 그룹 헤더 포함)
═══════════════════════════════════════════════ */
function renderList() {
  const list = document.getElementById('weapon-list');
  if (!list) return;

  const filtered = getFiltered();
  document.getElementById('weapon-count').textContent = filtered.length;

  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-results">조건에 맞는 무기가<br>없습니다</div>';
    return;
  }

  // 필터 결과를 type_key 순서대로 그룹화
  const groups = {};
  for (const typeKey of TYPE_ORDER) groups[typeKey] = [];
  filtered.forEach(w => groups[w.type_key]?.push(w));

  let html = '';
  for (const typeKey of TYPE_ORDER) {
    const items = groups[typeKey];
    if (!items.length) continue;

    // 그룹 헤더 (필터로 단일 타입이 선택된 경우에는 생략)
    const showGroupHeader = activeType === 'all';
    if (showGroupHeader) {
      html += `
        <div class="weapon-group-header">
          <span class="weapon-group-icon">${TYPE_ICONS[typeKey]}</span>
          <span class="weapon-group-name">${TYPE_LABELS[typeKey]}</span>
          <span class="weapon-group-count">${items.length}</span>
        </div>`;
    }

    items.forEach(w => {
      const color = RARITY_COLORS[w.rarity];
      const stars = '★'.repeat(w.rarity);
      const sel   = selectedId === w.id ? 'selected' : '';
      html += `
        <div class="weapon-item ${sel}" data-id="${escAttr(w.id)}">
          <div class="rarity-dot" style="background:${color}"></div>
          <div class="weapon-item-info">
            <div class="weapon-name-list">${escHtml(w.name)}</div>
            <div class="weapon-meta">
              ${escHtml(w.type)} · <span class="rarity-stars" style="color:${color}">${stars}</span>
            </div>
          </div>
        </div>`;
    });
  }

  list.innerHTML = html;

  list.querySelectorAll('.weapon-item').forEach(el => {
    el.addEventListener('click', () => {
      selectWeapon(el.dataset.id);
      if (isMobile()) closePanel();
    });
  });
}

/* ═══════════════════════════════════════════════
   상세 표시
═══════════════════════════════════════════════ */
function selectWeapon(id) {
  selectedId = id;
  const w = WEAPONS_FLAT.find(x => x.id === id);
  if (!w) return;

  document.getElementById('empty-state').style.display = 'none';
  const detail = document.getElementById('weapon-detail');
  detail.style.display = 'block';

  const color = RARITY_COLORS[w.rarity];
  const stars = RARITY_LABELS[w.rarity];

  // 스토리 텍스트 정제 → 문단 분할
  let lore = w.lore || '';
  lore = lore.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const loreParagraphs = lore
    .split(/\n{2,}/)
    .map(p => p.trim())
    .filter(p => p.length > 0)
    .map(p => `<p>${escHtml(p).replace(/\n/g, '<br>')}</p>`)
    .join('');

  detail.className = `weapon-detail rc-${w.rarity}`;
  detail.style.setProperty('--rarity-color', color);

  detail.innerHTML = `
    <div class="detail-header">
      <div class="detail-rarity-badge"
           style="color:${color};border-color:${color}40;background:${color}10">
        ${stars} · RARITY ${w.rarity}
      </div>
      <div class="detail-name">${escHtml(w.name)}</div>
      <div class="detail-type-row">
        <div class="detail-type-tag">${TYPE_ICONS[w.type_key] ?? '⚔'} ${escHtml(w.type)}</div>
        <div class="detail-id">ID: ${escHtml(w.id)}</div>
      </div>
    </div>

    <div class="section-block">
      <div class="section-label">무기 설명</div>
      <div class="desc-box">${escHtml(w.description)}</div>
    </div>

    ${loreParagraphs ? `
    <div class="section-block">
      <div class="section-label">무기 스토리</div>
      <div class="lore-box">
        <div class="lore-text">${loreParagraphs}</div>
      </div>
    </div>` : ''}
  `;

  document.getElementById('panel-center').scrollTo({ top: 0 });
  renderList(); // 선택 상태 하이라이트 갱신
}

/* ═══════════════════════════════════════════════
   유틸
═══════════════════════════════════════════════ */
function escHtml(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
function escAttr(str) {
  return String(str ?? '').replace(/"/g, '&quot;');
}
</script>

</body>
</html>
