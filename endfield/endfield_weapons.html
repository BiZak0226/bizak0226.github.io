 관계입니다. 앞선 사례들처럼 테라의 기술을 답습해 심미적 문화를 재창조하는 수준에 그친다면, 우리는 당연히 테라 문화라는 꼬리표를 떼어낼 수 없을 겁니다!\r\n\r\n\r\n하지만 프로토콜 오리지늄 기술이야말로 탈로스 II만의 가장 '아방가르드'하고 '쿨'한 기술이라 할 수 있지 않습니까? 공간 차원에 대한 상식을 이토록 철저히 박살 내는데, 어째서 이걸 예술 창작에 활용하는 예술가는 코빼기도 안 보이는 겁니까?\r\n\r\n\r\n아방가르드 예술은 재고품 리폼도 아니고, 골동품에 새 라벨을 붙이는 짓도 아닙니다.\r\n\r\n\r\n계속 할아버지 세대의 장난질이나 반복할 거라면, 제발 더 이상 '아방가르드'를 자처하지 마십시오.\r\n\r\n\r\n\r\n본문은 어떠한 공식 입장도 대변하지 않으며, 개인적인 견해일 뿐입니다. 불편하신 분들은 뒤로 가기를 눌러주시기 바랍니다.\r\n\r\n\r\n\r\n작성자: 예술의 폭군\r\n\r\n작성일: 151년 ██월 ██일", "weaponId": "wpn_pistol_0010", "rarity": 6}, {"name": "항로의 개척자", "type": "권총", "description": "미에슈코 공업의 올해의 콘셉트 신작품, 우리를 탈로스 II의 끝없는 여정으로 이끈 항로의 개척자들에게 경의를 표합니다.", "lore": "전달자 팔켄 그라프닝의 이야기를 들어보시겠습니까?\r\n\r\n\r\n테라에서 그의 이름을 기억하는 이는 거의 없습니다. 사람들이 기억하는 건 그가 짊어졌던 '재앙의 전달자'라는 신분뿐이죠.\r\n\r\n\r\n카시미어 변경 출신인 팔켄 그라프닝은 젊은 나이에 그 고독한 길에 올랐습니다. 그는 묵묵히 산을 넘고 물을 건너, 파멸 직전에 놓인 마을마다 재앙의 소식을 전했습니다. 물론 그는 구원자가 아니었습니다. 그가 할 수 있는 일이라곤 그저 사람들에게 \"재앙의 발소리가 가까워졌다\"고 알리는 것뿐이었죠. 누군가는 그에게 감사했지만, 누군가는 그를 원망했습니다. 그는 상처 입고 희생을 목격했으며, 험담과 냉대 속에 수년을 보냈고, 우울의 그림자는 오랫동안 그의 마음을 짓눌렀습니다.\r\n\r\n\r\n쉰셋이 되던 해, 그는 마침내 고향에서의 모든 것을 정리하고, 새로 발견된 행성인 탈로스 II에 남은 생을 바치기로 결심했습니다.\r\n\r\n\r\n이곳에서 그는 더 이상 '재앙의 전조'가 아닌, 평범한 전달자였습니다. 탈로스 II는 광활하고 고요했으며, 적어도 그 짧은 세월 동안에는 재앙도, 파멸의 그림자도 없었습니다. 팔켄은 오랜만에 평온을 느꼈습니다. 그는 배낭을 메고 개척 기지 사이를 오가며 편지와 물건, 정보를 전달했습니다.\r\n\r\n\r\n틈날 때면 홀로 먼 길을 떠났습니다. 심지어 오리지늄 설비로 조잡한 비행선을 조립해 위태롭게 하늘을 가르며 아무도 발 디딘 적 없는 황무지에 착륙하기도 했습니다. 그는 높은 산을 오르고 늪을 건너며, 공백의 땅에 자신의 발자국을 남겼습니다.\r\n\r\n\r\n재앙에 유린당하지 않은 이 땅을 마주하며, 그는 꿈을 꾸기 시작했습니다. 은퇴하면 어느 골짜기에 오두막을 지을지, 한여름엔 어느 고원에서 맑은 공기를 마시며 피서를 즐길지 말입니다. 그의 수첩은 경로와 지형, 그리고 꿈에 그리던 '이상향'으로 빼곡히 채워졌습니다. 그의 발길이 닿는 곳마다 지도상의 공백이 하나둘 메워졌습니다.\r\n\r\n\r\n그날이 오기 전까지는요.\r\n\r\n\r\n앵커가 추락하고 아겔로스가 강림하자, 사람들은 마치 재앙을 피하듯 도망쳤습니다.\r\n\r\n\r\n혼란 속에서 팔켄은 다시 한번 옛 직책을 짊어졌습니다. 그는 가장 믿음직한 길잡이가 되어 생존자들을 남쪽으로 이끌었습니다. 사람들의 말에 따르면, 그는 수없이 앞장서서 나아갈 길을 확인했고, 심지어 낡은 비행선을 몰고 홀로 폭풍 속으로 뛰어들었다가 온몸이 상처투성이가 되어 돌아오기도 했다고 합니다. 그는 경험과 끈기, 용기로 유랑자들을 위해 활로를 열었습니다. 수많은 정착지가 그가 남긴 표식이나 구술된 안내에 따라 세워졌습니다. 그가 없었다면, 아마 많은 사람이 문명 밴드에 도달하지 못했을 겁니다.\r\n\r\n하지만 그는 멈추지 않았습니다.\r\n\r\n\r\n생애 마지막 몇 년간, 팔켄은 계속해서 남쪽으로 향했습니다. 산맥을 넘고 문명 밴드를 지나, 마침내 바다의 끝자락에 닿았습니다. 전설에 따르면, 그는 그곳에서 배를 한 척 만들어 돛을 펴고 더 먼 남쪽을 향해 항해를 시작했다고 합니다.\r\n\r\n\r\n그 후로 아무도 그를 보지 못했습니다.\r\n\r\n\r\n탈로스 II의 항해사들 사이에서는 이런 이야기가 전해집니다. 수평선 너머로 마치 높이 솟은 돛처럼 생긴 특이한 구름이 보이면, 그건 '팔켄의 돛'이며 좋은 날씨가 찾아올 징조라고요.\r\n\r\n\r\n후세 사람들은 그를 '항로의 개척자'라고 높여 불렀습니다. 도시와 학부, 항구 어디서든 누군가는 항상 팔켄의 이야기를 전했습니다. 그는 전달자이자 개척자였고, 고독한 여행자이자 어둠 속에서 횃불을 높이 든 사람이었다고 말입니다.\r\n\r\n\r\n미에슈코 공업은 이러한 '항로의 개척자' 정신을 모티브로 삼아 올해의 신제품 시리즈에 담아냈으며, 끝없는 미래를 향한 야망과 용기를 품은 모든 이에게 바칩니다.\r\n\r\n\r\n\r\n\"또 광고성 기사야? 고작 이거 보여주려고 부른 거야?\"\r\n\r\n\r\n\"물론 그게 다가 아니지. 내가 소개하려는 건 새로 발표된 논문이야. 팔켄 그라프닝의 알려지지 않은 비밀에 관한 거지.\"\r\n\r\n\r\n\"호오?\"\r\n\r\n\r\n\"팔켄 그라프닝이 끊임없이 남쪽으로 향했던 건, 어쩌면 머나먼 남극에 아직 발견되지 않은 또 다른 스타게이트가 있을지도 모른다고 믿었기 때문이라더군.\"\r\n\r\n\r\n\"또 다른... 스타게이트? 그게 정말 가능해?\"\r\n\r\n\r\n\"누가 알겠어. 아무도 증명할 수 없고, 부정할 수도 없지. 어쩌면 그는 정말로 바다 끝에서 집으로 가는 길을 찾았을지도, 아니면 그저 파도 속으로 사라졌을지도 모르지.\"\r\n\r\n\r\n\"그러니까...\"\r\n\r\n\r\n\"그러니까, 인생의 마지막 순간에 '항로의 개척자'를 지탱했던 건, 탐험과 모험에 대한 열정뿐만이 아니라 더 간절한 갈망... 바로 '귀향'이었다는 거야.\"", "weaponId": "wpn_pistol_0005", "rarity": 6}, {"name": "이성적인 작별", "type": "권총", "description": "레이시언 공업에서 인류의 외부 탐색을 지원하기 위해 설계 생산한 고에너지형 총기. 환경 적응 능력이 뛰어나 대부분 탐험가의 표준 무기로 사용됩니다.", "lore": "\"그러니까 우리 둘이 여기 갇힌 거네요. 저랑 그쪽... 레이시언 공업의 떠오르는 샛별인 조립 라인 작업자랑, 숙련자의 여유가 느껴지는 공단... 저기... 형님은 무슨 일을 하시나요?\"\r\n\r\n\r\n\"무기 쪽. 총기에 최종 오리지늄 안전장치를 장착하지.\"\r\n\r\n\r\n\"오, 그럼 베테랑 무기 장인이신 거네요. 아무튼 우린 여기 갇혔고, 침식 때문에 길이 끊겨서 오도 가도 못하는 신세네요. 여기서 나가면 동료들한테 이 무용담을 쫙 풀어야지... 와, 그나저나 붕대 진짜 잘 감으시네요. 저 혼자였으면 손가락 부러진 거 손도 못 댔을 텐데.\"\r\n\r\n\r\n\"황무지에 주둔한다면서, 응급 처치법 같은 건 안 배웠나?\"\r\n\r\n\r\n\"신입이라 경험이 없어서요, 하하. 원래 외근 나갈 일은 없을 줄 알았는데, 인력이 부족하다 보니 배차 지원 업무에 딱 걸렸지 뭐예요. 있잖아요, 집 떠나기 전에 반년 치 월급을 모았거든요? 지폐 뭉치가 이따만 했는데, 그걸로 3년짜리 종합 보험이랑 문명 밴드 인근 구역 응급 구조 보험까지 들었다니까요. 근데, 에휴, 쥐뿔도 소용없네요... 어? 왜 그렇게 멍한 표정이세요?\"\r\n\r\n\r\n\"미안, 사소한 생각이 나서. 지폐를 만져본 지 꽤 오래됐다는 생각이 들었거든.\"\r\n\r\n\r\n\"맞다 맞다 맞다! 그렇죠! 공단에는 월급이나 돈 개념이 없다면서요? 매주 생활 물자를 배급받는다던데, 진짜예요?\"\r\n\r\n\r\n\"돈, 월급이야 있긴 한데. 단지... 쓸 일이 별로 없을 뿐이지. 우리 생산 기지 대부분이 외진 곳에 있거든. 이번 임무만 해도 그래. 자네한테는 황무지로 나온 거겠지만, 나한테는 후방으로, 안전 구역 쪽으로 물러난 셈이거든... 기지마다 물자 보급도 잘 나오는 편이라 돈은... 정말 쓸 일이 별로 없어.\"\r\n\r\n\r\n\"듣기만 해도 좀... 어... 지루하네요. 그럼 레이시언 공업으로 오실래요? 맞다! 내가 왜 이걸 까먹었지, 요즘 신입 추천하면 보너스 주는데... 어? 방금 뭘 던지신 거예요? 사원증? 레이시언 공업? 뭐야, 농담하시는 거죠? 우리 같은 회사 사람이었어요?\"\r\n\r\n\r\n\"옛날 사원증이야. 칩은 빼고 껍데기만 기념으로 남겨뒀지. 몇 년 전에 레이시언에 있었거든.\"\r\n\r\n\r\n\"그럼 왜...\"\r\n\r\n\r\n\"오래 일했지만 기술 혁신이 상업화랑 직결되는 게 영 익숙해지질 않더군. 물론 레이시언은 좋은 회사야. 그냥 내 유별난 결벽증 때문에 나온 거지. 게다가 누군가는 똘똘 뭉쳐서 밖으로 나가 험지를 개척해야 하지 않겠어? 안 그래?\"\r\n\r\n\r\n\"말씀은 맞는데, 그래도... 어? 어디서 삐삐거리는 소리가...\"\r\n\r\n\r\n\"통신기야. 동료들이 내 신호기 이상을 감지하고 구조하러 오고 있어. 경계 쪽으로 좀 더 붙어야겠군.\"\r\n\r\n\r\n\"역시 베테랑이시라니까! 저기, 진짜 레이시언 공업으로 돌아오실 생각 없으세요? 재입사하면 어쩌면...\"\r\n\r\n\r\n\"어서 가자고.\"", "weaponId": "wpn_pistol_0004", "rarity": 5}, {"name": "O.B.J. 벨로시투스", "type": "권총", "description": "엔드필드 공업에서 제작한 제식 장비 시리즈, 베테랑 무기고 공학자 오페로가 이끄는 프로토타입 기획팀이 설계했습니다. 경량 소재를 사용했으나 견고하고 내구성이 뛰어납니다.", "lore": "나는 세 번, 권총을 들어 올린 적이 있다.\r\n\r\n처음 권총을 들었을 때, 온 세상이 내 손아귀에 들어온 줄 알았다.\r\n\r\n아버지와 크게 다퉜던 날이었다. 나는 소위 '창창한 앞날'을 위해 공단 의대에 진학하고 싶지는 않았다. 이불 속에 숨어 아버지가 보지 못하게 했던 영상을 단말기로 몰래 훔쳐보았다. 권총을 높이 치켜든 이베리아의 재판관, 막힘없이 돌파하는 라테라노의 총기사들. 나는 영상 속 모습을 흉내 내며 아버지의 권총을 만지작거렸다. 내 손가락을 타고 흐른 오리지늄 아츠가 오리지늄 회로에 닿아, 존재하지도 않는 식각 탄환이 벽에 구멍을 뚫는 상상을 하면서.\r\n\r\n......\r\n\r\n두 번째로 권총을 들었을 때, 난 그게 내 마지막이 될 줄 알았다.\r\n\r\n4번 협곡에서 출발해 인근 거주지로 의료 지원 임무를 나가는 길이었다. 그런데 임무 도중 흉악한 랜드브레이커들을 만났다. 그 순간 우리 모두는 공포심에 휩싸였다. 4번 협곡 코앞에서 랜드브레이커가 나타나다니?\r\n\r\n나는 오리지늄 통신 설비를 켜고 협곡 요새에 구조 요청을 보내려 했다. 랜드브레이커들의 고함이 점점 가까워지고, 통신 노드를 맞추는 내 손놀림도 다급해졌지만, 설비에서는 지직거리는 잡음만 들려올 뿐이었다. 나는 권총을 들어 무작정 방아쇠를 당겼고, 아이들을 데리고 지평선 너머 협곡 요새를 향해 죽기 살기로 달렸다.\r\n\r\n......\r\n\r\n황무지를 얼마나 달렸는지 기억도 나지 않는다. 그저 날이 저물었다는 것만 알 뿐, 등 뒤를 쫓아오던 랜드브레이커들은 따돌린 지 오래였지만, 아이들을 데리고 정착지로 돌아갈 엄두가 나지 않았다. 함정일 수도 있으니까. 화살을 몇 대 맞은 탓에 시야는 흐릿해졌고, 멀리 협곡 요새의 윤곽조차 보이지 않았다. 그저 차를 타고 오가며 봤던 기억에 의존해, 더듬더듬 앞으로 나아갈 뿐이었다.\r\n\r\n......\r\n\r\n너무 지쳐서 그대로 고꾸라지고 말았다. 몸이 웅크러들었고, 아이들이 울며 내 몸을 흔드는 게 느껴졌다. 잠들면 안 된다고 되뇌었지만, 결국 눈이 감기고 말았다. 다음 날 깨어나 보니, 나는 다른 그레이 닥터의 거주지에 누워 있었다. 그제야 알게 된 사실이지만, 지난밤 우리는 방향을 잘못 들었고 이곳은 4번 협곡에서 한참 떨어진 곳이었다. 아이들의 울음소리를 듣고 그가 찾아왔던 것이다...\r\n\r\n그 일을 겪고 나니 내 무력함이 뼈저리게 느껴졌다. 난 그저 평범한 의사일 뿐이야. 몸이 회복되면 사표를 내고 고향으로 돌아가 가업인 진료소나 물려받자, 그렇게 생각했다.\r\n\r\n......\r\n\r\n세 번째로 권총을 든 건, 훈장 하나 때문이었다.\r\n\r\n꿈에서 학생 시절의 기억을 떠올렸다. 아버지는 굳은 표정으로, 내가 얼마나 별종인지 떠들어대는 의대 교수들의 말을 듣고 계셨다. 그 후 아버지가 기숙사로 찾아오셨다. 하지만 단말기를 압수하는 대신, 나와 나란히 앉아 그 안의 영상을 함께 보셨다. 그리고 바로 그때였다. 아버지가 가슴 주머니에서 단 한 번도 패용한 적 없는 훈장 하나를 꺼내신 것은.\r\n\r\n꿈은 계속 이어졌다. 나는 영상 속 그 대지 위에 서 있는 듯했다. 권총을 들고 들판을 달리다 보니, 어느새 그 훈장이 탄환으로 변해 있었다. 나는 하늘을 향해 그 탄환을 쏘아 올렸다.\r\n\r\n거기서 꿈이 깼다. 이 꿈이 내 모든 기력을 앗아간 것만 같았다.\r\n\r\n병상에서 비 오듯 땀을 흘리고 있을 때, 밖에서 비명소리가 들려왔다. 랜드브레이커뿐만 아니라, 앵커까지 나타났다고?\r\n\r\n나는 베개 밑을 더듬어 권총을 꺼냈다. 내가 엔드필드 공업에 입사했다는 소식을 듣고 아버지가 선물해 주신 것이었다.\r\n\r\n지금 이 순간, 나는 알 수 있었다. 앞으로 네 번이고, 다섯 번이고, 여섯 번이고... 나는 계속해서 이 총을 들게 되리라는 것을.", "weaponId": "wpn_pistol_0012", "rarity": 5}, {"name": "작품: 중생", "type": "권총", "description": "량 초자연 기술 실험실에서 의뢰받고 맞춤 제작한 작품, 예술가가 대담하게 유적 잔해로 총신을 감쌌으며, 그 위에 특수한 문양을 새겨 넣었습니다.", "lore": "산크타는 전장을 헤치고 나아가 중상을 입고 쓰러져 있는 공단 직원 앞에 멈춰 섰다. 그녀는 몸을 굽혀 간단히 상처를 살핀 뒤, 이 부상자가 의료진이 오기 전까지 버티기 어렵겠다고 판단했다.\r\n\r\n\r\n\"부디 마침내 안식을 찾으시길.\"\r\n\r\n\r\n산크타는 그의 두 손을 꼭 잡고, 이 가여운 이가 안식을 얻을 수 있기를 기도했다.\r\n\r\n몇 번째일까? 서른 번째? 아니면 삼백 번째? 산크타는 이미 싸늘하게 식어버린 두 손을 붙든 채 생각에 잠겼고, 그때 등 뒤에서 흙과 자갈이 무너지는 소리가 났다. 번개처럼 총을 뽑았고... 그곳엔 머리 위에 명멸하는 헤일로가 떠 있는 아겔로스가 있었다.\r\n\r\n산크타는 힘없이 쓰러진 아겔로스를 향해 천천히 걸어갔다. 녀석은 이미 위협이 되지 못했다. 놈은 몸의 대부분이 노동자 위병대의 포격에 산산조각이 난 상태였으니까.\r\n\r\n\r\n산크타의 마음속엔 의문으로 가득했지만, 또 한편으로는 지금 이 자리에서 그 답을 얻지 못하리란 것도 알고 있었다. 고요한 수도회의 거대한 이동 수도원이 탈로스 II에 발을 들이던 날부터, 산크타들이 처음으로 아겔로스를 눈앞에서 목격하던 그 순간부터, 그들은... 우리는... 더 이상 남이 준 해답에 기댈 수 없게 되었으니까.\r\n\r\n\r\n\"율법의 은총이시여, 저를 귀로로 인도하소서...\"\r\n\r\n\r\n고요한 수도회의 모든 산크타는 이 성가를 부를 줄 안다. 산크타는 성도들의 시선을 받으며 스타게이트를 넘었고, 같은 성가를 읊조리며 탈로스 II 곳곳에 흩어진 잔해 사이를 누볐다.\r\n\r\n그녀는 아직도 플론다 원장이 아침 기도 때 들려주었던 이야기를 기억한다. 역사서에 기록되지 않은 시대에 티카즈는 주의 가호를 구하며 산크타가 되었고, 주께서 성전을 떠나신 시대에 최초의 성도가 산크타에게 티카즈의 형상으로 모습을 드러냈다는 이야기. 하지만 그 이야기는 도리어 그녀에게 의구심만 심어주었다.\r\n\r\n만약 헤일로가 주께서 친히 산크타에게 하사하신 유일무이한 선물이라면, 마찬가지로 헤일로를 가지고 무리지어 다니는, 생명이라 부르기도 어려운 저 탈로스 II의 아겔로스들은 대체 어디서 온 것인가?\r\n\r\n\r\n또 무엇이 그들을 빚어냈는가?\r\n\r\n\r\n산크타는 손안의 총을 꽉 움켜쥐었다. 누구도 그녀의 의문에 답해 주지 않았다. 마치 이 세상에선 오직 손에 들린 총만이 진실이라 불릴 수 있다는 듯이.\r\n\r\n이윽고 마지막 앵커가 지평선 너머로 사라졌고, 전선에서는 승리를 알리는 기적 소리가 울려 퍼졌다. 연맹 공단은 또 한번 그들의 개척 임무를 완수했고, 이제 문명 밴드는 또 다른 황무지 위에 뿌리를 내리게 될 터였다.\r\n\r\n환호 속에서 그녀는 죽음을 앞둔 아겔로스의 머리에 양손을 올렸다. 감정이라곤 없어야 마땅할 이 이형의 존재에게서 미세한 떨림이 느껴지는 듯 했으나... 곧 공허한 정적만이 남았다.\r\n\r\n주께서는 산크타에게 헤일로를 내려 주셨지만, 그 은총은 산크타만의 것이 아닌 듯했다. 그녀는 이 모든 것 뒤에 숨은 뜻을 곱씹었다. 신앙이 다시금 그녀의 마음을 가득 채울 때까지. 그리고 지금 바로 여기서 고요한 수도회의 산크타는 또 한 번의 임종 기도를 올린다.\r\n\r\n\r\n\"그대가 어디서 왔든, 부디 마침내 안식을 찾기를.\"\r\n\r\n\r\n부서진 돌 조각이 무너져 내리고, 산크타의 손가락 사이로 흙먼지가 흘러나왔다. 희미하게 일렁이던 그 헤일로는, 마침내 허공 속으로 흩어져 사라졌다.", "weaponId": "wpn_pistol_0006", "rarity": 5}, {"name": "끝없는 여정", "type": "권총", "description": "용광로 요새에서 철의 서약군 일반 병사들을 위해 생산한 제식 총기, 단순한 구조와 높은 출력으로 인기가 높습니다.", "lore": "은퇴 신청서를 내야겠다.\r\n\r\n\r\n이 행성은... 그저 텅 비어 있으니까.\r\n\r\n\r\n10년 동안 30번 가까이 대규모 발굴을 진행했지만, 내가 발견한 게 고작 뭔가? 우르수스인의 거대한 협곡에 버려진 전쟁 병기? 아니면 아겔로스 무리로 인해 버려지고, 또 침식 때문에 이상 현상이 계속 일어나는 자동화 목장?\r\n\r\n\r\n이런 건 그저 낡은 나무 상자를 열어 케케묵은 장부를 뒤적이는 꼴이다.\r\n\r\n\r\n진정한 역사, 이 행성만의 것, 인류 기원의 유적... 내가 발굴한 세 곳은 하나같이 텅 비어 있었다. 시신, 에너지, 설비... 아무것도 없었다. 남은 건 고작 금속 조각 몇 개뿐. 차가운 금속이 희미하게 빛을 발하고, 그 빛 너머로 나는 거대한 강의 발원지에 선 인류 선조들의 흐릿한 그림자를 보았다. 그들은 환하게 웃고 있었다.\r\n\r\n\r\n우리의 발견은 우리 자신을 넘어서지 못했고, 과거와 미래는 여전히 안개 속에 싸여 있다. 탈로스 II는 장막 뒤에 숨어 자신을 드러내려 하지 않는다. '만물의 대지'에서 온 한 방랑자가 내게 말해 주었다. 그들의 최초의 사자가 끝없는 동토에서 이 행성의 그림자를 엿본 적이 있다고. 아주 찰나였지만, 그 사자의 마음속에는 탈로스보다 더 거대한 공포가 남았다고 한다. 이 이야기를 '철의 서약군' 친구에게 해 주었더니 그녀가 답했다. 성벽에 서서 북쪽 하늘의 짙고 묵직한 먹구름을 바라볼 때면 행성의 그림자가 그 구름 뒤에 숨어 있는 것만 같다고. 하지만 막상 앞으로 나아가 전장에 서면, 그 머나먼 그림자가 조금은 뒤로 물러나는 듯하다고.\r\n\r\n\r\n\"너무 깊이 생각하지 말고, 그냥 버텨.\"\r\n\r\n\r\n그녀가 내게 총을 쥐여주며 했던 말이다.\r\n\r\n\r\n그래, 그래. 이제 다시 출발해야겠군.", "weaponId": "wpn_pistol_0003", "rarity": 4}, {"name": "하울링 가드", "type": "권총", "description": "미에슈코 공업에서 출시한 중급 라인 제품 중 하나, 레트로 라테라노 구조와 현대 공업 디자인의 절묘한 조화가 돋보이며, 블루 메탈릭 마감이 독특한 미감을 선사합니다.", "lore": "<아겔로스의 저손실 도구화 가능성에 대하여>\r\n\r\n\r\n지난번 메일에서 아겔로스를 '잠재적 사용자'로 오인하여 질책받은 점, 깊이 반성하고 있습니다. 하지만 제 생각은 변함이 없습니다. 아겔로스를 단순히 적으로만 보아서는 안 되며, 이러한 연구는 계속해야 한다고 생각합니다.\r\n\r\n우선, 모든 아겔로스가 앵커와 그 배후에 있는 북쪽의 거대한 적의 통제하에 있다는 연구 증거는 없습니다. 상당수의 아겔로스는 파괴적인 성향을 보이지만 논리나 목적성이 전혀 없어 자연현상의 일종으로 분류할 수 있습니다. 그리고 동물을 모방하고(동물이 아니라는 것은 압니다!) 이를 통해 사회에 편리한 물건을 발명하려는 시도는 우리 인간의 본능이나 마찬가지입니다.\r\n\r\n지난 100년 동안 우리는 탈로스 II에서 자리를 잡기 위해 많은 성과를 이루어냈습니다. 하지만 아겔로스 연구에 관해서는 유독 '아겔로스'라는 호칭이 일부 산크타 동포들의 불만을 샀다는 점만 큰 파장을 일으켰습니다. 이건 정말이지 엄청난 낭비입니다. 그러니 부디 제 연구 방향에 대한 승인과 함께 일정 금액의 자금 지원을 부탁드립니다.\r\n\r\n본론으로 돌아가서, 제 팀(제 아들입니다만...)이 황무지에서 소형 아겔로스 한 마리를 포획하는 데 성공했습니다. 그 아겔로스는 작은 클로비스트처럼 생겼고, 원석충보다도 작은 편이었습니다. 제가 이 녀석을 길들이려는 거냐고요? 설마요. 그게 불가능하다는 건 압니다. 가능했다면 100년도 더 전에 누군가 성공했겠죠. 전 그저 이 녀석에게서 이용 가능한 부분을 찾고 있을 뿐입니다.\r\n\r\n아겔로스의 구조를 보면, 부위와 부위 사이에 일종의 중력장이나 자기장 같은 게 존재합니다. 사지(어떨 때는 여덟 개지만)가 물리적 연결에 완전히 의존하지 않는다는 건 누구나 다 아는 사실 아닙니까? 야외에서 이런 아겔로스가 '활성화'되는 모습은 흔히 볼 수 있죠.\r\n\r\n그럼 그 원리를 우리가 이용할 수 있지 않을까요? 예를 들어 아겔로스의 두 부위를 기계 팔 두 개에 고정해 둔다면, 끊임없이 운동 에너지를 만들어내지 않겠습니까?\r\n\r\n이걸 토대로 집에서 천재적인 발명품을 하나 완성했습니다. 바로 아겔로스 자동 호두까기 기계입니다! 아겔로스의 작은 부위 하나를 주조된 금속 받침대에 고정하고 호두를 올려놓으면, 아겔로스가 '합체'하려 할 때 호두가 박살 나는 원리죠.\r\n\r\n아겔로스의 구체적인 형태에 따라, 이 발명품은 무수히 많은 형태로 파생될 수 있을 거라 믿습니다.\r\n\r\n상세한 도면과 설명서는 메일에 첨부했습니다. 답장 기다리겠습니다.", "weaponId": "wpn_pistol_0002", "rarity": 4}, {"name": "페코 5", "type": "권총", "description": "엔드필드 공업에서 제작한 오퍼레이터 기본 장비 중 하나, 무기고 공학자 페코가 설계를 담당했습니다. 이제 식각 탄환과 총기는 더 이상 산크타만의 전유물이 아닙니다.", "lore": "엠버 오퍼레이터에게 자문을 구했는데, 페코 5의 성능 검증 테스트에 참여하겠다고 하더군요. 산크타인데도, 엠버 오퍼레이터가 전투에서 총을 쓰는 걸 한 번도 본 적이 없어서 제안을 거절할 줄 알았는데 정말 운이 좋았습니다. 엠버 오퍼레이터 말로는, 철의 서약군도 북쪽에 자체적인 총기 생산 라인을 갖추고 있다고 합니다. 그러면서 페코 5가 용광로 요새에서 생산된 제식 장비와 비교해도 '나쁘지 않아 보인다'고 하더군요. 제가 너무 예민한 걸 수도 있지만, 협력사의 기분을 맞춰주려고 한 빈말이 아니었으면 좋겠네요. 차라리 따끔하고 직설적인 비판을 듣는 편이 훨씬 안심될 것 같습니다.", "weaponId": "wpn_pistol_0001", "rarity": 3}, {"name": "기사도 정신", "type": "아츠 유닛", "description": "미에슈코 공업에서 개발한 아츠 유닛 중 하나, 특수 제작된 D64강을 사용했고, 다양한 맞춤형 모듈을 탑재했습니다. 이 제품은 과거 경기장의 불꽃놀이를 연상시킵니다.", "lore": "위대한 총 대변인 말키위츠 님께서 우리에게 남긴 것은 따분하고 공허하며 고행 같은 삶이 아닙니다. 우리가 어려움에 직면하고, 침식과 아겔로스, 그리고 온 탈로스 II의 적의에 맞서 싸우고 있기 때문에 인간 사회에서 없어서는 안 될 무언가, 바로 '자극'이 필요한 겁니다!\r\n\r\n\r\n자코뱅이 말했듯이, 책에서 영화까지, 카드 게임에서 전자 제품까지, 우리는 고향에서 유래한 많은 오락 형식을 많이 보존해 왔습니다. 하지만 왜 내가 이 일을 고집하는지 아십니까? 왜 내가 계속해서 '기사 스포츠 문화의 부흥'을 주장하는지도 궁금하시겠죠?\r\n\r\n\r\n서두르지 마세요! 진정하세요! 소문을 퍼뜨리지 마세요. 저는 테라주의자도 귀향파도 아닙니다. 제가 관심 있는 것은 오직 지금, 이곳뿐입니다. 제가 카시미어를 그리워해서 이 모든 것을 시작했다고 생각하십니까? 제가 태어났을 때, 아버지께서는 카시미어에 관한 사진 한 장도 남기지 않으셨습니다!\r\n\r\n\r\n오히려 그 반대입니다! 바로 제가 현실에 집중하기 때문에, 저는 평생의 막대한 자금을 들여 고향에 이 지하 경기장을 세우는 데 투자했습니다!\r\n\r\n\r\n여러분, 우리는 더 이상 테라의 고상한 도시 거리 위에 있지 않습니다! 여러분, 우리는 황무지에 있습니다. 우리는 외계 행성의 낯선 땅 위에 서 있습니다! 문학? 영화? 그런 따분한 것들이 젊은이들을 안전한 새장에 빠지게 할 뿐입니다. 책벌레들이 공단의 공장에서 오리지늄 광물을 옮기거나, 시력이 안 좋은 이들이 철의 서약군의 요새에서 아겔로스들과 맞설 수 있겠습니까?\r\n\r\n\r\n기사 스포츠를 생각해 보십시오. 무기와 신체를 갈고 닦으며, 오리지늄 아츠의 극한을 추구하는 이 운동이 우리 혹독한 현실과 얼마나 잘 맞아떨어지는지 말입니다! 바꾸어 말하면... 이건 여기 계신 분들께만 말씀드리는 건데... 상업연합회와 군대의 큰 지원을 받을 수 있지 않겠습니까?\r\n\r\n\r\n아니, 아닙니다. 우리가 야만인을 키운다는 식으로 말씀하지 마십시오. 기사 스포츠는 분명 무력을 강조하지만, 자기 신체와 정신을 단련하는 것이야말로 기사도 정신의 가장 좋은 표현이 아니겠습니까?\r\n\r\n\r\n도덕이요... 도덕도 물론 필요하죠... 하지만 도덕은 돈을 번 다음에 논할 문제 아닙니까?\r\n\r\n\r\n그만해, 레드친. 네가 말해봐, 네 의사인 아들이 좀 더 강했다면, 그가 북쪽으로 취직할 때도 아직 걱정했겠어?\r\n\r\n\r\n아, 당신 말이 맞습니다. 저 역시 철의 서약군이 우리에게 투자할 수도 있다고 생각합니다... 음, 이렇게 생각해보죠. 만약 우리가 링 위에서 슈퍼스타들을 몇 명 키워낼 수 있다면, 다른 협력자들도 그들을 위해 우리에게 손을 내밀 것입니다. 예전에 카시미어에서도 그런 전례가 있었다고 들었습니다! 슈퍼 전사를 만드는 것 말입니다!\r\n\r\n\r\n투자요? 물론입니다... 투자. 제가 동네 사람들을 부른 것은 그냥 말장난을 하기 위해서가 아닙니다... 솔직히 말씀드리죠, 저는 이미 첫 번째 참가자들을 찾아냈습니다. 엔지니어, 의사, 심지어는 산적도 있습니다... 하지만 그들은 모두 들러리일 뿐, 저는 두 명의 은퇴한 병사들이 마음에 들었습니다. 그들은 분명히 돋보일 것입니다!\r\n\r\n\r\n아, 당신의 제안도 나쁘지 않군요. 매우 안전한 선택입니다. 하지만 거리와 골목에서 모두가 내 뜨거운 대회를 주목할 때, 그때서야 참여하려고 하면 오늘과 같은 조건은 기대할 수 없을 것입니다... 됐습니다, 철의 서약군이 투자할 때가 오면, 나는 당신이 곡물 장사로 벌어들인 돈 따위는 필요 없습니다. 사랑하는 나의 외삼촌이여!\r\n\r\n\r\n아직 서명 안 하신 분이 있습니까? 좋습니다.\r\n\r\n\r\n모두 우리 가족이 모은 돈이니, 경기장은 우리 가문의 이름을 따서 명명하겠습니다... 뿐만 아니라, 기사 스포츠가 다시 대지를 휩쓸 때, 모든 협회는 우리 이름으로 바꿔야 합니다!\r\n\r\n\r\n그 이름은 바로 한니크 협회!", "weaponId": "wpn_funnel_0010", "rarity": 6}, {"name": "망각", "type": "아츠 유닛", "description": "주술 타임에서 개발한 아츠 유닛 중 하나, 기본적인 오리지늄 회로 외에는 모든 재료가 베일에 싸여있습니다. 정말로 이것이 탈로스 II에서 만들어질 수 있는 물건이란 말인가?", "lore": "엔드필드에 합류하기 전, 저는 한 임시 거주지에 지낸 적이 있습니다. 그곳은 공단과 탈로스 II 상업연합회가 인근 지역에 개발 계획을 세워 공동으로 관리하던 곳이었어요. 거기엔 온갖 사람들이 모여 살았어요. 낡았지만, 참 활기찼죠.\r\n\r\n\r\n어느 날 저녁, 집 앞에서 몇 명의 살카즈 사람들이 웅크리고 앉아 있는 모습을 보았어요. 그들은 모두 공단 소속의 인부들이었어요. 모두 체격이 건장하고 대부분이 감염자였어요. 약간의 아츠를 다룰 줄도 아는, 전형적인 살카즈, 내 동포들이었죠. 그들은 웃옷을 벗고 음식을 먹고 있었는데, 나를 보자 멋쩍은 미소를 지으며 길을 비켜주었어요.\r\n\r\n\r\n그들로부터 멀지 않은 곳에는 또 다른 공단 작업자들이 있었고, 그들도 비슷한 차림으로 떠들썩하게 웃으며 같은 음식을 먹고 있었어요. 모닥불을 둘러싸고 춤을 추고 각자의 고향 노래를 부르며 즐기고 있었어요.\r\n\r\n\r\n\"같은 음식을 먹고 있었다.\"...\r\n\r\n\r\n펠리카 감독관님, 이 말이 무슨 의미인지 아시겠어요?\r\n\r\n\r\n살카즈의 처지는 과거와는 확연히 달라졌어요. 저의 할아버지는 200년을 넘게 살아오면서 카즈델의 이야기를 자주 들려주곤 하셨죠. 맞아요, 탈로스 II의 다른 사람들이 우리를 받아들인다는 건 할아버지가 살아있던 그 시절과는 전혀 달라요. 사람들은 더 이상 우리의 아츠를 두려워하지 않으며, 광석병도 의사와 과학자들 덕분에 더 이상 그렇게 무섭지 않았어요. 저는 다른 또래들과 같은 교육을 받았고, 다양한 종족 친구들도 많이 만났죠. 오히려 저는 내 동포들과 마찬가지로 강한 체력을 지니고 아츠을 조금 다룰 수 있어, 없어서는 안 될 노동력이나 아겔로스와 침식에 맞서 싸우는 선봉대로 자리 잡게 되었죠.\r\n\r\n\r\n겉보기엔 분명 평등해졌습니다. 모든 작업자가 '같은 음식을 먹고' 있으니까요.\r\n\r\n\r\n하지만 그들은 여전히 땅바닥에 혼자 앉아 있었고, 저 멀리서 떠들썩한 파티와는 아무런 관계가 없는 듯 보였어요.\r\n\r\n\r\n가끔은 사람들이 살카즈를 받아들이는 방식이 살카즈를 '잊음'으로써 이루어진 것이 아닌가 하는 생각이 들어요. 우리의 역사, 문화, 언어의 차이를 의도적으로 무시함으로써 만들어진 '평등'은 진정한 수용일까요?\r\n\r\n\r\n물론 지금의 세상이 과거의 불평등보다는 훨씬 낫습니다. 저희 할아버지 시대에 이런 말을 했다면 아마 제 이런 생각을 쓸데없는 걱정이라며 꾸짖었겠죠.\r\n\r\n\r\n하지만 저는 묻고 싶습니다. 누가 살카즈라는 존재의 주체적 가치를 보장해 줍니까? 이대로라면 살카즈가 존중받는 게 아니라, 그저 새로운 방식으로 길들여지는 게 아닐까요? 저는 세쉬카의 선택을 이해합니다. 하지만 완전히 동의하지는 못합니다.\r\n\r\n\r\n나는 엔드필드의 유일무이함을 믿기에 엔드필드의 오퍼레이터가 되기로 결심했습니다. 펠리카 감독관님, 관리자님. 제겐 제 나름의 목표가 있습니다. 살카즈를 위한 목표 말입니다. 엔드필드에서 인정받을 수 있어 기쁩니다. 방랑자와 함께한 시간 그리고 마틴 마빈 말렌 씨가 제게 건넸던 격려의 말들도 절대 잊지 않겠습니다.\r\n\r\n\r\n하지만 저는 아직 정예 오퍼레이터가 되지 않을 겁니다.\r\n\r\n\r\n아직은, 그럴 때가 아니니까요.", "weaponId": "wpn_funnel_0009", "rarity": 6}, {"name": "폭발 유닛", "type": "아츠 유닛", "description": "노스마치 중공업 지원소에서 개발한 아츠 유닛, 논란의 여지 없이 최고의 오리지늄 아츠 전도성을 자랑합니다. 오직 가장 강인한 사용자만이 이 제품을 다룰 수 있습니다.", "lore": "나는 월터의 요청사항을 받았다. 도저히 말이 안 되는 요구였다. 나는 그가 출력 수치 칸에 실수로 0을 하나 더 쓴 게 아닌지 몇 번이고 확인했다. 그가 원하는 것은 아츠 유닛이 아니라 휴대용 대포였다. 그는 이것이 개척 전선에서 절실히 필요한 장비라고 주장했지만, 나는 그런 위험한 무기를 전선 개척자들에게 맡기고 싶지 않았다.\r\n\r\n\r\n......\r\n\r\n\r\n이론상으로는 이런 출력 수치를 달성하는 것이 불가능하지는 않다. 내 계산에 따르면, 충분히 가능한 일이다. 하지만 위험 부담이 너무 크다. 아츠 유닛의 구조를 새로 설계해야 하며, 그럴 경우 무게가 두 배로 늘어날 것이다.\r\n\r\n\r\n......\r\n\r\n\r\n체인 커터기라니? 이 요구는 정말 터무니없다. 그들은 아츠 유닛을 무기 대신 적에게 던지려는 것인가? 그러나 현재의 설계에서는 장착할 공간이 있긴 하다. 어쩌면 시도해 볼 만할지도 모르겠다.\r\n\r\n\r\n......\r\n\r\n\r\n전선을 밀고 나온 후, 월터는 나를 현장에 초대했다. 그의 말로는... 내가 만든 '걸작'을 직접 보러 가자는 것이었다. 나는 그가 내가 제공한 프로토타입이 왜 잔해조차 남기지 못했는지 충분한 이유를 설명해 주길 바랐다.\r\n\r\n\r\n......\r\n\r\n\r\n그 광경은 평생 잊을 수 없었다. 산처럼 거대한 아겔로스였다. 그것의 잔해는 계곡 전체를 막아버렸다. 월터는 내게 말했다. 그가 프로토타입으로 아겔로스를 들이받아, 체인 커터기로 그것의 몸에 틈을 냈다고. 그 후... 천지가 뒤흔들렸다고 한다.", "weaponId": "wpn_funnel_0008", "rarity": 6}, {"name": "바다와 별의 꿈", "type": "아츠 유닛", "description": "미에슈코 공업의 고급 라인 제품 중 하나, 우수한 오리지늄 아츠 전도성으로 겉만 화려한 다른 유행 제품들과 달리 실속을 갖추었습니다.", "lore": "나도 내가 어디로 가야 할지 고민했던 적이 있었지. 이 덩치를 봐, 처음엔 아스팔트 라운드어바웃으로 가서 지하 투기장에나 나갈까 생각했어. 하지만 그곳의 썰렁한 분위기에 겁을 먹고 말았지. 남은 인생을 거기서 썩히긴 싫었거든. 그래서 이 라반도르마로 오게 된 거야. 여긴 기회가 넘치는 대도시잖아. 수많은 거물이 찾아오고 합동 회의니, 포럼이니, 전시회니 없는 게 없지!\r\n\r\n\r\n......\r\n\r\n\r\n1년이 지났어. 전 재산을 털어 차를 한 대 샀고, 마음씨 좋은 상인의 도움을 받아 이동식 식당으로 개조했지. 바로 지금 이 차야. 뭐, 바닷가니까 난 이걸 '배'라고 부르기로 했어. '배'가 서는 곳이 곧 나의 '부두'인 셈이지. 일손도 몇 명 구했어. 마침 그때가 옵시디언 뮤직 페스티벌 기간이라 여행객이 넘쳐났고, 바닥에 골드티켓이 굴러다니던 시절이었지.\r\n\r\n\r\n......\r\n\r\n\r\n2년이 지났어. 나처럼 차를 몰고 나와서 여행객을 상대하는 사람들이 점점 늘어나더군. 에휴, 옵시디언 뮤직 페스티벌 덕에 흥하고, 또 그것 때문에 망한다더니... 거참 희한하지? 건물은 점점 늘어나는데 왜 내 손님은 오히려 줄어드는 걸까? 그해였지. 옛날의 나처럼 전 재산을 다 털어 넣었다가 결국 아무것도 건지지 못한 필라인 녀석을 본 것도...\r\n\r\n\r\n......\r\n\r\n\r\n3년이 지났어. 수익은 점점 줄고, 언제까지 버틸 수 있을지 모르겠더군. 제일 열받는 건, 항상 내 맞은편에 차를 대던 그 페로 녀석이 아 글쎄 우리 가게까지 와서 직원을 빼가려고 했다니까? 내가 곧 망할 거라고 헛소문을 내고 다니면서 말이야... 아오, 지금 생각해도 화가 나네.\r\n\r\n\r\n......\r\n\r\n\r\n짐을 싸기 시작했어. 어차피 '배'엔 나 혼자 남았으니, 차를 몰고 고향으로 돌아가면 그만이었지. 근데 바로 그해에 라반도르마에 해일이 덮쳤어. 재앙이 끝난 후 엔드필드의 의료 구조대가 도착했지... 엔드필드랑 내 가게가 무슨 상관이냐고? 당연히 상관없지. 하지만 어느 날 밤, 그 사람들이 뭔가 예쁘다, 별하늘 같다며 이야기하는 소리가 들리더라고. 나가서 봤더니 칠흑 같은 해변에 파도에 떠밀려온 조개들이 흩어져 있는데, 그중 몇 개가 은은한 빛을 내뿜고 있는 거야. 문득 옛날 페스티벌 때도 이런 광경을 봤던 기억이 나더군. 그땐 사람이 지금처럼 많지 않았지. 그래서 이거다 싶었지. 다음 날 바로 '배'를 담보로 잡히고 야광 조개를 잔뜩 구해서 장식품을 섞어 만들었지. 맞아, 지금 네가 들고 있는 그거랑 똑같은 거야. 그 뒤엔 어떻게 됐냐고? 이 일대에 '부두'가 늘어났고, 내 '배'도 잘 나가게 됐지.\r\n\r\n\r\n솔직히 말하면, 이쪽 해변을 통째로 빌릴 생각이야. 그래, 그래. 지금 서 있는 바로 여기. 그리고 이 조개들을 빻아서 야광 해변을 만드는 거지! 이름도 벌써 지어놨어. '별모래 바다의 꿈'이라고. 어쩌면 다음 옵시디언 뮤직 페스티벌 야간 무대가 우리 가게 쪽으로 잡힐지도 모르잖아? 그때 꼭 와서 자리 좀 채워줘. 내가 특별히 할인해 줄게.\r\n\r\n\r\n그 페로 녀석? 저기 있잖아. 우리 지금은 동업자야. 왜 걔랑 손잡았냐고? 이 라반도르마라는 도시는, 원래 장사꾼끼리 서로 돕고 살아서 지금의 모습이 된 거 아니겠어?", "weaponId": "wpn_funnel_0013", "rarity": 6}, {"name": "사명의 길", "type": "아츠 유닛", "description": "레이시언 공업의 대표적인 첨단 제품, 제1차 아겔로스 전쟁 당시 처음 프로토타입을 투입한 이후 꾸준히 개량을 거듭해 왔으며, 강력한 화력으로 확실한 안전을 보장합니다.", "lore": "그저께, 고물을 주우러 나갔다가 이상한 페로 누나를 만났다.\r\n\r\n\r\n누나는 예전에 우릴 돌봐줬던 만물의 대지 사람 같지도 않았다. 이상한 옷차림을 하고는 고철 덩어리 같은 걸 붙잡고 있었는데, 그걸 '바이크'라고 불렀다. 아겔로스가 부숴버렸다고 했다.\r\n\r\n\r\n누나는 내게 버든비스트를 빌려줄 수 있냐고 물었다.\r\n\r\n\r\n빌려주기 싫었다.\r\n\r\n\r\n누구냐고 물었더니, 자기는 '전달자'라고 했다.\r\n\r\n\r\n전달자? 처음 들어보는 이름이었다.\r\n\r\n\r\n누나가 설명해 주길, 아주 먼 옛날 '스타게이트'가 멀쩡했을 때는 전달자들이 탈로스 II의 물건을 가지고 스타게이트를 지나 테라로 갔다가, 다시 테라의 물건을 가지고 탈로스 II로 돌아오며 서로의 그리움과 마음을 주고받았다고 한다.\r\n\r\n\r\n하지만 아빠가 스타게이트는 진작에 망가졌고, 테라 같은 건 이제 없다고 했는데?\r\n\r\n\r\n누나는 아겔로스를 몰아낸 뒤 사람들이 다시 전쟁과 불신에 빠져 마음을 닫아버렸다고 했다. 마치 내 발치에 있는 새끼 샌드비스트가 굴 속에 틀어박혀 나오지 않는 것처럼 말이다.\r\n\r\n\r\n전쟁?\r\n\r\n\r\n인간과 아겔로스의 전쟁, 그리고 인간과 인간 사이의 전쟁. 누나는 나랑 아빠가 사는 이 거주지도 전쟁을 피해 황무지에 자리를 잡은 걸지도 모른다고 했다.\r\n\r\n\r\n난 버든비스트를 빌려주고 싶지 않았다.\r\n\r\n\r\n누나는 내 눈을 똑바로 바라보며 진지하게 말했다. 버든비스트를 빌리려는 건 전쟁이 끝났다는 걸 사람들에게 알리기 위해서라고.\r\n\r\n\r\n비록 테라와의 연결은 끊어졌지만, 전달자는 탈로스 II의 사람들이 다시 뭉치고 서로 믿게 만들고 싶다고 했다.\r\n\r\n\r\n누나는 전쟁이 끝난 후 나타난 첫 번째 전달자였고, '엔드필드'라는 사람을 대신해 첫 번째 편지, 즉 평화를 상징하는 편지를 부치려는 거라고 했다.\r\n\r\n\r\n그래도 난 버든비스트를 빌려주기 싫었다.\r\n\r\n\r\n누나는 부드럽게 웃으며 자기 몸 주위에 떠다니던 쇠구슬을 떼어냈다. 그게 편지 말고는 가진 것 중에 제일 비싼 거라며, 버든비스트를 돌려줄 때까지 담보로 맡기겠다고 했다.\r\n\r\n\r\n음, 보통 둥둥 떠다니는 건 꽤 비싸긴 하지.\r\n\r\n\r\n나는 알겠다고 하고 버든비스트를 빌려줬다. 내 이름도 알려주고 거주지가 있는 방향도 가르쳐 줬다.\r\n\r\n\r\n......\r\n\r\n\r\n오늘 아침에 일어났는데 누가 그러더라. 거주지 밖에 내 버든비스트가 묶여 있다고. 거기엔 편지 한 통이랑 소포 하나가 있었는데, 편지에 내 이름이 적혀 있었다.\r\n\r\n\r\n역시 그 전달자 누나였다.\r\n\r\n\r\n편지에는 나한테 맡겼던 물건은 돌려주지 않아도 된다고 적혀 있었다. 내 버든비스트 덕분에 누나랑 편지가 목적지에 더 가까워질 수 있었으니 그 답례라고 했다.\r\n\r\n\r\n전달자의 시대가 다시 왔어! 누나의 말투는 꽤 신나 보였다.\r\n\r\n\r\n소포 안에는 '통신 장치'가 들어 있었고 설명서도 있었다. 이제 우리 모두 이 '통신 장치'로 근처에 있는 전달자들을 부를 수 있다고 한다.\r\n\r\n\r\n근데 난 누구한테 편지를 쓰지? 어디로 보내야 하고? 난 거주지를 떠나본 적이 없는데.\r\n\r\n\r\n그럼 일단 그 전달자 누나한테 먼저 써야겠다.", "weaponId": "wpn_funnel_0011", "rarity": 6}, {"name": "작품: 침식 흔적", "type": "아츠 유닛", "description": "경량 초자연 기술 실험실에서 계약한 작품, 예술가가 직접 조각한 금속 부품과 빙력암의 무늬가 결합해 독특한 아츠 회로를 형성합니다.", "lore": "침식 흔적: 탈로스 II의 지질학 용어로, 원래는 결정체 표면이 용식 되어 생긴 규칙적인 오목한 자국을 가리키지만, 현재는 자연물이 침식의 영향을 받아 형성된 다양한 흔적을 의미하는 데 더 자주 사용된다.\r\n\r\n\r\n\r\n\"나는 바위에 침식 작용으로 생긴 자국들을 통칭하여 '침식 흔적'이라 부르고 싶어.\"\r\n\r\n\r\n\"또 기존 용어를 멋대로 끌어다 쓰는군.\"\r\n\r\n\r\n\"5년 내로 학생들은 테라에서 가져온 옛 교과서를 버리고, 내가 쓴 <탈로스 II 지질학>을 배울 거야. 그때가 되면 내가 정한 것이 정식 용어가 될 테니까.\"\r\n\r\n\r\n\"아직도 그런 뜬구름 잡는 소리를 하는구나. 이걸 자만이라고 해야 할지, 아니면 자신감이라고 해야 할지 모르겠네.\"\r\n\r\n\r\n\"뜬구름 잡는다고? 나는 이 단어가 너무 좋아. 여기에 오기 전 내가 전공은 우주항공이었고, 언젠가 로켓을 타고 별에 가보는 게 꿈이었다고.\"\r\n\r\n\r\n\"그런데 어쩌다 나랑 같이 지하로 내려오게 된 거야?\"\r\n\r\n\r\n\"그 '괘씸한', '모든 기존 법칙을 뒤엎은', '이해 불가능한' 물건 때문이지!\"\r\n\r\n\r\n\"초자연?\"\r\n\r\n\r\n\"그게 아니면 뭐겠어? 그것은 아겔로스보다도 만 배는 더 까다로워. 내가 포착한 모든 데이터를 분석한 결과, 하늘에서 관측할 수 없는 지점들은 모두 초자연에 의해 가려졌다는 결론이 나왔어. 지금 이 행성과 가장 가까운 초자연은... 너와 나의 코끝 거리만큼이나 가깝지.\"\r\n\r\n\r\n\"세상에, 그럼 우리도 결국...\"\r\n\r\n\r\n\"맞아, 우주는 위험해. 우리가 살아 있는 동안 탈로스의 손바닥을 벗어나긴 힘들 거야.\"\r\n\r\n\r\n\"음... 내 말은 초자연이 우리를 삼켜버릴 가능성에 대해서야. 넌 꽤 낙관적이네.\"\r\n\r\n\r\n\"그야 누가 알겠어? 어쨌든 난 그전에 초자연이 어떻게 나타났는지, 가장 오래된 침식 자국이 얼마나 오래된 것인지 알아내고 싶어. 그래서 너랑 함께하기로 한 거야.\"\r\n\r\n\r\n\"그걸 알아내면 지질학은 물론이고, 물리학, 천문학... 심지어 아이들이 쓴 작문에도 네 이름 '카디야'가 등장할걸.\"\r\n\r\n\r\n\"격려 고마워, 모리스. 속표지에 너에게 감사했다는 말 잊지 않을게. 어? 지수계가 반응했어, 저쪽이야!\"\r\n\r\n\r\n\"알았어. 와우!\"\r\n\r\n\r\n- 오래된 녹음 자료\r\n\r\n\r\n\r\n\"이게 선생님의 선생님의 선생님에 관한 이야기인가요? 이본 오퍼레이터님?\"\r\n\r\n\r\n\"정확히 말하자면, 그보다 더 오래된 이야기야. 이건 그분들의 마지막 녹음 자료였지.\"\r\n\r\n\r\n\"그다음은요?\"\r\n\r\n\r\n\"그 다음엔 그분들은 돌아오지 못했어. 그분들의 유품 중 처음 발견된 침식 빙력암 표본이 나의 선생님의 선생님의 선생님에게 전해졌지. 그곳에서 연구가 시작되었고, 그분은 '초자연 연구의 아버지'가 되셨어.\"\r\n\r\n\r\n\"그럼 이 이야기를 해주신 이유는...\"\r\n\r\n\r\n\"내가 초자연 연구의 길을 어떻게 걷게 되었는지 묻지 않았나? 아까 이야기한 것이야말로 내가 선생님한테서 전승받고 계승한 것이야.\"", "weaponId": "wpn_funnel_0006", "rarity": 6}, {"name": "O.B.J. 아츠 아이덴티티", "type": "아츠 유닛", "description": "엔드필드 공업에서 제작한 제식 장비 시리즈, 베테랑 무기고 공학자 오페로가 이끄는 프로토타입 기획팀이 설계했습니다. 출력은 사용자의 오리지늄 아츠 수준에 따라 달라집니다.", "lore": "한때는 정말 확신했었다.\r\n\r\n내가 적어도 응용 오리지늄 아츠 분야에서만큼은, 탈로스 II 전체를 통틀어도 손에 꼽힐 재능을 가졌다고.\r\n\r\n이 점에 대해서는 어릴 적부터 내게 아츠를 가르쳐 주신 선생님들, 총 스물세 분이나 되는데, 그분들 모두가 보증해 줄 것이다.\r\n\r\n또래들이 아츠 유닛으로 촛불 하나 켜는 법을 배우고 있을 때, 나는 이미 선생님과 '감염자가 맨손으로 장시간 대규모 아츠를 시전할 가능성'을 두고 토론하고 있었으니까... 적어도 그 당시엔, 그 전설적인 관리자에 대한 이야기를 듣고 나서 '나라고 못 할 게 뭐 있어?'라고 생각했을 정도였다.\r\n\r\n지난 20년간의 오리지늄 아츠 능력 평가 성적, 아카데미 입학 후 매년 받은 아츠 개론 점수, 심지어 졸업 논문인 <실전 응용에서 이론 구간까지 - 오리지늄 아츠의 미래를 논하다>가 받은 찬사까지. 그 모든 게 나를 더욱 확신하게 만들었다. 그래, 나는 분명 '천재'였다.\r\n\r\n...그렇게 믿어 왔다. 그 회사, 어릴 적부터 동경하던 '엔드필드 공업'에 입사하기 전까지는.\r\n\r\n\r\n입사 후 첫 정기 종합검진 보고서를 처음 받아든 순간의 심정을, 뭐라 설명해야 할까?\r\n\r\n오리지늄 아츠 적응성 '표준'? 말도 안 돼, 어떻게 이럴 수가 있지? 뭔가 착오가 있는 게 분명해.\r\n\r\n순간 나는 내가 어떤 디얄의 오리지늄 아츠에라도 걸려서 정신을 못 차리고 있는 건 아닌가 의심했을 정도였다.\r\n\r\n그래서 나는 곧장 인력 자원 사무부로 달려가 강력하게 항의했다. 이런 경솔하고 근거 없는 결론은 절대 받아들일 수 없으니 재검사를 해달라고 요구했다.\r\n\r\n내 요청에도 인력 자원 사무부는 전혀 놀란 기색이 없었다. 나를 담당한 마틴 마빈 말렌은 더없이 진지한 말투로 이렇게 대답했다.\r\n\r\n\"...요구 사항은 잘 알겠습니다. 그럼 공정성을 위해 3영업일 후에 오리지늄 아츠 적응성 테스트를 두 차례 다시 잡아드리죠. 그때는 비교군이 되어 줄 오퍼레이터 두 분도 함께 참가할 겁니다.\"\r\n\r\n\r\n3일 후...\r\n\r\n나는 요청받은 대로, 아츠 유닛을 사용해 눈앞의 철판을 아주 정교한 정사각형 모양으로 잘라냈다. 고개를 드니, 맞은편에서 테스트를 받고 있어야 할 그 사브라가 호기심 가득한 얼굴로 나를 쳐다보고 있었다.\r\n\r\n\"오, 그렇게도 자를 수 있어? 난 그냥 한 방에 열여섯 조각 내면 되는 줄 알았는데!\"\r\n\r\n순간 내 귀를 의심했다. 나도 모르게 그쪽의 테스트 결과물로 눈길이 갔다... 반듯하게 잘린 정사각형 조각 열여섯 개가 훈련실 바닥에 가지런히 놓여 있었고, 타이머는 1분 1초에 멈춰 있었다.\r\n\r\n...그때 나는 뭘 하고 있었더라? 아, 막 아츠 유닛 조정을 끝내고 철판의 어느 모서리부터 칼집을 넣어야 할지 고민하고 있었지.\r\n\r\n\r\n그렇게 첫 테스트는 완패였다.\r\n\r\n하지만 거기서 기죽지는 않았다. 서둘러 두 번째 테스트를 준비하며 스스로를 다독였다. \"엔드필드는 거대하니까. 관리자님 같은 전설적인 인물도 있는 곳인데, 가끔은 저런 괴물 같은 동료를 만날 수도 있지... 지극히 정상적인 일이야.\"\r\n\r\n하지만 곧 우연... 아니 어쩌면 필연이 닥쳤다.\r\n\r\n아츠 유닛을 점검하고 있는데, 정예 오퍼레이터 제복을 입은 에기르 청년이 훈련실 문 틈으로 고개를 들이밀었다. 그가 꼬리를 가볍게 한 번 쓸었을 뿐인데, 벽에 걸려 있던 제식 아츠 유닛 50여 개가 저절로 잠금 해제되더니 전부 그를 따라 날아가는 게 아닌가. 입으로는 \"아 귀찮아... 이럴 줄 알았으면 오지 말 걸...\"이라고 투덜대면서 말이다.\r\n\r\n그때 처음, 책에서만 읽던 '절망적인 격차'를 몸으로 느꼈다.\r\n\r\n나는 직감했다. 내가 아는 모든 오리지늄 아츠를 통달한다 해도, 저 사람처럼 흔적 하나 남기지 않고, 저렇게 자유자재로 다루는 건...\r\n\r\n절대 불가능하다는 것을.\r\n\r\n문득 그런 생각이 들었다. 지난 20여 년간 내가 쌓아올린 성적들은, 그저 이 순간을 위해 존재했던 게 아닐까. 내가 천재가 아니라, 진짜 천재는 따로 있다는 사실을 뼈저리게 깨닫게 해주기 위해서.\r\n\r\n결국 두 번째 테스트는 자진 포기했다.\r\n\r\n\r\n그 테스트 이후 나는 특수 기술부 입사를 포기했다. 다행히 무기고 쪽에서 내 이력서를 가져가더니, 거기서 일해보지 않겠냐고 제안해 왔다.\r\n\r\n나는 수락했다.\r\n\r\n\r\n듣자 하니, 올해 아츠 유닛 트러블 슈팅 대회의 우승 상품이 여전히 그 클래식한 모델인 '술식'이라던데, 이미 다섯 개나 가지고 있지만 여섯 번째를 손에 넣는 것도 나쁘진 않겠지.", "weaponId": "wpn_funnel_0014", "rarity": 5}, {"name": "선교의 자유", "type": "아츠 유닛", "description": "미에슈코 공업에서 고요한 수도회를 위해 맞춤 제작한 아츠 유닛, 이 제품은 설계와 검증부터 생산과 조정까지 모든 과정을 고요한 수도회 수사가 감수했습니다.", "lore": "회화'라는 이름의 수사가 황무지로 발걸음을 옮겼다.\r\n\r\n그는 황폐한 거주지에 닿았다. 개울은 말라붙고, 대지는 갈라져 있었다.\r\n\r\n굶주리고 목마른 포르테들이 그에게 구원을 청했다.\r\n\r\n\"너희에게 필요한 것은 지식이다. 너희를 물과 풀이 무성한 곳으로 인도할 지식.\"\r\n\r\n\"내 너희에게 이 땅을 읽는 법을 가르쳐 주리라.\"\r\n\r\n그의 손에서 오리지늄 네트워크의 빛이 반짝였고,\r\n\r\n그는 머나먼 곳의 사람들이 남긴 학식을 전해 주었다.\r\n\r\n일곱 번의 밤낮이 지난 후,\r\n\r\n깨달음을 얻은 포르테들은 황무지 속에서 스스로 우물을 파는 법을 익혔고,\r\n\r\n그 뒤로 거주지는 물과 풀로 풍성해졌다.\r\n\r\n\r\n'재현'이라는 이름의 수사가 황무지로 발걸음을 옮겼다.\r\n\r\n그는 황폐한 거주지에 닿았다. 개울은 말라붙고, 대지는 갈라져 있었다.\r\n\r\n굶주리고 목마른 포르테들이 그에게 구원을 청했다.\r\n\r\n\"너희에게 필요한 것은 힘이다. 본래 너희 것이던 수원을 되찾을 힘.\"\r\n\r\n\"내 너희에게 자신을 지킬 무기를 주리라.\"\r\n\r\n그는 등에 멘 여러 자루의 총을 내려놓고,\r\n\r\n여기저기서 모은 선조들의 유물을 사람들에게 건넸다.\r\n\r\n일곱 번의 밤낮이 지난 후,\r\n\r\n무장한 포르테들은 개울 상류를 차지하고 있던 랜드브레이커를 몰아냈고,\r\n\r\n그 뒤로 거주지는 물과 풀로 풍성해졌다.\r\n\r\n\r\n'해석'이라는 이름의 수사가 황무지로 발걸음을 옮겼다.\r\n\r\n그는 황폐한 거주지에 닿았다. 개울은 말라붙고, 대지는 갈라져 있었다.\r\n\r\n굶주리고 목마른 포르테들이 그에게 구원을 청했다.\r\n\r\n\"너희에게 필요한 것은 신념이다. 풍요의 비가 내릴 것이라는 신념.\"\r\n\r\n\"내 너희와 함께하며, 예정된 우기를 기다리도록 이끌어 주리라.\"\r\n\r\n그는 사람들을 위해 율법과 규정을 제정하여 그들이 단결과 인내를 배우게 했고,\r\n\r\n끈기 있게 절망에 빠진 모든 포르테를 격려하며 그들에게 평온과 희망을 주었다.\r\n\r\n일곱 번의 밤낮이 지난 후,\r\n\r\n굳세진 포르테들은 마침내 생명의 비를 맞이했고,\r\n\r\n그 뒤로 거주지는 물과 풀로 풍성해졌다.\r\n\r\n\r\n만약 그대가 그 굶주리고 목마른 포르테라면,\r\n\r\n어느 수사의 구원을 택하겠는가?\r\n\r\n\r\n- '세 수사'에 관한 우화 한 토막, 고요한 이동 대성당 한 모퉁이에 새겨진 글귀.", "weaponId": "wpn_funnel_0012", "rarity": 5}, {"name": "황무지의 방랑자", "type": "아츠 유닛", "description": "레이시언 공업이 개발한 아츠 유닛, 간결함과 경량화로 유명합니다. 재료 사용량이 일반적인 아츠 유닛의 절반에도 미치지 않습니다.", "lore": "나는 황무지에서 그들을 만났다.\r\n\r\n\r\n처음에 그들은 내게 그리 우호적이지 않았다. 한 사자가 내 부상을 살피고는 거동할 수 있을 때까지 머무는 것을 허락해 주었을 뿐, 다른 이들은 그 이상의 교류를 거부했다. 어쩌면 내가 입고 있던 탈로스 II 상업연합회의 제복 때문이었을지도 모른다.\r\n\r\n\r\n그들의 생활 방식은... 내게 깊은 인상을 남겼다. 나는 이들이 독자적인 전통을 구축했다고 생각하는데 그 핵심은 '절약', 아니 더 정확히 말하자면 '절제'였다. 기술 수준이 아주 높은 것은 아니지만, 그들은 모든 재료를 극한까지 활용하려 애썼다. 덕분에 그들이 만든 것들에는 이 행성의 혹독한 황무지가 빚어낸 '간결함의 미학'이 깃들어 있었다.\r\n\r\n\r\n나는 그들에게 나 또한 장인임을 밝혔고, 덕분에 그들의 생산 과정에 참여할 수 있었다. 가까이에서 그들의 작업을 지켜본 후, 나는 놀라운 사실을 발견했다. 그들의 제품은 우리보다 훨씬 적은 재료를 사용하고 공정도 상당히 단순했지만, 무기의 성능 차이는 그리 크지 않았다는 것이다. 이 발견을 통해 나는 우리의 설계에도 최적화할 여지가 아주 많다는 것을 깨달았다.\r\n\r\n\r\n그들과 함께 3년을 지내고 나서야 떠났다. 작별할 때, 그들은 나를 사자의 예로 대우해 주었다. 하지만 나는 내가 그들에게 가르쳐준 것보다, 그들에게서 배운 것이 훨씬 더 많았음을 뼈저리게 느꼈다.", "weaponId": "wpn_funnel_0004", "rarity": 5}, {"name": "무가내하", "type": "아츠 유닛", "description": "홍산 선검국에서 개발한 아츠 유닛, 희귀한 식양 재료를 사용했으며, 재료 특성상 사용자는 매우 정밀한 조작 능력을 갖춰야 합니다.", "lore": "아이야, 내일이면 졸업 테스트를 치르게 되는구나. 이 테스트의 중요성은 말하지 않아도 알겠지. 네가 앞으로 어떤 자리에 배치될지가 결정될 테니까. 정말로 너를 직접 테스트 장소까지 데려다주고 싶었지만, 나는 지금 임무 때문에 침식 조류를 지켜보고 있어야 한단다.\r\n\r\n\r\n너는 이미 충분히 준비되어 있을 거라고 믿는다. 하지만 오리지늄 아츠의 정확도를 평가하는 테스트에 대해 몇 가지 당부를 하고 싶구나. 이 단계에서 가장 많은 탈락자가 나온단다. 네가 응룡 특수부대에 합류하고 싶다면, 그 단계를 반드시 통과해야 한다.\r\n\r\n\r\n테스트에서 사용되는 것은 무릉성에 있는 홍산 선검국이 특별히 개발한 아츠 유닛이야. 이 유닛은 식양을 재료로 사용하여, 오리지늄 회로가 예전에 네가 사용했던 아츠 유닛이랑 다를 거야. 이는 네 집중력과 감각을 한계까지 시험할 도전이 될 거다.\r\n\r\n\r\n물론, 이런 정보들은 이미 다 알고 있겠지. 듣자 하니, 젊은 친구들은 이 유닛에 속수무책이라는 의미의 '무가내하'라는 별명을 붙였다고 하더구나. 참으로 어울리는 별명이야. 이제 우리도 다 그렇게 부른단다.\r\n\r\n\r\n테스트의 공정성을 위해, 아츠 유닛의 세부 사항에 대해 더 말해 줄 수는 없지만, 나는 네가 잘해낼 거라고 믿는다. 어릴 적 우리가 함께 풀던 나무 자물쇠 놀이를 기억하니? 쉽진 않았지만, 넌 금세 요령을 찾아냈지. 이번에도 그때와 똑같이 하면 된다. 눈앞의 도전에 집중하고, 그 과정을 즐기거라.\r\n\r\n\r\n잘 해내길 바란다. 행운을 비마.", "weaponId": "wpn_funnel_0007", "rarity": 5}, {"name": "망자의 노래", "type": "아츠 유닛", "description": "주술 타임에서 출시한 기묘한 아츠 유닛 중 하나, 오리지늄 아츠의 범용성을 일부러 제한하여 고대 티카즈 주술의 어두운 논리를 부각했습니다.", "lore": "그 여자는 이른 아침 묘지에 와서 기도를 올리고, 점심때면 떠납니다. 오후에는 마을 공동 작업을 좀 거들다가 저녁 무렵 다시 묘지로 돌아오고, 깊은 밤이 되어서야 귀가하죠. 제가 미행해 봤는데, 집은 묘지에서 남동쪽으로 기껏해야 1km 떨어진 곳에 있었습니다. 대부분의 만물의 대지 방랑자가 그렇듯, 그 여자 또한 이런 외딴 황무지에서도 유유자적하게 지내는 법을 알고 있더군요.\r\n\r\n\r\n외부인과 어울리는 것을 딱히 꺼리지도 않습니다. 듣자하니 공단 사람들과도 접촉한 적이 있다는데, 대부분 물자 거래 때문이었다더군요.\r\n\r\n\r\n겉보기에는 전혀 위험해 보이지 않아요. 젊고 상냥한 데다, 심지어 수줍음까지 타니까요.\r\n\r\n\r\n하지만, 한번 생각해 보십시오. 여기서 가장 가까운 거주지까지 100킬로미터는 족히 넘는데, 이런 곳에 묘지가 있고, 묘지기는 그 여자, 단 한 명뿐이란 말입니다!\r\n\r\n\r\n제가 확인해 봤는데, 묘지에 묻힌 사람들은 그 여자와 아무런 관계가 없더군요. 대부분 침식 사고나 아겔로스의 습격을 받아 황무지에서 목숨을 잃은 이들이죠. 이름 없는 묘비는 그렇다 쳐도, 이름이 있는 건 제가 다 조사해 봤는데 모두 최근 몇 년간 실종된 사람들이었습니다.\r\n\r\n\r\n저도 이젠 슬슬 겁이 나거든요.\r\n\r\n\r\n이 일은 길어야 일주일, 딱 일주일만 더 하겠습니다. 그때 가서 찍어둔 사진이랑 영상 몽땅 넘겨드리고 전 손 뗄 겁니다. 돈은 안 주셔도 상관없습니다. 정말이지 더는 못 견디겠어요.\r\n\r\n\r\n그 여자는 분명... 나흐체러르란 말입니다!", "weaponId": "wpn_funnel_0005", "rarity": 5}, {"name": "섬광 번개", "type": "아츠 유닛", "description": "엔드필드 공업에서 제작한 아츠 유닛 중 하나, 과감한 구조와 강력한 전도성을 갖췄지만 다루기 어렵습니다. 많은 오퍼레이터가 이것을 능숙하게 다루는 것을 실력의 증표로 여깁니다.", "lore": "우리는 이름 없는 산 정상에서 이 광석을 발견했단다. 네 아버지는 이걸 얻기 위해 세 번이나 지쳐 쓰러질 때까지 땅을 팠어. 하지만 걱정 마렴, 아버지는 괜찮단다. 최근에 운동이 좀 부족했거든. 네가 그린 그림을 봤단다. 이렇게 멋진 아츠 유닛의 청사진을 그릴 수 있다니 정말 기쁘구나. 이 하얀 금속, 네가 만든 유닛의 눈으로 쓰기에 딱 맞지 않겠니? 우리 곧 제강호로 돌아갈 거야. 네가 잘 지내고 있기를 바란다.\r\n\r\n...\r\n\r\n우리는 탈로스 II 상업연합회에서 천재적인 디자이너를 발견하고, 레이시언 공업 손에서 그 디자이너의 최고 작품을 비싼 값에 사들여, 네 생일 선물로 주려고 했어. 사실 깜짝 선물을 준비하고 싶었지만, 경매에서 모든 돈을 써버리는 바람에 조금 귀찮은 일에 말려들었어. 제강호로 돌아가는 날짜가 조금 늦어질 수도 있겠지만, 네 생일 전에는 꼭 도착할 거란다. 잘 지내고 있기를 바란다. 아빠, 엄마 대신 펠리카 감독관에게 안부도 전해 주렴.\r\n\r\n...\r\n\r\n우리는 세묜 아저씨를 만났고, 4번 협곡에서 네가 설계한 권총을 보았단다. 정말 감동했어. 네 아버지는 아무리 말려도 소용이 없었고, 절차도 거치지 않고 몰래 한 자루를 가져가 버렸어. 그래서 내가 대신 서류를 마무리했단다. 펠리카 감독관에게도 우리 대신 사과해 주렴. 이 무기의 대담한 설계와 식각 탄환에서 보여준 창의성에 정말 놀랐어. 다만 4번 협곡에 문제가 좀 있었던 것 같고, 네 아버지는 홀로 몇 시간째 황무지로 들어가서 연락이 안 되고 있어. 걱정 말아라, 너의 생일 전에 꼭 돌아갈게.\r\n\r\n......\r\n\r\n이 총은 정말 최고야!\r\n\r\n......\r\n\r\n우리는 홍산 선검국에 있는 몇몇 지인과 연락이 닿았어. 그분들이 네 최신 아이디어를 지원해 줄 거란다. 하지만 일에 너무 몰두해서 몸을 상하지 않도록 조심해. 항상 몸을 풀고, 아침 운동도 잊지 말고. 펠리카 감독관의 말을 잘 듣고 그녀의 일을 도와드리렴. 다음에 제강호로 돌아올 때, 네가 원하는 대로 키가 조금 더 자라 있기를 바랄게.", "weaponId": "wpn_funnel_0003", "rarity": 4}, {"name": "오토 하이퍼노바", "type": "아츠 유닛", "description": "엔드필드 공업에서 제작한 오퍼레이터 돌파 장비 중 하나, 안드레의 설계를 채택하였으며, 아츠 술식을 사전에 저장했다가 긴급 상황에서 빠르게 아츠를 전개할 수 있습니다.", "lore": "\"탈로스는 가장 위대한 도시가 될 거란다.\" 그의 부모님은 말했다. \"안드레 즐로타리드, 견습생으로 들어가서 현장 일을 먼저 배우고, 그 뒤에 학교에 가거라. 어른이 되면 이 작은 정착지를 떠나 탈로스 II의 미래를 건설하고, 네 새로운 가족과 함께 의미 있는 삶을 살아야 한다.\"\r\n\r\n\r\n\"탈로스는 탈로스 II의 주성이다.\" 그의 책에는 그렇게 적혀 있었다. 그곳은 거대 기체 행성이었고, 스타게이트가 열려 있던 몇 년 동안, 그 유명한 퍼디낸드 클루니가 질량과 탈로스 II 사이의 거리를 계산해 냈다. 탈로스 II에는 별깍지가 존재하지 않는 것 같았다. 그들은 이곳에서 테라의 하늘보다 훨씬 더 많은 별을 발견했기 때문이다.\r\n\r\n\r\n\"별은 아주 가까운 곳에 있어. 아쉽게도 문은 이미 닫혔지만.\" 그의 지도 교수가 말했다. 오리지늄 응용 전공 수업 내용이 성에 차지 않는다면, 학원의 점성술사 살롱에 가보게. 점을 치는 것 말고도 천문학, 그러니까 과학적인 천문학을 토론하기도 하니까. 하지만 자네의 별에 대한 흥미는 단순히 관측하고 기록하는 데 있는 것 같지 않군. 안드레, 자네는 별을 만들고 싶어 하는 거지?\r\n\r\n\r\n\"별은 네놈이 감히 닿을 수 있는 곳에 있지 않아.\" 폭력을 등에 업은 대리인들이 의기양양하게 말했다. \"아니, 별은 바로 내 손안에 있어.\" 안드레가 대답했다. \"신사 숙녀 여러분, 제가 엔드필드 공업을 위해 설계한 첫 번째 아츠 유닛의... 프로토타입을 소개하겠습니다.\" 그의 어깨 위에 머물던 아츠 유닛이 허공으로 날아올랐고, 칠흑 같은 어둠 속 깊은 곳에서 터져 나오는 극초신성처럼 강렬한 빛이 상대의 눈을 찔렀다.", "weaponId": "wpn_funnel_0001", "rarity": 4}, {"name": "지미니 12", "type": "아츠 유닛", "description": "엔드필드 공업에서 제작한 오퍼레이터 기본 장비 중 하나, 무기고 공학자 지미니가 설계를 담당했습니다. 이 아츠 유닛은 신입 오퍼레이터들 사이에 특히 인기가 많습니다.", "lore": "사용 편의성이나 확장성이라니, 다들 과찬이십니다... 12 모델에 호평을 남겨준 오퍼레이터들에게 이유를 물어본 적이 있거든요. 다들 입을 모아 말하더군요. 진짜 마음에 든 건 이 아츠 유닛이 조명 아츠를 집중 강화해 주는 기능이라고요. 외근 나갈 때 엄청 편하다나요? 마치 고출력 탐조등을 하나 들고 다니는 것 같다면서요. 처음엔 그 말을 듣고 웃어야 할지 울어야 할지 몰랐습니다. 이건 제 설계 의도랑은 딴판이라고, 12 모델이 탐조등을 닮은 건 그냥 우연일 뿐이라고 어떻게 해명하겠어요? 나중에 저도 한 번... 침식 감염 구역 탐색 임무에 나간 적이 있습니다. 그때야 비로소 깨달았죠. 어둠 속을 홀로 걸을 때, 그 불빛이 얼마나 소중한지를요.\r\n\r\n- 지미니가 분기 직무 인터뷰에서 한 발언 기록", "weaponId": "wpn_funnel_0002", "rarity": 3}, {"name": "찬란했던 기억", "type": "한손검", "description": "용광로 요새에서 단조한 무기 중 하나, 형태가 우아하고 정교해 전선에서의 격전보다는 철의 서약군의 의식 자리에서 주로 사용됩니다. 칼날은 여러 차례 정밀한 연마를 거쳐 예리함이 극에 달했습니다.", "lore": "[음성 로그 발췌 · 1]\r\n\r\n\"콜록... 탈로스력 15년 ██월 ██일. 음, 임시 수용 구역으로 옮겨온 지 사흘째... 토리! 조용히 좀 해! 너 지금 의자 고치는 거야, 집을 다 부수는 거야?\"\r\n\r\n\"됐어, 불평 그만해. 그리고 네 그 랭크우드 도심 한복판에 있던 작업실 얘기도 집어치워. 나라고 뜨거운 물에 망작 영화나 틀어놓고 목욕하고 싶지 않겠어? 근데 지금은 깨끗한 수건 한 장도 사치라고.\"\r\n\r\n\"그럴 힘 있으면 북쪽 가서 '아겔로스 씨'랑 한 잔하고 오지 그래? 겸사겸사 걔네가 스타게이트 열쇠를 어디 숨겨뒀는지도 물어보고. 물론 그런 열쇠 따위 없다는 건 나도 알아. 너 유머 감각이 스테이빌라이저랑 같이 아겔로스한테 날아가 버린 거냐?\"\r\n\r\n\"나 뭐 하냐고? 로그 녹음 중이지. 너 그 카메라 좀 빌려주면 안 되냐? 어차피 다큐도 못 찍게 됐잖아. ...안 돼? 그래, 알았다. 또 그놈의 촬영기사 자존심 납셨네.\r\n\r\n\"방금 어디까지 녹음했더라? 그래, 오늘은 탈로스력 15년...\"\r\n\r\n\r\n\r\n[음성 로그 발췌 · 2]\r\n\r\n\"2주나 지났는데, 아직도 다른 사람들 소식이 없어. 모리, 엘리, 헨리... 다들 분명 살아 있을 거야. 그렇게 생각해야 해.\r\n\r\n\"우린 운이 좋은 편이야. 적어도 여긴 지붕이라도 있잖아. 다른 수용 구역은 이미 미어터져. 전쟁은 끝났는데, 테라로는 못 돌아가고, 밥 한 끼 챙겨 먹기도 힘든 이 꼴이라니...\"\r\n\r\n\"...너 돌아왔어? 잠깐, 저건 뭐야? 검? 그걸 통조림이랑 바꿨다고?! 미쳤냐?! ...이걸로 아겔로스를 잡았다고? 그래서 어쩌라고. 네 예비 렌즈로도 아겔로스를 거의 죽일 뻔했거든. 그만, 그만해. 알아, 그때는 내가 잘못했어!\"\r\n\r\n\"엘리랑 모리가 작업자 연합 지휘부 쪽 수용 구역에 있다는 소식 알아냈다고? 잘 됐다. 근데 거긴 물자가 더 부족해. 요 며칠 작업자 연합 지휘부랑 기업 안전 이사회가 '수용 계획' 때문에 회의한다더라. 하, 테라 신문에나 나올 법한 지루한 뉴스 같지. 내가 이런 걸 신경 쓰게 될 줄은 몰랐네.\"\r\n\r\n\"요즘은 함부로 돌아다니지 마, 토리. 그리고 그런 고물들 바꿔치기하러 다니지도 말고. 네 그 불쌍한 통조림이나 아껴 둬.\"\r\n\r\n\r\n\"그리고, 네 카메라도 점검해 둬. ...나도 몰라. 그냥... 어쩌면 우리, 다시 쓸 일이 있을 것 같아서.\"\r\n\r\n\r\n[음성 로그 발췌 · 3]\r\n\r\n\"얼마나 지났지? 세기 귀찮아. 대충 다섯 달 좀 넘었겠지.\r\n\r\n나랑 토리는 지금 기업 안전 이사회 녀석들이랑 섞여서 다니고 있어. 임시로. 어디든 찍을 게 있는 곳이면 그쪽으로 가.\"\r\n\r\n\"이 친구들이 오늘 한바탕 거하게 깨졌거든. 후퇴하다가, 똑같이 꼴이 말이 아닌 다른 패거리랑 마주쳤지. 작업자 연합 지휘부 쪽 사람들이더라. 양쪽이 서로를 30초 쯤 쳐다봤는데, 아무도 말이 없었어. 누구도 무기에 손을 뻗지 않았고, 그냥 스쳐 지나갔다고. 진짜 웃기지... 문제는, 난 하나도 웃음이 안 나온다는 거야.\"\r\n\r\n\"여긴 싸우기 싫고, 저기도 싸우기 싫은데, 전쟁은 왜 다섯 달 넘게 계속된 거지? 이유가 뭐야? 너는 알아, 토리?\"\r\n\r\n\"아, 맞다. 토리 지금 밖에 나가서 찍고 있어. 가지 말랬는데, 말을 안 들어처먹어. 난 그 녀석이 아직 카메라를 들 힘이 있는 게 부러워. 나는 내가 뭘 찍는지도 모르겠고, 찍고 싶지도 않아. 누가 이따위 다큐를 보고 싶어 하겠냐. 그래도 토리가 맞긴 해. 누군가는 이 빌어먹을 일들을 남겨야 한다고.\"\r\n\r\n\"토리가 통조림이랑 바꿔 온 그 검도 아직 있어. 그거 덕분에 우린 지금까지 살아남았지. 그 검의 원래 주인도 이번에 전장에 나갔다고 하더라. 근데 얼마 전에 죽었대. 아겔로스 전쟁 때의 옛 전우에게 칼을 겨누길 거부해서. 하. 이번엔 나도 웃음이 나오네. 설마 내가 진짜 미친 건가?\"\r\n\r\n\"젠장, 밖에서 또 시작이야. 누가 누구랑 싸우는지도 모르겠어. 난 한 번도 제대로 안 적이 없거든.\"\r\n\r\n\"...[컬럼비아 욕설], 토리는 왜 아직도 안 돌아오지?\"\r\n\r\n\r\n[흐릿하게 흔들리는 영상]\r\n\r\n\"...하하! [컬럼비아 욕설]! 이겼다, 친구! 우리의 전쟁이 드디어 하늘을 미치게 만들었어! 이건 오리지늄 재앙이야. 탈로스 II의 첫 오리지늄 재앙. 단독 첫 공개라고! 봐, 테라랑 얼마나 닮았는지! 봤어, 토리?! 너도 여기 있었어야 했는데! 나랑 같이! 이 영화 상 탄다, 토리! 이 영화 제목 좀 지어 줘, 토리! 생각해 보자... 그래! '영광스러운 [컬럼비아 욕설]의 기억'이라고 하자! 맞아, 맞아. 우리 [컬럼비아 욕설] 상 탄다!!\"\r\n\r\n\"오, 저기 봐. 탑이 무너져 내린다... 완벽한 엔딩 샷이야! 축하해, 인류여!\"", "weaponId": "wpn_sword_0017", "rarity": 6}, {"name": "향수", "type": "권총", "description": "홍산 선검국이 개발한 총기, 홍산 과학원 무장 부대의 기본 방침에 맞추기 위해 디자인 단계에서 무게를 줄였고, 그립감을 최적화했습니다.", "lore": "\"월병 만들자.\" 내가 툭 내뱉었다.\r\n\r\n\r\n이슨은 순간 멍한 표정을 지었지만, 그 뒤에 있던 볼코프가 술병을 쿵 내려놓더니 허벅지를 찰싹 때리며 맞장구를 쳤다. \"월병! 친구들! 월병 만들자!\"\r\n\r\n\r\n이슨은 손을 휘휘 저어 코앞의 술 냄새를 쫓으려다, 소용없다는 걸 깨닫고는 포기해 버렸다. 그는 볼코프에게 대체 월병이 뭐냐고 꼬치꼬치 캐물었다. 이 작자가 정말 취한 게 아닌지 확인하고 싶었던 모양이다. 하지만 불행히도 볼코프는 \"빵이지 뭐, 우리 우르수스 공단에도 빵은 있다고.\" 같은 주정 섞인 헛소리만 더듬더듬 반복할 뿐이었다. 그러자 이슨은 다시 나를 바라봤다.\r\n\r\n\r\n\"난 그냥...\"\r\n\r\n\r\n\"좋아.\"\r\n\r\n\r\n내가 '농담'이라는 두 글자를 입 밖에 내기도 전에, 이슨이 먼저 찬성했다. 녀석은 염국의 역사와 풍습을 나보다 더 훤히 꿰고 있는 사람이다. 중추절까지 아직 한 달 반이나 남았고, \"월병을 만들자\"라는 말이 내 즉흥적인 헛소리였다는 걸 모를 리 없었다. 그런데도 지금, 나는 알 것 같았다. 마치 컬럼비아의 진지함을 죄다 한 몸에 짊어진 듯한 이 남자가, 왜 우리 장단에 맞춰 미친 척을 해주는지.\r\n\r\n\r\n아겔로스 전쟁이 끝났기 때문이다.\r\n\r\n\r\n얼마 전, 승전보가 전선에서 우리 통신 초소로 날아들었다. 관리자와 40명의 영웅이 오로라 실드를 뚫고 들어가 적을 끝장냈고, 인류는 마침내 아겔로스 전쟁에서 해방되었다는 이야기였다. 처음에는 우리도 믿지 않았다. 그런데 며칠이 지나도록 머리 위를 스치는 앵커가 손에 꼽을 정도로 줄었고, 초소를 덮치던 아겔로스도 씨가 마른 듯 보이지 않았다. 그제야, 전쟁이 정말 끝났을지도 모른다는 실감이 났다.\r\n\r\n\r\n하지만 안타깝게도, 전쟁은 우리 마음속에서 그렇게 쉽게 사라져 주지 않았다.\r\n\r\n\r\n우리 셋은 평화로운 삶에 적응하는 법을 잊어버린 것 같았다. 나는 잘려 나간 손을 멍하니 내려다보고, 볼코프는 몰래 부동액을 들이키고, 이슨은 일기를 썼다. 하지만 나는 그 일기장을 훔쳐본 적이 있다. 죽음, 전우, 고향... 문장조차 되지 못한 단어들만 종이 위에 널브러져 있었다. 그 단어들이 내게 상처를 입혔다. 수많은 해가 흘러, 풋내기 소년이던 나는 이제 중년이 되었고, 운 좋게 살아남았다. 그렇다면 나는 어떤 대가를 치렀고, 무엇을 잊어버린 걸까? 나는 상촉 옛집의 돌계단을 떠올려 보려 했고, 중추절에 조부모님이 월병을 빚던 순서를, 내 눈앞에서 처음 죽어간 전우의 얼굴을 떠올려 보려 했다. 하지만 그 모든 건 이미 흐릿하기만 했다.\r\n\r\n\r\n문득, \"월병을 만들자\"는 생각이 우스꽝스럽게 느껴졌다. 탈로스 II에는 달이 없다. 사람들이 '달'이라 부르는 건 탈로스 I이다. 설령 천사부 동료들이 만년력을 펼쳐 염국의 절기를 통째로 탈로스 II에 옮겨 심는다 한들, 그게 무슨 소용일까. 달은 가짜이고, 24절기 또한 이곳의 기후와 맞지 않는다. 여기는 우리 집이 아니다. 우린 이미 갈 곳 잃은 객귀 신세니까. 우리가 두려워하는 건 탈로스 II 그 자체였다. 수없이 반복되는 악몽 속에서, 새로운 괴물이 바다에서 기어 나오고, 새로운 괴물이 별하늘에서 쏟아진다. 우리의 투지와 기개는 남쪽으로 철수하던 행군 길에서 이미 짓이겨져 가루가 되었다.\r\n\r\n\r\n\"월병 만들자.\" 그런데도 나는 고집을 부렸다.\r\n\r\n\r\n이슨은 박력분으로 반죽을 빚었고, 나는 에너지 바를 으깨고 초콜릿을 섞어 소를 만들었다. 볼코프는... 오리지늄 아츠로 물을 얼려, 간신히 틀 비슷한 걸 깎아냈다. 두 시간 뒤, 우리는 둘러앉아 약간의 단맛과 온기만이 느껴지는 갈색 반죽을, 턱이 아플 정도로 힘겹게 씹어 삼키기 시작했다. 볼코프는 \"이게 정통 월병 맛이로군.\"이라며 감탄했고, 나는 잠시 생각하다가 입에 담기 힘든 말을 꾹 눌러 삼켰다. 또 두 시간이 지나 눈을 떠보니, 나는 눈밭에 대자로 뻗어 있었다. 부동액은 확실히, 아무나 넙죽넙죽 마실 물건이 아니었다. '달'이 시야로 쏟아졌다. 문득, 창백한 탈로스 I이 테라의 달보다 조금 더 밝아 보인다는 생각이 들었다. 아쉽게도 고향의 달에 대한 기억은 이미 몹시 흐릿했지만. 그래도 괜찮지 않나? 부동액 속 알코올이 내게 속삭였다. 그래, 나는 대답했다. 우리는 이미 새로운 달을 얻었다고. 낯선 땅에서, 인류는 두 발을 굳게 디뎠다고.\r\n\r\n\r\n그제야, 나는 전쟁이 정말로 떠나가는 걸 느꼈다. 이 행성은 여전히 두려운 곳이지만, 내 안에서는 아주 작은 희망이 싹트기 시작했다. 나는 초소로 돌아가, 볼코프와 이슨이 막 들어온 정보들을 나누는 소리를 들었다. 유랑자 캠프의 소규모 충돌, 그리고 다른 초소들에서도 조용히 명절 인사를 주고받고 있다는 소식... 전쟁은 떠났고, 수수께끼 투성이인 거대한 탈로스 II가 우리를 기다리고 있다. 이제부터는 미래를 다시 세우는 시대다. 인류는 다시 한 번 희망을 손에 넣었다. 나는 그렇게 믿었다.\r\n\r\n\r\n- 치욕의 전쟁 발발 전야, 어느 천사의 일기", "weaponId": "wpn_pistol_0007", "rarity": 6}, {"name": "반항", "type": "권총", "description": "홍산 선검국이 개발한 총기, 디자인은 간단하지만 재료가 탄탄하고, 휴대가 편리하여 각종 복잡한 환경에서도 제약 없이 사용할 수 있습니다.", "lore": "마지막으로 '아겔로스'를 마주한 건 백 일 전이었다. 2월, 우리는 마지막 소탕 작전을 수행 중이었다. 앵커가 추락했을지도 모르는 의심스러운 구덩이를 점검하던 참이었다. 우리가 막 구덩이 가장자리에 도착했을 때, 그 아겔로스는 아무런 예고도 없이 대열 후방에 나타났다. 첫 희생자는 유 선생이었다. 놈이 유 선생의 천사의를 베어버리며 날카로운 굉음을 낼 때까지, 그의 경보기는 침묵했다. 그제야 우리는 죽음이 코앞에 닥쳤음을 알았다. 토빈은 반응이 빨랐다. 그는 즉시 놈의 복부에 사격을 가했다. 놈이 기괴한 비명을 지르며 칼날 같은 꼬리를 휘둘렀다. 토빈과 카친스키는 피하지 못했지만, 대신 내 앞을 막아 그 공격을 받아냈다. 그 덕에 나는 마지막 남은 총알을 놈의 몸뚱어리에 박아 넣을 수 있었다. 아겔로스는 고통스러운 듯 땅으로 곤두박질쳤다. 놈들은 감각이 없고, 고통도 느끼지 않는다고들 한다. 참 불공평한 일이다.\r\n\r\n그 이후로 나는 더는 아겔로스를 보지 못했다.\r\n\r\n\r\n전쟁은 끝났다.\r\n\r\n\r\n\r\n서훈식은 북쪽 근거지에서 열렸다. 탁월한 전공을 세운 전사들을 집단으로 표창하는 자리였다. 나는 158초소의 유일한 생존자로서, 수훈 대열 한가운데를 걸었다. 내 앞뒤에는 나와 같은 노병들이 있었다. 이제는 개나 소나 전쟁 영웅이라 불리는 판국에, 다들 의식을 위해 빳빳한 새 제복을 걸치고 있었다. 나는 마지막으로 새 제복을 입었던 때를 떠올렸다. 탈로스 II에 처음 왔을 때였다. 개척 지역 지방 위원회가 블랙홀 프로토콜의 정신을 관철한다며 마련한 첫 합동 결혼식. 신랑 신부만 52쌍이었다. 염국에서, 우르수스에서, 빅토리아에서... 모두들 낯선 세계에서 연을 맺었고, 나도 그중 하나였다. 그때의 나는 젊었고, 문 하나를 통과하는 것만으로도 평생의 용기를 다 써버린 상태였다. 유 선생도 그때는 젊었다. 갓 천사가 되어 의기양양했지. 그는 내 손을 잡고 말했다. 두려워하지 말라고. 앞에 어떤 험난함이 있든, 함께 넘어가자고. 이 행성은 우리의 새로운 보금자리가 될 거라고... 그게 벌써 15년 전이었다.\r\n\r\n\r\n지금 나는, 주 시상대까지 이어지는 긴 통로를 홀로 걷는다. 회장 쪽에서 터져 나오는 환호는 뜨겁지만, 어딘가 아득하게만 들린다. 나는 수훈을 기다리는 사람 수를 세어 보았지만, 끝이 보이지 않았다.\r\n\r\n\r\n전쟁은 끝났다.\r\n\r\n\r\n\r\n전쟁의 대가는 상상보다 훨씬 참혹했다. 북쪽에서 흘러든 유랑자 행렬은 전쟁이 끝난 뒤에도 끊기지 않았고, \"우리가 이전에 세웠던 모든 것이 잿더미가 되었다\"는 소식만을 날랐다. 유랑자들은 모든 수용 구역을 가득 메웠다. 10여 년 전 한창 번성하던 공업 시설은 이제 허름한 흰색 임시 수용 주택으로 변해 있었다. 곧, 폭동 소식이 들려왔다. 2호 개발구에서 작업자와 기업의 병사들이 충돌했고, 양측은 전면전 선포 직전까지 갔다. 전운이 감돌자 천사부 내부의 신경도 곤두섰다. 어떤 천사들은 서로를 '프로토콜파', '안티 프로토콜파'로 갈라 부르기 시작했다. 마치 갈등과 대립을 우리 곁으로 끌어들이지 못해 안달 난 사람들처럼. 유 선생의 동창인 원 천사는 여러 차례 천사부에 청원을 올려, 내부에서 날로 커지는 대립 정서를 공개적으로 해결하자고 호소했다. 하지만 그때마다 \"중립을 지키며 흔들리지 않는다\"는 허울 좋은 핑계로 묵살당했다. 누군가는 궤도에 있는 제강호와 연락을 시도했지만, 엔드필드 공업조차 침묵을 지켰다. 그러다 홍산 1번 질량 가속기가 습격당했다. 그제야 중립이라는 위선의 가면은, 동료들 사이에 이미 오래전부터 벌어진 틈을 더는 가리지 못했다.\r\n\r\n\r\n어느 날, 한 무리의 전문 농업인들이 어떻게 했는지 홍산 1번 에너지 공급 시설로 침입했지만, 곧 천사들에게 제압당했다. 그들은 갇힌 채로 목청껏 따졌다. \"왜 스타게이트를 고치지 않지? 왜 이 가속기로 우리를 집에 보내주지 않는 거야?\" 천사들은 대꾸하지 않았다. 그저 그들을 독방에 처넣었을 뿐. 체포된 사람들 가운데는 열 살도 채 안 된 필라인 아이가 하나 있었다. 아이는 아버지에게 물었다. \"아빠, 우리는 왜 집에 가야 해요? 우리 집은 여기 아니에요?\" 아버지는 딸아이의 물음에 아무 말도 하지 못했다.\r\n\r\n\r\n우리는 그 아이에게 뭐라고 말할 수 있을까. 이 거대한 '유랑자 캠프'가 네 집이라고? 애초에 왜 테라를 떠났는지, 왜 이 행성에 발을 들였는지? 우리 자신도 거의 잊어가고 있는데.\r\n\r\n\r\n우리는 스스로 쌓아 올린 감옥에, 스스로를 가두어 버렸다.\r\n\r\n\r\n전쟁은 끝났다.\r\n\r\n\r\n\r\n정오 무렵, 누군가 고의로 일으킨 작은 소란이 순찰 중인 천사들의 시선을 끌었다. 우리는 숨어 있던 차량에서 나와 경계선을 넘었다. 홍산을 빠져나가는 마지막 관문에 젊은 천사가 홀로 경비를 서고 있었다. 녀석의 시선이 우리와 마주쳤다. 나는 총알을 약실로 밀어 넣었지만, 녀석의 경보기는 울리지 않았고 아츠 유닛을 들어 올리지도 않았다.\r\n\r\n\r\n\"저는 원 천사님의 제자입니다. 여기서 기다리고 있었습니다.\" 내가 놀라 멈칫한 사이, 그가 말했다.\r\n\r\n\r\n\"그럼 원 천사는?\"\r\n\r\n\r\n\"사부님께서 말씀하시길, 떠나는 일은 나눠서 하는 게 중요하다고 하셨습니다. 사부님은 이미 여러분보다 한발 앞서 떠나셨습니다. 새 보금자리를 찾겠다고 하신 이상, 결코 여러분을 저버리지 않으실 겁니다.\"\r\n\r\n\r\n그는 그러면서, 푸른 대나무에 새긴 패 한 장을 내 손에 쥐여 주었다. 대나무 패에는 두 글자가 새겨져 있었다. 청파.\r\n\r\n\r\n\"성 밖으로 나가 산중에 이르면, 그분이 직접 와서 맞이해 줄 겁니다.\"\r\n\r\n\r\n전쟁은 끝났다.", "weaponId": "wpn_pistol_0011", "rarity": 6}, {"name": "늑대의 혈흔", "type": "한손검", "description": "레이시언 공업이 생산한 인기 장검. 암시장 경로를 통해 문명 밴드 밖으로 유통되며, 랜드브레이커 사이에서 특히 인기가 높습니다. 많은 이들이 여기에 특수 개조 모듈을 추가하곤 합니다.", "lore": "남자는 안으로 들어오자마자 번개처럼 재빠르게 간이 병영의 문을 닫아걸었습니다. 문은 짧고 날카로운 비명을 한 번 내지르기도 전에 마지못해 닫히며, 차가운 바람을 밖으로 밀어냈습니다. 그는 좌우를 훑어보고는 길게 숨을 내쉬었습니다. 칸막이 안쪽의 딸아이는 깨지 않았습니다. 올해 네 살, 울프팀의 새끼들 중에서도 가장 재우기 까다로운 아이였습니다.\r\n\r\n\r\n아내는 무기를 손질하고 있었고, 조준경과 아츠 유닛을 분해해 책상 위에 빼곡히 펼쳐두고, 문이 닫히던 순간에도 그녀는 단검 하나를 온 신경을 쏟아 갈고 있었습니다.\r\n\r\n\r\n\"무기 거치대 청소라도 하게?\"\r\n\r\n\r\n남자는 책상 맞은편에 앉아, 손에 든 단검으로 고기 군량 통조림을 툭 하고 따냈습니다. 데워 둔 덕에 지금 먹기 딱 좋은 온도였습니다.\r\n\r\n\r\n\"내 추측이 틀릴 리 없잖아. 여보, 곧 이걸 쓸 일이 생길 텐데, 아니야?\"\r\n\r\n\r\n\"사실은 농담 한 번 던지려고 했어. '사냥 회의에서 네 판단 완전 틀렸더라'고 말해 주려고. 근데 저 늙은 늑대들이 입에서 뱉는 말이란 게, 마치 네가 여기서 미리 대본이라도 외워 둔 것 같더라... 내가 졌어. 다음 한 주는 내가 우리 귀염둥이를 재우지... 그래도 말이야, 진 게 그렇게까지 억울하지 않은 건 아니고.\"\r\n\r\n\r\n여자는 갈아낸 칼을 남편에게 휙 던져 손맛을 보라는 듯 고개짓하더니, 곧바로 총 한 자루를 집어 탄환을 장전하기 시작했습니다.\r\n\r\n\r\n\"울프팀과 제이컵 쪽이 원래부터 한목소리였던 적이 없어. 분열은 언젠가 터질 일이었지... '친구'가 아니게 되면 남는 관계는 하나뿐이야. 사냥꾼과 사냥감... 사냥해서, 우리 배를 채우는 거지. 바로 클래니벌.\"\r\n\r\n\r\n\"클래니벌... 이 말 마음에 드네. 회의 때 늙은 로이가 뭐라 했더라, '문명 밴드가 본 크러셔들의 목을 죄는 손을 더 조여 온다. 늑대가 그 때문에 죽을 순 없으니, 친구의 살이 과연 달콤한지 맛보자'... 하하, 늙은이답게 말만 번지르르해.\"\r\n\r\n\r\n\"그래서 목표는?\"\r\n\r\n\r\n\"본 크러셔. 걔들은 제이컵을 너무 좋아해. 광신적이라 속이 좀 울렁거릴 정도야.\"\r\n\r\n\r\n\"당신 임무는?\"\r\n\r\n\r\n\"아마 걔들 지옥의 용광로를 파괴하는 쪽? 오늘 밤 물자만 낚아채고, 빠지면 돼. 울프팀이 했다는 흔적도 안 남아. 반 시간 뒤 출발... 내일 아침밥도 먹을 수 있겠네.\"\r\n\r\n\r\n\"딸이랑 인사는 하고.\"\r\n\r\n\r\n\"...깨우지 말자.\"\r\n\r\n\r\n\"정말?\"\r\n\r\n\r\n\"그래. 이 임무, 위험한 것도 아니고...\"\r\n\r\n\r\n'쿵'.\r\n\r\n\r\n남자는 아내가 총을 책상 위에 내리치는 둔탁한 소리를 들었습니다. 얼음처럼 차가운 눈빛을 보았고, 아직 다 장전하지 못한 탄환이 책상 위를 굴러 바닥으로 떨어져, 구석으로 데구르르 굴러가는 것도 보았습니다. 순간 그는 알았습니다. 아내가 그의 거짓말을 이미 꿰뚫어 봤다는 걸.\r\n\r\n\r\n\"나한테 거짓말하지 마.\"\r\n\r\n\r\n\"난 거짓말 같은 건...\"\r\n\r\n\r\n\"회의의 진짜 내용, 맞히기 어렵지도 않아... 제이컵과 문명 밴드의 협상은 결렬됐고, 그와 그의 충복들은 끝난 거고... 너희가 하려는 건 딱 하나뿐이지... 이 소용돌이 속에서 울프팀을 살리는 것.\"\r\n\r\n\r\n여자는 깊게 숨을 내쉬었습니다.\r\n\r\n\r\n\"늑대가 늑대를 죽여. 집단 내부에서 숙청이 벌어질 거고, 제이컵을 따르던 자들은 제거될 거야. 그뿐이겠어? 약탈과 살육으로 문명 밴드에 '이름'을 남긴 늑대들조차 피의 대가를 치르고, 황무지에서 죽겠지. 그리고 너희 중 일부는 다른 집단을 습격하러 보내질 거야. 숨기지도 않고, 그냥 대놓고. 그건 신호야. 문명 밴드는 이제 공격하기 가장 좋은 때가 왔다는 걸 알 거고, 울프팀이 다른 랜드브레이커들과는 길이 다르다는 것도 알겠지... 너희는 랜드브레이커들의 멸망을 앞당기려는 거야... 누군가는 일부러 죽으러 가고, 그 죽음으로 집단의 연명을 바꾸려 하지.\"\r\n\r\n\r\n\"어떻게 알았어?\"\r\n\r\n\r\n\"내가 죽인 사람이 당신보다 훨씬 많거든, 여보. 죽음이 당신 눈 안에서 흐르고 있어.\"\r\n\r\n\r\n\"그래도 난 두렵지 않아... 어쩌면 눈을 감으면, 할아버지가 고향에서, 시라쿠사의 장원에서 날 기다리고 있는 게 보이겠지... 그리고 말할 거야. 아내와 딸, 그리고 다른 새끼 늑대들을 내가 잘 지켰다고. 우리의 피가 이어졌다고. 비옥한 초원에서 달리든, 도시의 어두운 골목에서 골드티켓을 세든, 아예 탈로스 II를 껴안고 집단의 이름으로 가문의 이름을 씻어내든... 어떤 삶이든, 선택은 울프팀이 스스로 하는 거라고...\"\r\n\r\n\r\n\"나도 같이 갈게.\"\r\n\r\n\r\n\"안 돼. 내가 죽음을 택하고, 이 사냥에 들어가는 건 너희들 때문이야. 고향을 잊어도, 가문을 버려도, 너희는 살아야 해. 나는...\"\r\n\r\n\r\n남자는 더는 말을 잇지 못했습니다. 그의 눈앞, 아주 가까운 곳에 작은 손바닥이 펼쳐져 있었습니다. 손바닥 한가운데에는 방금 굴러 떨어진 그 탄환이 올려져 있었습니다.\r\n\r\n\r\n\"아빠, 사냥... 파이팅...\"\r\n\r\n\r\n깨어난 딸아이는 대화를 전부 듣진 못했지만, 이 정도면 충분했습니다. 계획했던 '말없이 떠나기'는, 차가운 바람 속을 오래 맴돌다 끝내 굳혀 온 신념은, 그 조그마한 격려 한마디에 조용히 부서졌습니다. 남자는 죽음의 강 한가운데서, 단숨에 기슭에 오른 듯했습니다.\r\n\r\n\r\n\"나는...\"\r\n\r\n\r\n\"피가 우릴 이어 주니까, 그래서 이어질 수 있는 거잖아?\"\r\n\r\n\r\n부드러운 손, 작은 손, 거친 손이 한데 포개졌다.\r\n\r\n\r\n\"새끼 늑대들이 황무지를 마음껏 달릴 수 있을 때까지, 누구도 우리를 죽일 수 없어. 그 누구도.\"", "weaponId": "wpn_sword_0022", "rarity": 6}];

const RARITY_COLORS = {6:'#ff7100',5:'#ffcc00',4:'#b380ff',3:'#33C2FF'};
const RARITY_LABELS = {6:'★★★★★★',5:'★★★★★',4:'★★★★',3:'★★★'};
const TYPE_ICONS = {'한손검':'⚔','양손검':'⚔','장병기':'🗡','권총':'🔫','아츠 유닛':'✦'};

let activeRarity = 'all';
let activeType = 'all';
let searchQuery = '';
let selectedIdx = null;

function getFiltered() {
  return WEAPONS.filter((w,i) => {
    w._origIdx = i;
    if (activeRarity !== 'all' && w.rarity !== parseInt(activeRarity)) return false;
    if (activeType !== 'all' && w.type !== activeType) return false;
    if (searchQuery && !w.name.includes(searchQuery)) return false;
    return true;
  });
}

function renderList() {
  const filtered = getFiltered();
  const list = document.getElementById('weapon-list');
  document.getElementById('weapon-count').textContent = filtered.length;

  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-results">조건에 맞는 무기가<br>없습니다</div>';
    return;
  }

  list.innerHTML = filtered.map((w,i) => {
    const color = RARITY_COLORS[w.rarity];
    const stars = '★'.repeat(w.rarity);
    const sel = selectedIdx === w._origIdx ? 'selected' : '';
    return `<div class="weapon-item ${sel}" data-idx="${w._origIdx}" onclick="selectWeapon(${w._origIdx})">
      <div class="rarity-dot" style="background:${color}"></div>
      <div class="weapon-item-info">
        <div class="weapon-name-list">${w.name}</div>
        <div class="weapon-meta">${w.type} &nbsp;·&nbsp; <span class="rarity-stars" style="color:${color}">${stars}</span></div>
      </div>
    </div>`;
  }).join('');
}

function selectWeapon(origIdx) {
  selectedIdx = origIdx;
  const w = WEAPONS[origIdx];
  
  document.getElementById('empty-state').style.display = 'none';
  const detail = document.getElementById('weapon-detail');
  detail.style.display = 'block';
  
  const color = RARITY_COLORS[w.rarity];
  const stars = RARITY_LABELS[w.rarity];
  
  // Clean lore: strip outer quotes if present
  let lore = w.lore || '';
  if (lore.startsWith('"') && lore.endsWith('"')) lore = lore.slice(1,-1);
  lore = lore.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  
  // Remove rc-* classes, add new
  detail.className = 'weapon-detail rc-' + w.rarity;
  detail.style.setProperty('--rarity-color', color);
  
  detail.innerHTML = `
    <div class="detail-header">
      <div class="detail-rarity-badge" style="color:${color};border-color:${color}40;background:${color}10">
        ${stars} &nbsp; RARITY ${w.rarity}
      </div>
      <div class="detail-name">${w.name}</div>
      <div class="detail-type-row">
        <div class="detail-type-tag">${TYPE_ICONS[w.type] || '⚔'} ${w.type}</div>
        <div class="detail-id">ID: ${w.weaponId}</div>
      </div>
    </div>

    <div class="section-block">
      <div class="section-label">무기 설명</div>
      <div class="desc-box">${w.description}</div>
    </div>

    ${lore ? `<div class="section-block">
      <div class="section-label">무기 스토리</div>
      <div class="lore-box">
        <div class="lore-text">${escHtml(lore)}</div>
      </div>
    </div>` : ''}
  `;

  document.getElementById('panel-center').scrollTo({top:0});
  renderList(); // re-render to update selected state
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Filter buttons
document.querySelectorAll('.filter-btn[data-rarity]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn[data-rarity]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeRarity = btn.dataset.rarity;
    renderList();
  });
});

document.querySelectorAll('.filter-btn[data-type]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn[data-type]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeType = btn.dataset.type;
    renderList();
  });
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  renderList();
});

renderList();
</script>
